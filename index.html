{id:63,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Cost Allocation Tags",
q:"A company has 15 development teams sharing one AWS account. Finance needs a monthly bill breakdown by team and project. What is the minimum configuration required?",
o:["Create separate IAM users per team — billing auto-tracks per user","Apply tags (Team, Application) to all resources → activate as cost allocation tags in the Billing console → use Cost Explorer to filter/group by tag","Enable AWS Organizations so each team gets its own bill","Use AWS Budgets with team names in the budget names"],
c:1,
e:"<strong>Correct: Tags → Cost Allocation Tag activation → Cost Explorer.</strong> Three required steps: (1) Tag all billable resources (EC2, RDS, S3, Lambda, etc.) with consistent tags: Team:DataPlatform, Application:Phoenix. (2) Activate these tag keys as cost allocation tags in Billing Console → Cost Allocation Tags (takes up to 24 hours to appear in billing data). (3) Use Cost Explorer: Group By → Tag Key → Team or Application. Key limitations: tags only apply prospectively — no retroactive tagging. Untagged resources appear as 'no tag.' Enforce tagging via AWS Config rules or SCPs. For cleanest separation, separate accounts (Organizations) is ideal — but same-account tagging is the practical solution for a single-account environment."},

// ── GLOBAL ACCELERATOR ──
{id:64,domain:"High-Performing Architectures",topic:"Networking",sub:"Global Accelerator",
q:"A financial trading application needs the lowest possible and most CONSISTENT latency from global clients to an ALB in us-east-1, for standard HTTPS traffic. Standard internet routing has variable, unpredictable performance. What addresses this?",
o:["CloudFront — caches HTTPS responses at edge locations globally","AWS Global Accelerator — routes traffic over AWS's private global network from the nearest edge PoP to us-east-1; provides static anycast IPs","Route 53 latency routing pointing all users to us-east-1","Add more EC2 instances behind the ALB"],
c:1,
e:"<strong>Correct: AWS Global Accelerator.</strong> Global Accelerator assigns 2 static anycast IPs. Users connect to the nearest AWS edge PoP (130+ globally), then traffic travels on AWS's private, optimized network backbone to your ALB in us-east-1 — avoiding unpredictable public internet routing. This reduces latency variability significantly and improves consistency. Key distinction vs CloudFront: CloudFront caches HTTP content at the edge (static assets, video). Global Accelerator does NOT cache — it accelerates all traffic types (TCP/UDP/HTTP) using network-level optimization. Use CloudFront for cacheable content; Global Accelerator for dynamic, non-cacheable, or non-HTTP traffic that benefits from consistent network performance."},

// ── STORAGE GATEWAY ──
{id:65,domain:"Resilient Architectures",topic:"Storage Gateway",sub:"File Gateway",
q:"An on-premises application writes files to a local NFS share. The company wants to transparently back up all new files to S3 without modifying the application or changing the NFS interface. What AWS service enables this?",
o:["AWS DataSync — transfers files to S3 on a schedule","Volume Gateway (Cached) — iSCSI block storage backed to S3","File Gateway — deploys on-premises as a VM; presents NFS/SMB; files written to the gateway are stored as S3 objects transparently","AWS Direct Connect with S3 bucket mounted via NFS"],
c:2,
e:"<strong>Correct: File Gateway.</strong> Storage Gateway types: File Gateway: on-premises VM presenting NFS/SMB. Files written to it are stored as S3 objects. Application sees a normal file share — no code changes. Frequently accessed data is cached locally. Volume Gateway Stored: iSCSI block volumes, all data on-premises, async backed up to S3 as EBS snapshots. Volume Gateway Cached: primary data in S3, frequently accessed data cached locally — also iSCSI block, not NFS. Tape Gateway: virtual tape library for backup software. DataSync is a data transfer service, not a transparent NFS-to-S3 gateway. File Gateway is the answer for 'NFS interface → S3 storage, no app changes.'"},

// ── MIGRATION ──
{id:66,domain:"Resilient Architectures",topic:"Migration",sub:"DMS",
q:"A company needs to migrate a 5TB Oracle database to Aurora PostgreSQL with MINIMAL downtime. The Oracle database must stay online serving traffic during the migration. What AWS tools achieve this?",
o:["AWS DataSync — transfers Oracle data files directly","Use AWS DMS alone — it handles schema conversion and live replication","AWS Schema Conversion Tool (SCT) to convert Oracle schema to PostgreSQL, then AWS DMS with full-load + CDC replication for near-zero-downtime cutover","Create an Aurora Read Replica of Oracle, then promote it"],
c:2,
e:"<strong>Correct: SCT (schema conversion) + DMS (full-load + CDC).</strong> Heterogeneous migration requires two tools: (1) AWS Schema Conversion Tool (SCT): converts Oracle DDL, stored procedures, functions, triggers, views to PostgreSQL equivalents. Flags manually-convertible items. (2) AWS DMS: Full Load copies existing data to Aurora; CDC (Change Data Capture) continuously replicates ongoing changes from Oracle to Aurora while the source stays live. When replication lag approaches zero, update connection strings and cut over — seconds of downtime. DMS does not convert stored procedures or schema — that's SCT's job. DataSync moves files, not database rows. Aurora can't natively replicate from Oracle."},

// ── STEP FUNCTIONS ──
{id:67,domain:"High-Performing Architectures",topic:"Serverless",sub:"Step Functions",
q:"A document processing pipeline runs 6 Lambda functions sequentially. Some steps take minutes. The team needs: visibility into which step each execution is in, automatic retries with exponential backoff, and routing failed executions to a notification step. What should they use?",
o:["Chain Lambda calls using SDK from within each Lambda function","Six SQS queues with Lambda triggers between each step","AWS Step Functions Standard Workflow — visual state machine with per-state Retry/Catch, full execution history, and 1-year max duration","Amazon EventBridge Pipes to chain Lambda invocations"],
c:2,
e:"<strong>Correct: AWS Step Functions Standard Workflow.</strong> Step Functions: visual state machine with full execution history (see every step's input/output per execution), per-state Retry (attempts, backoff rate, interval), Catch (route errors to specific states like a notification step), Parallel states (concurrent execution), Wait states, and integration with 200+ AWS services. Standard Workflows: exactly-once execution, up to 1 year, auditable — right for this use case. Express Workflows: at-least-once, 5-min max, high-throughput event processing. Lambda-calling-Lambda loses error context and creates tight coupling. SQS chains work but have no centralized visibility or orchestration. Step Functions is the purpose-built workflow orchestration service."},

// ── ELB ADVANCED ──
{id:68,domain:"Resilient Architectures",topic:"ELB",sub:"Deregistration Delay",
q:"During rolling deployments, users experience connection errors because in-flight API calls (taking up to 45 seconds) are cut off when their EC2 instance is removed from the ALB target group. What ALB feature prevents this?",
o:["ALB sticky sessions — keeps users on the same instance throughout their session","Auto Scaling cooldown period — delays the next scaling action","ALB Connection Draining (Deregistration Delay) — allows in-flight requests to complete before fully deregistering an instance; set to ≥45 seconds","ALB health checks removing unhealthy instances faster"],
c:2,
e:"<strong>Correct: Connection Draining / Deregistration Delay.</strong> When an instance is deregistered from an ALB target group (deploy or scale-in), Connection Draining keeps the instance in 'draining' state: ALB stops sending NEW requests to it but allows EXISTING in-flight connections to complete for up to the configured delay. Default: 300 seconds. Range: 0–3600 seconds. For 45-second API calls, set the delay to at least 60–90 seconds to provide buffer. After the delay expires, remaining connections are forcibly closed. Set delay ≥ your maximum expected request duration. This is a key zero-downtime deployment pattern alongside proper health check configuration."},

// ── EFS ──
{id:69,domain:"High-Performing Architectures",topic:"Storage",sub:"EFS",
q:"A CMS application runs on an Auto Scaling group where any instance can serve user-uploaded files. All instances need concurrent read/write access to the same file repository, and the storage must persist independently of any instance lifecycle. What is the correct storage solution?",
o:["EBS gp3 attached to each instance — each has its own copy","EBS io2 Multi-Attach — attach one volume to multiple instances","Amazon EFS — fully managed NFS mountable concurrently by thousands of EC2 instances across multiple AZs","S3 with a FUSE-based mount (s3fs) on each instance"],
c:2,
e:"<strong>Correct: Amazon EFS.</strong> EFS is a fully managed NFS file system that scales automatically (0 to petabytes), mounts concurrently on thousands of EC2 instances across multiple AZs, and persists independently of EC2 instances. Performance modes: General Purpose (latency-optimized, most workloads) and Max I/O (highly parallel, slightly higher latency). Storage classes: Standard (frequently accessed) and Infrequent Access (lower cost with lifecycle management). EBS gp3: one instance at a time (not shared). EBS Multi-Attach: io1/io2 only, same AZ, cluster-aware apps required — not for general shared storage. s3fs: not POSIX-compliant for concurrent writes, high latency. EFS is the standard answer for 'multiple EC2 instances sharing a file system.'"},

// ── ORGANIZATIONS ──
{id:70,domain:"Cost-Optimized Architectures",topic:"Organizations",sub:"Consolidated Billing",
q:"Account A in an AWS Organization purchased EC2 Reserved Instances that are no longer being used (no matching instances). Account B has On-Demand EC2 instances that exactly match Account A's unused RI type, size, OS, and region. What happens in consolidated billing?",
o:["Account A pays the full RI cost; Account B pays full On-Demand pricing — discounts don't cross account boundaries","Account B must purchase the RI from Account A through the Reserved Instance Marketplace","Consolidated billing automatically applies Account A's unused RI discount to Account B's matching On-Demand instances","Account A must contact AWS Support to transfer the RI benefit"],
c:2,
e:"<strong>Correct: RI discounts are automatically shared across the Organization.</strong> AWS Organizations consolidated billing treats all member accounts as a single billing entity for discount purposes. Unused RIs in any account automatically apply to matching On-Demand usage in other accounts within the same Organization — no action required. The same applies to Savings Plans. This makes purchasing RIs more valuable in an Organization because unused capacity in one account doesn't go to waste. Exception: the RI owner account can opt out of RI sharing (console setting) to keep discounts local. Cross-account RI sharing is a frequently tested Organizations billing concept."},

// ── API GATEWAY ──
{id:71,domain:"High-Performing Architectures",topic:"API Gateway",sub:"HTTP vs REST API",
q:"A team building a simple Lambda-backed API needs JWT authorization (from Cognito or Auth0) and wants the lowest cost and latency. They do NOT need API keys, request/response mapping templates, or usage plans. Which API Gateway type should they use?",
o:["REST API — full-featured, always the safest choice","HTTP API — up to 71% cheaper than REST API, lower latency, native JWT/OIDC authorizer, ideal for Lambda or HTTP backends","WebSocket API — for bidirectional real-time communication","Private REST API — for internal VPC-only APIs"],
c:1,
e:"<strong>Correct: HTTP API.</strong> HTTP API vs REST API: HTTP API is up to 71% cheaper in request costs, ~60% lower latency, native JWT authorizers (Cognito, Auth0, any OIDC), automatic CORS, Lambda proxy and HTTP proxy integrations. REST API adds: API keys/usage plans, request/response transformation (mapping templates), WAF integration, response caching, resource-based policies, VPC Links for private integrations. Decision rule: does the API need request/response mapping templates, API keys/usage plans, or WAF? → REST API. Otherwise → HTTP API is cheaper and faster. JWT authorization, Lambda, and CORS all work natively with HTTP API."},

// ── ELASTIC BEANSTALK ──
{id:72,domain:"Resilient Architectures",topic:"Elastic Beanstalk",sub:"Deployment Policies",
q:"An Elastic Beanstalk deployment must: (1) not impact current production traffic during rollout, (2) allow testing the new version with real traffic before full cutover, and (3) provide instant rollback. Which deployment strategy satisfies all three?",
o:["Rolling — replaces instances in batches, some old+new versions serving traffic simultaneously","Immutable — new ASG with new instances, shift traffic when healthy, rollback = terminate new ASG","Blue/Green — deploy to a cloned environment, test independently, swap environment URLs for cutover, swap back to rollback","All at Once — fastest deployment but causes downtime"],
c:2,
e:"<strong>Correct: Blue/Green deployment.</strong> Blue (current) environment keeps serving all traffic. Green (new) environment is cloned and deployed independently — fully testable in isolation before receiving any production traffic. When ready: 'Swap Environment URLs' in console performs a Route 53 CNAME swap. Instant rollback: swap URLs back to blue — blue environment was never terminated. Contrast: Immutable has no separate test environment (traffic shifts automatically when health checks pass), rollback requires terminating the new ASG (~5–10 minutes). Rolling has partial rollback complexity. Blue/Green is the 'test in isolation + instant rollback' answer. Extra cost: running two full environments simultaneously during the deployment window."},

// ── WELL-ARCHITECTED ──
{id:73,domain:"Resilient Architectures",topic:"Well-Architected",sub:"Reliability",
q:"According to the AWS Well-Architected Reliability pillar, which design principle best addresses the risk that a DR plan has never been validated and may not work during an actual disaster?",
o:["Design for failure by deploying across multiple AZs (this validates DR automatically)","Rely on AWS SLAs to guarantee recovery","Test recovery procedures: use Game Days, chaos engineering, and automated failure injection to regularly validate that DR actually works","Document the DR runbook thoroughly so operators can execute it correctly"],
c:2,
e:"<strong>Correct: Test recovery procedures (chaos engineering / Game Days).</strong> Well-Architected Reliability design principles: (1) Automatically recover from failure, (2) Test recovery procedures — a documented DR plan that has never been tested is a false sense of security. Game Days (scheduled failure simulations), chaos engineering (controlled fault injection), and AWS Fault Injection Service (FIS) are how you PROVE your recovery works before it matters. (3) Scale horizontally for availability, (4) Stop guessing capacity, (5) Manage change through automation. Multi-AZ deployment is a reliability best practice but doesn't validate that your recovery automation and runbooks actually work under simulated failure conditions."},

{id:74,domain:"Cost-Optimized Architectures",topic:"Well-Architected",sub:"Cost Optimization",
q:"A startup wants to identify the biggest cost drivers in their AWS bill and get specific recommendations for Reserved Instance and Savings Plans purchases to reduce compute costs. Which service provides both analysis AND purchase recommendations?",
o:["AWS Budgets — tracks spend against thresholds and forecasts","AWS Pricing Calculator — estimates costs for new architectures","AWS Cost Explorer — visualizes historical cost/usage; provides RI and Savings Plans purchase recommendations with projected savings","AWS Trusted Advisor — checks for underutilized resources"],
c:2,
e:"<strong>Correct: AWS Cost Explorer.</strong> Cost Explorer provides: (1) Cost and usage visualizations — by service, region, tag, account, daily/monthly, (2) Cost anomaly detection (ML-powered), (3) RI utilization and coverage reports (are you using RIs you bought?), (4) Savings Plans utilization and coverage, (5) RI purchase recommendations — shows which RIs to buy based on your actual On-Demand usage with projected savings. Combine with Trusted Advisor for specific resource-level findings. Budgets: alerts when spend exceeds thresholds — reactive, not analytical. Pricing Calculator: future cost estimation. Trusted Advisor: specific underutilized resource checks. Cost Explorer is the primary cost analysis and RI/SP optimization tool."},

// ── SNOW FAMILY ──
{id:75,domain:"Resilient Architectures",topic:"Migration",sub:"Snow Family",
q:"A media company needs to transfer 800TB of video archives from on-premises to S3. Their internet connection is 1 Gbps (shared with production traffic). A full online transfer would take over 80 days. They need the transfer completed in 2 weeks. What should they use?",
o:["AWS DataSync with bandwidth throttling to avoid impacting production","S3 Transfer Acceleration — speeds up uploads from remote locations","AWS Snowball Edge Storage Optimized — each device holds 80TB; ship 10+ devices to copy data locally, ship back to AWS, data loaded to S3","Provision a dedicated AWS Direct Connect circuit for the transfer"],
c:2,
e:"<strong>Correct: AWS Snowball Edge Storage Optimized.</strong> Each Snowball Edge Storage Optimized device: 80TB usable storage, 40 vCPUs for edge compute. For 800TB: ~10 devices. AWS ships them to your data center, you copy data (S3-compatible API or NFS), ship back, AWS loads to S3. Snow family: Snowcone (8TB HDD / 14TB SSD, small), Snowball Edge Storage Optimized (80TB), Snowball Edge Compute Optimized (52TB + more compute), Snowmobile (100PB — shipping container). Rule of thumb: if network transfer takes >1 week or would disrupt production, consider Snow devices. DataSync is limited by your available bandwidth. Direct Connect provisioning takes weeks and is expensive for one-time transfers."},

// ── BATCH 3: NEW TOPICS ──
{id:76,domain:"High-Performing Architectures",topic:"FSx",sub:"FSx for Windows vs Lustre",
q:"A media rendering farm requires a shared high-performance file system with sub-millisecond latency, hundreds of GB/s throughput, and native POSIX compliance. It must integrate directly with S3 so rendering jobs can read/write to the same dataset. Which FSx product is correct?",
o:["Amazon FSx for Windows File Server — SMB protocol, Active Directory integration","Amazon FSx for Lustre — high-performance parallel file system; native S3 integration; sub-ms latency","Amazon EFS — NFS, scales automatically","Amazon FSx for NetApp ONTAP — multi-protocol"],
c:1,
e:"<strong>Correct: Amazon FSx for Lustre.</strong> FSx for Lustre: open-source Lustre parallel file system designed for HPC, ML training, financial modeling, video processing. Key features: sub-millisecond latency, hundreds of GB/s throughput, millions of IOPS, native S3 integration (transparently presents S3 objects as files; writes back to S3). Deployment types: Scratch (temporary, no replication, cheapest) and Persistent (replicated within AZ). FSx for Windows: SMB protocol, Active Directory, Windows ACLs — designed for Windows workloads, not HPC rendering. EFS: NFS but significantly lower performance than Lustre for HPC. When the exam says 'HPC' or 'ML training' with S3 integration needs, FSx for Lustre is the answer."},

{id:77,domain:"High-Performing Architectures",topic:"FSx",sub:"FSx for Windows",
q:"A company's Windows applications use SMB file shares and require integration with their on-premises Active Directory for user authentication and Windows Access Control Lists (ACLs). The shares must be accessible from EC2 Windows instances and on-premises servers simultaneously. Which service fits?",
o:["Amazon EFS — NFS file system mountable on Linux","Amazon FSx for Lustre — POSIX-compliant HPC file system","Amazon FSx for Windows File Server — native SMB, Active Directory integration, Windows ACLs, Multi-AZ","Amazon S3 with S3FS — object storage mounted as file system"],
c:2,
e:"<strong>Correct: Amazon FSx for Windows File Server.</strong> FSx for Windows is a fully managed Windows file server built on Windows Server. Key features: native SMB (Server Message Block) protocol, Active Directory integration (AWS Managed AD or on-premises AD via AD Connector), Windows NTFS ACLs, DFS Namespaces (consolidate multiple file systems under one namespace), shadow copies (file snapshots), Multi-AZ deployment for HA with automatic failover. Accessible from EC2 Windows instances AND on-premises via Direct Connect/VPN. Exam trigger: 'SMB', 'Windows ACLs', 'Active Directory', 'DFS' → FSx for Windows. EFS/Lustre: NFS/POSIX, not SMB."},

{id:78,domain:"Secure Architectures",topic:"VPC",sub:"VPC Flow Logs",
q:"A security engineer needs to investigate whether specific traffic between two EC2 instances was actually accepted or rejected by Security Groups and NACLs, and what ports were used. Which AWS service captures this network traffic metadata?",
o:["AWS CloudTrail — captures API calls including Security Group rule changes","Amazon CloudWatch Metrics — EC2 network in/out statistics","VPC Flow Logs — captures metadata about IP traffic (source/dest IP, port, protocol, bytes, action: ACCEPT/REJECT)","AWS Inspector — scans for network vulnerabilities"],
c:2,
e:"<strong>Correct: VPC Flow Logs.</strong> VPC Flow Logs capture metadata about IP traffic to/from network interfaces in your VPC. Each log record includes: source/destination IP, source/destination port, protocol, packets, bytes, start/end time, and crucially the action (ACCEPT or REJECT — based on SG/NACL decisions). Can be published to CloudWatch Logs or S3. Scope: VPC-level, subnet-level, or individual ENI-level. Does NOT capture: actual packet contents, DNS queries (use Route 53 resolver query logs), DHCP traffic, or traffic to/from the Amazon DNS server. CloudTrail captures API calls (e.g., modifying Security Group rules) — not the actual network flows. CloudWatch Metrics shows total bytes in/out — no per-flow detail."},

{id:79,domain:"Secure Architectures",topic:"IAM",sub:"Access Analyzer",
q:"A company wants to automatically identify all S3 buckets, IAM roles, KMS keys, and SQS queues in their AWS account that are accessible by entities OUTSIDE the account (other AWS accounts, public access). Which service provides this continuously?",
o:["AWS Trusted Advisor — checks for publicly accessible S3 buckets only","Amazon Macie — identifies sensitive data in S3","AWS IAM Access Analyzer — continuously analyzes resource-based policies and identifies external access; generates findings","AWS Config — tracks resource configuration changes over time"],
c:2,
e:"<strong>Correct: AWS IAM Access Analyzer.</strong> Access Analyzer uses automated reasoning (provable security) to continuously analyze resource-based policies and identify resources shared with external principals (outside your account or organization). Supported resources: S3 buckets, IAM roles, KMS keys, SQS queues, Lambda functions, Secrets Manager secrets, SNS topics. Generates 'findings' for each externally accessible resource with details on who can access it and what actions they can perform. You set a 'zone of trust' (account or organization) — anything outside is flagged. Different from Macie (PII in S3) and GuardDuty (threat detection). Access Analyzer = 'who can access my resources from outside?'"},

{id:80,domain:"Resilient Architectures",topic:"SQS",sub:"Dead Letter Queue",
q:"An SQS Standard queue processes order events. Some messages consistently fail processing (corrupt data) and get retried endlessly, blocking processing of new messages and consuming Lambda invocations. What SQS feature should be configured?",
o:["Increase the SQS visibility timeout so messages have more time to process","Enable SQS FIFO to process messages in order","Configure a Dead Letter Queue (DLQ): after maxReceiveCount failures, messages are moved to a separate DLQ for inspection","Delete all failed messages immediately using the SQS console"],
c:2,
e:"<strong>Correct: Dead Letter Queue (DLQ).</strong> A DLQ is a separate SQS queue that receives messages that couldn't be processed successfully after maxReceiveCount attempts. Configuration: set the source queue's Redrive Policy with the DLQ ARN and maxReceiveCount (e.g., 3). After 3 failed processing attempts, SQS automatically moves the message to the DLQ. Engineers can then inspect DLQ messages to diagnose the root cause without losing the data. Can configure CloudWatch alarms on DLQ depth (NumberOfMessagesSent) to alert on message failures. Critical exam point: DLQs for SQS queues must be the same type (Standard→Standard, FIFO→FIFO). Lambda automatically uses a DLQ for async invocations."},

{id:81,domain:"High-Performing Architectures",topic:"SQS",sub:"FIFO Queues",
q:"An e-commerce application sends order events to SQS. Order events for the same customer MUST be processed in the exact order they were sent (place-order → payment → fulfill → ship). Duplicate processing must be prevented. Which SQS type is required?",
o:["SQS Standard queue — highest throughput, at-least-once delivery","SQS FIFO queue — exactly-once processing, strict ordering within a message group","SQS Standard queue with message group IDs","Any SQS queue with a Lambda consumer that sorts by timestamp"],
c:1,
e:"<strong>Correct: SQS FIFO Queue.</strong> FIFO queues guarantee: strict ordering (messages processed in the exact order received within a Message Group ID — use customerId as the group ID so each customer's events are ordered), exactly-once processing (content-based deduplication using MessageDeduplicationId — rejects duplicates within 5 minutes). Throughput: 300 messages/sec (or 3,000 with batching). Standard queues: best-effort ordering (messages can arrive out of order), at-least-once delivery (duplicates possible), unlimited throughput. FIFO has lower throughput — only use it when ordering and exactly-once are genuinely required. Message Group ID is the key FIFO concept: each group is independently ordered."},

{id:82,domain:"High-Performing Architectures",topic:"Lambda",sub:"Layers",
q:"Five Lambda functions all use the same 50MB data processing library. Currently the library is bundled into each function's deployment package, making each package large and slow to deploy. How should this be optimized?",
o:["Create one Lambda function that imports the others","Store the library in an S3 bucket and download it on every Lambda invocation","Use a Lambda Layer — package the shared library once; all 5 functions reference the same layer version","Use a container image for all Lambda functions and share the base layer"],
c:2,
e:"<strong>Correct: Lambda Layers.</strong> A Layer is a .zip archive containing libraries, dependencies, custom runtimes, or data. Functions reference layers by ARN — the layer is mounted to /opt in the function's execution environment. Benefits: (1) Smaller deployment packages — don't bundle the same library 5 times, (2) Shared code reuse across functions, (3) Separate versioning — update the library layer without redeploying every function, (4) Can be shared across accounts. Limits: up to 5 layers per function, total unzipped size (function + layers) ≤ 250MB. S3 download per invocation: slow, adds latency, bad practice. Layers are the canonical solution for shared dependencies across multiple Lambda functions."},

{id:83,domain:"Resilient Architectures",topic:"Lambda",sub:"Async Destinations",
q:"A Lambda function processes S3 upload events asynchronously. If it succeeds, a downstream SQS queue should be notified. If it fails after all retries (2 attempts), a different SNS topic should alert the ops team. What Lambda feature configures this routing?",
o:["Lambda DLQ — configure one DLQ for both success and failure","Lambda Event Source Mapping with error handling","Lambda Destinations — configure separate On Success and On Failure destinations for async invocations","SQS FIFO with separate success/failure queues"],
c:2,
e:"<strong>Correct: Lambda Destinations.</strong> Lambda Destinations route the result of async function invocations to different targets based on success or failure. Configuration: On Success → SQS queue (or SNS, EventBridge, another Lambda); On Failure → SNS topic (or SQS, EventBridge, another Lambda). The destination receives a JSON payload with the function response and execution details. Lambda retries async invocations twice before routing to On Failure destination. Key distinction vs DLQ: DLQ only handles failures (receives the original event). Destinations handle both success AND failure, and send the full invocation result/error context — more information for debugging. Prefer Destinations over DLQ for new Lambda async workflows."},

{id:84,domain:"High-Performing Architectures",topic:"Lambda",sub:"Concurrency",
q:"A critical payment-processing Lambda function must ALWAYS have capacity to run immediately with no cold starts, even during peak traffic. A separate batch function in the same account should NOT consume the capacity needed by the payment function. What concurrency settings achieve this?",
o:["Set account-level concurrency limit high enough for both functions","Use Provisioned Concurrency on the payment function (pre-initialized instances) + Reserved Concurrency to guarantee and cap the batch function","Enable Enhanced Monitoring on both functions","Use Lambda@Edge for the payment function to reduce latency"],
c:1,
e:"<strong>Correct: Provisioned Concurrency (payment) + Reserved Concurrency (batch).</strong> Lambda concurrency types: Reserved Concurrency: guarantees a pool of concurrency exclusively for that function AND caps its maximum — the batch function can't consume more than its reserved amount, protecting payment function capacity. It does NOT eliminate cold starts. Provisioned Concurrency: pre-initializes execution environments so functions respond immediately with no cold start — essential for latency-sensitive payment processing. Combined: payment function gets Provisioned Concurrency (no cold starts), batch function gets Reserved Concurrency (capped, can't starve payment). Account default concurrency limit: 1,000 per region (soft limit, can be increased)."},

{id:85,domain:"High-Performing Architectures",topic:"CloudFront",sub:"Lambda@Edge vs CloudFront Functions",
q:"A global e-commerce site uses CloudFront. They need to: (1) redirect users to locale-specific pages based on Accept-Language header (lightweight, <1ms needed), AND (2) validate JWTs in Authorization headers and make external API calls to an auth service before allowing origin access. Which function types handle each requirement?",
o:["Lambda@Edge for both — it handles all CloudFront customizations","CloudFront Functions for both — runs at all edge locations","CloudFront Functions for the Accept-Language redirect (lightweight viewer request, sub-ms); Lambda@Edge for JWT validation (can make network calls, longer timeout)","Neither — use WAF rules for header-based routing"],
c:2,
e:"<strong>Correct: CloudFront Functions for lightweight + Lambda@Edge for complex logic.</strong> CloudFront Functions: runs at 200+ edge locations, sub-millisecond execution, JavaScript only, no network access, max 10KB code, $0.10/1M invocations. Perfect for: header manipulation, URL rewrites/redirects, cache key normalization, simple A/B testing. Lambda@Edge: runs at ~13 regional edge locations, up to 30s timeout (origin req/resp), supports Node.js + Python, CAN make network/API calls, 1MB code limit, $0.60/1M invocations. Perfect for: auth/JWT validation with external calls, complex personalization, database lookups, A/B testing with session state. Rule of thumb: simple/fast → CloudFront Functions; complex/network calls → Lambda@Edge."},

{id:86,domain:"Secure Architectures",topic:"Cognito",sub:"User Pools vs Identity Pools",
q:"A mobile app needs to: (1) let users sign up with email/password and federate with Google/Facebook, AND (2) grant authenticated users temporary AWS credentials to directly read from DynamoDB. What Cognito components handle each requirement?",
o:["Cognito User Pool for both authentication and AWS access","Cognito Identity Pool for both sign-up and AWS credentials","Cognito User Pool for user directory and authentication (sign-up, login, federation); Cognito Identity Pool to exchange User Pool tokens for temporary AWS IAM credentials","IAM users for all mobile app users"],
c:2,
e:"<strong>Correct: User Pool (authentication) + Identity Pool (AWS credentials).</strong> Cognito User Pool: a user directory and authentication service. Handles: sign-up, sign-in, email/password, MFA, social federation (Google, Facebook, Apple), SAML federation, triggers (pre-signup Lambda), hosted UI, JWT tokens (ID token, access token, refresh token). Cognito Identity Pool (Federated Identities): exchanges JWT tokens (from User Pools OR social providers OR SAML) for temporary AWS credentials via STS AssumeRoleWithWebIdentity. Maps authenticated/unauthenticated users to IAM roles. After exchange: mobile app has IAM credentials to call DynamoDB, S3, etc. directly. Often used together: User Pool authenticates → Identity Pool provides AWS access."},

{id:87,domain:"Resilient Architectures",topic:"Backup & Recovery",sub:"AWS Backup",
q:"A company needs to centrally manage backup policies for EC2 instances, EBS volumes, RDS databases, DynamoDB tables, EFS file systems, and FSx — across 20 AWS accounts. They need consistent retention policies (7 days daily, 4 weeks weekly, 12 months monthly) applied everywhere. What service provides this?",
o:["Write custom Lambda functions to trigger backups across accounts","Use individual service-specific backup mechanisms (RDS automated backups, EBS snapshots, etc.) managed separately","AWS Backup — centralized backup service; backup plans with schedules and retention, cross-account backup vault, cross-region copy","Use AWS Data Lifecycle Manager for all services"],
c:2,
e:"<strong>Correct: AWS Backup.</strong> AWS Backup is a fully managed, centralized backup service that supports: EC2/EBS, RDS/Aurora, DynamoDB, EFS, FSx, S3, Storage Gateway. Create Backup Plans with: schedule (daily/weekly/monthly), retention period, lifecycle (move to cold storage after X days), and tag-based resource selection. Cross-account backup: use AWS Organizations to apply backup policies to all member accounts from a central account — a backup plan in the management account deploys to all accounts. Cross-region copy: replicate backups to another region for DR. Backup Vault Lock: WORM protection for backups (even root can't delete). AWS Data Lifecycle Manager only manages EBS snapshots and AMIs, not the full range of services."},

{id:88,domain:"Secure Architectures",topic:"Compliance",sub:"AWS Config",
q:"A company must continuously verify that all EC2 instances have encryption enabled on EBS volumes and that no Security Groups allow unrestricted inbound access on port 22 (SSH). When violations are found, the instance should be automatically stopped. What achieves this?",
o:["AWS Trusted Advisor — checks security best practices","CloudTrail — audits API calls for Security Group changes","AWS Config with managed rules (ec2-encrypted-volumes, restricted-ssh) + Config Remediation using SSM Automation to auto-remediate violations","IAM policies preventing creation of unencrypted volumes"],
c:2,
e:"<strong>Correct: AWS Config with rules and auto-remediation.</strong> AWS Config continuously monitors and records your AWS resource configurations. Config Rules evaluate whether resources comply with desired configurations — using AWS managed rules (restricted-ssh, ec2-encrypted-volumes, rds-storage-encrypted, s3-bucket-public-read-prohibited, etc.) or custom Lambda rules. Each rule flags non-compliant resources. Config Remediation: automatically triggers an SSM Automation document when a rule is violated (e.g., stop the EC2 instance, remove the Security Group rule). Config also maintains a configuration history so you can see how a resource's configuration changed over time. Trusted Advisor: periodic best-practice checks, not continuous monitoring with auto-remediation."},

{id:89,domain:"High-Performing Architectures",topic:"Analytics",sub:"Athena",
q:"A data team stores 10TB of JSON log files in S3 organized by date. They need to run ad-hoc SQL queries against this data without loading it into a database or running any servers. Which service provides this?",
o:["Redshift — load data into a data warehouse cluster","EMR — launch a Hadoop cluster for SQL on S3","Amazon Athena — serverless, interactive SQL queries directly on S3 data; pay per query (per TB scanned)","RDS Aurora — import S3 data into Aurora for SQL queries"],
c:2,
e:"<strong>Correct: Amazon Athena.</strong> Athena is a serverless interactive query service that runs SQL directly on data in S3 — no infrastructure to manage, no data loading. Supports: JSON, CSV, Parquet, ORC, Avro, and more. Pricing: $5 per TB of data scanned. Optimization: use columnar formats (Parquet/ORC) and partition your S3 data by date to dramatically reduce data scanned and costs. Integrates with AWS Glue Data Catalog for schema management. Common use cases: ad-hoc log analysis, querying CloudTrail/ALB/VPC Flow Logs, data exploration before building ETL pipelines. Redshift: persistent data warehouse cluster with loading required. EMR: needs cluster management. Athena = 'SQL on S3 with no servers' — a very common exam pattern."},

{id:90,domain:"High-Performing Architectures",topic:"Aurora",sub:"Endpoints",
q:"An Aurora MySQL cluster has 1 writer and 5 reader instances. The application sends all database traffic to the writer endpoint, even read queries, causing the writer to be overloaded. How should traffic be distributed correctly?",
o:["Connect all read queries directly to each reader's individual endpoint (hardcoded)","Use the Cluster Endpoint for writes; use the Reader Endpoint for reads — Aurora automatically distributes reads across all available reader instances","Enable Aurora Multi-Master so all instances handle reads and writes","Add more writer instances to handle read traffic"],
c:1,
e:"<strong>Correct: Cluster Endpoint for writes + Reader Endpoint for reads.</strong> Aurora provides multiple endpoint types: Cluster Endpoint (Writer Endpoint): always points to the current writer — use for all INSERT/UPDATE/DELETE/DDL. Reader Endpoint: load-balances read connections across ALL available reader instances using round-robin — use for SELECT queries. Instance Endpoints: connect to a specific instance (use for diagnostics, not application traffic). Custom Endpoints: connect to a user-defined subset of instances (e.g., a powerful instance for analytics vs smaller instances for OLTP reads). Applications should be coded to use the Reader Endpoint for reads — this automatically leverages all read replicas without hardcoding individual endpoints."},

{id:91,domain:"Resilient Architectures",topic:"Auto Scaling",sub:"Lifecycle Hooks",
q:"An Auto Scaling group launches EC2 instances that must download a 2GB ML model from S3 and warm up before serving traffic. Without intervention, the ALB registers new instances before they're ready and users get errors. What feature ensures instances are ready before receiving traffic?",
o:["Set a longer health check grace period on the ALB target group","Use an EC2 User Data script — Auto Scaling waits for User Data to complete","Auto Scaling Lifecycle Hooks — hold the instance in Pending:Wait state while startup scripts run; complete the hook when ready; only then does the instance enter InService and receive traffic","Set the ALB health check interval to 60 seconds instead of 30"],
c:2,
e:"<strong>Correct: Auto Scaling Lifecycle Hooks.</strong> Lifecycle hooks let you perform custom actions during Auto Scaling events. Scale-out hook (Pending:Wait): when a new instance launches, it pauses in Pending:Wait state — not yet InService. You run your startup script (download model, warm up), then signal complete via CompleteLifecycleAction. The instance moves to InService and starts receiving traffic. Scale-in hook (Terminating:Wait): pause before termination to drain connections or save state. Hooks integrate with EventBridge (triggers Lambda), SNS, or SQS. The health check grace period just delays health checks — the instance still enters InService immediately. Lifecycle hooks guarantee the instance finishes initialization before traffic hits it."},

{id:92,domain:"Secure Architectures",topic:"Certificates",sub:"ACM",
q:"A company runs multiple HTTPS applications behind ALBs in us-east-1. They need SSL/TLS certificates for each domain. Managing certificate renewals manually is time-consuming and often causes outages from expired certificates. What is the AWS-recommended solution?",
o:["Purchase certificates from a CA and upload to IAM certificate store","Use self-signed certificates on each EC2 instance","AWS Certificate Manager (ACM) — free public certificates for ACM-integrated services (ALB, CloudFront, API Gateway) with automatic renewal; no expiry outages","Upload certificates to S3 and configure ALBs to retrieve them"],
c:2,
e:"<strong>Correct: AWS Certificate Manager (ACM).</strong> ACM provisions, manages, and auto-renews SSL/TLS certificates for use with ACM-integrated AWS services: ALB, NLB, CloudFront, API Gateway, AppSync, Elastic Beanstalk. Public certificates from ACM are FREE. Auto-renewal: ACM automatically renews certificates 60 days before expiry — no manual action, no expiry outages. Private CA: ACM Private CA creates and manages a private certificate authority for internal services. Important limitation: ACM certificates CANNOT be downloaded/exported for use on EC2 instances directly (use IAM certificate store or third-party CAs for that). For CloudFront: ACM certificate must be in us-east-1 (N. Virginia) regardless of distribution origin regions."},

{id:93,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Budgets Actions",
q:"A team has a monthly AWS budget of $5,000. If spend is projected to exceed $4,500, they want to automatically STOP all non-production EC2 instances to prevent the budget from being exceeded — without human intervention. What feature provides automated cost control?",
o:["AWS Cost Explorer with email alerts at $4,500","AWS Budgets alert that emails the team at $4,500 threshold","AWS Budgets with Budget Actions — when the threshold is breached, automatically apply an IAM policy, target EC2 instances with a tag, or run an SSM document to stop instances","AWS CloudWatch alarm on estimated charges with Lambda to stop instances"],
c:2,
e:"<strong>Correct: AWS Budgets with Budget Actions.</strong> Budget Actions allow automated responses when a budget threshold is breached: (1) Apply IAM policy: attach a restrictive policy to a user/role/group (e.g., deny all actions), (2) Apply Service Control Policy (SCP) to an OU, (3) Target EC2/RDS instances: stop instances that have a specific tag. Actions can trigger immediately when the threshold is hit (actual or forecasted). Example: at 90% of budget ($4,500), run an SSM Automation to stop all instances tagged Environment:NonProd. No human intervention needed. Cost Explorer: analysis and recommendations only, no automated actions. CloudWatch estimated charges → Lambda: works but requires custom code and maintenance."},

{id:94,domain:"Secure Architectures",topic:"WAF",sub:"Rate-Based Rules",
q:"A public API is suffering a web scraping attack: one IP is making 10,000 requests per minute, consuming all capacity. They need to automatically block this IP for 5 minutes after it exceeds 2,000 requests in 5 minutes, without blocking legitimate users. What AWS WAF feature handles this?",
o:["Create a WAF IP Set rule with the attacker's IP (requires manual update each attack)","Enable AWS Shield Advanced — it handles rate limiting automatically","Create a WAF Rate-Based Rule: set rate limit to 2,000 requests per 5 minutes per IP; AWS WAF automatically blocks IPs that exceed the threshold for the configured period","Configure CloudFront geo-restriction to block the attacker's country"],
c:2,
e:"<strong>Correct: WAF Rate-Based Rule.</strong> AWS WAF Rate-Based Rules automatically track the request rate per IP (or other aggregation key: forwarded-IP, HTTP header, query string) over a 5-minute window. If an IP exceeds the configured limit (2,000 in this case), WAF automatically adds it to a temporary block list. Once the rate drops below the threshold, the IP is automatically unblocked. No manual IP management. Rate-Based Rules can be combined with other conditions (e.g., only rate-limit if the request includes specific headers). IP Set rules require manual updates and don't help for dynamic attacker IPs. Shield Advanced protects against volumetric DDoS, not API-level rate limiting. This is the canonical 'automatically block scrapers/abusers' WAF pattern."},

{id:95,domain:"Secure Architectures",topic:"IAM",sub:"Permission Boundaries",
q:"A company allows developers to create IAM roles for their Lambda functions. However, developers keep accidentally creating roles with AdministratorAccess, creating security risks. How can you allow developers to create roles while ensuring those roles CANNOT exceed a defined set of permissions?",
o:["Use SCPs in Organizations to limit all IAM role permissions account-wide","Only allow senior admins to create IAM roles — developers submit tickets","Attach an IAM Permission Boundary to any role developers create: the role's effective permissions = intersection of its identity policy AND the permission boundary","Use IAM Access Analyzer to alert when overly permissive roles are created"],
c:2,
e:"<strong>Correct: IAM Permission Boundaries.</strong> A Permission Boundary is a managed IAM policy attached to an IAM entity (user or role) that sets the MAXIMUM permissions that entity can ever have. Effective permissions = identity-based policies ∩ permission boundary. Even if a developer attaches AdministratorAccess to a Lambda role that has a permission boundary of LambdaExecutionBoundary, the role can only perform actions allowed by BOTH policies. Implementation: require developers to attach a specific permission boundary when creating roles (enforce via an SCP or IAM condition: aws:RequestedRegion or iam:PermissionsBoundary). Permission boundaries do NOT grant permissions — they only limit the maximum. SCPs limit the account level; permission boundaries limit individual entities."},

{id:96,domain:"High-Performing Architectures",topic:"Analytics",sub:"OpenSearch Service",
q:"A company needs to index and search through millions of application log records with full-text search, complex aggregations, and visualization dashboards (Kibana). Data is ingested from Kinesis Firehose. Which service provides this?",
o:["Amazon RDS with full-text search indexes","Amazon Redshift — data warehouse with SQL","Amazon OpenSearch Service (formerly Elasticsearch Service) — distributed search and analytics engine; integrates with Kibana (OpenSearch Dashboards); receives from Firehose","Amazon Athena — SQL on S3"],
c:2,
e:"<strong>Correct: Amazon OpenSearch Service.</strong> OpenSearch Service (formerly Amazon Elasticsearch Service) is a managed search and analytics engine based on OpenSearch/Elasticsearch. Key features: full-text search across billions of documents, aggregations for analytics, real-time indexing, and OpenSearch Dashboards (formerly Kibana) for visualization. Common architecture: Kinesis Data Firehose → OpenSearch (direct integration, transforms and indexes in near real-time) → OpenSearch Dashboards for monitoring/alerting. Use cases: log analytics, application monitoring, clickstream analytics, e-commerce product search. Athena: SQL queries on S3 (batch, not real-time search). Redshift: OLAP data warehouse (great for aggregations, not full-text search). OpenSearch = 'search, log analytics, Kibana dashboards.'"},

{id:97,domain:"Resilient Architectures",topic:"ELB",sub:"ALB Sticky Sessions",
q:"A stateful web application stores user session data in EC2 instance memory. When users are load-balanced across multiple instances, they lose their session state and get logged out. What ALB feature resolves this without rewriting the application?",
o:["Enable ALB Cross-Zone Load Balancing","Use ALB Weighted Target Groups to pin users to one instance","Enable ALB Sticky Sessions (session affinity) — ALB sets a cookie that routes the same user to the same target instance for the session duration","Add a Network Load Balancer in front of the ALB"],
c:2,
e:"<strong>Correct: ALB Sticky Sessions.</strong> ALB Sticky Sessions (session affinity) work by setting a cookie (AWSALB or AWSALBAPP) in the client's browser that identifies the target instance. On subsequent requests, ALB reads this cookie and routes the user to the same instance for the duration configured. Duration: application-based cookies (from the app, up to 7 days) or ALB-generated cookies (1 second to 7 days). Important caveat: sticky sessions reduce load balancing effectiveness and create state loss if the sticky instance fails. Best practice for stateful apps: externalize session state to ElastiCache or DynamoDB instead of using stickiness. Exam note: sticky sessions solve the immediate problem but are not a long-term architectural solution."},

{id:98,domain:"Cost-Optimized Architectures",topic:"EC2 Pricing",sub:"Reserved Instances Strategy",
q:"A company runs a web application with a predictable baseline of 10 EC2 instances running 24/7, plus an additional 0–5 instances for unpredictable traffic spikes. What is the most cost-effective purchasing strategy?",
o:["On-Demand for all 15 instances — simple and no commitment","10 Reserved Instances (1-year, All Upfront) for the baseline + On-Demand or Spot for the variable portion","15 Reserved Instances for full coverage — always cheaper than On-Demand","Spot Instances for all 15 — maximum savings"],
c:1,
e:"<strong>Correct: Reserved Instances for baseline + On-Demand/Spot for spikes.</strong> Optimal EC2 cost strategy layers purchasing options: Reserve what you KNOW you'll always use (10 instances 24/7 = certain, steady-state → 1-year RIs with All Upfront for max 40–60% savings). Use On-Demand or Spot for the uncertain, variable portion (0–5 extra instances → pay only when needed, Spot if interruptible). Buying 15 RIs wastes money when you're only using 10 baseline — you're paying for reserved capacity that's unused during off-peak. All Spot: risky for the baseline (production can be interrupted). This tiered approach (reserve base, flex the peak) is a core Well-Architected cost optimization pattern."},

{id:99,domain:"Resilient Architectures",topic:"RDS",sub:"Multi-AZ Failover",
q:"An RDS Multi-AZ MySQL instance fails its primary AZ. How does Aurora MySQL Multi-AZ failover compare to standard RDS MySQL Multi-AZ failover?",
o:["Both use the same failover mechanism and take the same amount of time (~2 minutes)","Aurora failover is typically faster (under 30 seconds in many cases) because Aurora uses a shared distributed storage layer — replicas don't need to replay logs to catch up; standard RDS needs to complete log replay on the standby","Standard RDS failover is faster because it uses native MySQL replication","Aurora doesn't support Multi-AZ — it only uses Read Replicas for HA"],
c:1,
e:"<strong>Correct: Aurora failover is typically faster.</strong> Standard RDS Multi-AZ: synchronous replication to a standby using native DB engine replication. On failover, the standby must complete transaction log replay to reach consistency before promoting — typically 60–120 seconds. Aurora Multi-AZ: Aurora Replicas share the same underlying distributed storage (6 copies across 3 AZs at the storage layer). An Aurora Replica promoted to primary doesn't need to replay logs — it immediately has access to all current data. Typical Aurora failover: under 30 seconds (AWS target: <30s for in-region replica promotion). For fastest Aurora failover: tier the replicas using Tier 0 promotion priority. Aurora also supports Global Databases for cross-region failover."},

{id:100,domain:"Resilient Architectures",topic:"High Availability",sub:"Multi-Region Architecture",
q:"A financial services company has an RTO of 15 minutes and RPO of 1 minute for their critical trading platform. The database is Aurora MySQL. Which architecture meets these requirements?",
o:["Aurora Multi-AZ in a single region (RTO ~30s, RPO ~0 — but only within one region)","Aurora Global Database: primary in us-east-1 + secondary in eu-west-1; replication lag ~1 second; promote secondary to primary in <1 minute if region fails","S3 Cross-Region Replication with a read replica in the secondary region","RDS Multi-AZ with cross-region snapshots (RPO = time since last snapshot)"],
c:1,
e:"<strong>Correct: Aurora Global Database.</strong> Aurora Global Database: one primary region (reads and writes) + up to 5 secondary regions (read-only). Replication: dedicated low-latency replication infrastructure with typical lag <1 second (meets RPO of 1 minute). Failover: promote a secondary region to primary in <1 minute (meets RTO of 15 minutes). Reads from secondary regions enable globally distributed read scaling. Multi-AZ single region: protects against AZ failure but not region failure. S3 CRR: not for databases. RDS cross-region snapshots: RPO = hours (time between snapshots), RTO = hours (restore time). Aurora Global Database is the answer for sub-minute RPO and sub-15-minute RTO multi-region requirements."},

{id:101,domain:"Secure Architectures",topic:"Network Security",sub:"AWS Network Firewall",
q:"A company needs to inspect and filter all traffic leaving its VPC, including the ability to block specific domain names (e.g., known malware C2 servers) and filter traffic based on protocol and port — beyond what Security Groups and NACLs offer. What is the correct solution?",
o:["Add deny rules to all VPC NACLs — they support domain-name matching","Deploy AWS Network Firewall in the VPC — it provides stateful and stateless deep-packet inspection, domain-list filtering, and Suricata-compatible rule groups","Use a WAF WebACL on the VPC's Internet Gateway","Configure Security Group outbound rules with domain names as targets"],
c:1,
e:"<strong>Correct: AWS Network Firewall.</strong> AWS Network Firewall is a managed stateful/stateless network firewall deployed inside your VPC. It supports: stateless rules (5-tuple), stateful Suricata-compatible rules, and domain-list rules for blocking FQDNs. Unlike NACLs (which only match IPs and ports), Network Firewall can filter by domain name. WAF is for HTTP/S applications at Layer 7, not general VPC egress. Security Groups do not support domain-name matching. Network Firewall requires routing traffic through its endpoint (typically via a transit gateway or centralized inspection VPC)."},

{id:102,domain:"Resilient Architectures",topic:"Messaging",sub:"Amazon MSK",
q:"A company is migrating an on-premises Apache Kafka workload to AWS. Their application producers and consumers use the native Kafka API. They want managed infrastructure, automatic scaling of storage, and no code changes to producers/consumers. Which service is the best fit?",
o:["Amazon SQS FIFO — provides ordered, exactly-once message delivery like Kafka","Amazon Kinesis Data Streams — Kafka-compatible API so no code changes needed","Amazon MSK (Managed Streaming for Apache Kafka) — fully managed Kafka that is 100% compatible with the native Kafka API, so existing producers/consumers work without modification","Amazon EventBridge — serverless event bus with Kafka integration"],
c:2,
e:"<strong>Correct: Amazon MSK.</strong> Amazon MSK runs Apache Kafka on AWS — you get fully managed brokers, ZooKeeper/Raft, automatic storage scaling (MSK Serverless or tiered storage), and 100% native Kafka API compatibility. Your existing Kafka producers/consumers need zero code changes. Kinesis Data Streams uses its own SDK/API (not Kafka-compatible without a separate Kafka connector). SQS FIFO is not Kafka-compatible. EventBridge is an event bus, not Kafka. MSK is the go-to answer for 'lift-and-shift Kafka to AWS.'"},

{id:103,domain:"Secure Architectures",topic:"Data Protection",sub:"Macie",
q:"A company stores thousands of S3 buckets across multiple AWS accounts in an Organization. The security team needs to automatically discover and report which buckets contain sensitive data such as PII (names, SSNs, credit card numbers) and flag buckets that are publicly accessible. What AWS service automates this?",
o:["Amazon Inspector — scans EC2 instances and container images for vulnerabilities","Amazon GuardDuty — detects threats based on CloudTrail, VPC Flow Logs, DNS logs","Amazon Macie — uses ML to automatically discover, classify, and protect sensitive data in S3, generates findings for PII and public access issues","AWS Config — evaluates S3 bucket configurations against managed rules"],
c:2,
e:"<strong>Correct: Amazon Macie.</strong> Amazon Macie is an ML-powered data security service that automatically discovers sensitive data (PII, financial data, credentials) in S3 buckets. It generates findings when sensitive data is detected and flags security issues like public access. It integrates with AWS Organizations for multi-account coverage. GuardDuty detects threats/anomalies (not data classification). Inspector scans workloads for vulnerabilities, not data. AWS Config checks configuration compliance but doesn't inspect data content for PII."},

{id:104,domain:"Secure Architectures",topic:"Secrets Management",sub:"Secrets Manager vs SSM",
q:"A Lambda function needs a database password that must be automatically rotated every 30 days, with zero application downtime during rotation. The password must be encrypted and the function should always get the latest version. Which solution is correct?",
o:["Store the password in an SSM Parameter Store SecureString — set a 30-day TTL that auto-rotates it","Store the password in AWS Secrets Manager — enable automatic rotation with a Lambda rotation function; the application always calls GetSecretValue which returns the current active secret","Embed the password in the Lambda environment variable and update it manually every 30 days","Store the password in S3 with SSE-KMS encryption and have Lambda fetch it on cold start"],
c:1,
e:"<strong>Correct: AWS Secrets Manager with automatic rotation.</strong> Secrets Manager natively supports automatic rotation via a Lambda rotation function — it rotates the secret, updates the database password, and keeps the old version available momentarily to avoid downtime (AWSPREVIOUS/AWSCURRENT/AWSPENDING versioning). Applications call GetSecretValue and always get the current valid secret. SSM Parameter Store SecureString does NOT support automatic rotation. Environment variables require manual updates and redeploys. S3 has no rotation capability. Secrets Manager is the answer whenever you see 'automatic rotation' of credentials."},

{id:105,domain:"High-Performing Architectures",topic:"Analytics",sub:"AWS Lake Formation",
q:"A company wants to build a data lake on S3 with fine-grained access control — specific users should only be able to query specific tables and columns in Athena, even though the underlying S3 data files are in shared prefixes. What is the right approach?",
o:["Use S3 bucket policies with condition keys to restrict access per column — S3 supports column-level permissions","Use IAM policies to restrict Glue catalog access per table","Use AWS Lake Formation — it provides table-level and column-level permissions on top of the Glue Data Catalog, enforced when users query via Athena, Redshift Spectrum, or EMR","Enable Macie on the data lake buckets to restrict access to sensitive columns"],
c:2,
e:"<strong>Correct: AWS Lake Formation.</strong> Lake Formation is a governance layer on top of the AWS Glue Data Catalog. It allows you to define fine-grained permissions: database-level, table-level, column-level, and row-level (via data filters). These permissions are enforced when users query via Athena, Redshift Spectrum, or EMR — without needing to manage complex S3 bucket policies per column. S3 bucket policies operate on objects/prefixes, not columns. IAM policies control Glue API access, not query-level column filtering. Macie discovers sensitive data but doesn't enforce access control."},

{id:106,domain:"High-Performing Architectures",topic:"Application Integration",sub:"AppSync",
q:"A mobile app needs a real-time API where clients subscribe to data changes and receive push updates when the backend data changes, without polling. Multiple clients may be subscribed simultaneously. The team prefers a managed service with GraphQL schema support. What should they use?",
o:["Amazon API Gateway WebSocket API with a Lambda backend pushing to all connected clients","Amazon SQS FIFO queue — clients long-poll for updates","AWS AppSync — managed GraphQL service with built-in subscriptions; clients subscribe to real-time data updates via WebSocket, server pushes mutations to subscribers automatically","Amazon Kinesis Data Streams — clients consume a shard for real-time updates"],
c:2,
e:"<strong>Correct: AWS AppSync.</strong> AppSync is a managed GraphQL API service. Key features: (1) GraphQL subscriptions — clients subscribe to mutations and receive real-time push updates via WebSocket without any polling. (2) Built-in resolvers for DynamoDB, Lambda, RDS, HTTP. (3) Offline sync with Amplify DataStore. API Gateway WebSocket requires you to manage connection tracking and fan-out manually. SQS requires polling. Kinesis is for streaming data pipelines, not client API subscriptions. AppSync is the answer for 'real-time push' + 'GraphQL' + 'managed.'"},

{id:107,domain:"Resilient Architectures",topic:"Networking",sub:"Transit Gateway",
q:"A company has 15 VPCs in the same region that all need to communicate with each other. They also need to connect all VPCs to their on-premises data center via a single VPN connection. What is the correct architecture?",
o:["Create VPC Peering connections between every pair of VPCs (105 connections total) and a separate VPN for each VPC","Use an AWS Direct Connect hosted connection for each VPC","Deploy AWS Transit Gateway — attach all 15 VPCs and the on-premises VPN/Direct Connect to the Transit Gateway; it acts as a hub enabling any-to-any VPC routing and centralized on-premises connectivity","Deploy a VPN Gateway in each VPC and use BGP route propagation to share routes"],
c:2,
e:"<strong>Correct: AWS Transit Gateway.</strong> Transit Gateway is a regional network hub. Instead of N*(N-1)/2 VPC peering connections (105 for 15 VPCs), each VPC attaches once to the TGW. TGW routes traffic between attached VPCs and supports Site-to-Site VPN and Direct Connect Gateway attachments for on-premises connectivity — one VPN serves all attached VPCs. TGW also supports inter-region peering. VPC Peering is non-transitive (VPC A peered to B and B peered to C doesn't mean A can reach C) and doesn't scale to 15 VPCs. Transit Gateway is always the answer when you see 'many VPCs' + 'centralized connectivity.'"},

{id:108,domain:"Resilient Architectures",topic:"Networking",sub:"Direct Connect",
q:"A company requires a dedicated, private, low-latency connection from their on-premises data center to AWS that does NOT traverse the public internet and provides consistent network performance. They need 10 Gbps throughput. What should they use?",
o:["Site-to-Site VPN — encrypted tunnel over the public internet","AWS Direct Connect — dedicated private network connection from on-premises to AWS, bypasses the internet, consistent throughput, available at 1, 10, or 100 Gbps","AWS PrivateLink — private connectivity between VPCs and AWS services within AWS","Enhanced VPC Routing on Redshift for dedicated throughput"],
c:1,
e:"<strong>Correct: AWS Direct Connect.</strong> Direct Connect provides a dedicated physical network connection from your data center to an AWS Direct Connect location — traffic never touches the public internet. It offers consistent latency and bandwidth (1 Gbps, 10 Gbps, or 100 Gbps hosted or dedicated connections). Site-to-Site VPN goes over the internet and has variable latency — it's a cost-effective backup to Direct Connect but doesn't meet 'no internet' requirements. PrivateLink provides private connectivity between services within AWS, not to on-premises. Direct Connect is the answer for: dedicated, private, consistent, 10+ Gbps, on-premises to AWS."},

{id:109,domain:"High-Performing Architectures",topic:"CloudFront",sub:"Signed URLs vs Signed Cookies",
q:"A media company serves private video content from S3 via CloudFront. Users authenticate via a web app, then should be able to access multiple protected video files for up to 8 hours without re-authenticating. Which CloudFront feature is most appropriate?",
o:["CloudFront Signed URLs — generate one URL per file valid for 8 hours; user gets a signed URL for each video","CloudFront Signed Cookies — set a single cookie in the browser granting access to multiple files matching a wildcard path for the session duration; one cookie covers all videos","S3 Pre-signed URLs with 8-hour expiry directly from S3, bypassing CloudFront","Configure an Origin Access Control policy that expires after 8 hours"],
c:1,
e:"<strong>Correct: CloudFront Signed Cookies.</strong> Signed Cookies are ideal when a user needs access to MULTIPLE files (e.g., all videos in /premium/*) — you set one cookie that grants access to a wildcard path, without needing a new signed URL per file. Signed URLs are best for single-file access (e.g., a download link for one specific file). In this scenario, a user accesses many video files (segments, thumbnails, etc.), so cookies are more practical. OAC controls how CloudFront authenticates to S3, it's not user-facing. S3 pre-signed URLs bypass CloudFront, losing caching benefits."},

{id:110,domain:"Secure Architectures",topic:"IAM",sub:"Service Control Policies",
q:"A company uses AWS Organizations. They want to ensure that NO account in the production OU can disable CloudTrail or delete CloudTrail logs, even if an account's root user tries. SCPs are enabled. What SCP should they attach to the Production OU?",
o:["Attach a Deny SCP on cloudtrail:DeleteTrail and cloudtrail:StopLogging actions to the Production OU — this overrides even root user permissions within member accounts","Create an IAM policy denying these actions and attach it to all IAM users in each account","Enable AWS Config rules to detect and auto-remediate CloudTrail disabling","Use a Permission Boundary on all roles in production accounts"],
c:0,
e:"<strong>Correct: Deny SCP on CloudTrail actions.</strong> SCPs in AWS Organizations are the ONLY control that can restrict root user permissions in member accounts. An SCP Deny on cloudtrail:DeleteTrail, cloudtrail:StopLogging, and s3:DeleteObject (on the log bucket) applied to the Production OU prevents even account root users from disabling CloudTrail. IAM policies don't apply to root. Permission Boundaries apply to IAM entities, not root. AWS Config can detect violations but cannot prevent them. SCPs are your guardrails — they define the maximum permissions boundary for all principals (including root) in member accounts."},

{id:111,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Savings Plans",
q:"A company runs a mix of EC2 instances and Fargate tasks that change instance types and sizes frequently as they migrate workloads. They want to commit to AWS compute usage for 1 year to get a discount but need flexibility to switch instance families, sizes, and even move from EC2 to Fargate. Which purchase option gives them this flexibility?",
o:["EC2 Reserved Instances (Convertible) — can change instance family within EC2 only","Standard Reserved Instances — cheapest but locked to specific instance type","Compute Savings Plans — apply to any EC2 instance (any family, size, OS, region) and Fargate/Lambda usage; most flexible discount option at up to 66% off On-Demand","EC2 Instance Savings Plans — apply to specific instance family in a region; cannot apply to Fargate"],
c:2,
e:"<strong>Correct: Compute Savings Plans.</strong> Compute Savings Plans offer the most flexibility: they apply automatically to any EC2 instance regardless of instance family, size, OS, tenancy, or region, AND to AWS Fargate and Lambda. You commit to a $/hour spend for 1 or 3 years. EC2 Instance Savings Plans are cheaper but apply only to a specific instance family in a specific region (not Fargate). Convertible RIs allow instance family changes within EC2 but not Fargate. For workloads that span EC2 and Fargate or change frequently, Compute Savings Plans are the answer."},

{id:112,domain:"Resilient Architectures",topic:"Route 53",sub:"Routing Policies",
q:"A global e-commerce company wants to route users to the AWS region with the lowest network latency. They have deployments in us-east-1, eu-west-1, and ap-southeast-1. Which Route 53 routing policy should they use?",
o:["Geolocation routing — routes based on user's geographic location to the nearest region","Weighted routing — distributes traffic by percentage across regions","Latency-based routing — Route 53 measures latency between the user and each region and directs the user to the region with the lowest latency","Failover routing — routes to primary until it fails, then to secondary"],
c:2,
e:"<strong>Correct: Latency-based routing.</strong> Route 53 latency routing directs users to the region that provides the lowest latency based on AWS's latency measurements between AWS regions and the user's DNS resolver. This dynamically routes to the fastest region, not necessarily the geographically closest one. Geolocation routing is based on geographic location (useful for content licensing or language preferences), not latency. Weighted routing splits traffic by fixed percentage. Failover routing is for active-passive DR. The key phrase 'lowest network latency' → latency-based routing."},

{id:113,domain:"Resilient Architectures",topic:"Route 53",sub:"Health Checks & Failover",
q:"A company hosts a web app in us-east-1 with a hot standby in us-west-2. If the primary region becomes unavailable, Route 53 should automatically redirect traffic to the standby. What configuration achieves this?",
o:["Latency routing with health checks — Route 53 will stop routing to a region that is slow","Weighted routing with 90/10 split — most traffic goes to primary","Route 53 Failover routing — designate us-east-1 as PRIMARY and us-west-2 as SECONDARY; attach a health check to the primary record; if the health check fails, Route 53 automatically routes to the secondary","Geolocation routing with a default record pointing to us-west-2"],
c:2,
e:"<strong>Correct: Route 53 Failover routing with health checks.</strong> Failover routing requires: (1) A PRIMARY record for us-east-1 with a health check. (2) A SECONDARY record for us-west-2 (no health check needed on secondary). Route 53 evaluates the health check; if primary is unhealthy, all traffic routes to the secondary. This is active-passive DR. Health checks can monitor endpoints, CloudWatch alarms, or other health checks (calculated health checks). Latency routing doesn't do failover — it routes to the fastest region, but if both are slow, it still picks one. Weighted routing doesn't do automatic failover based on health."},

{id:114,domain:"High-Performing Architectures",topic:"Application Integration",sub:"EventBridge",
q:"A company wants to build an event-driven architecture where S3 uploads, EC2 state changes, and third-party SaaS events (e.g., Zendesk ticket creation) all trigger different downstream Lambda functions. They want centralized routing rules without custom code to fan out events. What service should they use?",
o:["Amazon SNS — publish events to topics with Lambda subscriptions","Amazon SQS — create separate queues for each event source and poll with Lambda","Amazon EventBridge — serverless event bus that accepts events from AWS services, custom apps, and 90+ SaaS integrations; routing rules pattern-match on event content to target Lambda functions, SQS, Step Functions, etc.","Amazon Kinesis Data Streams — ingest all events and route with consumer Lambda functions"],
c:2,
e:"<strong>Correct: Amazon EventBridge.</strong> EventBridge is the AWS event bus service purpose-built for event-driven architectures. It has: (1) Default event bus (AWS service events like EC2 state changes, S3 events via EventBridge notifications). (2) Custom event buses (your application events). (3) Partner event buses (90+ SaaS partners like Zendesk, Datadog, Shopify). Rules use event patterns to match and route events to targets (Lambda, SQS, Step Functions, etc.) — no custom routing code. SNS topics require explicit publish calls; they don't natively ingest SaaS events. SQS is a queue, not an event router. EventBridge is the answer for centralized event routing across AWS, custom, and SaaS sources."},

{id:115,domain:"Secure Architectures",topic:"Threat Detection",sub:"GuardDuty & Security Hub",
q:"A company wants a single pane of glass for security findings across their AWS Organization — findings from GuardDuty, Macie, Inspector, and third-party tools should be normalized, aggregated, and prioritized in one place. What service provides this?",
o:["Amazon Detective — investigates and visualizes security findings using graph analysis","AWS Config — aggregates configuration compliance findings across accounts","AWS Security Hub — aggregates, normalizes, and prioritizes security findings from GuardDuty, Macie, Inspector, Firewall Manager, and partner tools into a single dashboard with compliance standards scoring","AWS Trusted Advisor — provides best practice recommendations including security checks"],
c:2,
e:"<strong>Correct: AWS Security Hub.</strong> Security Hub is the centralized security posture management service. It: (1) Aggregates findings from GuardDuty, Macie, Inspector, IAM Access Analyzer, Firewall Manager, and 50+ partner tools. (2) Normalizes findings into the AWS Security Finding Format (ASFF). (3) Scores your account against security standards (CIS, PCI-DSS, AWS Foundational Security Best Practices). (4) Works cross-account via Organizations. Amazon Detective helps investigate and visualize EXISTING findings (it answers 'why is this happening?'). Config tracks configuration compliance. Trusted Advisor gives recommendations, not finding aggregation."},

{id:116,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS Outposts",
q:"A manufacturing company needs to run AWS compute (EC2, ECS, RDS) in their on-premises data center with single-digit millisecond latency to factory floor PLCs (programmable logic controllers) that cannot route traffic to the public cloud. They want to use the same AWS APIs and console they use for their cloud workloads. What solution fits?",
o:["Deploy EC2 instances in a Local Zone nearest to the factory","Use AWS Direct Connect to reduce latency to the existing AWS region","Deploy AWS Outposts in the factory data center — AWS-managed rack with EC2, ECS, EKS, RDS, and S3 on Outposts running on-premises, connected back to the parent AWS region","Set up a VMware Cloud on AWS cluster in the factory"],
c:2,
e:"<strong>Correct: AWS Outposts.</strong> Outposts is a fully managed AWS rack (42U rack or 1U/2U servers) physically deployed in your on-premises facility. It runs genuine AWS infrastructure so you use the same EC2, ECS, EKS, RDS, S3 on Outposts APIs and console. Traffic between Outpost workloads and on-premises equipment (PLCs) never leaves the facility — single-digit ms latency. The Outpost connects back to its parent region for management. Local Zones extend AWS regions to metro areas but are still AWS-managed facilities, not your premises. Direct Connect reduces latency but doesn't put compute on-premises. Outposts = AWS infrastructure, your building."},

{id:117,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS Wavelength",
q:"A company is building a low-latency mobile gaming application. They need compute at the edge of 5G networks to achieve sub-10ms latency for mobile players. Their target carriers are Verizon and Vodafone. What AWS solution is specifically designed for this?",
o:["Deploy EC2 instances in the AWS region closest to the carrier network","Use Amazon CloudFront with Lambda@Edge to move compute closer to users","AWS Wavelength — embeds AWS compute inside telecom 5G networks; traffic stays within the carrier network and never traverses the internet to reach an AWS region","Deploy in an AWS Local Zone in the nearest metropolitan area"],
c:2,
e:"<strong>Correct: AWS Wavelength.</strong> Wavelength Zones are AWS infrastructure deployments embedded within telecommunications providers' 5G networks (Verizon, Vodafone, KDDI, SK Telecom). Mobile device traffic travels over the 5G network directly to the Wavelength Zone compute — it never leaves the carrier network to traverse the public internet to an AWS region. This achieves single-digit millisecond latency for 5G-connected devices. CloudFront/Lambda@Edge reduce latency for content delivery but are still internet-based. Local Zones reduce latency to cities but are not embedded in 5G carrier networks. Wavelength = ultra-low latency for 5G mobile apps."},

{id:118,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Intelligent-Tiering",
q:"A data analytics company stores large objects in S3. Access patterns are unpredictable — some objects are accessed frequently, some are never accessed again after 30 days. The team doesn't want to manage lifecycle rules or pay retrieval fees, but wants automatic cost optimization. What S3 storage class is best?",
o:["S3 Standard-IA — lower cost than Standard, small retrieval fee per object","S3 One Zone-IA — cheapest IA tier but only one AZ","S3 Glacier Instant Retrieval — for objects accessed once per quarter","S3 Intelligent-Tiering — automatically moves objects between access tiers (Frequent, Infrequent, Archive Instant, Archive, Deep Archive) based on actual access patterns; no retrieval fees, small monitoring fee per object"],
c:3,
e:"<strong>Correct: S3 Intelligent-Tiering.</strong> Intelligent-Tiering monitors access patterns and automatically moves objects between tiers: Frequent Access (like Standard), Infrequent Access (after 30 days without access, 40% cheaper), Archive Instant Access (after 90 days, 68% cheaper), optional Archive and Deep Archive tiers. Crucially, there are NO retrieval fees when objects move back to Frequent Access — you only pay a small monthly monitoring fee per object. It's ideal for unpredictable access patterns. Standard-IA and One Zone-IA charge per-GB retrieval fees. Glacier requires restore operations. Intelligent-Tiering removes the need to predict or manage transitions manually."},

{id:119,domain:"Resilient Architectures",topic:"Messaging",sub:"SQS vs SNS vs EventBridge",
