e:"<strong>Correct: EC2 Image Builder.</strong> EC2 Image Builder automates the creation, maintenance, validation, and distribution of AMIs (and container images). Pipeline components: (1) Infrastructure Configuration: EC2 instance type and IAM role used during build. (2) Image Recipe: base image (latest Amazon Linux 2) + components (BuildComponent: install/configure software, run hardening scripts) + test components (TestComponent: run compliance checks, verify software). (3) Distribution settings: copy AMI to target regions, share with target accounts. Schedule: trigger weekly → automatically applies latest OS patches. The built AMI is tested before distribution. Integration: Launch Templates can reference the latest version of a shared AMI. Benefits over manual process: repeatable, auditable, automated patching, version history. User data: installs at every launch — slow, inconsistent across instances (different package versions at different times). Golden AMI pattern: bake everything in — faster launch, consistent configuration."},

{id:261,domain:"Resilient Architectures",topic:"High Availability",sub:"Elastic IP and EC2 Failover",
q:"A legacy application requires a fixed IP address for DNS (the IP is hardcoded in several client configurations). The application runs on EC2. If the instance fails, a replacement instance must be reachable at the SAME IP address within 5 minutes, without any DNS changes. How is this achieved?",
o:["Assign a static private IP address to the instance","Use a Network Load Balancer with a static IP","Allocate an Elastic IP and re-associate it with the replacement instance on failure","Use Amazon Route 53 with a low TTL pointing to the instance's public IP"],
c:2,
e:"<strong>Correct: Elastic IP (EIP) re-association.</strong> An Elastic IP is a static public IPv4 address that belongs to your account (not an instance). You associate it with an EC2 instance; it stays associated until you disassociate it. On instance failure: (1) Detect failure (CloudWatch alarm, health check). (2) Terminate or stop failed instance (disassociates the EIP automatically). (3) Launch replacement instance. (4) Associate the EIP with the new instance (aws ec2 associate-address — takes seconds, not minutes). Result: the EIP moves to the new instance; clients using the IP experience connectivity within the failover time (instance launch + EIP re-association). EIPs are free when associated with a running instance; $0.005/hour when allocated but not associated. Route 53 low TTL: changes the DNS record (different IP) — doesn't work for hardcoded IPs. NLB with static IP: better long-term solution but requires architecture change."},

{id:262,domain:"High-Performing Architectures",topic:"Serverless",sub:"Step Functions — Express Workflows",
q:"A company processes IoT sensor events at 10,000 events/second. Each event triggers a short workflow: validate → transform → store in DynamoDB → publish to SNS. Each execution completes in under 5 seconds. They evaluated Standard Step Functions Workflows but the cost is too high at this volume. What is the right Step Functions workflow type?",
o:["AWS Step Functions Standard Workflows","Chained Lambda functions","AWS Step Functions Express Workflows","AWS Step Functions Standard Workflows with a high-volume pricing tier"],
c:2,
e:"<strong>Correct: Step Functions Express Workflows.</strong> Two workflow types: Standard Workflows: max 1 year duration, exactly-once execution semantics, full execution history in console/CloudWatch, priced per state transition ($0.025 per 1,000 transitions) — expensive at high volume (10K events/sec × many transitions). Express Workflows: max 5 minutes duration, at-least-once execution (idempotent steps required), execution history only in CloudWatch Logs, priced per execution + GB-second of duration — much cheaper at high volume; supports 100,000+ executions/second. For IoT at 10K events/second with 5-second executions → Express Workflows: ~10,000 executions/second × $0.000001/execution = $0.01/second = $864/day. Standard at same volume would be prohibitively expensive. Choose Standard when you need: exactly-once guarantees, long durations, full execution history in console. Choose Express for: high-volume, short-duration, cost-sensitive event processing."},

{id:263,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"AWS Budgets Actions",
q:"A company's development team has a monthly budget of $5,000. In previous months, a runaway process left EC2 instances running and the bill reached $12,000. They want to automatically stop EC2 instances in the dev account when the forecasted spend exceeds $5,000, without human intervention. What is the correct approach?",
o:["Amazon CloudWatch billing alarm with SNS email notification","AWS Cost Explorer budget alerts","AWS Budgets with an automated Budget Action","A daily Lambda function that checks spend and stops instances"],
c:2,
e:"<strong>Correct: AWS Budgets with Budget Actions.</strong> Budget Actions allow automatic enforcement when a budget threshold is breached. Action types: (1) Apply an IAM policy: attach a policy to IAM users/roles (e.g., deny ec2:RunInstances). (2) Apply a Service Control Policy: attach an SCP to an OU or account (stronger — affects all principals including root). (3) Run an SSM Automation document: execute runbooks (e.g., stop all EC2 instances, scale down ASGs). Configuration: set threshold at 100% of $5,000 forecasted or actual spend; select action (SCP to deny new launches + SSM to stop running instances). Actions can require IAM approval (approval-only) or execute automatically. This is the native AWS tool for 'stop spending when budget is exceeded.' CloudWatch billing alarms: only SNS/email notifications. Lambda solution: requires building custom spend-checking and action logic. Budget Actions = built-in automated cost governance."},

{id:264,domain:"Resilient Architectures",topic:"Storage",sub:"DynamoDB Point-in-Time Recovery",
q:"A developer accidentally ran a script that deleted 50,000 items from a production DynamoDB table. The error was discovered 2 hours later. How can the table be restored to its state from 3 hours ago?",
o:["Restore from the most recent DynamoDB on-demand backup","DynamoDB has no recovery mechanism for mass deletion","Enable DynamoDB Point-in-Time Recovery (PITR) and restore to a point before the incident","Use AWS Backup to restore the DynamoDB table"],
c:2,
e:"<strong>Correct: DynamoDB Point-in-Time Recovery (PITR).</strong> PITR provides continuous, automatic backups of DynamoDB tables with granularity to any second within the last 35 days. When you initiate a restore: DynamoDB creates a NEW table (not overwrite in place) from the selected point in time — the original table keeps running. After restoration: compare new table with current, reconcile differences if needed, swap application endpoint. PITR must be enabled on the table BEFORE the incident (a best practice for production tables). Cost: additional storage charge for backup data (~$0.20/GB/month). On-demand backups: point-in-time snapshots you manually trigger — only useful if you took one recently. AWS Backup DOES support DynamoDB — it can take and restore DynamoDB backups centrally. PITR is the answer for 'restore to a specific moment in the past' for DynamoDB. For RDS: automated backups also support PITR to any second within the retention window."},

{id:265,domain:"Secure Architectures",topic:"IAM",sub:"Roles Anywhere",
q:"An on-premises application running on servers in a data center needs to call AWS APIs (access S3, DynamoDB). The security team does NOT want to create IAM users with long-term access keys for the on-premises servers. What allows on-premises servers to use IAM roles and get temporary credentials?",
o:["Store IAM access keys in AWS Secrets Manager for retrieval by on-premises servers","Create IAM users with rotating access keys stored in environment variables","AWS IAM Roles Anywhere with X.509 certificate-based authentication","AWS Direct Connect"],
c:2,
e:"<strong>Correct: AWS IAM Roles Anywhere.</strong> IAM Roles Anywhere extends IAM roles to workloads outside AWS. Setup: (1) Trust Anchor: register your CA certificate (your PKI, ACM Private CA, or any X.509 CA) with IAM Roles Anywhere. (2) Profile: define which IAM roles can be assumed and session policies. (3) On-premises servers: use their X.509 certificates (signed by the trusted CA) to call IAM Roles Anywhere endpoint → get temporary credentials (AccessKeyId, SecretAccessKey, SessionToken, 1-hour expiry). The AWS SDK picks up these temporary credentials automatically. Benefits: no long-term keys, certificate-based identity (ties to your existing PKI), automatic credential rotation (1-hour temp creds). Use with: on-premises servers, edge devices, Kubernetes clusters outside AWS, CI/CD systems. Similar patterns: EC2 uses instance profiles, Lambda/ECS use task roles — Roles Anywhere extends this to non-AWS compute."},

{id:266,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS ParallelCluster",
q:"A computational fluid dynamics research team needs to run HPC (High Performance Computing) simulations on AWS. They need MPI-based parallel computing across hundreds of tightly coupled EC2 instances, a shared file system accessible by all nodes, job scheduling (submit jobs to a queue), and automatic scale-up/down of compute nodes based on queue depth. What is the fastest way to deploy this HPC environment?",
o:["Manually provision EC2 instances in a cluster placement group with MPI","Amazon ECS with hundreds of containers","AWS ParallelCluster","Amazon SageMaker Distributed Training"],
c:2,
e:"<strong>Correct: AWS ParallelCluster.</strong> ParallelCluster is the AWS-supported tool for HPC cluster deployment. One configuration file (YAML) defines: Head node: manages job queue, user login, shared storage mounting. Compute fleet: instance types (c5n.18xlarge for compute, p3.16xlarge for GPU), placement groups, EFA networking for MPI. Shared storage: Amazon FSx for Lustre (high-performance, S3-integrated) or EFS. Job scheduler: Slurm (most common for HPC). Auto-scaling: Slurm + ParallelCluster automatically provision compute nodes when jobs enter the queue and terminate idle nodes — 'scale to zero' capability eliminates idle HPC costs. Supports: Spot Instances for cost-effective HPC, custom AMIs, Intel/AMD/ARM instances, GPU clusters for ML+HPC. Manual EC2 setup: weeks of configuration work. SageMaker: ML training, not general MPI HPC. ParallelCluster = HPC cluster in hours, not weeks."},

{id:267,domain:"Resilient Architectures",topic:"Networking",sub:"Direct Connect — Redundancy",
q:"A company has a single AWS Direct Connect connection at 10 Gbps as their primary link. A network engineer notes that if the Direct Connect location (colocation facility) suffers a power outage, they lose all connectivity to AWS. What architecture provides the highest resilience?",
o:["Add a second Direct Connect connection at the same Direct Connect location","Enable Direct Connect failover mode","Add a second Direct Connect connection at a different location plus a Site-to-Site VPN backup","Use the Direct Connect Resiliency Toolkit"],
c:2,
e:"<strong>Correct: Two Direct Connect connections at different locations + VPN backup.</strong> Direct Connect redundancy levels: No redundancy: one connection — any fiber cut or facility outage = total loss. Connection-level redundancy: two connections at the same location — protects against fiber cut, not facility outage. Location-level redundancy (recommended): two connections at two DIFFERENT Direct Connect locations — independent facilities, independent fiber paths; a full facility outage only fails one path. Maximum resiliency: two connections at two different locations (as above) + Site-to-Site VPN over internet as a final failover — provides internet-based backup if both DX locations fail (rare but possible). Direct Connect Resiliency Toolkit: helps you test your resiliency configuration by failing connections to see if traffic fails over correctly — useful for validation, not for adding connections. For exam: 'same location = same failure domain' → always use different locations for highest availability."},

{id:268,domain:"High-Performing Architectures",topic:"Monitoring",sub:"CloudWatch Dashboards",
q:"A company has 10 microservices each with their own CloudWatch metrics and alarms. The operations team wants a single operational health dashboard showing all services' error rates, latency, and alarm states in one view, updated in real-time. What should they build?",
o:["Deploy Grafana on EC2 connected to CloudWatch","AWS X-Ray Service Map","Create an Amazon CloudWatch Dashboard with metric and alarm widgets","AWS Service Health Dashboard"],
c:2,
e:"<strong>Correct: CloudWatch Dashboard.</strong> CloudWatch Dashboards are customizable, shareable operational views. Widget types: Line, Stacked Area, Number (current value), Gauge (speedometer style), Bar, Text (Markdown), Alarm Status (shows red/green for alarm states), Logs Table (CloudWatch Logs Insights results), Explorer (auto-discover and display metrics). Cross-account, cross-region: one dashboard can display metrics from multiple accounts and regions (configure cross-account observability). Sharing: share dashboards publicly (no login required — useful for NOC screens) or with specific accounts. Auto-refresh: 1 second to 15 minutes. Composite Alarms: combine multiple alarm states into a single parent alarm ('service is unhealthy if latency > threshold OR error rate > threshold') — show composite alarm state as a single widget. X-Ray Service Map: traces, not operational metrics dashboards. AWS Service Health Dashboard: AWS infrastructure health, not your application. CloudWatch Dashboard = operational health monitoring for your workloads."},

{id:269,domain:"Resilient Architectures",topic:"Compute",sub:"EC2 — Capacity Reservations",
q:"A company plans to launch 100 c5.4xlarge instances in us-east-1a at 9 AM on Black Friday for a guaranteed capacity boost. They are concerned that EC2 capacity might not be available at that time due to high demand. How can they guarantee capacity availability without paying for unused instances before Black Friday?",
o:["Purchase Zonal Reserved Instances","Submit Spot Instance requests in advance","Create an On-Demand Capacity Reservation in the target AZ","Launch the instances on demand on Black Friday morning"],
c:2,
e:"<strong>Correct: On-Demand Capacity Reservation.</strong> Capacity Reservations guarantee EC2 capacity in a specific AZ for a specific instance type. You create the reservation immediately and capacity is held for you — regardless of overall demand. Billing: On-Demand rate applies from reservation creation, whether instances are running or not (you pay for the reservation even when no instances use it). To avoid paying for idle capacity before Black Friday: create the Capacity Reservation the night before. For a pricing discount: combine with Regional Reserved Instances or Savings Plans (the discount applies to instances matching the reservation). Zonal Reserved Instances: provide capacity reservation + discount but require 1-year or 3-year commitment. On-Demand Capacity Reservations: no commitment, cancel anytime — ideal for known short-term capacity needs. Spot Instances: no capacity guarantee — can be interrupted or unavailable. Regional RIs: no capacity reservation guarantee (only zonal RIs provide capacity guarantee)."},

{id:270,domain:"Secure Architectures",topic:"IAM",sub:"Permission Evaluation Logic",
q:"A user has an IAM identity policy that allows s3:PutObject on a bucket. There is also an explicit DENY in an SCP from AWS Organizations for s3:DeleteObject. The user tries to run 'aws s3 rm s3://bucket/file'. What happens?",
o:["The delete succeeds because SCPs only apply to IAM roles, not IAM users","The delete succeeds because the identity policy does not explicitly deny s3:DeleteObject","The delete is denied because the explicit SCP deny overrides all allows","The delete succeeds because an explicit IAM allow overrides an SCP deny"],
c:2,
e:"<strong>Correct: SCP explicit deny blocks the action.</strong> IAM policy evaluation logic for AWS Organizations members: (1) If there's an explicit DENY anywhere (identity policy, resource policy, SCP, permissions boundary, session policy) → DENY. Explicit deny overrides all allows. (2) If there's no explicit deny: check if any applicable policy allows the action. (3) If no allow is found → implicit deny. In this scenario: SCP has explicit DENY for s3:DeleteObject → the delete is denied regardless of any IAM allow. SCPs apply to all principals in the account (IAM users, IAM roles, root user) — except the management account's principals (SCPs don't apply to the management account). SCPs don't grant permissions on their own — they only restrict. The user would also need an IAM allow to perform an action (SCPs + IAM both must allow). For s3:PutObject: SCP doesn't deny it, IAM allows it → allowed. For s3:DeleteObject: SCP explicitly denies → denied even if IAM allowed it."},

{id:271,domain:"High-Performing Architectures",topic:"Databases",sub:"RDS Parameter Groups",
q:"A DBA needs to tune MySQL configuration parameters on an RDS instance — specifically increasing max_connections, setting innodb_buffer_pool_size, and enabling slow_query_log. These are settings normally changed in my.cnf on self-managed MySQL. How are these configured on RDS?",
o:["SSH into the RDS instance and edit /etc/mysql/my.cnf directly","Modify the existing default DB parameter group","Create a custom DB Parameter Group and associate it with the RDS instance","Submit an AWS Support request to modify the database parameters"],
c:2,
e:"<strong>Correct: Custom DB Parameter Group.</strong> RDS Parameter Groups are the mechanism for configuring database engine settings. You cannot SSH into RDS instances — AWS manages the underlying OS. Default Parameter Group: AWS-managed, cannot be edited. Custom Parameter Group: create one, modify any supported parameters, associate with your RDS instance. Parameter types: Dynamic: take effect immediately without reboot (e.g., slow_query_log, log_output). Static: require a pending reboot to take effect (e.g., max_connections, innodb_buffer_pool_size). Pending reboot: parameter change shows 'pending reboot' in the console; apply by rebooting the instance during a maintenance window. Option Groups: separate from parameter groups; configure optional features (Oracle TDE, MySQL memcached, SQL Server CLR, etc.). Cluster Parameter Groups: for Aurora clusters — cluster-level parameters apply to all instances, instance-level parameter groups for instance-specific settings."},

{id:272,domain:"Resilient Architectures",topic:"Application Integration",sub:"EventBridge Scheduler",
q:"A company needs to run a Lambda function to generate reports at exactly 8:00 AM EST every weekday (Monday–Friday), regardless of daylight saving time changes. What is the correct EventBridge Scheduler configuration?",
o:["Amazon CloudWatch Events rule with a UTC cron expression","Amazon EventBridge rule with a daily rate expression","Amazon EventBridge Scheduler with a cron expression in the America/New_York timezone","A Lambda function that polls the current time every minute"],
c:2,
e:"<strong>Correct: EventBridge Scheduler with timezone support.</strong> EventBridge Scheduler (not the same as EventBridge Rules) supports: Cron and rate schedules, Timezone-aware scheduling (specify any IANA timezone — America/New_York, Europe/London, Asia/Tokyo), Target invocation (Lambda, SQS, SNS, Step Functions, and 270+ direct API targets). With America/New_York timezone: the scheduler automatically handles EST (UTC-5) and EDT (UTC-4) transitions — when DST shifts, the function still runs at 8:00 AM New York time. EventBridge Rules (cron): always UTC — you'd need cron(0 13 ? * MON-FRI *) for 8 AM EST, then manually change to cron(0 12 ...) during EDT — error-prone. EventBridge Scheduler is the modern, timezone-aware replacement for time-based EventBridge Rules. It also supports one-time schedules (fire once at a specific datetime) and flexible time windows (fire within a range to distribute load)."},

{id:273,domain:"Secure Architectures",topic:"Network Security",sub:"WAF — Rate-Based Rules",
q:"A web application is being targeted by a credential stuffing attack — thousands of login attempts from many different IP addresses, each IP sending only 10–20 requests per minute (low rate, evading simple IP-block rules). The team wants to automatically block IP addresses that send more than 100 login attempts in any 5-minute window. What WAF rule type handles this?",
o:["AWS WAF IP set match rule","AWS WAF Geographic match rule","AWS WAF Rate-Based Rule targeting the /login path","AWS WAF Regex pattern match rule"],
c:2,
e:"<strong>Correct: WAF Rate-Based Rules.</strong> Rate-Based Rules in AWS WAF count requests from each source IP over a rolling 5-minute window. When an IP exceeds the configured rate limit, WAF automatically applies the rule action (BLOCK, CAPTCHA, or COUNT) to subsequent requests from that IP. When the rate drops below the threshold, the block is automatically removed. Key features: scope to specific paths (e.g., /login, /api/auth) using AND conditions with other statements; aggregate by IP, forwarded IP (if behind CloudFront/ALB with X-Forwarded-For), HTTP header, or query string. Rate-based rules are different from Count-based rules — they're dynamic and self-managing. Minimum rate limit: 100 requests per 5 minutes. Perfect for: login protection, API abuse prevention, DDoS mitigation at Layer 7. IP set rules: static list — can't auto-block new IPs. Geo match: blocks by country regardless of behavior. Regex: signature-based (easy to evade by changing user-agent)."},

{id:274,domain:"High-Performing Architectures",topic:"Storage",sub:"S3 Multipart Upload",
q:"A company uploads large video files (5–50 GB each) to S3 from application servers. Uploads frequently fail midway through due to network interruptions, requiring the entire file to be re-uploaded. How should they redesign the upload process to handle failures gracefully and improve upload speed?",
o:["Compress videos before uploading to reduce file size","Amazon S3 Transfer Acceleration","Amazon S3 Multipart Upload with parallel part uploads","Amazon S3 Versioning"],
c:2,
e:"<strong>Correct: S3 Multipart Upload.</strong> Multipart Upload splits a large object into parts for parallel, resumable uploads. Requirements: minimum part size 5 MB (except last part), maximum 10,000 parts per object, maximum object size 5 TB. Process: (1) Initiate multipart upload → get Upload ID. (2) Upload parts (can be done in parallel with multiple threads/connections). (3) Complete multipart upload → S3 assembles parts into the final object. Failure handling: if a part fails, retry that specific part — only ~50 MB retry instead of 50 GB restart. Parallel upload: 10 parts uploading simultaneously at 100 Mbps each = effectively 1 Gbps aggregate upload speed. Objects > 5 GB: MUST use multipart upload (single PUT limit is 5 GB). Best practice: use multipart for any object > 100 MB. Lifecycle rules: set to abort incomplete multipart uploads after N days to avoid storage charges for partial uploads. The AWS SDK automatically uses multipart for large files via the transfer manager."},

{id:275,domain:"Resilient Architectures",topic:"Compute",sub:"Elastic Load Balancing — Health Checks",
q:"An ALB target group has an EC2 instance that is running and serving valid requests, but the ALB is marking it as unhealthy and not sending traffic to it. The health check endpoint is /health and the target returns HTTP 200. What is the most likely cause?",
o:["The ALB only supports HTTP/1.0 for health checks","The instance CPU utilization is too high, triggering the unhealthy threshold","The instance security group does not allow inbound traffic from the ALB security group on the health check port","ALB health checks require HTTPS on port 443"],
c:2,
e:"<strong>Correct: Security group misconfiguration blocking health checks.</strong> ALB health check flow: ALB sends HTTP GET to /health on the instance's health check port (default: traffic port). If the ALB security group doesn't allow outbound to the instance's port (usually not an issue since SG default allows all outbound), or more commonly, the INSTANCE's security group doesn't allow inbound from the ALB's security group on the health check port → health check request is dropped → ALB marks instance unhealthy. Fix: add an inbound rule to the instance's security group allowing traffic from the ALB's security group (reference SG ID, not CIDR) on port 80 (or health check port). Common mistake: adding the ALB security group to the instance's NACL or not including the health check port. Health check details that could also cause issues: wrong path (/health vs /healthcheck), wrong port, wrong protocol, success codes not including 200 (can specify 200-299 or custom codes like 200,301)."},

{id:276,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Storage Classes — Access Patterns",
q:"A company stores 1 PB of log files in S3 Standard. Analysis shows 70% of files have NEVER been accessed after 30 days, 20% are accessed once between 31–90 days, and 10% are accessed regularly throughout the year. What lifecycle configuration minimizes cost while maintaining immediate retrieval for the 10% regularly accessed?",
o:["Transition all files to S3 Glacier Flexible Retrieval after 30 days","Keep all files in S3 Standard with no lifecycle policy","S3 Lifecycle policy to transition to S3 Intelligent-Tiering after 30 days","Manually review access logs monthly and move files to appropriate storage classes"],
c:2,
e:"<strong>Correct: Transition to S3 Intelligent-Tiering after 30 days.</strong> This scenario has mixed and unpredictable access patterns within the same bucket — exactly what Intelligent-Tiering is designed for. After the 30-day Standard period, transition everything to Intelligent-Tiering (IT). IT automatically handles the access pattern diversity: Frequently accessed (10%): stays in Frequent Access tier (same cost as Standard). Occasionally accessed (20%): moves to Infrequent Access tier after 30 days without access (40% cheaper). Never accessed (70%): moves to Archive Instant Access tier after 90 days without access (68% cheaper). No retrieval fees when data moves back to Frequent tier. Small monthly monitoring fee ($0.0025/1,000 objects). Alternative: lifecycle rules to Glacier for everything → cheap storage but the 10% regularly-accessed would incur retrieval costs and latency. IT is the right tool when you have mixed, unpredictable patterns in the same data set."},

{id:277,domain:"Resilient Architectures",topic:"Networking",sub:"IPv6 in VPC",
q:"A company is enabling IPv6 in their VPC. Instances in a private subnet need outbound-only IPv6 internet connectivity (they can initiate connections to IPv6 internet resources but must NOT be accessible from the internet via IPv6). What gateway provides this?",
o:["Internet Gateway","NAT Gateway","Egress-Only Internet Gateway","NAT Gateway configured for NAT64 translation"],
c:2,
e:"<strong>Correct: Egress-Only Internet Gateway.</strong> IPv6 addressing in AWS: all IPv6 addresses are public (no private IPv6 ranges like RFC 1918 for IPv4). For instances in a private subnet that need to initiate IPv6 connections to the internet (e.g., download IPv6-only resources) but must not be reachable from the internet: Egress-Only Internet Gateway (EOIGW): allows outbound IPv6 traffic; blocks unsolicited inbound IPv6 connections. It's the IPv6 equivalent of a NAT Gateway for IPv4 (though it doesn't translate addresses — it's a stateful gateway that blocks inbound). Route table: add ::/0 → egress-only-igw for private subnet. Internet Gateway: enables full bidirectional IPv4 and IPv6 connectivity — not appropriate for instances that must not accept inbound. NAT Gateway: handles IPv4 translation only; does not process IPv6 traffic. NAT64: converts IPv6 client requests to IPv4 — different use case (for IPv6-only clients reaching IPv4 resources)."},

{id:278,domain:"High-Performing Architectures",topic:"Serverless",sub:"API Gateway — WebSocket",
q:"A multiplayer gaming application needs a real-time bidirectional communication channel between the game server (Lambda) and connected players. Players send game actions, and the server broadcasts updates to all players simultaneously. REST API polling is too slow. What API Gateway configuration enables this?",
o:["Amazon API Gateway REST API with long polling","Amazon API Gateway HTTP API with streaming responses","Amazon API Gateway WebSocket API","Amazon SQS queue with Lambda polling"],
c:2,
e:"<strong>Correct: API Gateway WebSocket API.</strong> WebSocket APIs provide full-duplex, persistent connections. Route types: $connect: invoked when a client establishes a WebSocket connection — store the connectionId in DynamoDB. $disconnect: invoked on disconnect — clean up connectionId. Custom routes (e.g., 'gameAction'): based on a routeSelectionExpression field in the JSON message body. Server-to-client push: use the @connections management API endpoint (POST to https://{api-id}.execute-api.{region}.amazonaws.com/{stage}/@connections/{connectionId}) to push a message to any connected client by its connectionId. Fan-out pattern: on a game state update, Lambda queries DynamoDB for all active connectionIds, then calls @connections for each. This enables: real-time multiplayer, collaborative editing, chat applications, live dashboards. REST long polling: 29-second max, not truly real-time, inefficient. HTTP API: request-response only, no server push. WebSocket = bidirectional, persistent, real-time."},

{id:279,domain:"Resilient Architectures",topic:"Storage",sub:"AWS Snow Family — Snowball Edge",
q:"A construction company operates on remote sites with no reliable internet connectivity. Their drones generate 10 TB of video footage per day that needs to be processed locally (object detection ML inference) before uploading to S3 when the site gets occasional internet access. What Snow family device supports both local ML inference AND storage?",
o:["AWS Snowmobile","AWS Snowcone","AWS Snowball Edge Compute Optimized","AWS Snowball Edge Storage Optimized"],
c:2,
e:"<strong>Correct: Snowball Edge Compute Optimized.</strong> Snow family comparison: Snowcone: 8 TB HDD or 14 TB SSD usable, 2 vCPUs, 4 GB RAM — for small edge workloads and lightweight data collection. Snowball Edge Storage Optimized: 80 TB usable, 40 vCPUs, 80 GB RAM — balanced storage and compute. Snowball Edge Compute Optimized: 104 TB NVMe usable, 52 vCPUs, 208 GB RAM, optional V100 GPU — designed for demanding edge ML inference, IoT data aggregation, pre-processing before cloud transfer. Snowmobile: 100 PB container truck for massive migrations — no edge compute. For daily 10 TB generation + ML inference (object detection requires significant compute) → Compute Optimized with GPU is the answer. All Snow devices include: local S3-compatible endpoints, EC2 AMI support, AWS Lambda execution, automatic data encryption, and transfer to S3 when connected. OpsHub: GUI for managing Snow devices."},

{id:280,domain:"Secure Architectures",topic:"Monitoring",sub:"AWS Security Lake",
q:"A large enterprise wants to centralize security logs from CloudTrail, VPC Flow Logs, Route 53 DNS logs, Lambda logs, and third-party security tools (firewall logs, endpoint detection) across all AWS accounts into a single security data lake for long-term retention, SIEM integration, and custom security analytics with Athena. What service automates this?",
o:["Stream all logs to a CloudWatch Logs cross-account central log group","Manually configure each account to deliver logs to a central S3 bucket","Amazon Security Lake","AWS Glue with Amazon Redshift as the central log store"],
c:2,
e:"<strong>Correct: Amazon Security Lake.</strong> Security Lake automates the collection, normalization, and centralization of security data. What it does automatically: enables log sources across all accounts in an Organization (CloudTrail management and data events, VPC Flow Logs, Route 53 query logs, Lambda execution logs, Security Hub findings, AWS WAF logs). Normalizes to OCSF: Open Cybersecurity Schema Framework — a vendor-neutral, open standard format making data consistent regardless of source. Stores in dedicated S3 buckets with configurable lifecycle. Subscribers: security tools, SIEMs (Splunk, Sumo Logic), analytics tools (Athena, Amazon SageMaker) can subscribe to query the data. Why it matters: without Security Lake, you need custom scripts/Glue jobs to collect, normalize, and deliver logs from 10+ sources. Security Lake does this with a few clicks. OCSF normalization means your Athena queries work the same way for CloudTrail events, VPC Flow Logs, and firewall logs."},

{id:281,domain:"High-Performing Architectures",topic:"Compute",sub:"Session State Externalization",
q:"A company runs a web application on EC2 instances behind an Application Load Balancer. The application stores user session data locally on each instance. Users frequently report being logged out when their requests are routed to a different instance. The solutions architect must fix this with the LEAST amount of application code changes.",
o:["Enable sticky sessions (session affinity) on the Application Load Balancer","Store session data in Amazon ElastiCache for Redis and update the application to use it","Increase the number of EC2 instances to reduce the probability of cross-instance routing","Store session data in an Amazon RDS database"],
c:1,
e:"<strong>Correct: ElastiCache for Redis.</strong> Externalizing session state to ElastiCache is the scalable fix — all instances share the same session store, so routing to any instance works correctly. Sticky sessions (A) avoids the problem but doesn't solve it: sessions break during auto scaling events when an instance is terminated. More instances (C) make the problem worse, not better. RDS (D) works but adds unnecessary latency and cost compared to an in-memory store designed for this purpose."},

{id:282,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Lifecycle Policies",
q:"A company stores application log files in Amazon S3. Logs are accessed frequently for the first 30 days, occasionally for the next 60 days, and rarely after that. The logs must be retained for 7 years for compliance. What is the MOST cost-effective storage strategy?",
o:["Store all logs in S3 Intelligent-Tiering for automatic cost optimization","Use an S3 Lifecycle policy: S3 Standard for 30 days, S3 Standard-IA for 60 days, then S3 Glacier Flexible Retrieval for the remainder","Store all logs in S3 Standard and delete them after 7 years","Use an S3 Lifecycle policy: S3 Standard for 90 days, then transition directly to S3 Glacier Deep Archive"],
c:1,
e:"<strong>Correct: Lifecycle policy matching the access pattern.</strong> Tiering through Standard → Standard-IA → Glacier minimizes cost at each stage by matching the storage class to the actual access frequency. Intelligent-Tiering (A) charges a monthly monitoring fee per object and is best when access patterns are <em>unknown</em> — here they are known. Skipping Standard-IA (D) leaves money on the table during the 60-day occasional-access window where IA is cheaper than Standard. Keeping everything in S3 Standard (C) is the most expensive option."},

{id:283,domain:"Resilient Architectures",topic:"Networking",sub:"NAT Gateway",
q:"A company has EC2 instances in a private subnet that need to download software updates from the internet. The security team requires that no inbound internet traffic can reach the instances. What should a solutions architect configure?",
o:["Attach an internet gateway to the VPC and add a route in the private subnet route table pointing to it","Deploy a NAT Gateway in a public subnet and add a route in the private subnet route table pointing 0.0.0.0/0 to the NAT Gateway","Assign Elastic IP addresses to the EC2 instances in the private subnet","Create a VPC endpoint for the software repository"],
c:1,
e:"<strong>Correct: NAT Gateway in a public subnet.</strong> A NAT Gateway allows instances in private subnets to make outbound internet connections (for updates) while preventing any inbound connections from the internet. It must be placed in a public subnet with a route to the internet gateway. Option A would expose the instances directly to inbound internet traffic. Elastic IPs (C) make instances publicly reachable, violating the security requirement. VPC endpoints (D) only work for AWS services, not arbitrary internet sources."},

{id:284,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"EC2 Pricing Models",
q:"A company runs a stateless batch processing job that analyzes data from an SQS queue. The job runs for 4–6 hours each night and can tolerate interruptions because jobs are re-queued automatically. What is the MOST cost-effective EC2 purchasing option?",
o:["On-Demand Instances to ensure availability throughout the job","Reserved Instances with a 1-year term commitment","Spot Instances","Dedicated Hosts"],
c:2,
e:"<strong>Correct: Spot Instances.</strong> Spot Instances offer up to 90% savings vs. On-Demand. This workload is an ideal Spot candidate: it's stateless (no lost work if interrupted because SQS re-queues the message), interruptible by design, and runs on a predictable nightly schedule. On-Demand (A) works but costs significantly more. Reserved Instances (B) require a 1- or 3-year commitment and are better for 24/7 steady-state workloads. Dedicated Hosts (D) are the most expensive option and used for licensing or compliance requirements."},

{id:285,domain:"Resilient Architectures",topic:"Databases",sub:"Cross-Region Disaster Recovery",
q:"A company runs a critical application using Amazon RDS for MySQL in us-east-1. The application requires a Recovery Time Objective (RTO) of less than 1 minute and a Recovery Point Objective (RPO) of less than 5 seconds in the event of a regional failure. Which solution meets these requirements?",
o:["Enable RDS Multi-AZ in us-east-1 with automated backups to S3","Create a read replica in us-west-2 and promote it manually during a failure","Deploy Amazon Aurora Global Database with us-west-2 as a secondary region","Configure AWS Database Migration Service (DMS) to continuously replicate data to us-west-2"],
c:2,
e:"<strong>Correct: Aurora Global Database.</strong> Aurora Global Database replicates data across regions with typically under 1 second of lag (meeting the 5-second RPO). In a failure, managed failover promotes the secondary region in under 1 minute (meeting the RTO). RDS Multi-AZ (A) is single-region — it doesn't protect against regional failure. A standard read replica (B) requires manual promotion which takes several minutes, exceeding the 1-minute RTO. DMS (D) is a migration tool, not a high-availability solution."},

{id:286,domain:"Secure Architectures",topic:"Encryption",sub:"Server-Side Encryption",
q:"A company wants to encrypt all objects stored in Amazon S3. The security team requires that the company controls the encryption keys and that all key usage is logged in AWS CloudTrail. Which solution meets these requirements?",
o:["Enable SSE-S3 (server-side encryption with S3-managed keys) on the bucket","Enable SSE-KMS with an AWS managed key (aws/s3)","Enable SSE-KMS with a customer managed key (CMK) created in AWS KMS","Enable SSE-C and provide the encryption key in each API request"],
c:2,
e:"<strong>Correct: SSE-KMS with a customer managed key.</strong> CMKs give the company full control: define key policies, enable/disable the key, set rotation schedules, and grant/revoke access. All CMK usage (encrypt, decrypt calls) is automatically logged in CloudTrail. SSE-S3 (A) uses keys fully managed by AWS — the company has no control. The AWS managed key (B) is managed by AWS; while usage is logged, the company cannot control, disable, or audit the key policy directly. SSE-C (D) requires sending the key with every API request and doesn't integrate with CloudTrail key usage logging."},

{id:287,domain:"High-Performing Architectures",topic:"Application Integration",sub:"Decoupled Serverless Architecture",
q:"A company needs to process images uploaded to Amazon S3. Each image must be resized into three thumbnail sizes. Processing takes 3–5 seconds per image. Upload volume varies from 10 to 2,000 images per hour unpredictably. The solution must scale automatically and minimize operational overhead. What architecture should a solutions architect recommend?",
o:["S3 event notification → Lambda function (invoke directly for each upload)","S3 event notification → Amazon SNS → Amazon SQS → Lambda function","S3 event notification → SQS queue → Lambda function","S3 event notification → SQS queue → EC2 Auto Scaling group"],
c:2,
e:"<strong>Correct: S3 → SQS → Lambda.</strong> SQS buffers the unpredictable upload spikes so no images are dropped, and Lambda scales automatically to process the queue. The 3–5 second processing time is well within Lambda's 15-minute limit. Direct Lambda invocation (A) works at low volume but risks throttling and dropped events during spikes without a buffer. Adding SNS between S3 and SQS (B) adds unnecessary complexity — S3 can write directly to SQS. EC2 Auto Scaling (D) adds significant operational overhead compared to the serverless Lambda approach."},

{id:288,domain:"Resilient Architectures",topic:"Disaster Recovery",sub:"DR Strategy Selection",
q:"A company's application has an RTO of 4 hours and an RPO of 1 hour. The application runs on EC2 instances with an RDS database. The company wants the MOST cost-effective disaster recovery solution that meets these requirements.",
o:["Multi-site active-active deployment across two regions","Warm standby with a scaled-down environment running in a second region","Pilot light with core infrastructure (database replication) running in a second region and EC2 AMIs ready to launch","Backup and restore using AWS Backup with cross-region copy"],
c:2,
e:"<strong>Correct: Pilot light.</strong> Pilot light keeps only the minimum core components running in the DR region (the database replicating continuously meets the 1-hour RPO), with EC2 AMIs pre-built ready to launch quickly. Recovery launches the EC2 fleet and scales up — achievable within 4 hours (meeting the RTO). This is cheaper than warm standby (B), which runs a scaled-down but live EC2 fleet at ongoing cost. Multi-site active-active (A) meets both RTOs easily but is the most expensive option. Backup and restore (D) has RTO measured in hours-to-days depending on data size, making it too slow."},

{id:289,domain:"High-Performing Architectures",topic:"Networking",sub:"CloudFront for Static Content",
q:"A company hosts a static website in an Amazon S3 bucket in us-east-1. International users report slow load times. The company wants to improve performance for all users globally with the LEAST operational overhead.",
o:["Enable S3 Transfer Acceleration on the bucket","Create an Amazon CloudFront distribution with the S3 bucket as the origin","Deploy EC2 instances in multiple regions and use Route 53 latency-based routing","Enable S3 Cross-Region Replication to buckets in multiple regions"],
c:1,
e:"<strong>Correct: CloudFront distribution.</strong> CloudFront caches static content at 400+ edge locations worldwide, serving users from the nearest edge with the lowest latency — no code changes and minimal ongoing management. S3 Transfer Acceleration (A) speeds up <em>uploads</em> to S3, not downloads to end users. EC2 + Route 53 (C) requires running and managing infrastructure in multiple regions — high operational overhead. S3 Cross-Region Replication (D) copies data between regions but doesn't bring content closer to users at the edge and requires managing multiple buckets and DNS."},

{id:290,domain:"Cost-Optimized Architectures",topic:"Networking",sub:"VPC Endpoints",
q:"A company has hundreds of EC2 instances in private subnets that frequently read and write objects to Amazon S3. The company is seeing high costs for data transfer through their NAT Gateway. What is the MOST cost-effective way to reduce these costs without impacting functionality?",
o:["Enable S3 Transfer Acceleration to reduce NAT Gateway usage","Create an S3 Gateway Endpoint and update the route tables in the private subnets","Move the EC2 instances to public subnets so they can access S3 directly","Use an S3 Interface Endpoint instead of routing through the NAT Gateway"],
c:1,
e:"<strong>Correct: S3 Gateway Endpoint.</strong> An S3 Gateway Endpoint routes S3 traffic from your VPC directly to S3 over Amazon's private network without going through the NAT Gateway — eliminating NAT Gateway data processing charges for S3 traffic. Gateway Endpoints are free. You simply create the endpoint and update the route table; no application changes needed. S3 Transfer Acceleration (A) is for speeding up uploads from on-premises, not for VPC-to-S3 traffic. Moving to public subnets (C) is a security risk. An Interface Endpoint (D) does work but costs money per hour and per GB, whereas a Gateway Endpoint is free."},

{id:291,domain:"High-Performing Architectures",topic:"Databases",sub:"Read Replica vs Multi-AZ",
q:"A company runs a read-heavy web application backed by Amazon RDS for PostgreSQL. The primary instance is struggling to keep up with read traffic, causing slow query response times. The database must remain highly available. What should a solutions architect recommend?",
o:["Upgrade to a larger RDS instance size","Enable RDS Multi-AZ to distribute read traffic across the standby instance","Create one or more RDS Read Replicas and update the application to direct read queries to the replica endpoint","Enable ElastiCache for Redis in front of the database to cache all queries"],
c:2,
e:"<strong>Correct: RDS Read Replicas.</strong> Read Replicas offload read traffic from the primary instance by providing a dedicated read endpoint. The application routes SELECT queries to replicas and writes to the primary. You can add multiple replicas to scale reads further. Multi-AZ (B) is a common wrong answer here — the standby in a Multi-AZ deployment is not available for reads; it only takes over during failover. Upgrading instance size (A) helps temporarily but doesn't scale horizontally. ElastiCache (D) can help for repeated identical queries but adds application complexity and doesn't help for queries that must hit the database."},

{id:292,domain:"Resilient Architectures",topic:"Application Integration",sub:"SQS Visibility Timeout",
q:"A company uses SQS to decouple an order processing system. Occasionally, messages are processed multiple times, creating duplicate orders. A developer notes that order processing sometimes takes up to 3 minutes. The current SQS visibility timeout is 30 seconds. What should the solutions architect do?",
o:["Switch to an SQS FIFO queue to prevent duplicate processing","Enable SQS long polling to reduce the chance of duplicate receives","Increase the visibility timeout to at least 4 minutes","Enable SQS dead-letter queue (DLQ) to catch duplicate messages"],
c:2,
e:"<strong>Correct: Increase the visibility timeout.</strong> When a consumer receives a message, SQS hides it for the visibility timeout period. If processing takes 3 minutes but the timeout is only 30 seconds, SQS makes the message visible again before processing finishes — causing another consumer to pick it up and create a duplicate. Setting the timeout to at least 4 minutes (longer than the max processing time) prevents this. FIFO queues (A) prevent duplicates from producers but don't fix the visibility timeout issue. Long polling (B) reduces empty receives but doesn't affect duplicate processing. DLQs (D) capture messages that repeatedly fail — they don't prevent duplicates."},

{id:293,domain:"Secure Architectures",topic:"IAM",sub:"Cross-Account Access",
q:"A company has two AWS accounts: Account A (development) and Account B (production). Developers in Account A need to deploy updates to an S3 bucket in Account B. The security team requires that no long-term access keys are used. What is the MOST secure way to grant this access?",
o:["Create an IAM user in Account B, generate access keys, and share them with the Account A developers","Create an IAM role in Account B with a trust policy that allows Account A to assume it; developers use sts:AssumeRole","Create an S3 bucket policy in Account B that allows all principals from Account A","Grant Account A's root user cross-account S3 permissions"],
c:1,
e:"<strong>Correct: IAM role with cross-account trust policy.</strong> Developers in Account A assume the role in Account B using STS, receiving short-lived temporary credentials — no long-term keys ever leave Account B. The trust policy explicitly controls which Account A principals can assume the role. Sharing access keys (A) creates long-term credentials that can be leaked or forgotten. An open bucket policy (C) grants access to the entire Account A, not specific developers, and is too permissive. Using the root user (D) violates the principle of least privilege and is an AWS security anti-pattern."},

{id:294,domain:"Resilient Architectures",topic:"Compute",sub:"Auto Scaling Policies",
q:"A company runs a web application on an EC2 Auto Scaling group. The application's CPU utilization spikes to 90% at the start of every business day as users log in simultaneously, causing slow response times before Auto Scaling can add capacity. What should the solutions architect recommend to eliminate these delays?",
o:["Switch from a target tracking scaling policy to a step scaling policy","Create a scheduled scaling action to increase the minimum capacity before business hours","Reduce the CloudWatch alarm evaluation period to 30 seconds","Enable predictive scaling to automatically forecast and pre-scale capacity"],
c:3,
e:"<strong>Correct: Predictive scaling.</strong> Predictive scaling uses machine learning to analyze historical load patterns and proactively adds capacity <em>before</em> the expected spike — eliminating the lag that causes slow response times at day start. Scheduled scaling (B) also works and is simpler, but requires manual configuration of a fixed schedule; predictive scaling adapts automatically to changing patterns. Step scaling (A) still reacts to existing load after a CloudWatch alarm fires — it doesn't predict. Shorter alarm periods (C) speed up reactive scaling slightly but still can't add capacity faster than a few minutes."},

{id:295,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"Right-Sizing Serverless",
q:"A company runs a backend API using AWS Lambda. The functions are configured with 3,008 MB of memory but profiling shows they only use 256 MB during execution. Average execution time is 2 seconds. The company wants to reduce Lambda costs with the LEAST operational effort.",
o:["Rewrite the Lambda functions in a more memory-efficient language","Reduce Lambda memory to 256 MB to match actual usage","Enable Lambda Provisioned Concurrency to reduce cold starts","Use AWS Compute Optimizer recommendations to right-size Lambda memory and update the configuration"],
c:3,
e:"<strong>Correct: AWS Compute Optimizer for Lambda.</strong> Compute Optimizer analyzes Lambda invocation data and recommends the optimal memory setting — balancing cost and performance. It provides specific recommendations with projected cost savings, requiring only a configuration update. Manually reducing to 256 MB (B) seems right but may be wrong: Lambda allocates CPU proportional to memory, so reducing memory too aggressively increases execution time, which could make the function slower and potentially more expensive overall. Compute Optimizer finds the actual optimum. Rewriting code (A) is high effort. Provisioned Concurrency (C) actually increases cost; it addresses cold starts, not memory over-provisioning."},

{id:296,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Savings Plans vs Reserved Instances",
q:"A company runs a fleet of EC2 instances that includes On-Demand Linux instances across multiple instance families (m5, c5, r5) and multiple AWS Regions. Usage patterns are consistent but the instance types may change as workloads evolve. The finance team wants a 40–50% cost reduction with the MOST flexibility to accommodate future instance type changes.",
o:["Purchase Standard Reserved Instances for each current instance type in each Region","Purchase Convertible Reserved Instances for each current instance type","Purchase Compute Savings Plans with a 1-year, no-upfront commitment","Purchase EC2 Instance Savings Plans for the highest-usage instance family"],
c:2,
e:"<strong>Correct: Compute Savings Plans.</strong> Compute Savings Plans provide up to 66% savings vs On-Demand and automatically apply to any EC2 instance regardless of instance family, size, OS, tenancy, or Region — as well as AWS Fargate and Lambda. This is the most flexible commitment-based discount. Standard RIs (A): locked to specific instance type, size, OS, Region — no flexibility for changing workloads. Convertible RIs (B): allow instance type/family changes but require manual exchange process; still Region-locked; savings ~54%. EC2 Instance Savings Plans (D): apply within a specific instance family in a Region — more flexible than RIs but less flexible than Compute Savings Plans; savings up to 72%. For the exam: Compute Savings Plans = maximum flexibility + substantial savings. EC2 Instance Savings Plans = slightly more savings but less flexibility. Both Savings Plans types automatically apply to eligible usage — no need to manage individual instance commitments."},

{id:297,domain:"Secure Architectures",topic:"Network Security",sub:"VPC Endpoint Policies",
q:"A company's EC2 instances in a private subnet must access Amazon S3 to read application data. A security requirement states that the instances must NEVER send S3 traffic over the public internet, and S3 access must be restricted so the instances can only access the company's own S3 buckets — not any other AWS account's buckets. What combination of controls achieves both requirements?",
o:["NAT Gateway with an outbound security group rule allowing port 443 to S3 IP ranges; S3 bucket policy restricting access by source IP","VPC Gateway Endpoint for S3 with a VPC Endpoint Policy restricting access to the company's buckets; route table directing S3 traffic through the endpoint","VPC Interface Endpoint for S3 with PrivateLink; Security Group on the endpoint restricting outbound traffic","S3 Access Points configured with VPC network-origin conditions; no endpoint required"],
c:1,
e:"<strong>Correct: Gateway Endpoint + Endpoint Policy.</strong> A VPC Gateway Endpoint for S3 keeps traffic entirely within the AWS network (no NAT, no public internet). By default it allows access to all S3 buckets; a VPC Endpoint Policy (resource-based policy on the endpoint itself) restricts which S3 buckets can be accessed — you can limit to 'arn:aws:s3:::company-bucket-*' to prevent access to other accounts' buckets. Route tables must have an entry for the S3 prefix list pointing to the endpoint. NAT Gateway + IP allow-listing (A): NAT traverses the internet; S3 IP ranges change frequently and are hard to maintain. Interface Endpoint (C): works for S3 but is more expensive (hourly charge + data processing fee) and less common for S3 than Gateway Endpoints; Security Groups on interface endpoints restrict which resources can reach the endpoint, not which S3 buckets can be accessed. S3 Access Points (D): control access from VPC origins but don't replace the need for an endpoint to keep traffic off the internet."},

{id:298,domain:"Cost-Optimized Architectures",topic:"EC2 Pricing",sub:"Spot Instances — Interruption Handling",
q:"A company runs a large-scale genomics analysis workload that processes batches of sequencing data. Each batch job takes 2–6 hours to complete and must be fault-tolerant. The workload can tolerate interruptions as long as progress is not lost. The company wants to reduce EC2 costs by 80% compared to On-Demand pricing. What architecture BEST meets these requirements?",
o:["On-Demand instances with EC2 Auto Scaling using simple scaling policies","Reserved Instances with a 3-year term and no-upfront payment option","Spot Instances with checkpointing to S3; use EC2 Spot Instance interruption notices to save state before termination","Dedicated Hosts with Capacity Reservations to ensure availability"],
c:2,
e:"<strong>Correct: Spot Instances with checkpointing.</strong> Spot Instances offer up to 90% savings vs On-Demand (significantly more than 80%), making them ideal for fault-tolerant batch workloads. The 2-minute interruption notice (via EC2 metadata at /latest/meta-data/spot/termination-time and EventBridge) allows the application to save progress (checkpoint) to S3 before the instance is reclaimed. On restart, the job resumes from the checkpoint rather than starting over. AWS Batch natively supports Spot Instances with automatic retry. On-Demand Auto Scaling (A): fault-tolerant but no cost reduction; On-Demand pricing. Reserved Instances (B): 3-year no-upfront offers the lowest RI discount but only ~42% vs On-Demand — not 80%; also RIs are wasted when idle. Dedicated Hosts (D): most expensive option; designed for license compliance (BYOL), not cost reduction."},

{id:299,domain:"Secure Architectures",topic:"S3 Security",sub:"S3 Object Lock",
q:"A financial services company must retain trading records in Amazon S3 for exactly 7 years to comply with SEC Rule 17a-4. The records must not be modifiable or deletable by anyone — including the AWS account root user — for the retention period. After 7 years, objects must be automatically eligible for deletion. What S3 configuration satisfies these requirements?",
o:["S3 Versioning with a lifecycle policy that transitions objects to Glacier after 7 years","S3 Object Lock in Governance mode with a 7-year retention period","S3 Object Lock in Compliance mode with a 7-year retention period","MFA Delete on the S3 bucket combined with a bucket policy denying DeleteObject","S3 Object Lock in Compliance mode with a 7-year retention period"],
c:2,
e:"<strong>Correct: S3 Object Lock — Compliance mode.</strong> S3 Object Lock Compliance mode prevents any user — including the root account — from overwriting or deleting objects until the retention period expires. This satisfies SEC 17a-4(f) WORM (Write Once, Read Many) requirements. After the retention period, objects can be deleted normally. Governance mode (B): allows users with s3:BypassGovernanceRetention permission to delete or modify objects — does NOT satisfy strict regulatory requirements where even privileged users must be blocked. S3 Versioning + lifecycle (A): adds a new version on overwrite but doesn't prevent deletion of all versions; not true WORM. MFA Delete (D): adds a layer of protection but can be bypassed by the root account and doesn't enforce a time-based retention period. For the exam: Compliance mode = regulatory WORM; Governance mode = internal governance where admins can override. Object Lock requires S3 Versioning to be enabled."},

{id:300,domain:"Cost-Optimized Architectures",topic:"Networking",sub:"Data Transfer Cost Reduction",
q:"A company runs a three-tier web application in AWS. The presentation tier (EC2) in us-east-1 fetches data from an application tier (EC2) also in us-east-1, which reads from an Amazon RDS database in the same Availability Zone. The company is concerned about unexpected data transfer charges. A solutions architect reviews the architecture. Which data transfer scenario incurs NO AWS data transfer charges?",
o:["Data transferred from EC2 in us-east-1 to EC2 in us-west-2 over the public internet","Data transferred from EC2 to Amazon S3 in the same Region via the public S3 endpoint","Data transferred between EC2 instances in different Availability Zones within us-east-1","Data transferred between EC2 and RDS in the same Availability Zone within the same Region"],
c:3,
e:"<strong>Correct: Same-AZ transfer between EC2 and RDS is free.</strong> AWS data transfer pricing: (1) Within the same AZ: FREE for all traffic between EC2, RDS, ElastiCache, etc. using private IP addresses. (2) Between AZs in the same Region: $0.01/GB in each direction — a hidden cost source for multi-AZ architectures. (3) Cross-Region: $0.02/GB or more depending on regions. (4) EC2 to S3 in same Region via public endpoint: FREE since re:Invent 2021 — but using a VPC Gateway Endpoint is still best practice. (5) Internet egress: $0.09/GB for first 10 TB from EC2 to internet. The design with application and database in the same AZ avoids inter-AZ charges — but sacrifices availability. Cross-Region (A): $0.02/GB. S3 same-Region public endpoint (B): actually free now, but exam questions may still test this. Different AZs (C): $0.01/GB in each direction."},

{id:301,domain:"Secure Architectures",topic:"Encryption",sub:"KMS Key Policies",
q:"A company uses a customer managed AWS KMS key to encrypt sensitive S3 objects. The data science team needs to read these objects from their EC2 instances in a separate AWS account (Account B). The KMS key is in Account A. The S3 bucket is also in Account A. What must a solutions architect configure to grant the cross-account access?",
o:["Add the data science team's IAM role ARN to the S3 bucket policy only; KMS automatically follows S3 permissions","Update the KMS key policy in Account A to allow Account B's principal to use the key; AND grant an IAM policy in Account B to the data science role allowing kms:Decrypt","Create a new KMS key in Account B and re-encrypt the S3 objects with Account B's key","Enable KMS key sharing via AWS Resource Access Manager (RAM)"],
c:1,
e:"<strong>Correct: KMS key policy update in Account A + IAM policy in Account B.</strong> Cross-account KMS access requires TWO components: (1) KMS key policy in Account A: must explicitly allow the external principal (Account B role or account) to use the key — add Principal: arn:aws:iam::AccountB:role/DataScienceRole with kms:Decrypt permission. (2) IAM policy in Account B: must grant the data science role kms:Decrypt on the Account A key ARN — even after the key policy allows it, the IAM identity must also have permission. This is unlike S3 bucket policies where Account A trust alone is sufficient. S3 bucket policy must also allow the Account B role to access the objects (s3:GetObject). S3 permissions alone (A): S3 will serve the object but S3 decrypts server-side using the KMS key — for SSE-KMS, decryption happens transparently if S3 has key access. For client-side encryption or explicit decryption, both policies are needed. KMS RAM sharing (D): KMS keys cannot be shared via AWS RAM — they are cross-account shared via key policy only. Re-encrypting (C): possible but operationally expensive and unnecessary."},

{id:302,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"EBS Volume Optimization",
q:"A company runs 200 Amazon EC2 instances, each with a 500 GB gp2 EBS volume used for application logging. The volumes were originally sized for high IOPS performance, but monitoring shows average IOPS utilization is only 8% of provisioned capacity. The company wants to reduce EBS costs with MINIMAL disruption. What is the MOST cost-effective change?",
o:["Snapshot all gp2 volumes and restore them as smaller gp2 volumes","Migrate all volumes from gp2 to gp3 and reduce throughput to 125 MB/s","Migrate all volumes from gp2 to gp3; keep the same size but reduce provisioned IOPS to match actual usage","Replace EBS volumes with Amazon EFS for centralized log storage"],
c:2,
e:"<strong>Correct: Migrate gp2 to gp3 with reduced IOPS.</strong> gp2 pricing: $0.10/GB-month, with IOPS tied to volume size (3 IOPS/GB baseline, burst to 3,000 for <1 TB). gp3 pricing: $0.08/GB-month with a baseline of 3,000 IOPS and 125 MB/s throughput included at no extra charge — additional IOPS cost $0.005/IOPS-month. For a 500 GB gp2 volume: 500 GB × $0.10 = $50/month. For 500 GB gp3 with default 3,000 IOPS: 500 GB × $0.08 = $40/month — 20% savings, zero disruption (in-place modification, no downtime). EBS Elastic Volumes allows modifying volume type from gp2 to gp3 while the volume remains attached and in use. Restoring smaller volumes (A): reduces size but logging data may not shrink; risky. gp3 with reduced throughput (B): throughput is already included; reducing below 125 MB/s requires deliberate configuration and doesn't save money. EFS (D): EFS is $0.30/GB-month for standard — 3× more expensive; also requires application changes."},

{id:303,domain:"Secure Architectures",topic:"Security Services",sub:"Amazon GuardDuty",
q:"A company wants to detect the following threats across their AWS environment: EC2 instances communicating with known malware command-and-control servers, IAM credentials used from unusual geographic locations, and S3 buckets being accessed via API calls from Tor exit nodes. Which AWS service detects ALL of these threat types with NO agent installation required?",
o:["AWS Security Hub with CIS AWS Foundations standard","Amazon Inspector with network reachability assessments","Amazon GuardDuty","AWS Config with managed rules for network and IAM compliance"],
c:2,
e:"<strong>Correct: Amazon GuardDuty.</strong> GuardDuty is a managed threat detection service that continuously analyzes: (1) VPC Flow Logs: detects EC2 instances communicating with known malicious IPs/domains (C&C servers, cryptocurrency mining pools) — no VPC Flow Logs need to be enabled manually; GuardDuty uses its own data sources. (2) CloudTrail management events: detects unusual API call patterns, credential use from unexpected geolocations, impossible travel scenarios. (3) DNS logs: detects queries to known malicious domains. (4) S3 data events: detects API calls from Tor exit nodes, anomalous data access patterns. All analysis happens without installing agents on EC2 instances. GuardDuty uses AWS threat intelligence, anomaly detection, and ML models. Security Hub (A): aggregates findings from multiple services including GuardDuty — but doesn't detect threats itself. Inspector (B): scans for vulnerabilities in EC2/containers; requires agent for OS-level scanning; doesn't detect runtime behavior like C&C communication. AWS Config (D): tracks resource configuration changes; compliance checking — not behavioral threat detection."},

{id:304,domain:"Cost-Optimized Architectures",topic:"DynamoDB",sub:"Capacity Mode Selection",
q:"A company runs an e-commerce platform with an unpredictable traffic pattern: normal daily traffic averages 500 read request units/second and 100 write request units/second, but flash sales cause traffic spikes to 50,000 reads/second and 5,000 writes/second for 2–3 hours, 4–6 times per year. The company currently uses DynamoDB Provisioned Capacity with Auto Scaling. They are evaluating switching to On-Demand. Which analysis correctly guides the decision?",
o:["On-Demand is always more cost-effective for unpredictable workloads regardless of baseline usage","Provisioned with Auto Scaling is always cheaper because On-Demand charges a premium for the flexibility","On-Demand costs approximately 2.5× more per RCU/WCU than provisioned; for this workload, calculate whether the cost of idle provisioned capacity during normal traffic exceeds the On-Demand premium during spikes","DynamoDB Accelerator (DAX) should be added to reduce RCU consumption, making the pricing discussion irrelevant"],
c:2,
e:"<strong>Correct: Compare idle provisioned cost vs On-Demand premium.</strong> DynamoDB pricing: Provisioned: $0.00013/RCU-hour + $0.00065/WCU-hour (us-east-1). On-Demand: $0.25/million RCUs + $1.25/million WCUs (~2.5× higher per unit). Analysis for this workload: During normal traffic (≈8,500 hours/year at 500 RCU/100 WCU): Provisioned at baseline = low cost. During flash sales (≈24 hours/year at 50K RCU/5K WCU): Auto Scaling takes minutes to scale — may throttle during sudden spikes. On-Demand handles spikes instantly with no throttling. Decision framework: if traffic is consistently predictable → Provisioned saves ~60%. If spikes are sudden and brief → On-Demand prevents throttling but costs more. For this workload: flash sales are rare and short; Provisioned Auto Scaling with Application Auto Scaling (target tracking) likely more cost-effective overall. But Auto Scaling may throttle during instant spikes — consider Reserved Capacity + On-Demand burst. On-Demand always better (A): false — for steady traffic, provisioned is cheaper. DAX (D): reduces reads but doesn't eliminate write costs."},

{id:305,domain:"Secure Architectures",topic:"Compliance",sub:"Amazon Macie",
q:"A healthcare company stores patient records in Amazon S3. A compliance audit requires the company to identify all S3 buckets that contain personally identifiable information (PII) — specifically Social Security numbers, medical record numbers, and birth dates — and report any buckets where that data is publicly accessible. Which AWS service BEST automates this discovery and classification?",
o:["Amazon Inspector scanning S3 object content","AWS Config rule checking for S3 public access block settings","Amazon Macie with automated sensitive data discovery","Amazon GuardDuty S3 protection enabled on all buckets"],
c:2,
e:"<strong>Correct: Amazon Macie.</strong> Macie is a fully managed data security and privacy service that uses machine learning to automatically discover, classify, and protect sensitive data in S3. It identifies: PII (SSNs, names, addresses, dates of birth), financial data (credit card numbers, bank account numbers), healthcare data (medical record numbers, prescription data — PHI), credentials (API keys, passwords). Macie generates findings for: sensitive data discovered in objects, buckets with public access, buckets without encryption, buckets with cross-account replication. The automated sensitive data discovery feature continuously samples all S3 buckets in an account, providing an org-wide data inventory. Inspector (A): scans EC2/Lambda/ECR for software vulnerabilities — not S3 object content. AWS Config (B): checks bucket configuration (public access block, encryption settings) but cannot analyze object content. GuardDuty S3 Protection (D): monitors S3 data plane events for threats (e.g., Tor node access) — doesn't classify data content. For the exam: data classification + PII detection in S3 = Macie."},

{id:306,domain:"Cost-Optimized Architectures",topic:"CloudFront",sub:"Cache Hit Ratio Optimization",
q:"A media company serves video thumbnails and article images via Amazon CloudFront. Their origin is an Application Load Balancer fronting EC2 instances. CloudFront metrics show a cache hit ratio of only 12%, causing high origin load and significant CloudFront origin fetch costs. A solutions architect reviews the cache behavior configuration. Which change will MOST improve the cache hit ratio?",
o:["Increase the CloudFront TTL (Time to Live) for all objects to 1 year","Ensure the Cache Policy does not forward unnecessary headers, cookies, or query strings to the origin","Enable CloudFront Origin Shield to add an additional caching layer","Switch from Application Load Balancer to Amazon S3 as the origin"],
c:1,
e:"<strong>Correct: Remove unnecessary cache key components from the Cache Policy.</strong> CloudFront's cache key determines whether a request is a cache hit or miss. By default, CloudFront uses only the URL path. If the Cache Policy is configured to include headers (e.g., User-Agent, Accept-Language), cookies, or query strings in the cache key — each unique combination creates a separate cache entry, fragmenting the cache and drastically reducing hit ratio. Fix: use a Cache Policy that includes only the query strings, headers, and cookies actually needed to serve different content. For static images/thumbnails: typically no headers/cookies/query strings needed — use the Managed-CachingOptimized policy. Increasing TTL (A): helps if objects expire too quickly, but if the hit ratio is 12% due to cache key fragmentation, longer TTL won't help much. Origin Shield (C): adds a regional consolidating caching layer but doesn't fix the root cause of low hit ratio; reduces origin load but doesn't improve the percentage as dramatically as fixing the cache key. S3 origin (D): improves performance for static assets but doesn't fix cache fragmentation."},

{id:307,domain:"Secure Architectures",topic:"IAM",sub:"Attribute-Based Access Control",
q:"A company has 500 developers organized into 20 teams. Each team owns specific S3 buckets and EC2 instances tagged with their team name (e.g., Team=Phoenix, Team=Atlas). The security team wants to implement a policy that allows developers to access ONLY resources tagged with their own team name, without creating separate IAM policies for each team. What IAM mechanism achieves this?",
o:["Create 20 IAM groups (one per team) with specific resource ARNs in the policy","Use IAM permission boundaries with team-specific boundaries per developer","Use Attribute-Based Access Control (ABAC) with IAM condition keys matching the developer's principal tag to resource tags","Create 20 IAM roles with separate policies listing allowed resource ARNs"],
c:2,
e:"<strong>Correct: ABAC with principal tags and resource tags.</strong> Attribute-Based Access Control (ABAC) uses tags on both the IAM principal (user/role) and resources to control access with a single scalable policy. Setup: (1) Tag each developer's IAM user/role with their team: Team=Phoenix. (2) Tag each resource with its team: Team=Phoenix. (3) Create ONE IAM policy using condition: aws:PrincipalTag/Team matches aws:ResourceTag/Team. Policy example: Allow s3:GetObject if aws:ResourceTag/Team equals ${aws:PrincipalTag/Team}. Benefits: one policy for all 500 developers; as teams grow or shrink, just update tags — no policy changes needed; scales to thousands of resources without listing ARNs. Role-based access (A, D): requires updating policies when teams change or resources are added — O(teams) complexity. Permission boundaries (B): boundaries limit maximum permissions but don't grant access based on tags; used to delegate admin rights safely. ABAC is the AWS-recommended approach for large, dynamic environments."},

{id:308,domain:"Cost-Optimized Architectures",topic:"S3 Storage Classes",sub:"S3 Intelligent-Tiering",
q:"A company stores 2 PB of user-generated content in Amazon S3 Standard. Analysis shows that 60% of objects have not been accessed in over 90 days, 25% are accessed within 30 days, and 15% have unpredictable access patterns (some objects dormant for months then accessed suddenly). The company wants to optimize storage costs with ZERO operational overhead for lifecycle management. What is the BEST approach?",
o:["Create S3 Lifecycle policies transitioning objects to S3 Standard-IA after 30 days and Glacier after 90 days","Migrate all infrequently accessed objects manually to S3 Standard-IA on a quarterly basis","Enable S3 Intelligent-Tiering on all objects","Create separate S3 buckets for hot and cold data; move objects between buckets based on access logs"],
c:2,
e:"<strong>Correct: S3 Intelligent-Tiering.</strong> S3 Intelligent-Tiering automatically moves objects between access tiers based on actual access patterns with no retrieval fees and no operational overhead: Frequent Access tier (default): S3 Standard pricing. Infrequent Access tier (after 30 days with no access): 40% lower storage cost. Archive Instant Access tier (after 90 days): 68% lower storage cost. Archive Access tier (optional, 90–180 days): 95% lower storage cost — objects moved asynchronously (like Glacier). The monitoring and automation fee is $0.0025 per 1,000 objects/month. For 2 PB with mixed access patterns (especially the 15% unpredictable): Intelligent-Tiering avoids Glacier retrieval fees that lifecycle policies would charge for unexpectedly accessed cold objects. Lifecycle rules (A): good for predictable patterns but charge S3-IA retrieval fees ($0.01/GB) for the 15% suddenly accessed from cold tier. Manual moves (B): high operational overhead. Separate buckets (D): requires access log analysis, automation, and application changes — high complexity."},

{id:309,domain:"Secure Architectures",topic:"Network Security",sub:"AWS Network Firewall",
q:"A company runs workloads in a VPC and needs to implement stateful deep packet inspection (DPI) to filter traffic based on fully qualified domain names (FQDNs), detect and block intrusion attempts using managed Snort-compatible rules, and log all filtered traffic to Amazon S3 for compliance. Which AWS service provides ALL of these capabilities natively?",
o:["AWS WAF deployed on an Application Load Balancer","VPC Security Groups with custom inbound rules","Amazon Route 53 Resolver DNS Firewall","AWS Network Firewall"],
c:3,
e:"<strong>Correct: AWS Network Firewall.</strong> AWS Network Firewall is a managed, stateful network firewall and intrusion prevention system (IPS) for VPCs. Capabilities: (1) Stateful DPI: inspects packet payloads (not just headers); maintains connection state. (2) FQDN filtering: domain-based stateful rules — allow/deny traffic to specific hostnames (e.g., block *.malicious.com) using Suricata rule syntax. (3) IPS with managed rules: integrates with AWS-managed Suricata-compatible rules (and CrowdStrike, Fortinet partner feeds) for threat signatures. (4) Logging: flow logs, alert logs, and drop logs to CloudWatch Logs, S3, or Kinesis Data Firehose. Deployed as a VPC endpoint in a dedicated firewall subnet; route tables send traffic through it. WAF (A): Layer 7 HTTP/HTTPS filtering for web apps; no IPS capability; doesn't inspect non-HTTP traffic. Security Groups (B): stateful but only IP/port filtering — no DPI, no FQDN, no IPS. Route 53 Resolver DNS Firewall (C): blocks DNS queries to known malicious domains — DNS-level only; doesn't inspect actual traffic flows or do IPS."},

{id:310,domain:"Cost-Optimized Architectures",topic:"RDS",sub:"Reserved Instances for Databases",
q:"A company runs Amazon RDS for PostgreSQL with a Multi-AZ deployment in us-east-1. The database has been running continuously for 2 years and the solutions architect expects it to continue running for at least 3 more years. The current On-Demand cost is $4,000/month. Which Reserved Instance option provides the MAXIMUM cost savings?",
o:["1-year term, No Upfront payment","1-year term, All Upfront payment","3-year term, No Upfront payment","3-year term, All Upfront payment"],
c:3,
