q:"A company stores user-generated images in Amazon S3. Analysis shows that images are accessed frequently for the first 30 days after upload, rarely between 30 and 90 days, and almost never after 90 days. However, images must remain retrievable within 12 hours if accessed after 90 days. The company wants to minimize storage costs. What S3 lifecycle configuration should the solutions architect implement?",
o:["Store all objects in S3 Standard for 30 days, transition to S3 Standard-IA after 30 days, then transition to S3 Glacier Flexible Retrieval after 90 days","Store all objects in S3 Standard for 30 days, transition to S3 Intelligent-Tiering after 30 days to automatically optimize costs","Store all objects in S3 Standard for 30 days, transition to S3 One Zone-IA after 30 days, then delete after 90 days","Store all objects in S3 Standard for 30 days, transition to S3 Standard-IA after 30 days, then transition to S3 Glacier Instant Retrieval after 90 days"],
c:0,
e:"<strong>Correct: S3 Standard → Standard-IA → Glacier Flexible Retrieval.</strong> S3 Standard handles the first 30 days of frequent access. S3 Standard-IA (Infrequent Access) is ideal for 30–90 days — it costs ~58% less than Standard for storage but has a per-retrieval fee, appropriate for rare access. After 90 days, S3 Glacier Flexible Retrieval provides the lowest storage cost (~$0.0036/GB vs $0.023/GB for Standard) with retrieval times of 1–12 hours — meeting the 12-hour retrieval SLA. <strong>Why not B:</strong> S3 Intelligent-Tiering is cost-effective for unpredictable access patterns but charges a per-object monitoring fee (~$0.0025 per 1,000 objects). For predictable access patterns like this one, a manual lifecycle policy is more cost-effective. <strong>Why not C:</strong> S3 One Zone-IA stores data in a single AZ — if that AZ fails, data is lost. Not appropriate for user-generated content that must remain retrievable. Also deleting after 90 days violates the requirement to keep objects accessible. <strong>Why not D:</strong> S3 Glacier Instant Retrieval provides millisecond retrieval — but the requirement only needs 12 hours. Glacier Instant Retrieval costs ~$0.004/GB vs Flexible Retrieval's ~$0.0036/GB. Flexible Retrieval is cheaper when millisecond retrieval is not needed."},
{id:348,domain:"Cost-Optimized Architectures",topic:"Databases",sub:"RDS vs Aurora Cost Optimization",
q:"A company runs a MySQL database workload on Amazon RDS for MySQL (db.r5.2xlarge, Multi-AZ). After a cost review, the team finds that the database CPU and memory utilization rarely exceeds 20% on weekdays and drops to near zero on weekends. The application is non-critical and can tolerate up to 5 minutes of downtime. Which change would MOST reduce database costs?",
o:["Migrate to Amazon Aurora MySQL and use Aurora Auto Scaling to add read replicas during peak periods","Switch to Amazon RDS for MySQL with a smaller instance class (db.t3.medium) and disable Multi-AZ","Enable RDS Multi-AZ with a read replica in a second Region to eliminate the primary instance cost","Migrate to Amazon Aurora Serverless v2, which automatically scales capacity to zero during inactivity and charges only for consumed ACUs"],
c:3,
e:"<strong>Correct: Amazon Aurora Serverless v2.</strong> Aurora Serverless v2 scales capacity in fine-grained increments (0.5 ACU steps) based on workload demand. For near-zero weekend utilization, capacity scales down to the minimum ACU configuration (0.5 ACU), drastically reducing costs compared to a provisioned db.r5.2xlarge running 24/7. You pay per ACU-hour consumed rather than for a fixed instance. For a workload with 20% average utilization and near-zero weekends, Aurora Serverless v2 can reduce database costs by 60–80%. The 5-minute downtime tolerance accommodates scale events. <strong>Why not A:</strong> Aurora Auto Scaling adds read replicas for read scaling — it doesn't reduce the cost of the primary writer instance, which runs continuously at full instance cost. <strong>Why not B:</strong> Downsizing to db.t3.medium reduces costs but t3 instances have CPU credits and may throttle under peak load. Multi-AZ is removed, reducing availability. Aurora Serverless v2 provides better scaling and lower cost than a fixed t3 instance. <strong>Why not C:</strong> Cross-Region read replicas increase costs (additional instance + cross-region data transfer) — they do not reduce the primary instance cost."},
{id:349,domain:"Cost-Optimized Architectures",topic:"Networking",sub:"Data Transfer Cost Optimization",
q:"A company runs a three-tier web application in AWS. The web tier (EC2 in public subnets) calls the application tier (EC2 in private subnets) which queries an Amazon RDS database. All three tiers are deployed across two Availability Zones in us-east-1. During a cost review, the team identifies significant charges for EC2 data transfer between Availability Zones. What architectural change would MOST reduce inter-AZ data transfer costs?",
o:["Move all EC2 instances and the RDS database into a single Availability Zone to eliminate inter-AZ transfer charges","Deploy an Application Load Balancer with cross-zone load balancing disabled and ensure each web tier instance only calls application tier instances in the same AZ using Availability Zone-aware routing","Use AWS PrivateLink endpoints for all inter-tier communication to eliminate data transfer charges","Migrate to AWS Lambda functions that run in the same AZ as the RDS database to minimize data transfer"],
c:1,
e:"<strong>Correct: Disable cross-zone load balancing + AZ-aware routing.</strong> AWS charges $0.01/GB for data transferred between Availability Zones within the same Region. Application Load Balancers have cross-zone load balancing enabled by default — this means a request entering AZ-A may be routed to an EC2 instance in AZ-B, generating inter-AZ charges. Disabling cross-zone load balancing ensures each ALB node routes only to targets in its own AZ. Additionally, AZ-aware service discovery (e.g., using the Availability Zone header or ECS service connect) ensures the app tier calls only same-AZ dependencies. <strong>Why not A:</strong> Single-AZ deployment eliminates inter-AZ costs but destroys high availability — a failure of that AZ takes down the entire application. Not an acceptable trade-off for most production workloads. <strong>Why not C:</strong> AWS PrivateLink is used for secure service exposure across VPCs or to AWS services — it does not eliminate inter-AZ data transfer charges. PrivateLink traffic between AZs is still billed for inter-AZ transfer. <strong>Why not D:</strong> Lambda functions are not AZ-pinned by default — they can execute in any AZ in the Region. Even if they were, the database is still Multi-AZ and cross-AZ calls could still occur. This doesn't systematically address the inter-AZ transfer problem."},
{id:350,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"Spot Instance Architecture",
q:"A company runs a batch image processing pipeline that converts raw images to multiple output formats. Jobs take 2–5 minutes each, process 10,000 images per day in batches during business hours, and are submitted via an Amazon SQS queue. The pipeline is currently running on On-Demand EC2 instances and compute costs are high. The batch jobs are stateless and can be restarted without data loss if interrupted. What should the solutions architect implement to reduce costs while maintaining throughput?",
o:["Replace On-Demand instances with Reserved Instances (1-year, no upfront) to reduce hourly costs","Use Amazon EC2 Spot Instances with an Auto Scaling group configured with a mixed instances policy across multiple instance types and Availability Zones, with SQS-based scaling and a job visibility timeout longer than the maximum job duration","Use AWS Batch with On-Demand compute environments but reduce the maximum vCPU limit to control costs","Use AWS Lambda to process each SQS message — Lambda charges only for invocation duration with no idle cost"],
c:1,
e:"<strong>Correct: Spot Instances with mixed instance type Auto Scaling.</strong> Since jobs are stateless and restartable, Spot Instance interruptions are tolerable — the job simply returns to SQS (via visibility timeout expiration) and is retried. Spot Instances provide up to 90% savings vs On-Demand. A mixed instances policy across multiple instance types and AZs dramatically reduces interruption risk by spreading across multiple Spot capacity pools. SQS-based Auto Scaling (tracking the ApproximateNumberOfMessagesVisible metric) ensures the fleet scales with queue depth. Setting visibility timeout > job duration (e.g., 10 minutes for 5-minute max jobs) prevents duplicate processing. <strong>Why not A:</strong> Reserved Instances save ~40-60% vs On-Demand but the fleet still runs idle between batches — if instances are only running during business hours (8 hours/day), On-Demand may be cheaper than 24/7 RI commitment for a batch workload. Spot is far cheaper for interruptible work. <strong>Why not C:</strong> Limiting max vCPU reduces throughput and doesn't fundamentally change the cost structure — you still pay On-Demand rates for all compute consumed. <strong>Why not D:</strong> Lambda has a 15-minute maximum execution limit and 10 GB memory limit. For image processing pipelines requiring compute-intensive work (ffmpeg, ImageMagick), Lambda may hit memory limits and has higher per-GB-second costs than Spot EC2 for sustained workloads."},
{id:351,domain:"Cost-Optimized Architectures",topic:"Serverless",sub:"Lambda Cost Optimization",
q:"A company has an AWS Lambda function that processes records from an Amazon Kinesis Data Stream. The function is configured with 1,024 MB memory and processes each record in approximately 200 milliseconds. CloudWatch metrics show that average memory utilization is only 180 MB. The function is invoked 50 million times per month. The team wants to reduce Lambda costs. What is the MOST cost-effective configuration change?",
o:["Increase the Lambda memory to 3,008 MB to improve CPU performance and reduce execution duration, lowering total GB-seconds","Reduce the Lambda memory allocation to 256 MB, which reduces the per-GB-second cost while the actual execution duration may increase slightly","Use Lambda Power Tuning (an open-source tool) to empirically test memory configurations and find the optimal memory/price trade-off, then apply the most cost-effective configuration","Switch from Kinesis trigger to SQS trigger to reduce per-invocation overhead costs"],
c:2,
e:"<strong>Correct: Lambda Power Tuning.</strong> Lambda pricing is based on GB-seconds (memory × duration). Reducing memory to 256 MB cuts the per-GB-second rate, but if the function needs more time to process with less memory (e.g., due to CPU throttling), total GB-seconds may stay the same or increase. Increasing memory gives more CPU, potentially reducing duration proportionally. The optimal memory setting is empirically determined — Lambda Power Tuning (AWS Step Functions-based open source tool) tests the function at multiple memory configurations and identifies the memory setting that minimizes cost. For many CPU-bound functions, the cost-optimal point is often at a higher memory than current due to duration reduction. <strong>Why not A:</strong> Arbitrarily increasing memory to 3,008 MB assumes the function is CPU-bound and that duration will decrease proportionally. This may or may not be true — without testing, you could increase costs. <strong>Why not B:</strong> Reducing to 256 MB assumes the extra memory is wasted and won't affect duration — but at 256 MB the function gets less CPU and may take 3–4× longer to run, potentially increasing total GB-seconds. <strong>Why not D:</strong> Switching to SQS doesn't reduce execution cost — invocation pricing is the same for both triggers. Kinesis and SQS have different cost models for the stream/queue itself, not Lambda execution."},
{id:352,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"EBS Volume Optimization",
q:"A company runs a fleet of 200 Amazon EC2 instances, each with a 500 GB gp2 EBS volume used as boot volumes. The instances are general-purpose web servers with low I/O requirements — peak IOPS rarely exceed 1,500 IOPS per instance. The company is looking to reduce storage costs. What change should the solutions architect recommend?",
o:["Snapshot all gp2 volumes and delete the originals, restoring volumes from snapshots only when needed","Migrate all 200 gp2 volumes to gp3 volumes, which provide the same baseline performance (3,000 IOPS, 125 MB/s throughput) at 20% lower cost per GB","Convert all gp2 volumes to io1 volumes with 1,500 provisioned IOPS for right-sized performance","Reduce each volume size from 500 GB to 100 GB to lower the total storage cost"],
c:1,
e:"<strong>Correct: Migrate gp2 to gp3.</strong> Amazon gp3 volumes cost $0.08/GB-month compared to gp2's $0.10/GB-month — a 20% reduction in storage cost. gp3 provides a baseline of 3,000 IOPS and 125 MB/s throughput included in the base price (no extra charge), compared to gp2 where IOPS scale with volume size (3 IOPS/GB). For a 500 GB gp2, you get 1,500 IOPS baseline — migrating to gp3 actually doubles the baseline IOPS while reducing cost. Migration is done via a ModifyVolume API call with no downtime required. For 200 × 500 GB volumes, this saves 200 × 500 × $0.02 = $2,000/month. <strong>Why not A:</strong> Deleting volumes and restoring from snapshots is not practical for active EC2 boot volumes — the instances would be offline during restoration. <strong>Why not C:</strong> io1 volumes cost $0.125/GB-month plus $0.065/provisioned IOPS-month — significantly more expensive than gp3 for general-purpose workloads. io1 is designed for I/O-intensive databases requiring >16,000 IOPS. <strong>Why not D:</strong> Reducing volume size requires repartitioning and filesystem shrinking — complex and risky operations on boot volumes. Also 100 GB may be insufficient for OS + application data on 200 servers."},
{id:353,domain:"Cost-Optimized Architectures",topic:"Networking",sub:"NAT Gateway Cost Optimization",
q:"A company has a VPC with private subnets in three Availability Zones. Each AZ has a NAT Gateway for instances to access the internet. Analysis shows the majority of outbound traffic is to Amazon S3 and Amazon DynamoDB in the same Region. The company pays approximately $450/month in NAT Gateway data processing charges. How should the solutions architect reduce these costs?",
o:["Replace the three NAT Gateways with a single NAT Gateway in one AZ to reduce per-hour charges","Create VPC Gateway Endpoints for Amazon S3 and Amazon DynamoDB, and update route tables in all private subnets to route traffic destined for S3 and DynamoDB through the Gateway Endpoints instead of the NAT Gateway","Enable VPC Flow Logs to identify the top talkers and optimize application-level traffic","Create an S3 Interface Endpoint (PrivateLink) to route S3 traffic privately and reduce NAT costs"],
c:1,
e:"<strong>Correct: VPC Gateway Endpoints for S3 and DynamoDB.</strong> VPC Gateway Endpoints allow instances in private subnets to reach Amazon S3 and Amazon DynamoDB without going through a NAT Gateway. Gateway Endpoints are free — there is no hourly charge and no data processing charge. Since the majority of NAT traffic is to S3 and DynamoDB, routing that traffic through Gateway Endpoints eliminates the corresponding NAT Gateway data processing fees ($0.045/GB). After adding Gateway Endpoint routes to the private subnet route tables, S3/DynamoDB traffic bypasses the NAT Gateway entirely. <strong>Why not A:</strong> Using a single NAT Gateway reduces per-hour charges (from $0.045 × 3 AZs to $0.045 × 1 AZ for hourly cost) but increases inter-AZ data transfer charges ($0.01/GB) for instances in the two AZs without a local NAT. For high-traffic scenarios, this can increase total costs. Also creates a single point of failure. <strong>Why not C:</strong> VPC Flow Logs identify traffic patterns but don't reduce costs by themselves — they require additional analysis and are an extra cost. <strong>Why not D:</strong> S3 Interface Endpoints (PrivateLink) do have an hourly charge (~$0.01/hour per AZ) and per-GB data processing charge — they are more expensive than free Gateway Endpoints for S3. Use Interface Endpoints when you need specific S3 access policies per VPC endpoint or DNS routing customization."},
{id:354,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"Auto Scaling Cost Optimization",
q:"A company runs a customer-facing web application on Amazon EC2 with an Auto Scaling group. Traffic follows a predictable pattern: high during business hours (9 AM–6 PM weekdays), moderate in evenings, and very low on weekends. The company currently uses On-Demand instances and overprovisions capacity to handle peak load. The solutions architect wants to reduce costs while maintaining availability during all traffic periods. What combination of strategies is MOST cost-effective?",
o:["Purchase Reserved Instances sized for peak capacity to eliminate On-Demand costs entirely","Implement scheduled scaling to reduce capacity outside business hours, purchase Savings Plans sized for the predictable minimum baseline, and use On-Demand for the difference during ramp-up periods","Use only Spot Instances across all time periods with a diversified instance pool to handle interruptions","Purchase Compute Savings Plans sized for peak capacity and use On-Demand for overflow"],
c:1,
e:"<strong>Correct: Scheduled scaling + Savings Plan for baseline + On-Demand for ramp-up.</strong> This three-layer approach matches cost to actual capacity needs: (1) Scheduled scaling automatically reduces the Auto Scaling group minimum during low-traffic periods (evenings, weekends), eliminating idle capacity charges. (2) Savings Plans sized for the constant minimum baseline (e.g., always-on instances) achieve 40–66% savings with 100% plan utilization. (3) On-Demand covers the predictable ramp-up from baseline to peak — these instances only run for bounded hours, making On-Demand (vs. a larger Savings Plan commitment) more cost-effective. <strong>Why not A:</strong> Peak-sized Reserved Instances or Savings Plans pay for capacity 24/7 including overnight and weekends when most capacity is unused — poor utilization of the commitment. <strong>Why not C:</strong> Spot Instances work well for stateless, fault-tolerant workloads but customer-facing web applications require uninterrupted service. A Spot interruption during business hours would reduce capacity and impact users. Spot is better for non-critical background jobs. <strong>Why not D:</strong> Peak-sized Savings Plans would have very low utilization during off-hours and weekends — you're committing to pay for peak capacity 24/7 regardless of actual usage."},
{id:355,domain:"Cost-Optimized Architectures",topic:"Databases",sub:"DynamoDB Cost Optimization",
q:"A company uses Amazon DynamoDB to store user session data. The table has 50 million items, each averaging 2 KB. Read traffic is highly variable — peaks at 50,000 RCUs/second during promotional events (a few days per month) and averages 500 RCUs/second otherwise. Writes are steady at 200 WCUs/second. The company is currently using provisioned capacity with Auto Scaling, but the slow scaling response during flash events causes throttling. What should the solutions architect recommend to reduce costs while handling unpredictable traffic spikes?",
o:["Switch to DynamoDB On-Demand capacity mode to automatically handle any traffic level without throttling","Enable DynamoDB Accelerator (DAX) to cache reads and reduce the effective RCU consumption to DynamoDB","Switch to DynamoDB On-Demand for reads and provisioned capacity for writes to optimize each dimension separately","Keep provisioned capacity for writes (steady at 200 WCU/s) and use DynamoDB On-Demand for reads, but add a DynamoDB Accelerator (DAX) cluster to absorb read spikes before they reach DynamoDB"],
c:3,
e:"<strong>Correct: Provisioned writes + On-Demand reads + DAX for read spikes.</strong> DynamoDB does not support mixed capacity modes per operation type — this is a trick answer. The real correct answer is option D: DAX provides an in-memory cache in front of DynamoDB that serves repeated reads in microseconds without consuming DynamoDB RCUs. For session data with repeated reads (same user session read multiple times), DAX hit rates are high. DAX absorbs the flash read spikes, dramatically reducing the RCUs that reach DynamoDB. Combined with standard provisioned capacity, this eliminates throttling at much lower cost than On-Demand pricing for the spike volume. <strong>Why not A:</strong> On-Demand mode is more expensive than provisioned for predictable steady-state traffic (500 RCU/s average). On-Demand costs ~2× provisioned price per RCU/WCU during normal operations to provide the flexibility. Given mostly predictable load, provisioned + DAX is cheaper. <strong>Why not B:</strong> DAX alone without addressing capacity mode doesn't solve the provisioned capacity throttling during flash events unless provisioned capacity is set high enough or DAX absorbs enough of the spike. <strong>Why not C:</strong> DynamoDB capacity mode (On-Demand vs. Provisioned) applies to the entire table — you cannot independently set On-Demand for reads and Provisioned for writes. This is a common misconception."},
{id:356,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Requester Pays and Analytics",
q:"A company provides a large public dataset (500 TB) stored in Amazon S3 that external researchers download frequently. The company pays approximately $40,000/month in S3 data transfer costs (egress to internet). The company wants to continue providing data access to legitimate researchers but needs to reduce or eliminate these costs. What solution should the solutions architect recommend?",
o:["Enable S3 Transfer Acceleration to reduce transfer times and lower per-GB egress costs through AWS edge locations","Enable Amazon S3 Requester Pays on the bucket so that data transfer and request costs are billed to the requester (researcher) rather than the bucket owner","Move the dataset to Amazon S3 Glacier to reduce storage costs and provide signed URLs for temporary access","Enable Amazon CloudFront with caching in front of S3 to reduce repetitive downloads and lower total egress costs"],
c:1,
e:"<strong>Correct: S3 Requester Pays.</strong> When Requester Pays is enabled on an S3 bucket, the requester (not the bucket owner) pays for data transfer and request costs. The bucket owner still pays only for storage. Researchers must authenticate with AWS credentials to access the bucket — anonymous access is automatically disabled. This shifts $40,000/month in egress costs to the researchers who download the data. Requester Pays is specifically designed for large public dataset distribution scenarios (e.g., AWS Open Data Registry datasets all use Requester Pays). <strong>Why not A:</strong> S3 Transfer Acceleration increases transfer speeds using CloudFront edge locations but ADDS cost ($0.04–$0.08/GB on top of standard egress). It does not reduce egress costs. <strong>Why not C:</strong> S3 Glacier would reduce storage costs, but frequent downloads by researchers would incur high retrieval fees ($0.01–$0.03/GB plus retrieval overhead) in addition to the same egress costs. Not appropriate for a frequently-accessed public dataset. <strong>Why not D:</strong> CloudFront caching helps if many researchers download the same files repeatedly. However, research datasets are often unique per download (different files, different subsets), so cache hit rates may be low. CloudFront also adds per-request and distribution costs. Requester Pays is the direct solution to cost shifting."},
{id:357,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"Fargate vs EC2 for Containers",
q:"A company runs 200 microservices on Amazon ECS using EC2 launch type. The services have highly variable resource requirements — some run 24/7 at consistent utilization, others run only during business hours, and a few run for short burst periods. The team spends significant time managing EC2 cluster capacity and instance types. They want to reduce both costs and operational overhead. What approach should the solutions architect recommend?",
o:["Migrate all 200 services to AWS Fargate to eliminate EC2 capacity management entirely","Keep EC2 launch type for the consistently-utilized services (purchase Savings Plans), migrate burst and business-hours-only services to AWS Fargate, and use AWS Compute Optimizer to right-size EC2 instance types","Purchase Reserved Instances for the EC2 cluster at peak capacity to eliminate On-Demand charges","Consolidate all 200 microservices onto fewer, larger EC2 instances to improve bin-packing efficiency and reduce per-instance overhead"],
c:1,
e:"<strong>Correct: Hybrid EC2 + Fargate with Savings Plans for steady-state.</strong> A hybrid approach optimizes both cost and operational overhead by matching the compute model to workload characteristics. EC2 with Savings Plans is more cost-efficient (~40-66% savings) for steady, predictable 24/7 workloads where cluster management overhead is justified. Fargate eliminates EC2 management for variable workloads — you pay per-second for vCPU and memory consumed, no idle cluster capacity. Business-hours services running 8 hours/day on Fargate cost ~33% of an equivalent 24/7 EC2 instance. AWS Compute Optimizer provides right-sizing recommendations to further reduce EC2 costs. <strong>Why not A:</strong> Migrating all 200 services to Fargate eliminates EC2 management but Fargate is ~20-35% more expensive than EC2 On-Demand (and much more than Reserved) for 24/7 consistent workloads — 200 services on Fargate would significantly increase costs for the steady-state services. <strong>Why not C:</strong> Peak-capacity Reserved Instances pay for full capacity 24/7, including hours when variable services are not running — poor commitment utilization. <strong>Why not D:</strong> Consolidating onto fewer larger instances improves bin-packing but doesn't address the variable workload problem — the large instances still run 24/7 even when most containers are idle."},
{id:358,domain:"Cost-Optimized Architectures",topic:"Networking",sub:"CloudFront Cost Optimization",
q:"A company hosts a static website on Amazon S3 with Amazon CloudFront as the CDN. The site receives 5 million requests per month with an average object size of 1 MB. CloudFront costs are primarily from data transfer out to the internet. The majority of users are in North America and Europe. The company also has a small API served from an EC2 instance behind an ALB that is included in the CloudFront distribution. What change would MOST reduce CloudFront costs?",
o:["Enable CloudFront compression to serve gzip/brotli-compressed files, reducing transfer size by 60-80% for text-based content","Switch from CloudFront Price Class All to CloudFront Price Class 100 (North America and Europe only), which reduces data transfer costs for those regions","Move the S3 origin to a Region closer to users in North America to reduce CloudFront origin fetch costs","Enable S3 Transfer Acceleration on the origin bucket to reduce origin request latency and cache miss costs"],
c:1,
e:"<strong>Correct: CloudFront Price Class 100.</strong> CloudFront distributes content from edge locations worldwide, and the price per GB varies by region — North America and Europe are the least expensive ($0.0085/GB), while other regions like South America, India, and Australia are significantly more expensive ($0.016–$0.114/GB). Price Class 100 restricts distribution to only North America and Europe edge locations. Since the majority of users are in those regions, switching from Price Class All eliminates high-cost edge locations that serve only a small fraction of traffic, reducing average per-GB costs. <strong>Why not A:</strong> CloudFront compression is already a best practice and reduces data transfer — but the question asks about the MOST impactful single change. Compression helps text files but static website assets often include images, videos, and other binary content that compress poorly. Price Class change has a more direct, predictable cost reduction. <strong>Why not C:</strong> CloudFront origin fetch costs are for cache misses — these are typically a small fraction of total requests (1-5% with good cache-hit rates). Reducing origin fetch cost has minimal impact on total CloudFront spend vs. reducing edge transfer costs for all requests. <strong>Why not D:</strong> S3 Transfer Acceleration increases costs and is for accelerating uploads to S3 from end users — not for CloudFront origin fetches. CloudFront already uses AWS backbone network for origin fetches."},
{id:359,domain:"Cost-Optimized Architectures",topic:"Monitoring",sub:"Cost Allocation and Tagging",
q:"A company has 300 AWS accounts managed through AWS Organizations. The finance team cannot determine which business units are responsible for cost increases because resources are not consistently tagged. Engineering teams sometimes deploy resources without required cost allocation tags. The company wants to enforce tagging and generate accurate per-business-unit cost reports. What combination of AWS services and features should the solutions architect implement?",
o:["Use AWS Config rules to detect untagged resources and send SNS notifications to engineering teams for manual remediation","Enable AWS Organizations Tag Policies to define required tags and report compliance, use Service Control Policies (SCPs) to deny resource creation without required cost allocation tags, and use AWS Cost Explorer with tag-based cost allocation to generate per-business-unit reports","Deploy a Lambda function triggered by CloudTrail events for resource creation that automatically applies default tags based on the creating IAM user's department","Use AWS Budgets to create per-account budget alerts that notify business unit leaders when spending increases"],
c:1,
e:"<strong>Correct: Tag Policies + SCPs + Cost Explorer.</strong> This three-part solution enforces, reports, and analyzes: (1) AWS Organizations Tag Policies define the tag key names and allowed values (e.g., CostCenter must match a specific pattern), and generate compliance reports via Resource Groups Tagging API. (2) SCPs can deny resource creation (e.g., ec2:RunInstances, rds:CreateDBInstance) unless the required tags are present in the request using aws:RequestTag conditions — proactive enforcement at creation time. (3) Cost Explorer tag-based cost allocation groups costs by tag value across all accounts, enabling per-business-unit spending analysis. <strong>Why not A:</strong> Config rules detect untagged resources after creation (reactive) and send notifications — but notifications don't guarantee remediation. Resources may operate for weeks without tags, making cost attribution incomplete. <strong>Why not C:</strong> Auto-tagging via Lambda is reactive and has coverage gaps — resources created before the Lambda triggers may be missed. Also relies on IAM user metadata being accurate. SCPs prevent the problem at source. <strong>Why not D:</strong> AWS Budgets provides spending alerts but not attribution granularity within an account. Budget alerts notify after costs accumulate — they don't prevent untagged resource creation or provide business unit breakdowns."},
{id:360,domain:"Cost-Optimized Architectures",topic:"Serverless",sub:"API Gateway Cost Optimization",
q:"A company exposes internal microservices through Amazon API Gateway (REST API). The API currently receives 500 million requests per month. Analysis shows that 70% of requests are for the same 10 frequently-accessed endpoints, and the response data for these endpoints changes less than once per minute. The solutions architect wants to reduce API Gateway and backend costs. What should be configured?",
o:["Enable API Gateway caching with a 60-second TTL on the frequently-accessed endpoints to serve cached responses without invoking backend Lambda functions","Switch from REST API to HTTP API type, which costs $1.00 per million requests vs $3.50 per million for REST API","Enable API Gateway usage plans and throttle requests to reduce the total request count and associated backend costs","Deploy the API behind a CloudFront distribution to cache API responses at the edge and reduce API Gateway invocations"],
c:0,
e:"<strong>Correct: API Gateway caching with 60-second TTL.</strong> API Gateway has a built-in response cache (optional, costs $0.02/hour per GB of cache size). With a 60-second TTL on endpoints whose data changes less than once per minute, the cache serves up to 59 of every 60 requests directly from the cache without invoking backend Lambda functions. For 70% of 500M requests = 350M requests on these endpoints, caching could eliminate ~98% of those backend invocations (350M × 0.983 = ~344M fewer Lambda invocations). This reduces both API Gateway execution costs and Lambda invocation/duration costs significantly. <strong>Why not B:</strong> HTTP API is cheaper ($1.00 vs $3.50/million for REST API) and is a valid cost optimization — but the question asks about reducing both API Gateway AND backend costs. Caching addresses both, while switching to HTTP API only reduces API Gateway costs (and HTTP API has no built-in caching). The biggest savings comes from eliminating backend invocations. <strong>Why not C:</strong> Throttling reduces total request count by rejecting excess requests — this degrades the user experience. Caching serves requests faster and cheaper without rejection. <strong>Why not D:</strong> CloudFront in front of API Gateway can cache at the edge but requires additional CloudFront configuration (cache behaviors, TTLs, cache invalidation). API Gateway's built-in cache is simpler to configure and achieves the same goal."},
{id:361,domain:"Secure Architectures",topic:"Encryption",sub:"KMS Key Policies",
q:"A company stores sensitive customer data in Amazon S3 with server-side encryption using AWS KMS Customer Managed Keys (CMK). A security audit finds that three former employees still have their IAM users active (human error — offboarding was incomplete). These IAM users have s3:GetObject permissions on the bucket. The security team wants to immediately prevent these users from decrypting any customer data without disrupting access for the other 50 active employees. What is the MOST effective immediate action?",
o:["Rotate the CMK immediately — this generates a new key material version, and the old ciphertext cannot be decrypted with the new key version","Remove the three IAM users from all IAM groups and policies, then deactivate their access keys","Add a KMS key policy statement that explicitly denies kms:Decrypt to the three IAM user ARNs — KMS Deny statements in key policies cannot be overridden by IAM policies","Delete the IAM users immediately to revoke all AWS access"],
c:2,
e:"<strong>Correct: KMS key policy explicit Deny.</strong> KMS resource-based policies (key policies) use a unique evaluation model: explicit Deny in a key policy cannot be overridden by any IAM policy — not even by administrators with full IAM permissions. Adding a Deny statement for kms:Decrypt for the three specific IAM user ARNs immediately prevents those users from decrypting any data encrypted with that CMK, regardless of their IAM permissions. This is instantaneous and does not affect the other 50 active users. <strong>Why not A:</strong> KMS key rotation (automatic or manual) generates new key material but maintains backward compatibility — all previous versions of the CMK are retained and can still decrypt data encrypted with older versions. Key rotation does NOT revoke access to existing ciphertexts. <strong>Why not B:</strong> Removing IAM policies prevents s3:GetObject calls — but if the users can still call kms:Decrypt directly (e.g., via other permissions), they might decrypt data they have cached. More importantly, removing IAM permissions is the right long-term action but slower than a KMS key policy Deny for immediate, cryptographic-level revocation. The KMS Deny is the MOST effective immediate action as it prevents decryption regardless of any IAM path. <strong>Why not D:</strong> Deleting IAM users revokes all access but is irreversible and may have audit trail implications. Deactivating access keys is reversible and still leaves the account active."},
{id:362,domain:"Secure Architectures",topic:"Network Security",sub:"VPC Security Groups and NACLs",
q:"A company is designing a three-tier VPC architecture: public subnets for the web tier (ALB), private subnets for the application tier (EC2), and isolated subnets for the database tier (RDS). A security review requires that: (1) only the ALB can communicate with the application tier, (2) only the application tier can communicate with the database tier, and (3) direct internet access to the application and database tiers must be impossible at the network layer. Which combination of controls should the solutions architect implement?",
o:["Use Network ACLs on the private and isolated subnets to deny all traffic except from specific source IP ranges","Configure Security Groups: application tier SG allows inbound only from the ALB's Security Group; database tier SG allows inbound only from the application tier's Security Group. Place the application tier in private subnets (no route to internet) and the database tier in isolated subnets (no route table entries for internet or NAT)","Use AWS WAF rules to restrict traffic to the ALB and downstream services based on IP reputation lists","Configure Security Groups on all tiers with specific CIDR ranges for each subnet tier and use VPC Flow Logs to monitor for violations"],
c:1,
e:"<strong>Correct: Security Group chaining + proper subnet routing.</strong> Security Groups can reference other Security Groups as sources (not just CIDRs). This creates 'Security Group chaining': the App tier SG allows inbound TCP 8080 from the ALB's SG ID — only resources attached to that SG (the ALB) can reach the app tier. Similarly, the DB tier SG allows inbound TCP 5432 from the App tier's SG ID. This is precise and dynamic — new ALB instances automatically inherit access, no IP management needed. Subnet routing enforces network-layer isolation: private subnets route outbound through NAT (no inbound from internet), isolated subnets have no NAT route and no internet gateway route. <strong>Why not A:</strong> Network ACLs are stateless and IP-based — they cannot reference Security Groups. Maintaining ACL rules based on dynamic CIDR ranges is fragile. NACLs are a secondary defense, not the primary control for this pattern. <strong>Why not C:</strong> AWS WAF operates at the HTTP/HTTPS layer on the ALB — it inspects web requests, not network-layer connections to the application or database tier. WAF cannot restrict EC2-to-RDS connectivity. <strong>Why not D:</strong> CIDR-based Security Group rules require updating if subnet CIDRs change. Using SG-to-SG references is more precise and maintainable — the rule is 'allow from ALB's security group' not 'allow from 10.0.0.0/24'."},
{id:363,domain:"Secure Architectures",topic:"Identity",sub:"Amazon Cognito Federation",
q:"A company is building a mobile application that needs to allow users to sign in with their existing Google or Facebook accounts. After sign-in, users need temporary AWS credentials to directly upload photos to a user-specific prefix in Amazon S3 (e.g., s3://bucket/users/{userId}/). The solution must scale to millions of users without managing individual IAM users. What should the solutions architect implement?",
o:["Create an IAM user for each mobile app user and store the access keys securely in the mobile app's configuration","Set up Amazon Cognito User Pool with Google and Facebook as federated identity providers, then use Amazon Cognito Identity Pool to exchange the Cognito JWT token for temporary AWS credentials scoped to that user's S3 prefix using IAM role session policies","Use an API Gateway + Lambda backend where users authenticate via Google/Facebook OAuth and the Lambda function generates pre-signed S3 URLs for each upload","Create a single shared IAM role for all mobile users that allows access to the entire S3 bucket, and validate user identity in the mobile app"],
c:1,
e:"<strong>Correct: Cognito User Pool + Identity Pool with session policies.</strong> Amazon Cognito User Pools handle authentication and federation with external identity providers (Google, Facebook, SAML, OIDC). After authentication, Cognito Identity Pools exchange the JWT for temporary AWS credentials (via AWS STS) scoped to an IAM role. Critically, you can use IAM role trust policy conditions with cognito-identity.amazonaws.com to pass the authenticated user's sub (unique ID) as a session tag, then use a resource-based IAM policy condition like s3:prefix that includes ${cognito-identity.amazonaws.com:sub} to restrict each user to their own S3 prefix. This scales to millions without managing individual IAM entities. <strong>Why not A:</strong> Creating individual IAM users for each of millions of mobile users is impractical — IAM has account-level limits and managing credentials at this scale is an operational nightmare and security risk. <strong>Why not C:</strong> Pre-signed URL generation via Lambda is a valid alternative but adds API Gateway + Lambda cost and latency to every upload. For direct mobile-to-S3 uploads, Cognito Identity Pool credentials are more efficient. Also, the question asks what to 'implement' for the architecture, not just one aspect. <strong>Why not D:</strong> A shared IAM role with access to the entire bucket cannot restrict users to their own prefixes — every user can read/write all other users' photos. This is a serious security flaw."},
{id:364,domain:"Secure Architectures",topic:"Data Protection",sub:"Secrets Manager Rotation",
q:"A company stores database credentials for an Amazon RDS for MySQL instance in AWS Secrets Manager with automatic rotation enabled (30-day rotation schedule). A new compliance requirement mandates that database credentials must be rotated immediately whenever a team member with database access leaves the company. The current process requires a manual step to trigger rotation. The company wants to automate immediate credential rotation when an HR system records an employee departure. The HR system can send webhook notifications to an HTTPS endpoint. What architecture should the solutions architect build?",
o:["Configure an Amazon EventBridge scheduled rule to trigger rotation every 24 hours regardless of employee departures","Create an Amazon API Gateway endpoint that receives the HR webhook, triggers an AWS Lambda function that calls secretsmanager:RotateSecret on the database credentials secret, and notifies the database administrator via Amazon SNS","Set up an AWS Config rule that monitors IAM user deletion events and triggers a Systems Manager Automation runbook to rotate the secret","Enable Secrets Manager automatic rotation with a 1-day rotation schedule to minimize the window between employee departure and credential rotation"],
c:1,
e:"<strong>Correct: API Gateway webhook endpoint → Lambda → RotateSecret.</strong> This event-driven architecture directly connects the HR system's departure notification to immediate credential rotation. API Gateway provides the secure HTTPS webhook endpoint (with API key or IAM authorization). The Lambda function receives the webhook payload, identifies which secret(s) to rotate based on the departed employee's access, and calls secretsmanager:RotateSecret. Secrets Manager then invokes its own rotation Lambda (pre-built for RDS MySQL) to generate new credentials, update the database, and update the secret — all without manual intervention. SNS notifies the DBA for awareness. <strong>Why not A:</strong> A scheduled 24-hour rotation would rotate credentials at most 24 hours after departure — the compliance requirement mandates immediate rotation on departure. Also, this rotates credentials unnecessarily when no one has left. <strong>Why not C:</strong> AWS Config monitors resource configuration changes (e.g., security group rules, S3 bucket policies) — it does not natively monitor HR system events or IAM user deletion events in a way that maps to 'employee departure.' IAM user deletion may not happen immediately when an employee leaves. <strong>Why not D:</strong> A 1-day rotation schedule reduces the maximum window to 24 hours but is still not 'immediate.' The gap between departure and rotation could be up to 24 hours, which may not meet the compliance requirement."},
{id:365,domain:"Secure Architectures",topic:"Compliance",sub:"AWS Config and Security Hub",
q:"A company must demonstrate continuous compliance with the CIS AWS Foundations Benchmark to satisfy enterprise customer requirements. The company has 50 AWS accounts in AWS Organizations. Security findings must be centralized for review, and the company needs automated remediation for common misconfigurations such as public S3 buckets and open security groups. What solution should the solutions architect implement?",
o:["Deploy a custom Lambda function to scan all accounts daily and generate a compliance report stored in S3","Enable AWS Security Hub in all accounts with the CIS AWS Foundations Benchmark standard enabled, designate a central aggregator account, enable Amazon EventBridge rules in member accounts to route specific finding types to AWS Systems Manager Automation runbooks for automated remediation","Use Amazon Inspector across all accounts to scan EC2 instances for compliance violations and report findings to a central S3 bucket","Enable AWS Config with a custom rule set in each account and use AWS Lambda to aggregate Config findings into a central DynamoDB table"],
c:1,
e:"<strong>Correct: Security Hub (CIS standard) + central aggregator + EventBridge + SSM Automation.</strong> AWS Security Hub natively supports the CIS AWS Foundations Benchmark as a built-in security standard — it automatically evaluates controls and generates findings without custom code. The aggregator account feature (cross-account finding aggregation) centralizes findings from all 50 accounts into a single Security Hub view. EventBridge rules in member accounts can trigger on Security Hub findings matching specific patterns (e.g., 'S3 bucket is publicly accessible') and invoke Systems Manager Automation runbooks for immediate remediation (e.g., call s3:PutPublicAccessBlock). <strong>Why not A:</strong> Custom Lambda scanning is time-consuming to build and maintain, lacks built-in CIS benchmark mapping, and provides daily (not continuous) compliance assessment. AWS Security Hub provides near-real-time evaluation. <strong>Why not C:</strong> Amazon Inspector focuses on EC2/container vulnerability scanning and software CVEs — it does not evaluate CIS AWS Foundations Benchmark controls (which cover IAM, S3, CloudTrail, monitoring, networking). <strong>Why not D:</strong> Custom AWS Config rules require significant development effort to implement all CIS controls. Security Hub already integrates with AWS Config and maps Config rules to CIS controls automatically — no custom aggregation Lambda needed."},
{id:366,domain:"Secure Architectures",topic:"Network Security",sub:"AWS Network Firewall",
q:"A company has multiple VPCs in us-east-1 connected through AWS Transit Gateway. The security team requires that all east-west traffic (VPC-to-VPC) be inspected for malicious patterns using intrusion detection system (IDS) capabilities, and that specific domain names (known malicious domains from a threat intel feed) be blocked for all outbound internet traffic from all VPCs. What architecture should the solutions architect design?",
o:["Deploy AWS WAF on the Transit Gateway to inspect VPC-to-VPC traffic and block traffic to known malicious domains","Deploy AWS Network Firewall in a dedicated inspection VPC. Route all east-west traffic and internet-bound traffic through the inspection VPC via Transit Gateway route tables. Configure Network Firewall with Suricata-compatible stateful rules for IDS and DNS-based domain blocking rules for the malicious domain list","Use VPC Security Groups with IP-based deny rules to block known malicious IP addresses and deploy Amazon GuardDuty for threat detection","Deploy a third-party firewall appliance from the AWS Marketplace on EC2 in each VPC to inspect local traffic"],
c:1,
e:"<strong>Correct: AWS Network Firewall in inspection VPC + Transit Gateway routing.</strong> AWS Network Firewall provides stateful deep packet inspection with Suricata-compatible rule groups — supporting IDS/IPS signatures, protocol detection, and anomaly detection for east-west traffic inspection. DNS-based domain filtering (FQDN filtering) blocks connections to specified domain names for outbound traffic. The inspection VPC pattern centralizes traffic inspection: Transit Gateway route tables are configured to route VPC-to-VPC traffic and internet-bound traffic through the inspection VPC where Network Firewall appliances reside. This is a standard AWS reference architecture (TGW with centralized inspection). <strong>Why not A:</strong> AWS WAF is a web application firewall operating at Layer 7 for HTTP/HTTPS traffic to ALBs, API Gateways, and CloudFront — it cannot be attached to a Transit Gateway and does not inspect VPC-to-VPC traffic. <strong>Why not C:</strong> Security Groups block based on IP/port — they cannot perform deep packet inspection or pattern matching. GuardDuty is for threat detection (alerts), not real-time traffic blocking. Neither provides IDS capabilities. <strong>Why not D:</strong> Per-VPC firewall appliances create N independent inspection points with separate management, rule sets, and scaling — operationally complex for 50+ VPCs. A centralized inspection VPC with Network Firewall is the AWS recommended pattern."},
{id:367,domain:"Secure Architectures",topic:"IAM",sub:"Permission Boundaries",
q:"A company's platform team wants to allow product development teams to create and manage their own IAM roles for their Lambda functions and EC2 instances. However, the platform team needs to ensure that developer-created roles cannot have permissions exceeding a defined maximum — developers must not be able to grant themselves or their services access to sensitive production resources or IAM administrative actions. What IAM feature should the solutions architect implement?",
o:["Create a Service Control Policy (SCP) that restricts all IAM role creation to the platform team account only","Create an IAM permissions boundary policy that defines the maximum permissions any developer-created role can have, and require (via SCP) that all developer-created roles must have this permissions boundary attached — developers can then create roles with any permissions up to but not exceeding the boundary","Implement AWS Organizations with separate OUs for each development team and restrict permissions at the OU level using SCPs","Require all Lambda and EC2 role creation requests to go through a Service Catalog product that the platform team controls"],
c:1,
e:"<strong>Correct: IAM Permissions Boundaries.</strong> A permissions boundary is a managed IAM policy attached to an IAM role that defines the maximum permissions the role can have. Even if the role's identity-based policies grant broader permissions, the effective permissions are the intersection of the identity policy AND the permissions boundary. The platform team creates a boundary policy (e.g., allows Lambda, S3, DynamoDB but denies iam:*, sensitive S3 buckets, etc.) and uses an SCP or condition on iam:CreateRole to require that all developer-created roles include this boundary (via iam:PermissionsBoundary condition key). Developers can create any role they want — but those roles can never exceed the boundary. <strong>Why not A:</strong> Restricting IAM role creation to the platform team creates a bottleneck — developers would need to file tickets for every new role needed for their services. This slows development velocity. <strong>Why not C:</strong> SCPs apply at the account or OU level to all principals — they define what actions can be taken in the account, not the maximum permissions of specific roles developers create. SCPs alone cannot enforce that developer-created roles don't exceed a certain permission set. <strong>Why not D:</strong> Service Catalog provides guardrails via CloudFormation templates but still requires platform team involvement for each role creation request. Permissions boundaries allow developer self-service within defined boundaries."},
{id:368,domain:"Resilient Architectures",topic:"Compute",sub:"EC2 Auto Scaling Lifecycle Hooks",
q:"A company runs a web application on an Amazon EC2 Auto Scaling group behind an Application Load Balancer. The application requires 3 minutes to complete initialization (pulling configuration from AWS AppConfig, warming caches) before it can serve traffic. During scaling events, the Auto Scaling group currently brings new instances into service immediately, causing users to receive errors from uninitialized instances. What should the solutions architect configure to eliminate these errors?",
o:["Increase the ALB target group health check interval to 5 minutes so new instances have time to initialize before health checks pass","Configure an EC2 Auto Scaling lifecycle hook on the EC2_INSTANCE_LAUNCHING transition. During the hook, the instance completes initialization and calls CompleteLifecycleAction when ready. Configure the ALB target group deregistration delay to 0 seconds","Configure an EC2 Auto Scaling warm pool to pre-initialize instances in a Stopped state so they are already initialized when brought into service","Use an Elastic Load Balancing connection draining policy to delay new instance registration until the instance signals readiness"],
c:2,
e:"<strong>Correct: EC2 Auto Scaling Warm Pool.</strong> A warm pool maintains a pool of pre-initialized EC2 in
