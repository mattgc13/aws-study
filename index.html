e:"<strong>Correct: 3-year term, All Upfront.</strong> RDS Reserved Instance discount tiers (approximate savings vs On-Demand): 1-year No Upfront: ~30% savings. 1-year Partial Upfront: ~33% savings. 1-year All Upfront: ~36% savings. 3-year No Upfront: ~43% savings. 3-year Partial Upfront: ~48% savings. 3-year All Upfront: ~52% savings (maximum discount). At $4,000/month On-Demand: 3-year All Upfront saves ~$2,080/month = ~$74,880 over 3 years. The All Upfront option has the highest effective hourly rate discount because AWS offers a discount for the time-value of receiving the full payment immediately. Importantly: RDS Reserved Instances are not cancelable — choosing 3-year commits to 36 months. The question states the DB will run for 3+ more years, so the commitment risk is low. For the exam: maximum savings = longest term + all upfront. Always verify the workload will run for the full commitment period."},

{id:311,domain:"Secure Architectures",topic:"Encryption",sub:"ACM Certificate Management",
q:"A company hosts a public-facing HTTPS website behind an Application Load Balancer in AWS. They currently manage SSL/TLS certificates manually — purchasing from a CA, uploading to IAM, and remembering to renew before expiry. A solutions architect proposes a better approach. Which option provides automatic certificate provisioning AND automatic renewal with ZERO cost for public certificates?",
o:["Purchase wildcard certificates from a commercial CA and store them in AWS Secrets Manager with auto-rotation","Use AWS Certificate Manager (ACM) to provision and deploy public SSL/TLS certificates on the ALB","Use AWS Private CA to issue certificates for the public domain","Configure Let's Encrypt with Certbot on the EC2 instances behind the ALB"],
c:1,
e:"<strong>Correct: AWS Certificate Manager (ACM).</strong> ACM provides: Free public SSL/TLS certificates for domains you control. Automatic renewal: ACM automatically renews managed certificates before expiry (typically 60 days before). Native integration: certificates can be deployed directly to ALBs, CloudFront distributions, API Gateway, and NLB with one click — no manual upload. Domain validation: via DNS (add a CNAME record, never needs renewal) or email. ACM certificates cannot be exported (private key never leaves AWS) — designed for use with AWS services only. For the ALB use case: ACM + ALB = fully managed TLS with zero operational overhead and zero cost. Secrets Manager rotation (A): stores existing certificates; doesn't provision or auto-renew certs from a CA. AWS Private CA (C): issues private certificates for internal use; charges $400/month/CA + per certificate fee — not appropriate for public-facing sites needing public trust. Let's Encrypt on EC2 (D): free but requires managing Certbot, cron jobs, and EC2 infrastructure; operational overhead; certs expire every 90 days."},

{id:312,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"EC2 Spot Fleet Strategy",
q:"A company runs a video transcoding workload using an EC2 Spot Fleet. Jobs are stateless and idempotent — if an instance is interrupted, the job restarts on another instance. The fleet needs to maintain a total compute capacity of 1,000 vCPUs at all times. The solutions architect wants to minimize interruption frequency while still achieving Spot pricing. What Spot Fleet allocation strategy BEST achieves this?",
o:["lowestPrice — always use the cheapest Spot pool regardless of interruption rate","capacity-optimized — launch instances from Spot pools with the most available capacity","priceCapacityOptimized — select from the most-available pools, then choose lowest price among those","diversified — spread capacity equally across all Spot pools in the fleet"],
c:2,
e:"<strong>Correct: priceCapacityOptimized.</strong> Spot interruption rates are inversely correlated with spare capacity — pools with more spare capacity have lower interruption rates. priceCapacityOptimized (recommended by AWS as of 2022): selects from the Spot pools with the most available capacity (reducing interruption risk), then within those high-capacity pools, selects the lowest-price option. This is the successor to the older capacityOptimized strategy and provides both low interruption rate AND favorable pricing. lowestPrice (A): selects the cheapest Spot pool — but cheap pools are often cheapest because they're popular (high demand = lower spare capacity = higher interruption rate). High interrupt rate is costly for this workload despite lower instance prices. capacity-optimized (B): older strategy; selects purely for maximum capacity without price consideration — now superseded by priceCapacityOptimized. diversified (D): spreads across all pools — reduces impact of any single pool's interruption but doesn't optimize for low interruption rate or price; appropriate for long-running steady-state fleets where you want stability."},

{id:313,domain:"Secure Architectures",topic:"Logging & Monitoring",sub:"CloudTrail Lake",
q:"A company's security team wants to query 5 years of AWS API activity logs to investigate potential security incidents. They need to run SQL-style queries across all accounts in their AWS Organization, correlate events across services, and retain raw logs for 7 years. They are currently storing CloudTrail logs in S3 and using Athena for analysis, but query setup and table management has become operationally burdensome. What is the BEST AWS-native alternative?",
o:["Amazon CloudWatch Logs Insights with a multi-account log group","AWS Security Hub with automated findings over historical data","AWS CloudTrail Lake with organization-level event data stores","Amazon OpenSearch Service ingesting CloudTrail logs via Kinesis Data Firehose"],
c:2,
e:"<strong>Correct: AWS CloudTrail Lake.</strong> CloudTrail Lake is a managed audit data lake that: Consolidates CloudTrail events from all accounts and Regions in an Organization into an event data store — no S3 bucket management, no Athena table creation, no schema management. Supports SQL queries directly against CloudTrail events using a purpose-built query editor. Retention: configurable up to 7 years (standard) or 10 years (extended). Advanced event selectors: collect management events, data events (S3, Lambda, DynamoDB), and Insights events. Cross-account: enable for all accounts in an Organization with one click. Integration: findings exported to S3; feeds Security Lake. vs S3+Athena: Lake eliminates partitioning, Glue Data Catalog management, and schema updates when CloudTrail adds new fields. CloudWatch Logs Insights (A): good for recent logs; 90-day retention max without archiving; not designed for multi-year security investigations. Security Hub (B): aggregates findings from GuardDuty/Inspector — doesn't store raw API logs. OpenSearch (D): powerful but operationally complex; requires pipeline setup and index management."},

{id:314,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"AWS Cost Anomaly Detection",
q:"A company has 15 AWS accounts managed through AWS Organizations. Last month, an engineer accidentally left a large EC2 instance running for 3 weeks, resulting in an unexpected $8,000 bill. The finance team wants an automated solution that detects unusual spending and sends alerts within hours of the anomaly starting — not at the end of the billing cycle. What is the CORRECT AWS-native solution?",
o:["Enable AWS Budgets with a monthly fixed budget alert for each account","Enable AWS Cost Anomaly Detection with a monitor covering the Organization; set alert threshold to $500 with SNS notifications","Use Amazon CloudWatch billing alarms with a threshold set to 110% of last month's total","Review AWS Cost Explorer daily and manually compare to historical spending"],
c:1,
e:"<strong>Correct: AWS Cost Anomaly Detection.</strong> Cost Anomaly Detection uses ML models to learn your historical spending patterns for each service, account, cost category, or tag — then alerts when current spending deviates anomalously from predicted patterns. Key feature: near-real-time detection — alerts can fire within 24 hours of an anomaly starting, not at month-end. Alert threshold: set a minimum anomaly spend (e.g., $500) to avoid noise. Notification: via SNS to email, Slack, PagerDuty, etc. Monitor types: AWS service (detect anomalies per service), linked account (per account), cost category, cost allocation tag. For EC2 left running: Cost Anomaly Detection would detect the unusual sustained EC2 spend within 1–2 days and send an alert. AWS Budgets (A): fixed thresholds — alerts when cumulative spend crosses a set amount (e.g., 80%/$10K). Good for budget caps but not anomaly detection; won't alert for unexpected patterns below the budget threshold. CloudWatch billing alarms (C): monthly threshold, not anomaly-aware. Manual review (D): too slow and error-prone. Cost Anomaly Detection is free to use — only pay for SNS notification costs."},

{id:315,domain:"Secure Architectures",topic:"Security Services",sub:"AWS Security Hub",
q:"A company uses multiple AWS security services: GuardDuty (threat detection), Inspector (vulnerability scanning), Macie (data classification), and IAM Access Analyzer. The security operations team currently logs into each console separately to review findings, resulting in missed alerts and inconsistent remediation. They want a single pane of glass that aggregates all findings, scores them by severity, and maps them to security standards like CIS AWS Foundations Benchmark. Which AWS service provides this?",
o:["Amazon CloudWatch with a unified security dashboard","AWS Config Aggregator with multi-account rules","AWS Security Hub","Amazon Detective"],
c:2,
e:"<strong>Correct: AWS Security Hub.</strong> Security Hub is a centralized security findings management service that: Aggregates findings from: GuardDuty, Inspector, Macie, IAM Access Analyzer, Firewall Manager, AWS Partner Network solutions. Normalizes findings into AWS Security Finding Format (ASFF) for consistent structure. Security standards: continuously checks against CIS AWS Foundations Benchmark v1.4, AWS Foundational Security Best Practices, PCI DSS, NIST 800-53 — shows compliance score per standard. Severity scoring: CRITICAL/HIGH/MEDIUM/LOW/INFORMATIONAL with numerical score. Cross-account: enable for all accounts in an Organization via delegated admin; findings aggregated in one Region. Automated response: integrations with EventBridge and AWS Systems Manager Automation for auto-remediation. CloudWatch dashboard (A): can display metrics but doesn't ingest security findings from GuardDuty/Inspector/Macie natively. Config Aggregator (B): aggregates Config rules compliance; doesn't aggregate GuardDuty/Inspector findings or map to CIS benchmarks. Amazon Detective (D): investigates security incidents using graph analysis of CloudTrail, VPC Flow Logs, GuardDuty findings — used for post-incident forensics, not a findings aggregator."},

{id:316,domain:"Cost-Optimized Architectures",topic:"Analytics",sub:"Athena Query Cost Optimization",
q:"A company uses Amazon Athena to query a large dataset stored in Amazon S3. The raw data is in CSV format across 10,000 files totaling 5 TB. Analysts run 200 queries per day, and the monthly Athena bill is $45,000. The solutions architect wants to reduce query costs with MINIMAL changes to the analyst workflow. Which optimization will have the GREATEST cost impact?",
o:["Enable S3 Requester Pays to shift data transfer costs to analysts","Compress CSV files using gzip and partition data by date in S3; then convert to Apache Parquet columnar format","Enable Athena query result caching with a 24-hour TTL","Migrate the dataset to Amazon Redshift for better query pricing"],
c:1,
e:"<strong>Correct: Compress, partition, and convert to Parquet.</strong> Athena pricing: $5/TB of data scanned. Current: 5 TB / 10,000 queries = 0.5 TB scanned per query × $5 = $2.50 per query. Three optimizations compound: (1) Columnar format (Parquet/ORC): Athena only scans columns referenced in the query — typically 90% reduction in data scanned for analytic queries that select few columns. (2) Compression (Snappy for Parquet): reduces file size by ~70%; Athena scans compressed bytes. (3) Partitioning by date: queries with date filters only scan relevant partitions — can reduce from 5 TB to 50 GB for a 1-month query. Combined impact: 90%+ cost reduction; $45,000/month → <$5,000/month. Analyst workflow: same SQL queries — just faster and cheaper. S3 Requester Pays (A): shifts S3 data transfer costs (not Athena query costs) to requesters — doesn't reduce Athena charges. Query result caching (C): free in Athena; reuses results for identical queries within TTL — helps for repeated identical queries but most analyst queries vary. Redshift (D): better for high-concurrency analytics but requires ETL pipeline, cluster management, and different cost model — high migration effort."},

{id:317,domain:"Secure Architectures",topic:"IAM",sub:"Permission Boundaries",
q:"A company wants to allow team leads to create IAM roles for their team members. However, the security team is concerned that team leads could create roles with Administrator access, bypassing security controls. The security team wants team leads to only be able to create roles with permissions LIMITED to a defined set (e.g., only S3 and EC2 actions), even if the team lead has broader permissions themselves. What IAM feature prevents privilege escalation in this scenario?",
o:["IAM service control policies (SCPs) restricting the iam:CreateRole API","Require MFA for all iam:CreateRole API calls","IAM permission boundaries — require team leads to attach a specific permission boundary when creating roles","Configure IAM Access Analyzer to flag roles with excessive permissions"],
c:2,
e:"<strong>Correct: IAM Permission Boundaries.</strong> A permission boundary is a managed IAM policy attached to a role (or user) that defines the maximum permissions that role can have. Even if a role has AdministratorAccess as its identity-based policy, the boundary limits effective permissions to the intersection of the policy and the boundary. To prevent privilege escalation by delegated admins: (1) Define a permission boundary policy (e.g., allow only s3:*, ec2:*). (2) Grant team leads iam:CreateRole permission, but add a condition requiring the created role to have the specific permission boundary attached: Condition: StringEquals: iam:PermissionsBoundary: arn:aws:iam::account:policy/TeamBoundary. (3) Grant iam:AttachRolePolicy but restrict which policies can be attached (condition: iam:PolicyArn matches approved policy ARNs). Result: team leads can create roles, but those roles can never have more than the boundary allows — they cannot grant themselves AdministratorAccess via a new role. SCPs (A): apply at the account/OU level, not for delegated admin within an account. MFA requirement (B): adds authentication rigor but doesn't limit what permissions roles can have. Access Analyzer (D): detects after the fact — doesn't prevent creation."},

{id:318,domain:"Resilient Architectures",topic:"Networking",sub:"AWS Global Accelerator",
q:"A gaming company runs its multiplayer game servers on EC2 instances in us-east-1 and eu-west-1. Players in South America and Southeast Asia report high latency and frequent packet loss when connecting. The company needs a solution that routes players to the nearest AWS Region using the AWS global network (not the public internet), provides static IP addresses for the game client to connect to, and automatically fails over to the secondary Region if the primary becomes unhealthy. Which service meets ALL requirements?",
o:["Amazon CloudFront with origin groups and failover","Amazon Route 53 with latency-based routing and health checks","AWS Global Accelerator with endpoint groups in both Regions","An Application Load Balancer in each Region with DNS failover via Route 53"],
c:2,
e:"<strong>Correct: AWS Global Accelerator.</strong> Global Accelerator addresses all requirements: (1) AWS global network routing: traffic enters the AWS network at the nearest edge location (anycast), travels over the AWS private backbone (lower latency, less packet loss than public internet). (2) Static IP addresses: provides two static anycast IP addresses that never change — ideal for game clients that hard-code server IPs. (3) Automatic failover: health checks on endpoint groups; traffic shifted to healthy Region within 30 seconds. (4) TCP/UDP support: works for game traffic (UDP) unlike HTTP-only services. CloudFront (A): CDN for cacheable content delivery; not designed for game server connections; no static IPs for origin routing; primarily HTTP/HTTPS. Route 53 latency routing (B): DNS-based routing; clients still traverse the public internet to reach endpoints; DNS TTL causes slower failover (30–300 seconds); doesn't use AWS backbone for the full path. ALB + Route 53 (D): regional load balancing only; no AWS backbone traversal for cross-Region routing; failover depends on DNS TTL. For the exam: Global Accelerator = static IPs + AWS backbone + TCP/UDP + fast failover. CloudFront = HTTP caching."},

{id:319,domain:"High-Performing Architectures",topic:"Databases",sub:"ElastiCache Strategy Selection",
q:"A company's e-commerce application uses Amazon RDS MySQL as its primary database. During peak hours, the RDS instance shows 95% CPU utilization, and analysis reveals that 70% of database queries are identical read queries for product catalog data that changes only once per day. The solutions architect needs to reduce RDS load with the LEAST application refactoring. Which caching strategy and ElastiCache configuration is MOST appropriate?",
o:["Write-through caching with ElastiCache for Redis — update cache on every database write","Lazy loading (cache-aside) with ElastiCache for Redis — application checks cache first; on miss, reads from RDS and populates cache","Session store with ElastiCache for Memcached to offload session data from RDS","Read replicas with ElastiCache for Redis in cluster mode for horizontal scaling"],
c:1,
e:"<strong>Correct: Lazy loading with ElastiCache for Redis.</strong> Lazy loading (cache-aside): application first checks ElastiCache; on cache hit, returns data without touching RDS; on cache miss, reads from RDS, stores in cache with a TTL, returns result. For product catalog updated once/day: set TTL = 24 hours. Result: after initial cache warm-up, 70% of queries served from ElastiCache — RDS CPU drops dramatically. Advantages: only requested data is cached (no wasted memory); cache misses are transparent to application (minimal refactoring: add cache check before DB call). Disadvantage: first request after cache miss hits RDS (cold cache on startup or TTL expiry). Write-through (A): updates cache on every write — good for data that's both frequently written and read; for catalog updated daily, write-through adds unnecessary complexity; cache may be populated with data that's never read. Memcached for sessions (C): Memcached is appropriate for session storage (simple key-value, multi-threaded) but doesn't address the product catalog query problem. Read replicas (D): offload reads to RDS read replicas — reduces primary CPU but still runs SQL queries; ElastiCache is 10× faster than RDS for cache hits. For the exam: lazy loading = most common caching pattern; write-through = low tolerance for stale data."},

{id:320,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"S3 Storage Lens and Cost Allocation Tags",
q:"A company has 50 AWS accounts in an Organization with S3 usage growing 15% monthly. The finance team cannot determine which teams or applications are driving storage growth or which accounts have the most storage waste (empty buckets, non-current versions, incomplete multipart uploads). They want an organization-wide view of S3 usage and cost allocation by team. What combination of AWS tools provides this visibility with MINIMAL setup?",
o:["Enable AWS Cost Explorer and filter by S3 service in each account individually","Enable S3 Storage Lens with organization-level configuration and advanced metrics; enforce cost allocation tags (Team tag) via AWS Organizations Tag Policies","Run AWS Trusted Advisor across all accounts to identify underutilized S3 buckets","Build a custom solution: enable S3 inventory on all buckets, export to a central S3 bucket, query with Athena"],
c:1,
e:"<strong>Correct: S3 Storage Lens + Organization Tag Policies.</strong> S3 Storage Lens: organization-level configuration aggregates metrics across all 50 accounts and all buckets in a single dashboard — no per-account setup. Metrics include: total storage, object count, requests, data retrieval, non-current version bytes (versioning waste), incomplete multipart upload bytes. Advanced metrics ($0.20/million objects/month): activity metrics, advanced cost optimization metrics (StorageBytes by storage class). Export to S3 + Athena for custom queries. Tag Policies + cost allocation tags: enforce Team tag on all S3 buckets; enable Team as a cost allocation tag in Billing; view S3 cost by team in Cost Explorer. Combined result: operations team sees storage waste; finance team allocates costs by team. Cost Explorer per-account (A): requires manual per-account review; no aggregation of S3-specific operational metrics (no multipart upload analysis). Trusted Advisor (C): limited S3 checks; not organization-aggregated; doesn't track growth trends. Custom Athena solution (D): works but requires significant setup (S3 Inventory on 50 accounts × many buckets, Glue catalog, Athena queries) — high operational overhead vs Storage Lens."},
{id:321,domain:"Cost-Optimized Architectures",topic:"Serverless",sub:"Lambda Power Tuning",
q:"A company runs an AWS Lambda function that processes images uploaded to Amazon S3. The function is configured with 512 MB of memory and takes an average of 4 seconds per invocation. The function is invoked 10 million times per month. A solutions architect wants to reduce the monthly Lambda cost without changing the function code. What is the MOST effective approach?",
o:["Increase the Lambda function memory to 3008 MB to maximize CPU and reduce duration","Decrease the Lambda function memory to 128 MB to reduce the memory-hour cost","Use the AWS Lambda Power Tuning tool to identify the optimal memory setting that minimizes the cost-duration product","Convert the Lambda function to a container image to reduce cold start overhead"],
c:2,
e:"<strong>Correct: AWS Lambda Power Tuning.</strong> Lambda charges based on the number of requests and the duration × memory (GB-seconds). Increasing memory also increases CPU, which often reduces duration — but the optimal point varies by workload. The open-source AWS Lambda Power Tuning tool (deployed as a Step Functions state machine) invokes the function at different memory levels and measures both duration and cost. It produces a cost vs. speed chart, allowing selection of the memory that minimizes GB-seconds. <strong>Why not A:</strong> Blindly increasing memory to max may reduce duration but could increase overall cost if the GB-second reduction is not proportional. <strong>Why not B:</strong> Reducing memory without testing may increase duration so much that total GB-seconds (and cost) increase. <strong>Why not D:</strong> Container images don't change the memory-duration cost model; they affect cold start packaging, not runtime efficiency."},
{id:322,domain:"Cost-Optimized Architectures",topic:"Containers",sub:"ECS Fargate Spot",
q:"A company runs a data processing pipeline on Amazon ECS with AWS Fargate. The pipeline processes jobs submitted throughout the day, and each job takes between 10 and 30 minutes to complete. Jobs can tolerate interruptions as long as incomplete work is checkpointed and retried. The company wants to reduce Fargate compute costs by at least 50%. What should the solutions architect recommend?",
o:["Migrate the ECS tasks to Amazon EC2 instances with Spot Instance purchasing","Configure the ECS service to use Fargate Spot capacity providers with a base of 0 Fargate On-Demand tasks","Use AWS Batch with managed compute environments backed by EC2 Spot Instances","Enable ECS Task placement strategies to bin-pack tasks onto fewer underlying instances"],
c:1,
e:"<strong>Correct: Fargate Spot capacity providers.</strong> Fargate Spot offers up to 70% discount over standard Fargate pricing by using spare AWS capacity. Tasks can be interrupted with a 2-minute warning. Since the pipeline checkpoints progress and retries, interruptions are tolerable. Configuring a capacity provider strategy with Fargate Spot as the primary (weight > 0) and Fargate On-Demand as fallback (base=0) maximizes savings while maintaining availability. <strong>Why not A:</strong> Migrating to EC2 Spot works but requires managing EC2 instances, AMIs, and cluster capacity — significantly higher operational overhead vs Fargate Spot. <strong>Why not C:</strong> AWS Batch is a valid option for batch workloads, but the question asks about reducing cost on the existing ECS pipeline — Fargate Spot achieves this without re-architecting. <strong>Why not D:</strong> Bin-packing is a placement strategy for EC2 launch type and reduces instance count; it does not apply to Fargate (which abstracts the underlying hosts) and doesn't reduce per-task pricing."},
{id:323,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"Graviton Instances",
q:"A company runs a web application on a fleet of 50 Amazon EC2 m5.xlarge On-Demand instances in a single AWS Region. The application is CPU-bound, and the workload is steady throughout the day. A solutions architect is tasked with reducing EC2 compute costs by at least 20% without changing the application tier architecture. The application runs on Amazon Linux 2. What combination of changes provides the greatest cost reduction with LEAST risk?",
o:["Replace m5.xlarge instances with m6g.xlarge (Graviton2) instances and convert to 1-year No-Upfront Reserved Instances","Replace m5.xlarge instances with t3.xlarge instances to use burstable performance","Replace On-Demand m5.xlarge instances with Spot m5.xlarge instances using a Spot Fleet with capacity-optimized strategy","Purchase 3-year All-Upfront Reserved Instances for m5.xlarge instances"],
c:0,
e:"<strong>Correct: Graviton2 + 1-year Reserved Instances.</strong> Amazon m6g.xlarge (Graviton2) instances are up to 40% cheaper than equivalent m5.xlarge instances for the same or better performance on Amazon Linux 2 workloads. Combining with 1-year No-Upfront Reserved Instances adds ~40% savings over On-Demand. Together, the savings easily exceed 20%. Amazon Linux 2 supports Graviton2 natively with no code changes required for most applications. <strong>Why not B:</strong> t3 instances use a burstable CPU credit model — under sustained CPU-bound load they throttle, making them unsuitable for this workload type. <strong>Why not C:</strong> Spot Instances can be interrupted at any time; for a steady production web tier without checkpointing, interruptions would cause user-visible outages. <strong>Why not D:</strong> 3-year All-Upfront RIs for m5.xlarge maximize Reserved Instance savings (~60%) but don't capture the additional Graviton2 discount. The combination of Graviton2 + 1-year RI typically beats a 3-year RI on m5 alone, with lower commitment risk."},
{id:324,domain:"Cost-Optimized Architectures",topic:"Databases",sub:"RDS Proxy Cost Efficiency",
q:"A company has a serverless application with AWS Lambda functions that connect to an Amazon RDS for PostgreSQL database. During peak hours, the application scales to 500 concurrent Lambda invocations, each opening a new database connection. The RDS instance is frequently running out of connections, causing errors. The database team wants to fix the connection exhaustion problem. A solutions architect notes the solution must also be cost-effective. What should the solutions architect recommend?",
o:["Increase the RDS instance size to db.r6g.4xlarge to support more connections","Enable RDS Multi-AZ to distribute read connections across the standby replica","Add Amazon RDS Proxy between Lambda and RDS to pool and reuse database connections","Create an ElastiCache for Redis cluster to cache database query results and reduce connections"],
c:2,
e:"<strong>Correct: Amazon RDS Proxy.</strong> RDS Proxy maintains a pool of database connections and multiplexes thousands of Lambda connections into a much smaller set of actual database connections. For serverless workloads, this is the canonical solution to connection exhaustion. Cost-effectiveness: RDS Proxy costs ~$0.015/GB of database capacity per hour — typically far less than upsizing the RDS instance. It also improves failover time (60-second failover becomes near-instant for Lambda connections). <strong>Why not A:</strong> Upsizing the RDS instance increases max connections (max_connections scales with RAM) but is expensive and doesn't address the architectural problem of ephemeral Lambda functions opening/closing connections. <strong>Why not B:</strong> The RDS standby replica in Multi-AZ does not serve read traffic — it is only a failover target. This would not help with connection count. <strong>Why not D:</strong> ElastiCache reduces read query load but does not solve write connection exhaustion or connection pooling for all query types. It also adds architectural complexity and cost without directly addressing the problem."},
{id:325,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Incomplete Multipart Upload Cleanup",
q:"A company's monthly AWS bill shows Amazon S3 storage costs growing 25% month-over-month even though the amount of finalized objects has grown only 5%. An audit reveals that many applications upload large files using the S3 multipart upload API but frequently fail mid-upload, leaving incomplete multipart upload parts that accumulate in storage. The company wants to eliminate this waste automatically. What is the MOST operationally efficient solution?",
o:["Write an AWS Lambda function that runs nightly using the ListMultipartUploads API to delete incomplete uploads older than 7 days","Configure an S3 Lifecycle policy on each bucket with an AbortIncompleteMultipartUpload action set to 7 days","Enable S3 Storage Lens to detect and automatically clean up incomplete multipart uploads","Enable S3 Versioning and configure a lifecycle rule to expire non-current versions older than 7 days"],
c:1,
e:"<strong>Correct: S3 Lifecycle AbortIncompleteMultipartUpload action.</strong> S3 Lifecycle policies support a native AbortIncompleteMultipartUpload action that automatically cancels any multipart upload that has not completed within a specified number of days, freeing all associated part storage. This requires no code, no Lambda, and runs fully managed by S3. Setting 7 days balances cleanup speed with allowing time for legitimate slow uploads to finish. <strong>Why not A:</strong> A Lambda function achieves the same result but requires development, maintenance, scheduling, and IAM permissions — far higher operational overhead when a native lifecycle action exists. <strong>Why not B (none):</strong> This IS the correct answer. <strong>Why not C:</strong> S3 Storage Lens provides visibility into incomplete multipart uploads (metric: IncompleteMultipartUploadBytes) but does not automatically clean them up — it is a reporting tool only. <strong>Why not D:</strong> S3 Versioning lifecycle rules expire old object versions, which is a separate concern from incomplete multipart uploads. Non-current version expiration would not affect in-progress or abandoned uploads."},
{id:326,domain:"Cost-Optimized Architectures",topic:"Networking",sub:"Transit Gateway vs VPC Peering",
q:"A company has 8 AWS VPCs in the same AWS Region that need full mesh connectivity. Currently each VPC is connected via VPC peering, requiring 28 peering connections. The network team finds the full-mesh peering model difficult to manage. A solutions architect is evaluating AWS Transit Gateway to simplify connectivity. The company transfers approximately 500 GB of data per month between VPCs. What is the PRIMARY cost consideration when choosing between the current full-mesh VPC peering and AWS Transit Gateway?",
o:["VPC peering has no data transfer charge within the same Region; Transit Gateway charges $0.02/GB processed plus $0.05/hour per attachment — making Transit Gateway more expensive for this traffic volume","Transit Gateway is always cheaper than VPC peering because it reduces the number of peering connections from 28 to 1 hub","VPC peering charges $0.01/GB for intra-Region transfers; Transit Gateway has no data processing charge","Transit Gateway charges apply only for cross-Region traffic; same-Region traffic between VPCs is always free regardless of connectivity model"],
c:0,
e:"<strong>Correct: VPC peering is free within the same AZ; Transit Gateway has per-GB and per-hour charges.</strong> VPC peering data transfer within the same Availability Zone is FREE. Between AZs in the same Region: $0.01/GB. Transit Gateway charges: $0.05/hour per VPC attachment (8 VPCs = $0.40/hour = ~$292/month) plus $0.02/GB processed. For 500 GB/month: TGW data charge = $10; attachment charge = ~$292; total ~$302/month. This exceeds the cost of 28 peering connections (no monthly fee, minimal data transfer cost). The tradeoff is operational simplicity vs. cost — TGW is simpler but more expensive at lower traffic volumes. <strong>Why not B:</strong> Transit Gateway is often more expensive at low-to-medium traffic volumes due to per-attachment fees. <strong>Why not C:</strong> VPC peering within the same AZ is free; between AZs is $0.01/GB. Transit Gateway does charge $0.02/GB. <strong>Why not D:</strong> Transit Gateway charges apply to all traffic processed, including same-Region traffic."},
{id:327,domain:"Cost-Optimized Architectures",topic:"Analytics",sub:"Redshift vs Athena for Ad Hoc Queries",
q:"A company stores 10 TB of log data in Amazon S3 in Apache Parquet format, partitioned by date. Data analysts run ad hoc SQL queries against this data a few times per day to investigate issues. Queries are unpredictable in frequency and complexity. The company currently has no dedicated analytics infrastructure. A solutions architect must recommend the MOST cost-effective solution that minimizes infrastructure management overhead.",
o:["Provision an Amazon Redshift cluster with ra3.xlplus nodes and load the Parquet data into Redshift tables","Use Amazon Athena with an AWS Glue Data Catalog table pointing to the S3 Parquet data","Deploy an Amazon EMR cluster with Apache Spark SQL to query the Parquet files on demand","Load the data into Amazon RDS for PostgreSQL and use SQL queries for analysis"],
c:1,
e:"<strong>Correct: Amazon Athena.</strong> Athena is a serverless, pay-per-query service that queries data directly in S3. It natively supports Parquet (columnar format), and S3 partitioning further reduces data scanned. Cost: $5 per TB scanned — with date partitions and Parquet compression, effective cost per query is typically cents. No infrastructure to provision or manage. For infrequent ad hoc queries, Athena is almost always the most cost-effective starting point. <strong>Why not A:</strong> Redshift clusters run continuously (even when not querying), costing thousands of dollars per month for ra3 nodes — this is far more expensive than Athena for a few queries per day. Redshift is better for high-frequency, complex analytical workloads with dedicated users. <strong>Why not C:</strong> EMR clusters must be provisioned, and even transient clusters take time to start. Management overhead is high, and per-query cost exceeds Athena for ad hoc use. <strong>Why not D:</strong> RDS for PostgreSQL is an OLTP database not designed for analytical queries over 10 TB of S3 data. Loading 10 TB into RDS requires ETL infrastructure and would be extremely slow for large scans."},
{id:328,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"Scheduled Auto Scaling",
q:"A company runs a fleet of Amazon EC2 instances behind an Application Load Balancer to serve a B2B SaaS application. Traffic analysis shows that usage follows a highly predictable pattern: workloads peak at 9 AM–6 PM on weekdays and are near-zero on nights and weekends. The company is paying for 20 instances continuously. A solutions architect wants to reduce EC2 costs while ensuring capacity is available before peak hours begin. What is the MOST cost-effective approach?",
o:["Use an Auto Scaling group with Target Tracking scaling based on average CPU utilization","Use an Auto Scaling group with Scheduled Scaling actions to scale out before 9 AM on weekdays and scale in after 6 PM","Purchase Reserved Instances for the baseline capacity and use On-Demand for additional peak capacity","Use Amazon EC2 Spot Instances for all application instances and set a maximum Spot price"],
c:1,
e:"<strong>Correct: Scheduled Auto Scaling actions.</strong> Since traffic is highly predictable (weekday business hours only), Scheduled Scaling is the optimal approach. You define a cron-based schedule: scale out to peak capacity before 9 AM weekdays (ensuring capacity is ready before traffic arrives) and scale in to a small baseline after 6 PM. This proactively matches capacity to the known pattern, avoiding both under-provisioning and the continuous cost of 20 running instances on nights/weekends. <strong>Why not A:</strong> Target Tracking reacts to actual load — it scales out after CPU rises, which means there is a lag before capacity arrives. For predictable patterns, scheduled scaling is more appropriate and ensures warm capacity before the ramp. <strong>Why not C:</strong> Reserved Instances reduce the per-hour price but do NOT automatically turn instances on/off — you still pay for running instances on nights/weekends. Scheduling reduces the number of running instances, saving more. <strong>Why not D:</strong> Spot Instances can be interrupted, causing availability issues for a production SaaS application without specific interruption-handling design."},
{id:329,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"EFS Infrequent Access",
q:"A company uses Amazon EFS to provide shared file storage for a fleet of Amazon EC2 instances running a content management system. A storage audit shows that 80% of the files stored in EFS have not been accessed in over 30 days. The company pays the EFS Standard storage rate for all data. A solutions architect wants to reduce EFS storage costs without changing how the application accesses files. What should the solutions architect do?",
o:["Migrate infrequently accessed files to Amazon S3 Standard-Infrequent Access using an AWS DataSync job","Enable EFS Intelligent-Tiering, which automatically moves files not accessed for 30 days to EFS Infrequent Access storage class","Create a second EFS file system for archival data and manually move old files using a Lambda function","Use AWS Storage Gateway to serve the infrequently accessed files from on-premises tape storage"],
c:1,
e:"<strong>Correct: EFS Intelligent-Tiering (EFS-IA).</strong> EFS offers a lifecycle management feature (Intelligent-Tiering) that automatically moves files to the EFS Infrequent Access (EFS-IA) storage class when they haven't been accessed for a configurable period (7, 14, 30, 60, or 90 days). EFS-IA costs up to 92% less than EFS Standard. Crucially, access to EFS-IA files is transparent — the application uses the same file path and EFS API; there is no code change required. Files are automatically moved back to Standard if accessed again. <strong>Why not A:</strong> Migrating to S3 requires application changes — S3 uses an object API (PUT/GET), not a POSIX file system API. This would require significant code modification. <strong>Why not C:</strong> A second EFS file system requires manual or automated file movement and doesn't provide transparent access via the original paths without additional tooling. <strong>Why not D:</strong> Storage Gateway backed by tape is for archival use cases where long retrieval times are acceptable — not appropriate for an active CMS where files may be accessed unpredictably."},
{id:330,domain:"Cost-Optimized Architectures",topic:"Security",sub:"SSM Parameter Store vs Secrets Manager",
q:"A company is building a new microservices application on AWS. Each microservice needs to retrieve configuration values such as database connection strings, API endpoints, and feature flags at startup. Some configuration values are sensitive credentials that require automatic rotation every 30 days. The team wants to minimize costs while meeting security requirements. What is the MOST cost-effective approach?",
o:["Store all configuration in AWS Secrets Manager for consistency, using automatic rotation for all parameters","Store non-sensitive configuration in AWS Systems Manager Parameter Store (Standard tier) and store sensitive credentials that require rotation in AWS Secrets Manager","Store all configuration in environment variables within the microservice deployment configuration","Store all configuration in Amazon S3 with server-side encryption and use IAM policies to control access"],
c:1,
e:"<strong>Correct: SSM Parameter Store for non-sensitive + Secrets Manager for credentials requiring rotation.</strong> AWS SSM Parameter Store Standard tier is free for up to 10,000 parameters with no charge for standard API throughput — ideal for non-sensitive configuration like endpoints, feature flags, and connection strings. AWS Secrets Manager charges ~$0.40/secret/month plus $0.05 per 10,000 API calls, but provides built-in automatic rotation with Lambda integration — essential for the 30-day credential rotation requirement. Using each service where it provides unique value minimizes cost. <strong>Why not A:</strong> Storing all configuration in Secrets Manager works but is unnecessarily expensive — paying $0.40/secret/month for non-rotating, non-sensitive configuration values when Parameter Store is free. <strong>Why not C:</strong> Environment variables require redeployment to update configuration values and are exposed in plain text in deployment configs — not suitable for secrets. <strong>Why not D:</strong> S3 can store configuration but lacks automatic rotation, versioning, and the purpose-built secret management features (access auditing, automatic rotation) required for credential management."},
{id:331,domain:"Cost-Optimized Architectures",topic:"Serverless",sub:"Compute Savings Plans for Lambda",
q:"A company runs a mix of workloads on AWS: Amazon EC2 instances for their web tier, AWS Lambda functions for event processing, and AWS Fargate tasks for batch jobs. Usage has been stable for 6 months. The company currently has EC2 Instance Savings Plans for their web tier. The finance team wants to further reduce costs on the Lambda and Fargate workloads without committing to specific instance types or sizes. What should the solutions architect recommend?",
o:["Purchase EC2 Instance Savings Plans for the Lambda and Fargate workloads","Purchase Compute Savings Plans with a 1-year commitment, which apply to EC2, Lambda, and Fargate usage","Convert the Lambda functions to container-based Lambda to benefit from existing EC2 Savings Plans","Purchase Reserved Instances for the Fargate tasks and separate Reserved Concurrency for Lambda"],
c:1,
e:"<strong>Correct: Compute Savings Plans.</strong> Compute Savings Plans offer up to 66% savings over On-Demand pricing and apply flexibly across EC2 (any instance family, size, Region, OS), AWS Lambda, and AWS Fargate. They are the most flexible Savings Plan type. A 1-year commitment with hourly spend commitment provides immediate savings on Lambda invocation costs and Fargate compute. Compute Savings Plans automatically apply where they provide the greatest savings first. <strong>Why not A:</strong> EC2 Instance Savings Plans apply only to specific EC2 instance families in specific Regions — they do not cover Lambda or Fargate. <strong>Why not C:</strong> Lambda container images use the same Lambda pricing model regardless of packaging format — they do not benefit from EC2 Savings Plans. <strong>Why not D:</strong> Fargate does not have Reserved Instances — there is no RI purchase option for Fargate tasks. Lambda Reserved Concurrency reserves capacity but does not reduce cost (it's a scaling limit, not a pricing model)."},
{id:332,domain:"Cost-Optimized Architectures",topic:"Databases",sub:"DynamoDB On-Demand vs Provisioned",
q:"A company has a DynamoDB table used by a mobile gaming leaderboard. Traffic is extremely spiky: normal traffic is around 50 reads/writes per second, but the table experiences sudden bursts of 5,000+ reads/writes per second for 15–30 minutes when new game content releases, which happens approximately twice per month. The team currently uses Provisioned capacity mode with Auto Scaling. They frequently receive ProvisionedThroughputExceededException errors during content releases because Auto Scaling cannot react fast enough. What change would BEST solve the throttling issue while keeping costs reasonable?",
o:["Increase the provisioned capacity to 5,000 RCU/WCU permanently to handle peak load","Switch the DynamoDB table to On-Demand capacity mode","Enable DynamoDB Accelerator (DAX) in front of the table to cache read requests","Add a second DynamoDB table and route traffic using application-level sharding"],
c:1,
e:"<strong>Correct: DynamoDB On-Demand capacity mode.</strong> On-Demand mode instantly scales to handle any request rate without throttling (up to the previous peak × 2, and beyond that with a brief ramp). Since bursts occur only ~twice/month for 30 minutes, On-Demand cost during peaks is modest. At normal traffic (50 ops/sec), On-Demand charges are minimal. The total monthly cost of On-Demand is likely far less than provisioning 5,000 RCU/WCU continuously. On-Demand eliminates the need for capacity planning and resolves the Auto Scaling lag problem. <strong>Why not A:</strong> Permanently provisioning 5,000 RCU/WCU for normal traffic of 50 ops/sec wastes ~99% of provisioned capacity — extremely expensive and unnecessary. <strong>Why not C:</strong> DAX caches read results, reducing read RCU consumption — but write throttling is not addressed by DAX. If the burst includes writes, DAX doesn't help. Also, DAX adds latency on misses and cache management complexity. <strong>Why not D:</strong> Sharding across tables increases complexity significantly without addressing the fundamental issue that Auto Scaling reacts too slowly to sudden demand spikes."},
{id:333,domain:"Secure Architectures",topic:"Network Security",sub:"AWS WAF Managed Rules",
q:"A company runs a public-facing web application on Amazon CloudFront backed by an Application Load Balancer. The security team has identified a pattern of SQL injection and cross-site scripting (XSS) attacks originating from various IP addresses worldwide. They want to block these attacks at the edge with minimal configuration effort and without writing custom rules. What should the solutions architect implement?",
o:["Create a Network ACL on the VPC subnet containing the ALB with rules that deny common attack patterns","Associate an AWS WAF Web ACL with the CloudFront distribution using AWS Managed Rule Groups for SQL injection and XSS","Configure AWS Shield Advanced on the CloudFront distribution to block application-layer attacks","Create AWS WAF custom regex pattern rules to match and block SQL injection and XSS payloads"],
c:1,
e:"<strong>Correct: AWS WAF with AWS Managed Rule Groups.</strong> AWS WAF can be associated directly with Amazon CloudFront to inspect and filter requests at the edge before they reach the origin. AWS Managed Rule Groups — specifically the Core Rule Set (CRS), which includes SQL injection and XSS protections — are maintained by AWS and updated automatically as new attack patterns emerge. This provides immediate protection with minimal configuration: no custom rule writing required. <strong>Why not A:</strong> Network ACLs operate at the IP/port level (Layer 3/4) and cannot inspect HTTP payload content (Layer 7) — they cannot detect SQL injection or XSS patterns embedded in request bodies or query strings. <strong>Why not C:</strong> AWS Shield Advanced protects against DDoS (volumetric and protocol attacks). It provides some application-layer DDoS protection with WAF integration, but it does not block SQL injection or XSS by itself — it is not the right tool for this specific threat. <strong>Why not D:</strong> Custom regex rules require significant security expertise, time to develop, and ongoing maintenance as attack patterns evolve. AWS Managed Rule Groups achieve the same protection with zero development effort."},
{id:334,domain:"Secure Architectures",topic:"Secrets Management",sub:"Secrets Manager Automatic Rotation",
q:"A company stores database credentials for their Amazon RDS for MySQL instance in a configuration file on their application servers. The security team requires that database passwords be rotated every 60 days and that credentials never be stored in plaintext on servers. A solutions architect must redesign credential management to meet these requirements. What is the RECOMMENDED AWS solution?",
o:["Store the credentials in an Amazon S3 bucket with SSE-S3 encryption and update them manually every 60 days","Store the credentials in AWS Secrets Manager and enable automatic rotation with a Lambda rotation function for Amazon RDS","Store the credentials in AWS Systems Manager Parameter Store as SecureString parameters and rotate them using a scheduled EventBridge rule triggering a Lambda function","Store the credentials in an encrypted Amazon EBS volume mounted to each application server"],
c:1,
e:"<strong>Correct: AWS Secrets Manager with automatic rotation.</strong> Secrets Manager is specifically designed for this use case. It stores credentials encrypted at rest using AWS KMS, provides an API for applications to retrieve credentials at runtime (no plaintext on disk), and supports native automatic rotation for Amazon RDS databases using a built-in Lambda rotation function. The rotation function automatically generates a new password, updates it in both Secrets Manager and the RDS instance, and keeps the application functioning during rotation via the AWSPENDING/AWSCURRENT staging mechanism. <strong>Why not A:</strong> S3 with SSE-S3 encrypts at rest but requires manual rotation and doesn't provide a secrets API for applications — credentials would still need to be extracted to servers. <strong>Why not C:</strong> SSM Parameter Store SecureString with EventBridge + Lambda can achieve rotation but requires building and maintaining the rotation Lambda from scratch, and SSM lacks native RDS rotation integration — more operational overhead than Secrets Manager. <strong>Why not D:</strong> Encrypted EBS volumes still store credentials as plaintext files on the volume; anyone with OS access can read them. This does not meet the no-plaintext requirement."},
{id:335,domain:"Secure Architectures",topic:"Logging & Monitoring",sub:"VPC Flow Logs Analysis",
q:"A company's security team suspects that an Amazon EC2 instance in their VPC has been compromised and is communicating with external command-and-control (C2) servers. The team needs to quickly identify which IP addresses the instance has been communicating with, on which ports, and whether traffic was accepted or rejected by security group rules. What combination of AWS services provides this information MOST quickly?",
o:["Check Amazon CloudWatch metrics for the EC2 instance NetworkIn and NetworkOut to see traffic volume by destination","Enable VPC Flow Logs on the VPC, send logs to Amazon CloudWatch Logs, and use CloudWatch Logs Insights to query for traffic to and from the suspect instance's private IP","Use AWS CloudTrail to review API calls made from the EC2 instance role in the last 24 hours","Enable Amazon GuardDuty and wait for it to analyze historical traffic and generate findings"],
c:1,
e:"<strong>Correct: VPC Flow Logs + CloudWatch Logs Insights.</strong> VPC Flow Logs capture metadata for every network flow through the VPC — including source IP, destination IP, source port, destination port, protocol, bytes, packets, and ACCEPT/REJECT status. When sent to CloudWatch Logs, they can be queried immediately using CloudWatch Logs Insights with filtering by the instance's ENI or private IP. A query like `filter srcAddr = '10.0.1.50' or dstAddr = '10.0.1.50'` returns all connections within seconds. <strong>Why not A:</strong> CloudWatch EC2 network metrics show aggregate bytes in/out but do not show per-destination IP or port — no forensic detail. <strong>Why not C:</strong> CloudTrail logs AWS API calls (e.g., DescribeInstances) made with credentials — it does not log network-layer traffic between the instance and external IPs. <strong>Why not D:</strong> GuardDuty is an excellent detection tool and may already have findings, but enabling it now and waiting does not help with immediate forensic investigation of an already-suspected compromise. Additionally, GuardDuty requires 7–14 days of baseline data for some anomaly detections."},
{id:336,domain:"Secure Architectures",topic:"Compliance",sub:"AWS Config Conformance Packs",
q:"A company must demonstrate compliance with the CIS AWS Foundations Benchmark across 20 AWS accounts in their organization. The compliance team needs continuous, automated evaluation of AWS resource configurations against the benchmark's controls and a centralized dashboard showing the compliance status of each account. They want to minimize the setup effort. What should the solutions architect implement?",
o:["Write custom AWS Lambda functions triggered by Amazon EventBridge rules to evaluate resource configurations every hour","Deploy AWS Config with the CIS AWS Foundations Benchmark conformance pack across all organization accounts using AWS Organizations delegated administrator, and view results in AWS Security Hub","Enable Amazon Inspector on all accounts to scan for compliance violations against the CIS benchmark","Configure AWS Trusted Advisor in all accounts and aggregate results using AWS Organizations"],
c:1,
e:"<strong>Correct: AWS Config Conformance Packs + Security Hub via Organizations.</strong> AWS Config Conformance Packs are prebuilt collections of Config Rules mapped to compliance frameworks. AWS provides a CIS AWS Foundations Benchmark conformance pack template. Using AWS Organizations + Config's delegated administrator, the conformance pack can be deployed organization-wide in a single operation. AWS Security Hub aggregates compliance findings from Config across all accounts into a centralized dashboard with an overall security score — no per-account setup needed for member accounts. <strong>Why not A:</strong> Custom Lambda functions require significant development effort and ongoing maintenance. AWS Config Conformance Packs achieve the same with prebuilt, AWS-maintained rule sets. <strong>Why not C:</strong> Amazon Inspector evaluates EC2 instances and container images for software vulnerabilities and network reachability — not AWS resource configuration compliance against CIS benchmark controls (which cover IAM, logging, networking config). <strong>Why not D:</strong> Trusted Advisor provides some best-practice checks but does not map to CIS benchmark controls specifically and does not provide the detailed, per-resource compliance reporting of AWS Config."},
{id:337,domain:"Secure Architectures",topic:"IAM",sub:"STS Session Policies",
q:"A company uses a single IAM role with broad S3 permissions to allow a Lambda function to access any S3 bucket in the account. A new requirement dictates that when the Lambda function processes files for Customer A, it should only access Customer A's bucket, and when processing Customer B's files, it should only access Customer B's bucket — even though the Lambda uses the same IAM role. The solution must not require creating separate IAM roles for each customer. What should the solutions architect implement?",
o:["Add bucket-level conditions to the IAM role's trust policy that change based on the customer being processed","When the Lambda function assumes its execution role, pass a session policy via the AssumeRole API call that restricts access to only the current customer's bucket","Create S3 bucket policies on each customer bucket that only allow access from the specific Lambda function ARN when a customer-specific tag is present","Use IAM permission boundaries on the Lambda execution role to restrict access per customer"],
c:1,
e:"<strong>Correct: STS Session Policies.</strong> When calling sts:AssumeRole (or using the Lambda's role), you can pass a session policy as an inline JSON document that further restricts the permissions granted by the role. The effective permissions are the intersection of the role's identity policy AND the session policy. The Lambda function can dynamically generate a session policy like `{Effect:Allow, Action:s3:*, Resource:arn:aws:s3:::customer-a-bucket/*}` before processing Customer A's files. This requires no new roles and dynamically scopes access. <strong>Why not A:</strong> IAM role trust policies control who can assume the role — they don't restrict what the role can do once assumed. Adding conditions to the trust policy doesn't limit per-customer bucket access. <strong>Why not C:</strong> S3 bucket policies restricting by Lambda ARN would restrict ALL of that Lambda's access to the bucket — not per-invocation. This doesn't dynamically scope within a single Lambda's execution. <strong>Why not D:</strong> Permission boundaries define the maximum permissions an identity can have — they are set at role creation time, not dynamically per-invocation. They cannot be changed per customer context at runtime."},
{id:338,domain:"Secure Architectures",topic:"IAM",sub:"Resource-Based Policies",
q:"A company has an Amazon S3 bucket that must be accessible to Lambda functions in three different AWS accounts. The security team requires that no IAM changes be made to the individual accounts — the access must be controlled entirely from the S3 bucket's side. What is the correct approach?",
o:["Create a VPC endpoint for S3 in each account and configure the endpoint policy to allow cross-account access","Add a bucket policy to the S3 bucket that specifies the Lambda execution role ARNs from all three accounts in the Principal element with appropriate Action and Effect","Create an IAM role in the bucket's account with a trust policy for all three accounts and share the role ARN with each account's Lambda functions","Enable S3 Cross-Region Replication to copy the bucket contents to each of the three accounts"],
c:1,
e:"<strong>Correct: S3 Bucket Policy with cross-account Principals.</strong> S3 bucket policies are resource-based policies attached directly to the bucket. They can specify principals from any AWS account using ARNs like `arn:aws:iam::ACCOUNT-ID:role/lambda-role-name`. With this approach, access is controlled entirely from the bucket owner's side — no IAM changes are needed in the other accounts. The Lambda execution roles in those accounts need only standard S3 permissions in their own identity policy (which they likely already have), and the bucket policy grants the cross-account access. <strong>Why not A:</strong> VPC endpoints for S3 control routing within a VPC; endpoint policies don't grant cross-account access to the bucket — bucket policies still govern authorization. <strong>Why not C:</strong> A cross-account IAM role requires the external Lambda functions to call sts:AssumeRole and use temporary credentials — this DOES require IAM awareness in the external accounts (configuring Lambda to assume the role), violating the no-IAM-changes requirement. <strong>Why not D:</strong> S3 Cross-Region Replication copies data to new buckets — it is a data replication feature, not an access control mechanism."},
{id:339,domain:"Secure Architectures",topic:"Security Services",sub:"Amazon Inspector",
q:"A company runs a large fleet of Amazon EC2 instances and has recently adopted Amazon ECR to store container images for their Amazon ECS workloads. The security team wants continuous automated scanning for OS-level software vulnerabilities and known CVEs in both running EC2 instances and all container images stored in ECR, with findings centralized and prioritized by severity. What should the solutions architect enable?",
o:["Enable Amazon GuardDuty with EC2 runtime monitoring and ECR image scanning","Enable Amazon Inspector v2 for the AWS account, which automatically scans EC2 instances and ECR container images and centralizes findings with severity scoring","Configure AWS Security Hub with the AWS Foundational Security Best Practices standard, which includes vulnerability scanning","Enable ECR basic scanning on all repositories and install Amazon CloudWatch agent on EC2 instances for OS metric collection"],
c:1,
e:"<strong>Correct: Amazon Inspector v2.</strong> Amazon Inspector v2 (the modern version) provides continuous, automated vulnerability scanning for: (1) Amazon EC2 instances — scans OS packages and network reachability; (2) Amazon ECR container images — scans on push and continuously re-evaluates as new CVEs are published; (3) AWS Lambda functions — scans function code and layer packages. Inspector uses the AWS Systems Manager agent on EC2 (no separate agent needed if SSM is already deployed). All findings include a risk score combining CVSS severity with environmental context, and findings are aggregated in Inspector's console with direct integration into Security Hub. <strong>Why not A:</strong> GuardDuty detects active threats and suspicious behavior (threat intelligence, anomaly detection) but does not scan for software vulnerabilities/CVEs. <strong>Why not C:</strong> Security Hub aggregates findings from other services but does not itself perform vulnerability scanning — it needs Inspector as a source. <strong>Why not D:</strong> ECR basic scanning uses Clair for on-push scanning only (not continuous re-evaluation); it doesn't cover EC2 instances at all. CloudWatch agent collects metrics, not vulnerability data."},
{id:340,domain:"Secure Architectures",topic:"Systems Manager",sub:"Patch Manager Compliance",
q:"A company manages 300 Amazon EC2 instances running a mix of Amazon Linux 2 and Windows Server 2019. The security team requires that all instances receive OS security patches within 7 days of patch release and that a compliance report showing the patch status of every instance be available on demand. The operations team wants to minimize manual patching effort. What should the solutions architect implement?",
o:["Create an AWS Lambda function that uses the SSM API to run patch commands on all instances on a scheduled basis","Configure AWS Systems Manager Patch Manager with patch baselines for Amazon Linux 2 and Windows Server 2019, create a maintenance window to run AWS-RunPatchBaseline every 7 days, and use the SSM Patch Compliance dashboard","Use AWS Config rules to evaluate whether instances have the required patch level and trigger remediation via Systems Manager Automation","Deploy a third-party patch management tool on a bastion host that connects to all EC2 instances via SSH/RDP"],
c:1,
e:"<strong>Correct: AWS Systems Manager Patch Manager.</strong> Patch Manager provides end-to-end patch management: (1) Patch baselines define which patches are required (by severity, classification, and approval timing); (2) Maintenance windows schedule the AWS-RunPatchBaseline document to scan and install patches — configurable per OS type; (3) Patch Compliance in the SSM console and AWS Config shows compliance status for every managed instance, including which patches are missing. This requires SSM Agent (pre-installed on AWS AMIs) and an instance profile with SSM permissions — no additional software deployment. <strong>Why not A:</strong> A custom Lambda function can trigger SSM Run Command but requires development, scheduling, error handling, and compliance reporting — all built into Patch Manager natively. <strong>Why not C:</strong> AWS Config can detect patch non-compliance but triggers remediation asynchronously after violations occur. Config + Automation is a valid architecture but more complex to set up than Patch Manager's native maintenance window + baseline workflow. <strong>Why not D:</strong> Third-party patch tools require bastion host management, SSH/RDP connectivity to all instances, and agent installation — significant operational overhead compared to the native SSM approach."},
{id:341,domain:"Secure Architectures",topic:"Encryption",sub:"KMS Multi-Region Keys",
q:"A company runs a multi-Region active-active application with workloads in us-east-1 and eu-west-1. The application encrypts sensitive customer data using AWS KMS before storing it in Amazon DynamoDB Global Tables. Currently, each Region has a separate KMS key, so data encrypted in us-east-1 cannot be decrypted in eu-west-1 without a cross-Region KMS API call — adding latency and cross-Region costs. The team wants to encrypt data in one Region and decrypt it in another without cross-Region API calls. What should the solutions architect implement?",
o:["Export the KMS key material from us-east-1 and manually import it into a KMS key in eu-west-1","Create a KMS Multi-Region key in us-east-1 and replicate it to eu-west-1; both Regions share the same key material and key ID format but operate independently","Use a customer-managed key (CMK) with imported key material and set the same key material in both Regions manually","Use AWS CloudHSM in both Regions and synchronize the HSM key material between clusters"],
c:1,
e:"<strong>Correct: KMS Multi-Region Keys.</strong> AWS KMS Multi-Region Keys are sets of KMS keys in different AWS Regions that have the same key material and key ID. Data encrypted with the primary key in us-east-1 can be decrypted by the replica key in eu-west-1 without any cross-Region API calls. Each Regional key operates independently (no cross-Region dependency at decrypt time), providing low-latency decryption in each Region. This is the purpose-built solution for multi-Region encryption scenarios. <strong>Why not A:</strong> Manually exporting and importing KMS key material is a complex, risky operation. Also, once a key has been created without Multi-Region status, it cannot be converted — a new key would be required. More importantly, this approach is manual and error-prone. <strong>Why not C:</strong> Importing the same key material into two separate CMKs creates two independent keys — they may share material but are not the same key. This technically works for encryption/decryption but is not the managed, auditable approach that Multi-Region Keys provide, and each key must be managed separately. <strong>Why not D:</strong> AWS CloudHSM provides dedicated HSM appliances but requires significantly more operational complexity (HSM cluster management, key synchronization) compared to KMS Multi-Region Keys."},
{id:342,domain:"Secure Architectures",topic:"Logging & Monitoring",sub:"CloudTrail Insights",
q:"A company's security team has enabled AWS CloudTrail across all accounts in their AWS Organization. They are concerned about detecting unusual API activity patterns — specifically, spikes in API call error rates or unusual volumes of specific management API calls that could indicate a compromised IAM credential or misconfigured automation. They want automated detection of these anomalies without writing custom detection logic. What should the solutions architect enable?",
o:["Create Amazon CloudWatch metric filters on the CloudTrail log group to alert when error count exceeds a threshold","Enable CloudTrail Insights on the trail to automatically detect unusual write management API activity and API error rate anomalies","Use Amazon GuardDuty to monitor CloudTrail events for threat patterns based on known indicators of compromise","Configure AWS Security Hub to aggregate CloudTrail logs and use machine learning to detect anomalies"],
c:1,
e:"<strong>Correct: CloudTrail Insights.</strong> CloudTrail Insights automatically analyzes your management (control-plane) API activity and detects two types of anomalies: (1) unusual API call rates — when write management APIs are called at a rate significantly outside the baseline (e.g., normally 5 iam:CreateUser calls/hour, suddenly 500); (2) unusual API error rates — when API error rates spike significantly above baseline. Insights uses machine learning trained on your account's historical activity. When an anomaly is detected, it creates an Insights event visible in CloudTrail and can trigger EventBridge for automated response — no custom threshold configuration required. <strong>Why not A:</strong> CloudWatch metric filters can detect absolute threshold breaches but require you to define the threshold manually. They cannot adapt to your account's unique baseline or detect relative anomalies (e.g., 10x normal volume). <strong>Why not C:</strong> GuardDuty does analyze CloudTrail events for threat intelligence matches and behavioral anomalies. However, CloudTrail Insights specifically targets API call rate anomalies — GuardDuty and Insights are complementary, and Insights is more directly purpose-built for API rate/error anomaly detection. <strong>Why not D:</strong> Security Hub aggregates findings from other services but does not natively analyze raw CloudTrail logs with ML — it relies on Inspector, GuardDuty, Config, etc. as sources."},
{id:343,domain:"Resilient Architectures",topic:"Storage",sub:"S3 Cross-Region Replication",
q:"A company stores critical business data in Amazon S3 in us-east-1. The company's disaster recovery plan requires that all S3 objects be available in us-west-2 within 15 minutes of creation to meet an RPO of 15 minutes. The company also needs confirmation that replication is keeping up with the data creation rate. What should the solutions architect configure?",
o:["Enable S3 versioning on the source bucket and set up a scheduled AWS DataSync task to copy new objects to a us-west-2 bucket every 15 minutes","Enable S3 Cross-Region Replication (CRR) with S3 Replication Time Control (RTC) enabled, which guarantees 99.99% of objects are replicated within 15 minutes, and enable replication metrics in Amazon CloudWatch","Enable S3 Cross-Region Replication without Replication Time Control and monitor replication lag using S3 Storage Lens","Configure S3 Intelligent-Tiering in us-west-2 and sync objects using an EventBridge rule that triggers a Lambda copy function on each S3 ObjectCreated event"],
c:1,
e:"<strong>Correct: S3 CRR with Replication Time Control (RTC).</strong> S3 RTC is an add-on to Cross-Region Replication that provides an SLA: 99.99% of objects are replicated within 15 minutes. Without RTC, replication is best-effort with no time guarantee. RTC also enables replication metrics published to CloudWatch — including PendingReplicationCount and ReplicationLatency — allowing monitoring of replication lag in real time. This directly satisfies both the 15-minute RPO and the monitoring requirement. <strong>Why not A:</strong> DataSync scheduled every 15 minutes would not meet the RPO — a DataSync task scheduled at T=0 could miss objects created at T=1 until T=15, and the task itself takes time to run. Also, DataSync requires managing scheduling, error handling, and is not event-driven per object. <strong>Why not C:</strong> S3 CRR without RTC has no replication time guarantee. Replication could take minutes to hours depending on object size and system load — this does not meet the 15-minute RPO SLA requirement. <strong>Why not D:</strong> EventBridge + Lambda for per-object copying adds operational complexity and has rate limiting concerns at high object creation rates. It also doesn't provide the SLA guarantee of S3 RTC."},
{id:344,domain:"Resilient Architectures",topic:"Networking",sub:"Route 53 Weighted Routing for Migration",
q:"A company wants to migrate their web application from an on-premises data center to AWS without causing downtime. The plan is to gradually shift traffic from the on-premises servers to AWS EC2 instances over several weeks, starting with 10% of traffic to AWS and increasing as the team gains confidence. The application uses a single DNS name (app.example.com) for user access. What Route 53 configuration should the solutions architect use?",
o:["Create two Route 53 records for app.example.com: one ALIAS record pointing to the on-premises IP and one ALIAS record pointing to the AWS ALB, and use Route 53 health checks to route all traffic to the healthy endpoint","Create weighted routing policy records in Route 53 for app.example.com — one record pointing to the on-premises IP with weight 90 and one record pointing to the AWS ALB with weight 10, then gradually adjust the weights","Use Route 53 latency-based routing with two records: one for the on-premises data center and one for the AWS ALB, allowing Route 53 to automatically route users to the lowest-latency endpoint","Create a CNAME chain where app.example.com points to an intermediate CNAME that points to the on-premises servers, then update the intermediate CNAME to point to AWS during the migration"],
c:1,
e:"<strong>Correct: Route 53 Weighted Routing.</strong> Weighted routing allows you to assign a numeric weight to each DNS record. Traffic is distributed proportionally: weight 90 (on-premises) and weight 10 (AWS) means ~10% of DNS responses resolve to the AWS ALB. The weights can be adjusted at any time without DNS changes visible to users — just update the weight in Route 53. This enables a gradual, controlled migration with easy rollback (set AWS weight to 0 to instantly stop sending traffic). <strong>Why not A:</strong> Route 53 health check-based failover routing fails over ALL traffic when the primary is unhealthy — it is a binary switch, not a gradual traffic split. It doesn't allow a 90/10 percentage split. <strong>Why not C:</strong> Latency-based routing routes users to the endpoint with the lowest network latency — it is for performance optimization, not controlled traffic splitting. The on-premises data center may have lower latency for nearby users, but the routing is not controllable by percentage. <strong>Why not D:</strong> CNAME chains add unnecessary complexity and DNS TTL delays; updating the intermediate CNAME would shift 100% of traffic at once — not a gradual migration."},
{id:345,domain:"Resilient Architectures",topic:"Databases",sub:"RDS Backup and Restore Strategy",
q:"A company runs a business-critical application on Amazon RDS for PostgreSQL with a 4-hour RPO and a 1-hour RTO in case of accidental data deletion or corruption. The database is 500 GB. The company needs to be confident they can meet these targets. What backup and restore configuration should the solutions architect implement?",
o:["Enable RDS Multi-AZ deployment; in case of data corruption, fail over to the standby replica","Enable automated backups with a 7-day retention period and test restoring the database to a point-in-time within the backup window to validate the RTO","Enable automated backups with a 1-day retention period and rely on the most recent daily snapshot for recovery","Use AWS Database Migration Service (DMS) to continuously replicate the database to a second RDS instance in the same Region as a hot standby"],
c:1,
e:"<strong>Correct: Automated backups with 7-day retention + tested point-in-time restore.</strong> RDS automated backups enable point-in-time recovery (PITR) to any second within the backup retention period. With a 4-hour RPO, PITR allows restoration to within the last 4 hours. The 7-day retention window comfortably covers the RPO. Critically, the restore creates a new RDS instance — for 500 GB, restore time must be tested to confirm it meets the 1-hour RTO. Regular restore testing is a best practice (RTO is a promise, not a guarantee). <strong>Why not A:</strong> Multi-AZ standby is a replica that is always current — it does not provide point-in-time recovery. If data is accidentally deleted or corrupted, the corruption is immediately replicated to the standby, making it equally corrupted. Multi-AZ solves hardware failure, not logical data corruption. <strong>Why not C:</strong> A 1-day retention period only allows restoration to the previous day. If corruption occurs near the end of the day, the RPO could be nearly 24 hours — far exceeding the 4-hour RPO requirement. <strong>Why not D:</strong> DMS continuous replication creates a near-real-time replica — like Multi-AZ, it replicates corruption or accidental deletion immediately to the target, providing no protection against logical data errors."},
{id:346,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"EC2 Savings Plans vs Reserved Instances",
q:"A company runs a stable web application on Amazon EC2 that requires exactly 20 m5.xlarge On-Demand instances at all times. The company also has a data processing workload that runs on 10 m5.xlarge instances for 8 hours per day, every day. The finance team wants to minimize EC2 costs while maintaining flexibility to change instance families in the future. What purchasing strategy should the solutions architect recommend?",
o:["Purchase 20 Standard Reserved Instances (1-year, all upfront) for the baseline and use On-Demand for the 8-hour workload","Purchase a Compute Savings Plan sized to cover 20 m5.xlarge instances at On-Demand rate and use On-Demand for the additional 10 instances during processing hours","Purchase a Compute Savings Plan sized to cover 30 m5.xlarge instances at On-Demand rate to cover full peak usage","Purchase 20 Standard Reserved Instances for the baseline and 10 Convertible Reserved Instances for the processing workload"],
c:1,
e:"<strong>Correct: Compute Savings Plan for baseline, On-Demand for burst.</strong> Compute Savings Plans provide up to 66% savings vs On-Demand and apply to any EC2 instance family, size, OS, tenancy, and Region — giving maximum flexibility for future changes. Sizing the plan to cover 20 instances (the constant baseline) maximizes plan utilization (100%). The 8-hour daily processing workload runs 8/24 = 33% of the time — buying a Savings Plan for those 10 instances would only achieve 33% utilization, wasting 67% of the committed spend. On-Demand for the processing burst is more cost-effective when utilization is that low. <strong>Why not A:</strong> Standard RIs are tied to a specific instance family (m5.xlarge) — no flexibility to change to m6i or other families. Savings Plans offer similar savings with more flexibility. <strong>Why not C:</strong> A Savings Plan covering all 30 instances would result in ~67% average utilization for the 10 processing instances (8 hours/day), making those commitments inefficient — you'd be paying for commitment coverage during the 16 hours the instances are off. <strong>Why not D:</strong> Convertible RIs allow instance family changes but only through the exchange process and only for equal or greater value — less flexible than Savings Plans. Also, 10 Convertible RIs for a 33%-utilized workload is not cost-effective."},
{id:347,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Storage Classes",
