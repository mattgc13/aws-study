e:"<strong>Correct: Most-instances AZ first, then oldest configuration.</strong> Default Auto Scaling termination policy: (1) Select the AZ with the most instances (AZ-1 with 4). (2) If there are instances using an older launch configuration/template, terminate one of those first. (3) If all use the same config, terminate the instance closest to the next billing hour (minimizes wasted time). This policy achieves two goals: AZ rebalancing (even distribution) and phasing out old configurations during rolling updates. You can customize termination policies: OldestInstance, NewestInstance, OldestLaunchConfiguration, ClosestToNextInstanceHour, or custom Lambda-based policies via lifecycle hooks. Understanding the default policy helps predict which instance is removed during scale-in events."},

{id:162,domain:"Secure Architectures",topic:"Monitoring",sub:"CloudWatch Alarms",
q:"A company wants to receive an SNS notification whenever ANY EC2 instance in their account (current or future) has CPU utilization exceed 80% for 5 consecutive minutes. They don't want to manually create an alarm for each instance. What is the most scalable approach?",
o:["Create one CloudWatch alarm per EC2 instance — repeat for each new instance","Use CloudWatch Anomaly Detection on the CPUUtilization metric for each instance","Create a CloudWatch Composite Alarm combining all individual instance alarms","Create a CloudWatch alarm using a metric math expression on the EC2 CPUUtilization metric with a SEARCH function that dynamically finds all instances — or use EventBridge rules with an EC2 Auto Scaling event to auto-create alarms via Lambda when instances launch"],
c:3,
e:"<strong>Correct: Dynamic alarm creation via EventBridge + Lambda.</strong> CloudWatch alarms are per-metric (per-instance) — there's no single alarm that covers all current and future instances. The scalable pattern: EventBridge rule on EC2 instance state change (running) → triggers Lambda → Lambda creates a CloudWatch alarm for the new instance's CPUUtilization. On termination, the Lambda deletes the alarm. Alternatively, use CloudWatch metric math with SEARCH() to create a single alarm evaluating all instances, though SEARCH-based alarms have limitations with dynamic instances. AWS Systems Manager Explorer and Container Insights also provide fleet-level views. The core exam concept: CloudWatch alarms are not auto-created — automating alarm creation via EventBridge+Lambda is the scalable approach for fleets of EC2 instances."},

{id:163,domain:"High-Performing Architectures",topic:"Networking",sub:"ALB vs NLB vs GWLB",
q:"A company deploys a fleet of third-party network security appliances (firewalls, IDS/IPS) in AWS. All VPC traffic must be transparently inspected by these appliances before reaching the application. The appliances must receive packets with the original source IP preserved. Which load balancer type is purpose-built for this use case?",
o:["Application Load Balancer (ALB)","Network Load Balancer (NLB)","Classic Load Balancer (CLB)","Gateway Load Balancer (GWLB)"],
c:3,
e:"<strong>Correct: Gateway Load Balancer (GWLB).</strong> GWLB is specifically designed for deploying, scaling, and managing third-party network virtual appliances (firewalls, IDS/IPS, deep packet inspection). It operates at Layer 3 and uses the GENEVE protocol (port 6081) to encapsulate and forward traffic to appliances while preserving the original source/destination IPs. Traffic flow: VPC Route Table → GWLB endpoint → GWLB → security appliance → GWLB → destination. This 'bump in the wire' pattern lets appliances inspect all traffic transparently. ALB: HTTP/HTTPS only, Layer 7, not for raw packet inspection. NLB: Layer 4 TCP/UDP, preserves source IP, but not designed for transparent inspection workflows. GWLB is always the answer for 'third-party virtual appliance' + 'transparent traffic inspection.'"},

{id:164,domain:"Secure Architectures",topic:"Well-Architected",sub:"Security Pillar",
q:"According to the AWS Well-Architected Framework Security Pillar, what does 'applying security at all layers' mean in a multi-tier web application?",
o:["Install antivirus software on EC2 instances — that is the primary security layer","Rely on the VPC firewall (NACLs) as the single perimeter security control","Implement defense in depth: CloudFront + WAF (edge), ALB + Security Groups (load balancer), EC2 Security Groups (instance), NACLs (subnet), KMS encryption (data at rest), TLS (data in transit), IAM least-privilege (API) — multiple independent controls so bypassing one layer doesn't compromise the entire system","Use a single comprehensive security group that covers all traffic rules for the entire application"],
c:2,
e:"<strong>Correct: Defense in depth — security at every layer.</strong> The Security Pillar design principle 'apply security at all layers' means implementing independent security controls at every tier: Edge: CloudFront + WAF (block malicious requests before they reach your VPC). Network perimeter: Security Groups (stateful, instance-level), NACLs (stateless, subnet-level). Compute: hardened AMIs, Inspector scanning, no unnecessary software. Application: input validation, authentication/authorization. Data: KMS encryption at rest, TLS in transit, S3 bucket policies. Identity: IAM least privilege. If one layer is misconfigured, other layers still protect. Single security control = single point of failure. The pillar explicitly states: 'Apply security controls to all layers and assume that any individual control can fail.'"},

{id:165,domain:"Cost-Optimized Architectures",topic:"Well-Architected",sub:"Cost Optimization — Serverless",
q:"A company runs a batch processing job that executes for 2 hours every Sunday at 2 AM. It currently runs on a t3.large EC2 instance ($0.083/hour) that runs 24/7 (costs ~$60/month). They want to optimize cost. What is the best approach?",
o:["Purchase a 1-year Reserved Instance for the t3.large — saves ~40%, still runs 24/7","Use a Spot Instance for the t3.large — up to 90% savings but still runs 24/7","Migrate the job to AWS Lambda or run it on an EC2 instance that starts via EventBridge Scheduler at 1:55 AM and stops after the job completes — pay only for the 2 hours/week (~$0.17/week, ~$0.68/month) instead of 24/7 ($60/month)","Move the job to AWS Fargate — lower cost than EC2"],
c:2,
e:"<strong>Correct: Run only when needed — EventBridge Scheduler + EC2 start/stop or Lambda.</strong> The most powerful cost optimization is eliminating idle resource costs. This job runs 2 hours/week = 104 hours/year out of 8,760 total hours — only 1.2% utilization. Options: (A) EventBridge Scheduler triggers Lambda (if job fits in 15 min) or starts an EC2 instance at 1:55 AM, runs the job, then stops or terminates. (B) AWS Batch with Fargate: provision compute only during the job. Cost: 2h/week × $0.083 = ~$0.17/week = ~$0.68/month vs $60/month — a 99% reduction. Reserved Instances save 40% but still bill 24/7. Spot saves ~90% but still idle 24/7. The Well-Architected Cost Optimization Pillar principle: 'Stop spending money on undifferentiated heavy lifting' and 'match supply with demand' — the best optimization is not running infrastructure when it's not needed."},

{id:166,domain:"Resilient Architectures",topic:"S3",sub:"Cross-Region Replication",
q:"A company stores compliance documents in an S3 bucket in us-east-1. Regulations require a copy of every object to exist in a separate AWS region (eu-west-1) within 15 minutes of creation. New objects only — existing objects do not need replication. What is the correct configuration?",
o:["Enable S3 Cross-Region Replication (CRR) on the source bucket with eu-west-1 as the destination; enable Versioning on both buckets (required for replication); CRR replicates new objects asynchronously — use S3 Replication Time Control (RTC) to guarantee 99.99% of objects replicated within 15 minutes","Manually copy objects to eu-west-1 using a Lambda triggered by S3 event notifications","Enable S3 Same-Region Replication (SRR) to a second bucket in us-east-1 as a backup","Use CloudFront with an eu-west-1 origin to serve objects from Europe"],
c:0,
e:"<strong>Correct: S3 Cross-Region Replication (CRR) with Replication Time Control.</strong> CRR setup: (1) Enable Versioning on BOTH source and destination buckets (mandatory prerequisite). (2) Create a replication rule on the source bucket specifying the destination bucket in eu-west-1. (3) Enable S3 Replication Time Control (RTC) for the 15-minute SLA — RTC provides a guaranteed SLA that 99.99% of objects will be replicated within 15 minutes, with CloudWatch metrics for monitoring. Without RTC, replication is best-effort (usually fast but no SLA). CRR only replicates new objects after replication is enabled — existing objects require S3 Batch Replication. SRR replicates within the same region. Manual Lambda approaches are fragile and don't provide SLA guarantees."},

{id:167,domain:"Cost-Optimized Architectures",topic:"S3",sub:"Lifecycle Policies",
q:"A media company stores video files in S3 Standard. Access patterns: files are accessed frequently for 30 days, rarely accessed for days 31–90, then almost never after 90 days but must be retrievable within 12 hours. After 1 year, files can be permanently deleted. What lifecycle policy minimizes cost?",
o:["Keep everything in S3 Standard — simplest management","Transition to S3 Glacier Deep Archive at day 30 — cheapest storage","Transition to S3 Standard-IA at day 31, then to S3 Glacier Flexible Retrieval at day 91 (12-hour retrieval with free Standard retrieval option), then expire (delete) at day 365","Transition to S3 One Zone-IA at day 31 — cheaper than Standard-IA"],
c:2,
e:"<strong>Correct: Standard → Standard-IA → Glacier Flexible Retrieval → Expire.</strong> Optimal lifecycle: Days 0–30: S3 Standard (frequent access, no retrieval fee). Day 31: transition to S3 Standard-IA (~58% cheaper storage, $0.01/GB retrieval — acceptable for rare access). Day 91: transition to S3 Glacier Flexible Retrieval (~68% cheaper than Standard-IA storage; retrieval options: Expedited 1–5 min, Standard 3–5 hours, Bulk 5–12 hours — free Bulk retrieval meets the '12-hour' SLA cheaply). Day 365: expire (delete). Glacier Deep Archive: cheapest storage but 12-hour minimum retrieval time — only viable if 12 hours is the maximum, which it is here, but Flexible Retrieval offers cheaper retrieval when needed occasionally. One Zone-IA: data in one AZ only — not appropriate for compliance-sensitive media content."},

{id:168,domain:"Secure Architectures",topic:"Compute",sub:"EC2 Hibernate",
q:"A developer runs a memory-intensive application on EC2 that takes 20 minutes to warm up (load data into RAM) after each start. They frequently need to pause the instance overnight and resume in the morning with the in-memory state intact, without the 20-minute warm-up delay. What EC2 feature enables this?",
o:["Create an EBS snapshot before stopping — restore and reattach on next start","Use EC2 Stop — the instance stops and RAM is lost; next start requires full warm-up","Enable EC2 Hibernate — hibernation saves the contents of RAM to the EBS root volume, then stops the instance; on start, RAM is restored from EBS and the instance resumes from where it left off — no warm-up needed","Use a Dedicated Host so the instance keeps its physical hardware allocation overnight"],
c:2,
e:"<strong>Correct: EC2 Hibernate.</strong> Hibernate saves the in-memory (RAM) state to the encrypted EBS root volume, then powers off the instance. On restart, the RAM contents are restored and the OS resumes exactly where it stopped — running processes, open network connections (may need re-establishment), and in-memory data all intact. Requirements: instance must have an encrypted EBS root volume, instance RAM must be less than 150 GB, instance type must support hibernation (most modern types do), and the AMI must support it. Hibernated instances don't incur compute charges (only EBS storage). EBS snapshots capture disk state, not RAM. Normal Stop loses RAM. Dedicated Hosts don't preserve RAM across stops. Hibernate = suspend-to-disk for EC2."},

{id:169,domain:"High-Performing Architectures",topic:"Compute",sub:"EC2 Instance Store",
q:"A high-performance in-memory database requires the absolute lowest-latency, highest-IOPS local storage for temporary working data. The data is regenerated on each instance start, so durability is not required. What storage type should they use?",
o:["EBS io2 Block Express — highest-performance EBS, up to 256,000 IOPS","EBS gp3 with maximum provisioned IOPS","EC2 Instance Store (ephemeral storage) — NVMe SSD physically attached to the host server; provides the highest I/O performance of any EC2 storage option; data is lost when the instance stops or terminates — perfectly acceptable when data is regenerated on start","EFS with Max I/O performance mode — shared, low-latency NFS"],
c:2,
e:"<strong>Correct: EC2 Instance Store.</strong> Instance Store volumes are NVMe SSDs physically attached to the EC2 host server — no network hops. They deliver millions of IOPS and single-digit microsecond latency, far exceeding any EBS volume. Critical limitation: data is EPHEMERAL — lost on stop, terminate, or host failure. Data persists through reboots only. Perfect for: temporary data (scratch space, buffers, caches), data that is replicated elsewhere or regenerated on start (Hadoop HDFS temporary blocks, in-memory DB working sets). Not all instance types include Instance Store — i3, i3en, i4i, d3, h1 families are optimized for it. EBS io2 BE: up to 256K IOPS over network — excellent but can't match locally-attached NVMe. EFS: shared network filesystem, higher latency than EBS."},

{id:170,domain:"High-Performing Architectures",topic:"Monitoring",sub:"CloudWatch Logs Insights",
q:"A security team needs to query application logs stored in CloudWatch Logs to find all ERROR-level log events from the past 24 hours, count them by service name, and identify which service has the most errors. The logs are already streaming to CloudWatch. What is the fastest way to do this interactively?",
o:["Export logs to S3 and query with Athena — run SQL against the exported files","Write a Lambda function to filter CloudWatch Logs using FilterLogEvents API","Use CloudWatch Logs Insights — run an interactive query like: fields @timestamp, service, @message | filter @message like /ERROR/ | stats count(*) by service | sort count(*) desc — results in seconds","Set up an OpenSearch cluster and stream logs for full-text search"],
c:2,
e:"<strong>Correct: CloudWatch Logs Insights.</strong> Logs Insights is an interactive query engine built into CloudWatch. It uses its own query language to filter, aggregate, and visualize log data. Example query: `fields @timestamp, service | filter @message like /ERROR/ | stats count(*) as errors by service | sort errors desc`. Results return in seconds to minutes depending on data volume. No infrastructure to provision, no S3 export needed. Key functions: filter, stats (count, sum, avg, min, max), sort, limit, parse (extract fields from unstructured logs). Athena on exported S3 logs: works but adds export delay and requires S3/Glue setup. Lambda FilterLogEvents: real-time streaming filter, not ad-hoc query. OpenSearch: powerful but significant setup overhead. Logs Insights = fast interactive log analysis already in CloudWatch."},

{id:171,domain:"Secure Architectures",topic:"Systems Manager",sub:"Parameter Store vs Secrets Manager",
q:"A team stores database connection strings, feature flags, and API keys in AWS. The database password must auto-rotate every 30 days. The feature flags and connection strings are static and change rarely. What is the most cost-effective combination?",
o:["Store everything in Secrets Manager — unified secrets management","Store everything in SSM Parameter Store SecureString — no auto-rotation but cheaper","Store the database password in Secrets Manager (supports auto-rotation); store feature flags and connection strings in SSM Parameter Store Standard (free tier, no rotation needed) — right tool for each use case","Store passwords in environment variables; feature flags in DynamoDB"],
c:2,
e:"<strong>Correct: Secrets Manager for rotating credentials, SSM Parameter Store for static config.</strong> SSM Parameter Store: free tier for Standard parameters (up to 10,000 parameters, 4 KB each), supports SecureString (KMS-encrypted), hierarchical naming (/app/prod/db-host). No automatic rotation. Ideal for: config values, connection strings, feature flags, non-rotating credentials. Secrets Manager: ~$0.40/secret/month + $0.05 per 10K API calls. Built-in automatic rotation via Lambda for RDS, Redshift, DocumentDB, and custom sources. Supports cross-account access. For the database password that requires rotation → Secrets Manager is required. For static config → Parameter Store Standard is free and sufficient. Avoid paying Secrets Manager pricing for things that don't need rotation."},

{id:172,domain:"Secure Architectures",topic:"Systems Manager",sub:"Patch Manager",
q:"A company has 500 EC2 instances across 3 environments (dev, test, prod). They need to automatically apply OS security patches on a schedule: dev patches every Monday at 2 AM, prod patches on the first Sunday of the month at 3 AM. Patching must be logged and reported. What is the correct approach?",
o:["SSH into each instance and run yum update manually on a cron schedule","Use EC2 User Data scripts that run yum update on boot","Use AWS Systems Manager Patch Manager with maintenance windows — create patch baselines (defines which patches to apply), assign instances to patch groups via tags (dev/prod), create maintenance windows with the appropriate schedules, and Run Command applies patches; results logged to Systems Manager and S3","Use AWS Config rules to detect unpatched instances and trigger Lambda to patch them"],
c:2,
e:"<strong>Correct: Systems Manager Patch Manager with Maintenance Windows.</strong> Patch Manager automates OS patching. Components: (1) Patch Baseline: rules for which patches to approve/reject (severity, classification, auto-approval delay). (2) Patch Groups: tag instances (Key: Patch Group, Value: prod) to associate them with a baseline. (3) Maintenance Windows: define when patching runs — schedule (cron/rate), duration, targets (Patch Group), tasks (Run Patch Baseline). Results stored in Systems Manager Compliance and optionally S3. Works on EC2 and on-premises instances with SSM Agent. SSM is the canonical answer for fleet-wide patching with scheduling, logging, and compliance reporting. Manual SSH/cron: doesn't scale and isn't centrally logged. AWS Config: detects compliance but doesn't remediate."},

{id:173,domain:"High-Performing Architectures",topic:"CloudFront",sub:"Cache Behaviors",
q:"A website serves both static assets (/static/*) and dynamic API responses (/api/*). Static assets should be cached at CloudFront edge for 1 year. API responses must never be cached (always forwarded to the origin). How do you configure this in a single CloudFront distribution?",
o:["Create two separate CloudFront distributions — one for static, one for API","Use Lambda@Edge to inspect the URL path and decide whether to cache","Configure multiple cache behaviors in one CloudFront distribution: a path pattern /static/* with a cache policy setting TTL to 1 year; a path pattern /api/* with a cache policy disabling caching (TTL=0) and forwarding all headers/query strings to origin; the default (*) behavior serves remaining paths","Set the CloudFront TTL to 0 globally and use Cache-Control headers per object"],
c:2,
e:"<strong>Correct: Multiple cache behaviors with path patterns.</strong> CloudFront distributions support multiple cache behaviors ordered by path pattern specificity. Each behavior can have different: cache policies (TTL, what to cache), origin request policies (what to forward to origin), allowed HTTP methods, viewer protocol policies, and origins. Setup: (1) /static/*: cache policy with default/max TTL = 31,536,000s (1 year), compress objects. (2) /api/*: cache policy with TTL = 0 (no caching), forward all query strings and relevant headers. (3) Default (*): remaining traffic. Two distributions: works but harder to manage, different domain names. Lambda@Edge for routing logic: overkill for a static path-based split. Single global TTL=0: wastes the CDN for static assets."},

{id:174,domain:"Secure Architectures",topic:"Identity",sub:"Cognito User Pools",
q:"A SaaS company wants to add user sign-up, sign-in, MFA, and social login (Google, Facebook) to their web app. After login, users receive a JWT token to call their backend API Gateway. They want a fully managed service with no custom authentication code. What should they use?",
o:["IAM users and access keys — users log in with their AWS credentials","Build a custom authentication system with Lambda, DynamoDB for user storage, and JWT signing","Amazon Cognito User Pool — managed user directory with sign-up/sign-in UI, MFA, password policies, social identity federation (Google, Facebook, Apple via OIDC/SAML), and JWT token issuance (ID token, Access token, Refresh token); API Gateway can validate Cognito JWTs natively","Amazon Cognito Identity Pool — provides temporary AWS credentials for accessing AWS services directly"],
c:2,
e:"<strong>Correct: Amazon Cognito User Pool.</strong> User Pools are managed user directories for web/mobile apps. They provide: customizable hosted UI for sign-up/sign-in, MFA (SMS, TOTP), password policies, account verification (email/phone), social IdP federation (Google, Facebook, Apple, Amazon), enterprise federation (SAML, OIDC), and JWT token issuance. After authentication, User Pool issues ID token (user identity claims) and Access token (scopes). API Gateway supports Cognito User Pool Authorizers — it validates the JWT automatically. Cognito Identity Pool: takes tokens from User Pools (or other IdPs) and exchanges them for temporary AWS credentials (STS) for direct AWS service access (S3, DynamoDB). User Pool = authentication and user management. Identity Pool = AWS resource authorization."},

{id:175,domain:"Secure Architectures",topic:"WAF",sub:"Managed Rule Groups",
q:"A company deploys a public web application on ALB. They want protection against the OWASP Top 10 vulnerabilities (SQL injection, XSS, etc.) and AWS-managed threat intelligence (known malicious IPs, botnets) without writing custom WAF rules. What is the quickest path to baseline protection?",
o:["Configure Security Groups to block malicious IP ranges — maintain a block list manually","Deploy a third-party WAF appliance on EC2 in front of the ALB","Attach an AWS WAF WebACL to the ALB using AWS Managed Rule Groups: add the Core Rule Set (CRS) for OWASP Top 10 protection and the Amazon IP Reputation List for known malicious IPs — managed rules are maintained and updated by AWS automatically","Write custom WAF rules using regex patterns to block SQL injection strings"],
c:2,
e:"<strong>Correct: AWS WAF with Managed Rule Groups.</strong> AWS WAF WebACLs can be attached to CloudFront, ALB, API Gateway, AppSync, and Cognito. AWS Managed Rule Groups are pre-built, maintained by AWS (or Marketplace vendors) and include: AWS Core Rule Set (CRS): protects against OWASP Top 10 — SQLi, XSS, path traversal, HTTP protocol violations. Amazon IP Reputation List: blocks known malicious IPs, bots, scanners. AWS Bot Control: identifies and manages bot traffic. AWS Fraud Control: account takeover and fraud detection. Managed rules update automatically as new threats emerge — no maintenance burden. Custom rules are more flexible but require security expertise and ongoing maintenance. Security Groups: Layer 4 IP/port filtering only, no Layer 7 inspection."},

{id:176,domain:"Resilient Architectures",topic:"Route 53",sub:"Geolocation Routing",
q:"A company operates a streaming service with content licensing restrictions: users in Europe must be served from eu-west-1 (licensed European content), users in the US must be served from us-east-1 (licensed US content), and all other users should get a default response explaining the service is unavailable in their region. Which Route 53 routing policy achieves this?",
o:["Latency-based routing","Geoproximity routing","Geolocation routing","Weighted routing"],
c:2,
e:"<strong>Correct: Geolocation routing.</strong> Geolocation routing matches the DNS query to the geographic location of the source IP (continent, country, or US state). Configure: record for 'Europe' continent → eu-west-1 endpoint, record for 'United States' → us-east-1 endpoint, default record → error/unavailable page. Without a default record, Route 53 returns NODATA for unmatched locations. Geolocation is based on WHERE the user is (for licensing, language, legal compliance). Latency routing: based on measured network latency (for performance). Geoproximity: based on physical distance to the resource, with optional bias to shift boundaries — no content licensing semantics. Weighted: traffic splitting by percentage — both regions serve all users."},

{id:177,domain:"High-Performing Architectures",topic:"Containers",sub:"ECR",
q:"A development team builds Docker images in a CI/CD pipeline and needs to store them privately in AWS for use by ECS and EKS. Images should be automatically scanned for known OS vulnerabilities on push, and old images should be cleaned up automatically. What service and features should they use?",
o:["Docker Hub private repositories","Self-hosted Docker registry on EC2","Amazon ECR (Elastic Container Registry)","Store image tar files in Amazon S3"],
c:2,
e:"<strong>Correct: Amazon ECR with Enhanced Scanning and Lifecycle Policies.</strong> ECR is AWS's managed container image registry. Key features: private repositories with IAM-based access control, integration with ECS/EKS/Lambda (no credentials needed within AWS), image tag immutability option. Enhanced Scanning (Amazon Inspector): scans images on push AND continuously for new CVEs — provides findings with severity and remediation. Basic scanning (deprecated default): on-push only, less comprehensive. Lifecycle policies: rules to automatically delete images (e.g., keep only the last 10 tagged images, delete untagged images after 1 day) — reduces storage costs. Docker Hub: requires managing credentials in ECS/EKS, no AWS-native IAM, egress costs. S3 tar files: not a registry — can't push/pull with Docker CLI."},

{id:178,domain:"High-Performing Architectures",topic:"CI/CD",sub:"CodeDeploy",
q:"A company uses EC2 Auto Scaling for their web application. They need to deploy new application versions across all instances automatically, with the ability to deploy to a small percentage of instances first, monitor for errors, and stop the deployment if error rates spike. What AWS service and strategy handles this?",
o:["Manually SSH into each instance to deploy","AWS CodeDeploy with a canary or linear deployment configuration","Host the application package on Amazon S3 and pull via cron","AWS Elastic Beanstalk blue/green deployment"],
c:1,
e:"<strong>Correct: AWS CodeDeploy with canary/linear deployment configuration.</strong> CodeDeploy automates application deployments to EC2, on-premises servers, Lambda, and ECS. For EC2 In-Place: CodeDeploy agent on instances downloads and installs the new version from S3/GitHub. Deployment configurations: AllAtOnce (fast but risky), HalfAtATime, OneAtATime, or custom canary/linear. Canary: deploy to X% first, wait, then deploy to rest. Linear: deploy in increments over time. Rollback: configure CloudWatch alarms — if error rate or latency spikes, CodeDeploy automatically rolls back all instances. AppSpec.yml: defines lifecycle hooks (BeforeInstall, AfterInstall, ApplicationStart, ValidateService). CodeDeploy integrates with CodePipeline for full CI/CD. EC2 Auto Scaling + CodeDeploy: new instances in the ASG automatically get the current deployment revision."},

{id:179,domain:"Secure Architectures",topic:"Security Services",sub:"Amazon Inspector",
q:"A company runs hundreds of EC2 instances and Lambda functions. They want continuous automated scanning for software vulnerabilities (CVEs in OS packages and application libraries) and unintended network exposure (e.g., instances with port 22 open to 0.0.0.0/0). What service provides this?",
o:["Amazon GuardDuty","AWS Trusted Advisor","Amazon Inspector v2","AWS Config"],
c:2,
e:"<strong>Correct: Amazon Inspector v2.</strong> Inspector v2 is a vulnerability management service that continuously scans: EC2 instances (using SSM Agent — no separate Inspector agent), ECR container images (on push and when new CVEs are published), Lambda functions (code and dependencies). Finding types: (1) Software vulnerabilities (CVEs): identifies vulnerable packages with severity, CVSS score, and remediation. (2) Network reachability: identifies EC2 instances with ports open to internet (0.0.0.0/0) via security group and route analysis. Inspector integrates with Security Hub for centralized findings. GuardDuty: threat detection from logs and behavior — finds active threats like crypto mining or unauthorized access attempts, not software vulnerabilities. Config: configuration compliance, not CVE scanning."},

{id:180,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Cost Anomaly Detection",
q:"A company's AWS bill unexpectedly spiked by $50,000 in one week. The finance team only discovered it when the monthly bill arrived. They want to be automatically alerted within 24 hours when AWS spend deviates significantly from expected patterns, without manually setting fixed budget thresholds. What should they set up?",
o:["AWS Budgets with a fixed monthly budget alert","Amazon CloudWatch billing alarm with a static threshold","AWS Cost Anomaly Detection","Daily cost reports exported to Amazon S3 and analyzed with Athena"],
c:2,
e:"<strong>Correct: AWS Cost Anomaly Detection.</strong> Cost Anomaly Detection uses ML to model your normal spending patterns (by service, linked account, etc.) and automatically detects when actual spend deviates significantly. Unlike Budgets (which require you to set a fixed threshold), Anomaly Detection learns your baseline — if you normally spend $1K/day on EC2 and suddenly it's $10K/day, you get an alert even if your budget threshold isn't hit yet. Configuration: create a monitor (by service, linked account, or cost category), set an alert subscription with an SNS topic and minimum anomaly threshold (e.g., alert if anomaly > $100). Alerts typically arrive within 24 hours of the anomaly starting. AWS Budgets: excellent for 'don't exceed $X' but require manual threshold setting and miss unexpected pattern deviations."},

{id:181,domain:"Resilient Architectures",topic:"Networking",sub:"PrivateLink",
q:"A SaaS provider offers an API service running behind an NLB in their VPC. A customer company wants to consume this API from their own VPC without the traffic traversing the public internet, without requiring VPC peering (which would expose the entire VPCs to each other). What AWS networking feature enables this?",
o:["VPC Peering between Company A and Company B VPCs — traffic stays on AWS network","Create a Site-to-Site VPN between the two companies' VPCs","Company A creates a VPC Endpoint Service (PrivateLink) backed by their NLB; Company B creates a VPC Interface Endpoint to connect to that service — traffic flows privately within AWS, B only has access to the specific service (not the entire VPC), works even with overlapping CIDR ranges","Company B whitelists Company A's NLB public IP in their security groups"],
c:2,
e:"<strong>Correct: AWS PrivateLink (VPC Endpoint Service).</strong> PrivateLink enables private service consumption without VPC peering. Company A: creates a VPC Endpoint Service backed by an NLB — they control who can access it (whitelist B's AWS account). Company B: creates a VPC Interface Endpoint pointing to A's service — this creates an ENI in B's subnet with a private IP. Traffic: B's applications call the endpoint's DNS name → routed to A's NLB privately over AWS backbone — never touches internet. Key advantages over VPC peering: (1) Least privilege — B only accesses the specific service, not A's entire VPC. (2) Works with overlapping CIDR blocks (peering doesn't). (3) Scales to thousands of consumers without complex route tables. Used by AWS itself — all VPC interface endpoints for AWS services use PrivateLink."},

{id:182,domain:"Secure Architectures",topic:"S3 Security",sub:"Bucket Policies vs ACLs",
q:"A company wants to grant a partner company's AWS account (account ID: 222222222222) read access to specific objects in their S3 bucket, without making the objects public. The simplest approach that doesn't require the partner to assume a role in the bucket owner's account is:",
o:["Enable public access on the objects — the partner can download without credentials","Create an IAM user in the bucket owner's account and share the access keys with the partner","Attach an S3 bucket policy with a Principal of arn:aws:iam::222222222222:root (or specific role/user ARN), granting s3:GetObject — the partner accesses the bucket using their own IAM credentials from account 222222222222","Use S3 ACLs to grant READ permission to the partner account's canonical ID — ACLs are the modern recommended approach"],
c:2,
e:"<strong>Correct: S3 Bucket Policy with cross-account principal.</strong> S3 bucket policies are resource-based policies that can specify principals from other AWS accounts. Syntax: Principal: {AWS: 'arn:aws:iam::222222222222:root'} grants the entire partner account access (any principal in that account with s3:GetObject IAM permission can access). Or specify a specific role: 'arn:aws:iam::222222222222:role/PartnerReadRole'. The partner uses their own credentials — no need to create IAM users in your account or share keys. Note: cross-account access requires BOTH the bucket policy to allow AND the partner's IAM policy to allow. AWS now recommends disabling S3 ACLs (via Bucket Owner Enforced mode) — bucket policies are the modern, more flexible approach. ACLs: legacy feature, limited to predefined permissions, harder to audit."},

{id:183,domain:"High-Performing Architectures",topic:"Databases",sub:"Aurora Serverless v2",
q:"A SaaS company runs a multi-tenant application with highly variable database load — some tenants are very active, others are idle for hours. They want Aurora MySQL that automatically scales capacity instantly with load (within seconds), scales to zero when idle to minimize cost, and doesn't require any capacity planning. What should they use?",
o:["Amazon Aurora Provisioned with Auto Scaling read replicas","Amazon RDS MySQL Multi-AZ","Amazon Aurora Serverless v2","Amazon Aurora Serverless v1"],
c:2,
e:"<strong>Correct: Aurora Serverless v2.</strong> Aurora Serverless v2 scales in fine-grained increments (0.5 ACU steps) from 0.5 to 128 ACUs within seconds — genuinely instant scaling, unlike v1 which scales in larger steps with more latency. Supports all Aurora features: Multi-AZ, read replicas, Global Database, Backtrack. Billed per ACU-second. Aurora Serverless v1: scales to 0 (true zero cost when idle) but has a cold start (~25 seconds) when resuming — not suitable for production applications that need instant response. v2 doesn't scale to true 0 (minimum 0.5 ACU), but the scaling speed and feature support make it the recommended choice. Provisioned Aurora: fixed capacity, use when load is predictable. Serverless v2: variable, unpredictable, or spiky workloads."},

{id:184,domain:"Resilient Architectures",topic:"High Availability",sub:"Multi-AZ Patterns",
q:"A company deploys a web application with an ALB, 4 EC2 instances, and an RDS Multi-AZ database. AZ-1 has the primary RDS instance, 2 EC2s, and the ALB. AZ-2 has the standby RDS instance and 2 EC2s. If AZ-1 completely fails, what happens?",
o:["The application is completely down — AZ-1 has the ALB and primary RDS","The ALB fails over automatically to AZ-2; RDS fails over to the standby in AZ-2; EC2 Auto Scaling can replace AZ-1 instances in AZ-2; application continues serving traffic from AZ-2 with possible brief interruption during RDS failover (~30–60 seconds)","RDS Multi-AZ does not survive AZ failures — only protects against instance failures","The application serves traffic but with 75% capacity loss since half the EC2s are gone"],
c:1,
e:"<strong>Correct: Application recovers with brief RDS failover interruption.</strong> When AZ-1 fails: ALB: automatically stops sending to AZ-1 targets (health checks fail), routes all traffic to the 2 healthy EC2s in AZ-2 — this is immediate. RDS Multi-AZ: detects primary failure, promotes standby in AZ-2 to primary (~30–60 seconds for DNS failover); applications reconnect after the CNAME flips. EC2 in AZ-1: Auto Scaling will launch replacement instances in AZ-2 (if configured). Result: brief degradation during RDS failover, then full operation from AZ-2 with possibly more EC2 instances than before. The application is NOT completely down — this is exactly what Multi-AZ is designed for. Capacity: 2 EC2s (50% of original) serve traffic until replacements launch, but application is functional."},

{id:185,domain:"Secure Architectures",topic:"Networking",sub:"Security Groups — Stateful",
q:"A solutions architect reviews a security group configuration that allows inbound HTTP (port 80) from 0.0.0.0/0 on an EC2 instance. There is NO outbound rule explicitly allowing return traffic. Will the HTTP response traffic from the EC2 instance reach the clients?",
o:["No — outbound port 80 must also be explicitly allowed in the security group","No — the NACL will block the outbound response since NACLs are stateless","Yes — security groups are stateful; if inbound traffic is allowed, the return (outbound) traffic for that connection is automatically allowed regardless of outbound rules","No — only NACLs allow stateful connections, security groups are stateless"],
c:2,
e:"<strong>Correct: Yes — security groups are stateful.</strong> Security Groups track connection state. When an inbound rule allows traffic (e.g., HTTP request from client on port 80), the return traffic (response from EC2 to client's ephemeral port) is AUTOMATICALLY allowed — no outbound rule needed. This is stateful packet inspection. Contrast with NACLs: NACLs are STATELESS — they evaluate each packet independently. For NACLs, you MUST explicitly allow both the inbound request AND the outbound response (on ephemeral ports 1024–65535). Security group default: no inbound allowed, all outbound allowed. Common exam trap: students add outbound rules thinking they need them for responses — they don't. The only time outbound SG rules matter is when the EC2 initiates connections outbound (e.g., calling an external API)."},

{id:186,domain:"High-Performing Architectures",topic:"Compute",sub:"Lambda — Container Images",
q:"A data science team has a machine learning inference function with complex Python dependencies (numpy, pandas, scikit-learn, custom models) totaling 3 GB. Lambda deployment packages have a 250 MB limit (unzipped). How can they run this as a Lambda function?",
o:["Compress the dependencies to fit under the 250 MB limit","Split the function into multiple smaller Lambda functions","Package the function as a container image (up to 10 GB) and deploy to Lambda","Migrate the workload to an EC2 instance"],
c:2,
e:"<strong>Correct: Lambda Container Images.</strong> Lambda supports container images up to 10 GB (stored in ECR). You define a Dockerfile FROM a Lambda base image (or any compatible image with the Lambda Runtime Interface Client), package all dependencies including large ML models, and deploy the image. Lambda runs it with the same execution model (event-driven, auto-scaling, pay-per-invocation) — just with a much larger package size allowance. Deployment package limits: ZIP = 50 MB compressed / 250 MB unzipped. Container image = 10 GB. The function still runs with Lambda's full feature set: VPC, layers (for container images you'd include everything in the image), environment variables, concurrency controls. This is the standard answer for Lambda functions with large dependencies (ML models, complex binaries, legacy runtimes)."},

{id:187,domain:"Resilient Architectures",topic:"Compute",sub:"AWS Batch",
q:"A pharmaceutical company runs thousands of drug simulation jobs. Each job is independent, takes 1–12 hours, requires GPU compute, and the number of jobs varies dramatically (0 to 10,000 per day). They want AWS to automatically manage the compute fleet (provision, run jobs, scale to zero) without managing EC2 or containers manually. What service is designed for this?",
o:["EC2 Auto Scaling with Spot Instances and SQS","AWS Lambda","AWS Batch","Elastic Beanstalk Worker tier"],
c:2,
e:"<strong>Correct: AWS Batch.</strong> AWS Batch is purpose-built for batch computing workloads. Key concepts: Job Definition (Docker image, resource requirements: vCPUs, memory, GPU, retry strategy), Job Queue (priority, linked compute environment), Compute Environment (managed EC2/Fargate: Spot or On-Demand, instance types, vCPU limits). AWS Batch handles: EC2 provisioning/termination, job scheduling (priority, dependencies), retry on failure, spot interruption handling. Scales to zero when queue is empty — no idle cost. GPU instances: specify gpu: 1 in job definition. Lambda: 15-minute timeout and 10 GB memory limit — insufficient for 1–12 hour GPU jobs. Beanstalk Worker tier: simpler SQS-based processing, not designed for GPU or large-scale job scheduling. AWS Batch = managed HPC/ML/genomics batch workloads."},

{id:188,domain:"Secure Architectures",topic:"Encryption",sub:"S3 Encryption Options",
q:"A company requires that all S3 objects be encrypted at rest. Different teams have different requirements: Team A wants AWS to manage all encryption keys (simplest). Team B wants to use their own keys stored in KMS (for audit trail of key usage). Team C wants to use keys they generate and manage entirely outside AWS (provide the key with each request). Which S3 encryption options map to these requirements?",
o:["All three teams should use SSE-S3 — it's the AWS default and covers all use cases","Team A: SSE-S3, Team B: SSE-KMS, Team C: SSE-KMS with customer managed keys","Team A: SSE-S3 (AWS manages keys entirely, AES-256), Team B: SSE-KMS (keys stored in KMS, CloudTrail logs every key usage, key policies control access), Team C: SSE-C (customer-provided keys — client sends the key with each PUT/GET request; AWS encrypts/decrypts but never stores the key)","Team A and B: SSE-S3; Team C: client-side encryption"],
c:2,
e:"<strong>Correct: SSE-S3 / SSE-KMS / SSE-C mapping.</strong> S3 server-side encryption options: SSE-S3 (Team A): AWS generates, manages, and rotates keys entirely. AES-256. Simplest — enable with one click, no additional cost. SSE-KMS (Team B): encryption keys stored in AWS KMS. Benefits: CloudTrail logs every Decrypt/GenerateDataKey call (full audit trail), key policies enable fine-grained access control, supports automatic key rotation, cross-account access possible. Additional KMS API cost. SSE-C (Team C): you provide the encryption key with every PUT and GET request (HTTPS required). AWS uses it to encrypt/decrypt but NEVER stores the key. If you lose the key, data is unrecoverable. AWS has no key management responsibility. Client-side encryption: you encrypt before sending to S3 — AWS never sees plaintext or the key. Not what Team C described (they want AWS to encrypt, just with their key)."},

{id:189,domain:"Resilient Architectures",topic:"Messaging",sub:"SQS Visibility Timeout",
q:"A company has an SQS consumer Lambda function that receives a message and begins processing. Processing typically takes 30 seconds but occasionally takes up to 90 seconds. The visibility timeout is set to 45 seconds. What happens when processing takes 85 seconds?",
o:["SQS sends a duplicate copy of the message to a different consumer after 45 seconds, while the original Lambda continues processing — the message is processed twice","Lambda automatically extends the visibility timeout when it needs more time","After 45 seconds, the message becomes visible again in the queue and another consumer picks it up — the message is processed twice unless the original processor has finished and deleted it","SQS moves the message to the DLQ after 45 seconds"],
c:2,
e:"<strong>Correct: Double processing — message becomes visible again at 45 seconds.</strong> SQS visibility timeout hides a message from other consumers while one consumer is processing it. If the consumer doesn't delete the message before the timeout expires, SQS makes the message visible again — another consumer can pick it up. In this scenario: Lambda picks up the message, visibility timeout = 45 seconds. At 45 seconds, Lambda is still processing (at 85 total). SQS makes the message visible → another Lambda picks it up and starts over. Both Lambdas may complete and try to delete the same message. Solution: set visibility timeout = max expected processing time + buffer (e.g., 120 seconds). Or: Lambda calls ChangeMessageVisibility to extend the timeout programmatically during long processing. DLQ: only triggered after the message exceeds the maxReceiveCount (not a timeout issue)."},

{id:190,domain:"High-Performing Architectures",topic:"Networking",sub:"Enhanced Networking",
q:"A company runs a big data cluster on EC2 that requires extremely high network throughput (100 Gbps) between instances for shuffle operations, with the lowest possible latency and CPU overhead for network processing. The instances are in a cluster placement group. What networking feature must be enabled?",
o:["ENA (Elastic Network Adapter)","Network Load Balancer for inter-instance traffic","EFA (Elastic Fabric Adapter)","Multiple ENIs per instance to aggregate bandwidth"],
c:2,
e:"<strong>Correct: Elastic Fabric Adapter (EFA).</strong> EFA is a specialized network interface for HPC and ML workloads. The key differentiator: OS-bypass — applications use the libfabric API to send messages directly to the EFA hardware, bypassing the OS kernel network stack. This eliminates context switches and kernel overhead, enabling microsecond latency and lower CPU utilization. Used by MPI (Message Passing Interface) for HPC, and NCCL (NVIDIA Collective Communications Library) for distributed ML training. EFA supports 100 Gbps in supported instance types. ENA: standard high-performance NIC, 100 Gbps capable, but goes through the OS kernel — higher latency than EFA. EFA is backwards compatible: if libfabric is not used, it falls back to ENA behavior. Multiple ENIs: can aggregate bandwidth but doesn't provide OS-bypass or reduce latency. EFA = HPC/ML distributed computing networking."},

{id:191,domain:"Secure Architectures",topic:"DDoS Protection",sub:"AWS Shield",
q:"A company hosts a critical public web application on CloudFront and ALB. They have experienced volumetric DDoS attacks in the past and need 24/7 access to the AWS DDoS Response Team (DRT), financial protections against scaling costs during attacks, and advanced attack diagnostics. What should they enable?",
o:["AWS Shield Standard","AWS WAF rate-based rules","AWS Shield Advanced","AWS Firewall Manager"],
c:2,
e:"<strong>Correct: AWS Shield Advanced.</strong> Shield Standard: free, automatic, protects all AWS customers against common infrastructure-level attacks (SYN floods, UDP reflection). Shield Advanced: paid, ~$3,000/month flat fee per organization (covers unlimited resources). Adds: real-time attack visibility and notifications, access to AWS DRT (they help write WAF rules during attacks), cost protection (AWS credits for EC2, CloudFront, ELB charges caused by attack traffic), advanced detection for application-layer attacks, and integration with AWS WAF at no extra cost. Firewall Manager: helps deploy Shield Advanced and WAF rules centrally across many accounts — you still need Shield Advanced for DRT access and cost protection. For 'DRT access' + 'cost protection' → Shield Advanced is the answer."},

{id:192,domain:"Secure Architectures",topic:"Certificates",sub:"ACM",
q:"A company wants to provision and deploy SSL/TLS certificates for their CloudFront distribution and ALB. They need automatic renewal so certificates never expire. They do NOT want to manage certificate private keys. What is the correct AWS service?",
o:["Purchase an SSL certificate from a third-party CA and manually import it to IAM","Use self-signed certificates on EC2 instances behind the ALB","AWS Certificate Manager (ACM) — provisions, manages, and automatically renews public SSL/TLS certificates for use with CloudFront, ALB, API Gateway, and other integrated services; private key never leaves AWS; completely free for public certificates","Generate certificates with Let's Encrypt and upload to S3"],
c:2,
e:"<strong>Correct: AWS Certificate Manager (ACM).</strong> ACM provides free public SSL/TLS certificates for AWS services. Key properties: automatic renewal (ACM renews before expiry — no manual intervention), private key never accessible (stored securely in AWS, never exported), one-click deployment to CloudFront, ALB, API Gateway, AppSync, Cognito. Two types: ACM Public Certificates (free, trusted by browsers, validated via DNS or email, only usable with AWS services) and ACM Private CA (for internal certificates — paid). Limitation: ACM public certificates cannot be downloaded or used outside AWS services. For CloudFront specifically, the certificate MUST be in us-east-1 (N. Virginia) regardless of where your CloudFront distribution serves content. Third-party certs can be imported but require manual renewal. ACM = zero-cost, auto-renewing, managed TLS for AWS services."},

{id:193,domain:"High-Performing Architectures",topic:"Developer Tools",sub:"AWS X-Ray",
q:"A company has a microservices application experiencing intermittent latency spikes affecting end-users. The application spans API Gateway, Lambda, DynamoDB, and SQS across multiple services. The team needs to trace individual requests end-to-end across all services to pinpoint which component introduces latency. What should they use?",
o:["Amazon CloudWatch Logs","AWS CloudTrail","AWS X-Ray","VPC Flow Logs"],
c:2,
e:"<strong>Correct: AWS X-Ray.</strong> X-Ray provides end-to-end distributed tracing for applications. Components: Trace — one complete request journey through all services. Segment — one service's contribution to a trace. Subsegment — granular details within a segment (DynamoDB GetItem call, HTTP call to downstream service). Service Map — visual graph of all services, showing latency percentiles, error rates, and request throughput for each node and edge. Setup: add X-Ray SDK to your code (auto-instrumented for Lambda if active tracing enabled, for other services add X-Ray daemon or AWS Distro for OpenTelemetry). API Gateway and Lambda support X-Ray natively via configuration — no code changes needed. CloudWatch gives metrics and logs but not request-level traces across services. CloudTrail captures API calls but not application-level latency breakdowns. X-Ray = 'find the slow service in my distributed application.'"},

{id:194,domain:"High-Performing Architectures",topic:"Analytics",sub:"AWS Glue",
q:"A company needs to run ETL (extract, transform, load) jobs to move data from RDS MySQL and S3 CSV files into Amazon Redshift for analytics. They want a serverless, managed service with an automatic schema discovery crawler and a central metadata catalog. What should they use?",
o:["Custom Python scripts on EC2","Amazon EMR","AWS Glue","AWS Data Pipeline"],
c:2,
e:"<strong>Correct: AWS Glue.</strong> Glue is serverless ETL. Key components: Glue Crawlers: connect to data sources (S3, RDS, DynamoDB, JDBC), infer schema, and populate the Glue Data Catalog automatically. Glue Data Catalog: centralized Hive-compatible metadata repository — tables, schemas, partitions. Used by Athena (queries S3 via Catalog), Redshift Spectrum (queries S3 from Redshift), EMR, and Lake Formation. Glue Jobs: serverless Spark (Python/Scala) or Python Shell scripts that transform data. Glue Studio: visual ETL builder. Glue DataBrew: visual data preparation without code. EMR: managed Hadoop/Spark clusters — you manage nodes; more control but more ops overhead than Glue. Data Pipeline: older orchestration service (largely superseded by Glue + Step Functions). For 'serverless ETL' + 'schema crawler' + 'central catalog' → Glue is the standard answer."},

{id:195,domain:"Resilient Architectures",topic:"Infrastructure as Code",sub:"CloudFormation Custom Resources",
q:"A company needs a CloudFormation stack to perform an action that CloudFormation does not natively support — specifically, it needs to look up the latest AMI ID for Amazon Linux 2 in the current region at deploy time. How can this be accomplished within CloudFormation?",
o:["Hardcode the AMI ID in the template — update manually when AMIs change","Use a CloudFormation Parameter with the latest AMI ID passed at deploy time","Use a CloudFormation Custom Resource backed by a Lambda function — the Lambda is invoked during stack create/update/delete with the resource properties; it queries the SSM Parameter Store public parameter /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2 and returns the AMI ID to CloudFormation as a response value","Use AWS Config to look up the AMI ID and pass it to CloudFormation"],
c:2,
e:"<strong>Correct: CloudFormation Custom Resource backed by Lambda.</strong> Custom Resources extend CloudFormation with arbitrary logic via Lambda (or SNS). When CloudFormation creates/updates/deletes the Custom Resource, it sends an event to the Lambda function with the resource properties and a pre-signed S3 URL. The Lambda performs any action (API calls, lookups, external service calls) and responds to the pre-signed URL with SUCCESS/FAILED and optional output attributes. CloudFormation then makes those outputs available via !GetAtt. For AMI lookup: Lambda calls SSM GetParameter for the public AMI parameter and returns the AMI ID. This pattern is used for: looking up values not available in CloudFormation (AMIs, account IDs from other accounts), provisioning resources not yet supported by CloudFormation, running custom validation, or triggering external systems. !Ref of a Custom Resource returns the PhysicalResourceId; !GetAtt returns custom output attributes."},

{id:196,domain:"Resilient Architectures",topic:"ELB",sub:"ALB Rules",
q:"A company has an ALB that serves multiple applications on the same domain. Requests to /api/* should go to the API target group, requests to /images/* should go to an image service target group, requests with the header X-Version: v2 should go to a new version target group, and all other requests should go to the default application target group. How should the ALB listener rules be configured?",
o:["Deploy separate ALBs for each service and use Route 53 to route based on path","Use NLB instead — it supports content-based routing","Configure ALB listener rules in priority order: Rule 1 (priority 1): path pattern /api/* → forward to API TG. Rule 2: path pattern /images/* → forward to image TG. Rule 3: HTTP header X-Premium=true → forward to premium TG. Default rule: fixed response 404. ALB evaluates rules top-down, first match wins","Use Lambda@Edge on CloudFront to route requests before they reach the ALB"],
c:2,
e:"<strong>Correct: ALB listener rules with priority ordering.</strong> ALB supports sophisticated Layer 7 routing rules. Rule conditions: path patterns (/api/*, /images/*), HTTP headers (X-Premium: true), HTTP methods, query strings, source IP, host headers. Actions: forward to target group, redirect (301/302), fixed response (return status + body without hitting a backend), authenticate (with Cognito or OIDC). Rules are evaluated in priority order (lowest number = highest priority); the default rule (no conditions) is always last. This enables: host-based virtual hosting (app1.example.com vs app2.example.com to different TGs), path-based routing, header-based routing for A/B testing or feature flags. NLB: Layer 4 only — no content-based routing. One ALB can replace many application-specific load balancers."},

{id:197,domain:"Resilient Architectures",topic:"ELB",sub:"Connection Draining",
q:"A company performs rolling deployments and notices that when an EC2 instance is deregistered from the ALB target group for replacement, in-flight HTTP requests to that instance are abruptly terminated, causing errors for users. How should this be resolved?",
o:["Increase the ALB idle timeout so requests have more time to complete","Use NLB instead — it handles connection draining automatically","Enable Connection Draining (Deregistration Delay) on the target group — set a timeout (default 300 seconds, max 3600s); when an instance is deregistered, the ALB stops sending new requests but allows existing in-flight requests to complete until they finish or the timeout expires","Add a lifecycle hook to the Auto Scaling group to delay termination"],
c:2,
e:"<strong>Correct: Connection Draining (Deregistration Delay).</strong> When an ALB target is deregistered (manual removal, ASG scale-in, health check failure), Connection Draining ensures graceful removal: the ALB immediately stops routing new requests to the deregistering target, but allows existing in-flight connections up to the deregistration delay timeout (1–3600 seconds, default 300). After the timeout or when all connections close naturally, the target is fully removed. Set the timeout to slightly longer than your longest expected request duration. For short-lived API calls: set to 30–60 seconds. For long-running operations: increase accordingly. This is configured per target group. ALB idle timeout: time a connection can be idle before ALB closes it — different concept. ASG lifecycle hooks: pause instance termination but don't affect ALB connection handling directly (combine both for fully graceful shutdown)."},

{id:198,domain:"Resilient Architectures",topic:"RDS",sub:"RDS Blue/Green Deployments",
q:"A team needs to upgrade their RDS MySQL 8.0 instance to a new minor version and change several parameter group settings. The production database cannot have more than 1 minute of downtime, and they want to test the changes on a copy of production data before switching. What feature should they use?",
o:["Take an RDS snapshot, restore it to a new instance with the new version, test, then promote","Modify the RDS instance directly — minor version upgrades require only a brief restart","RDS Blue/Green Deployments — creates a staging (green) environment that is an exact copy of production (blue) with continuous replication; apply changes to green (version upgrade, parameter changes, schema changes); test green; execute switchover — RDS promotes green to primary with typically under 1 minute of downtime; blue is retained for rollback","Use Aurora instead of RDS — Aurora supports zero-downtime patching"],
c:2,
e:"<strong>Correct: RDS Blue/Green Deployments.</strong> Blue/Green Deployments create a staging environment (green) synchronized with production (blue) via binary log replication. You apply schema changes, version upgrades, or parameter changes to green and test thoroughly. When ready, initiate the switchover: RDS waits for green to catch up, then renames instances (green becomes the new primary endpoint), typically completing in under 1 minute. Blue is retained for a configurable period (rollback by pointing back to blue). Supported for: RDS MySQL, RDS MariaDB, Aurora MySQL. Advantages over snapshot-restore: no data loss (green stays synced), automated switchover, retained rollback option. Direct in-place upgrade: faster but no pre-testing and harder rollback. Aurora zero-downtime patching: Aurora-specific, not general RDS MySQL. Blue/Green is the answer for 'test changes on production data copy before switching.'"},

{id:199,domain:"High-Performing Architectures",topic:"Migration",sub:"AWS Transfer Family",
q:"A financial institution needs to accept SFTP file transfers from external partners who use standard SFTP clients with username/password or SSH key authentication. Files must land in S3. They want a managed service with no servers to manage and integration with their existing SFTP workflows without partner-side changes. What should they deploy?",
o:["EC2 instance with OpenSSH SFTP server syncing to S3","Amazon S3 Transfer Acceleration","AWS Transfer Family for SFTP","AWS DataSync"],
c:2,
e:"<strong>Correct: AWS Transfer Family for SFTP.</strong> Transfer Family is a managed file transfer service that provides standard protocol endpoints (SFTP, FTPS, FTP, AS2) backed directly by S3 or EFS. Partners connect with their existing SFTP clients — no changes needed on their side. Authentication options: service-managed (SSH keys stored in Transfer), custom IdP via Lambda (integrate with Active Directory, LDAP, or any identity system). Files land directly in S3 — no intermediate server. Supports VPC endpoints for private transfer. Pricing: per protocol endpoint-hour + per GB transferred. EC2 SFTP: operational overhead (patching, HA, backups, scaling). S3 Transfer Acceleration: for HTTP/HTTPS S3 uploads, not SFTP. DataSync: for data migration/sync workflows, not serving external SFTP clients. Transfer Family = managed SFTP/FTPS with S3 backend."},

{id:200,domain:"High-Performing Architectures",topic:"IoT",sub:"AWS IoT Core",
q:"A manufacturing company has 50,000 factory sensors that need to securely publish telemetry data to AWS every 5 seconds using the MQTT protocol. The data should be routed to Kinesis Data Streams for real-time processing and S3 for long-term storage. What manages the device connections and routing?",
o:["Open-source MQTT broker on EC2","API Gateway WebSocket API","AWS IoT Core","Amazon MSK (Managed Streaming for Apache Kafka)"],
c:2,
e:"<strong>Correct: AWS IoT Core.</strong> IoT Core is the managed IoT message broker and gateway. MQTT: lightweight publish/subscribe protocol designed for constrained devices and unreliable networks — ideal for sensors. IoT Core scales to billions of concurrent device connections. Device authentication: X.509 mutual TLS certificates (unique per device). IoT Rules Engine: SQL-like rules that evaluate incoming MQTT messages on topics and route to: Kinesis Data Streams/Firehose, S3, DynamoDB, Lambda, SNS, SQS, OpenSearch — no custom routing code. Device Shadow: persistent JSON document representing device state (useful when devices are offline). Fleet indexing, jobs for OTA updates, device defender for security. MSK does not support MQTT natively — it's a Kafka broker. EC2 MQTT broker: operational overhead and doesn't scale to 50K+ devices easily. IoT Core = the AWS answer for any MQTT/IoT device connectivity question."},

{id:201,domain:"Resilient Architectures",topic:"Messaging",sub:"Amazon MQ",
q:"A company is migrating a legacy enterprise application from on-premises to AWS. The application uses IBM MQ with JMS (Java Message Service) APIs and requires message broker features like topics, queues, durable subscriptions, and message ordering. They cannot rewrite the application to use SQS/SNS. What is the correct migration target?",
o:["Amazon SQS","Amazon SNS","Amazon MQ","Amazon Kinesis"],
c:2,
e:"<strong>Correct: Amazon MQ.</strong> Amazon MQ is a managed broker service for Apache ActiveMQ and RabbitMQ. It supports industry-standard messaging protocols: JMS, NMS, AMQP 0-9-1, AMQP 1.0, MQTT, OpenWire, STOMP — making it compatible with existing applications that use these protocols. For a JMS-based application, only the broker endpoint changes — no code rewrite. Supports: queues (point-to-point), topics (publish-subscribe), durable subscriptions, message selectors, transaction support. High availability: Active/Standby deployment across two AZs. SQS/SNS: AWS-native, highly scalable, but require SDK adoption — not JMS compatible. Use SQS/SNS for new cloud-native applications. Use Amazon MQ for lift-and-shift of existing broker-dependent applications. Kinesis: data streaming, not a traditional message broker."},

{id:202,domain:"High-Performing Architectures",topic:"CloudFront",sub:"Origin Shield",
q:"A global company uses CloudFront with an S3 origin. During traffic spikes, CloudFront's regional edge caches all make simultaneous requests to S3 for the same uncached object (cache stampede), causing high S3 request rates and costs. What CloudFront feature reduces origin load?",
o:["Increase the CloudFront TTL","Add S3 bucket replicas in multiple regions as additional origins","Enable CloudFront Origin Shield","Use CloudFront Lambda@Edge to cache responses"],
c:2,
e:"<strong>Correct: CloudFront Origin Shield.</strong> CloudFront's caching hierarchy: user → Edge Location (PoP) → Regional Edge Cache → Origin. Origin Shield adds a fourth layer: user → PoP → Regional Edge Cache → Origin Shield → Origin. Origin Shield is a single centralized cache region you choose (pick the one closest to your origin). When multiple regional edge caches miss for the same object simultaneously, they all check Origin Shield first — only one request propagates to the actual origin. Benefits: up to 99% reduction in origin requests during cache stampedes, reduced origin load and cost, improved cache hit ratio. Best for: high-traffic content with S3, custom origins, or media origins where request consolidation matters. Increasing TTL: helps over time but doesn't prevent the initial stampede for new/expired objects. Origin Shield is billed per request to Shield (much cheaper than origin requests)."},

{id:203,domain:"High-Performing Architectures",topic:"S3",sub:"S3 Object Lambda",
q:"A company serves product images from S3 via CloudFront. Different consumers need different transformations: mobile apps need thumbnails (100×100px), web apps need medium size (800×600px), and the original size is stored in S3. They want transformations to happen on-the-fly without storing multiple copies. What feature enables this?",
o:["Store pre-generated thumbnails alongside originals in S3 at upload time — different prefix per size","Use CloudFront Lambda@Edge to resize images on the way out","S3 Object Lambda — attach a Lambda function to an S3 access point; when a GET request is made, S3 invokes the Lambda with the original object; Lambda transforms the data (resize, redact, augment) and returns the modified response — consumers see transformed data without storing multiple copies","Use AWS Elemental MediaConvert for image transformation"],
c:2,
e:"<strong>Correct: S3 Object Lambda.</strong> S3 Object Lambda allows you to add compute to S3 GET (and HEAD/LIST) requests. Setup: create an S3 Object Lambda Access Point, associate a Lambda function. When a consumer GETs an object through the Object Lambda Access Point, S3 invokes the Lambda with a URL to the original object; Lambda fetches it, transforms it (resize with PIL/Pillow, redact PII with Comprehend, add watermarks), and writes the transformed response back. Consumers at different endpoints get different transformations — mobile endpoint transforms to thumbnail, web endpoint to medium size. Only one copy stored in S3. Use cases: image resizing, data masking (redact SSNs from CSV rows), format conversion (XML to JSON), row-level access control. CloudFront Lambda@Edge: closer to the user but has Lambda size and timeout limits; Object Lambda is simpler for S3-centric workflows. MediaConvert: for video transcoding, not image resizing."},

{id:204,domain:"Secure Architectures",topic:"IAM",sub:"IAM Identity Center (SSO)",
q:"A company with 20 AWS accounts in an Organization wants employees to log in once with their corporate Active Directory credentials and access any of their authorized AWS accounts and roles without managing separate IAM users in each account. What is the correct solution?",
o:["Create IAM users in each account with the same username/password synced from AD","Use IAM roles with cross-account trust policies — employees switch roles manually","AWS IAM Identity Center (formerly AWS SSO) — centralized access management that integrates with Active Directory (via AD Connector or Managed AD); employees log in to the IAM Identity Center portal with AD credentials; the portal lists all accounts and permission sets they have access to; one click to access any account — no separate IAM users needed in member accounts","Use Cognito User Pools federated with Active Directory for AWS console access"],
c:2,
e:"<strong>Correct: AWS IAM Identity Center.</strong> IAM Identity Center is AWS's centralized workforce identity and access management service. It integrates with identity sources: AWS Managed Active Directory, AD Connector (for on-premises AD), external SAML 2.0 IdPs (Okta, Azure AD, Ping). Employees authenticate once → get a portal listing all accounts and roles → one-click access generates temporary credentials (no long-term keys). Permission Sets: define IAM policies centrally; assign to accounts and groups; IAM Identity Center creates temporary IAM roles in each account. Works with Organizations for multi-account management. This replaces the pattern of: creating IAM users per account, cross-account role switching, or individual SAML federation per account. Cognito: for customer-facing app authentication, not workforce/employee AWS console access."},

{id:205,domain:"Secure Architectures",topic:"IAM",sub:"Resource-Based vs Identity-Based Policies",
q:"A company has a Lambda function in Account A that needs to read objects from an S3 bucket in Account B. What combination of IAM policies is required to enable this cross-account access?",
o:["Only add an S3 bucket policy in Account B granting Account A's Lambda role access — identity-based policies in Account A are not required","Only add an IAM policy to Account A's Lambda execution role allowing s3:GetObject on the Account B bucket — bucket policy in Account B is not required","Both: (1) IAM policy on the Lambda execution role in Account A allowing s3:GetObject on Account B's bucket ARN, AND (2) S3 bucket policy in Account B granting Account A's Lambda role s3:GetObject — cross-account requires BOTH identity-based AND resource-based policy to allow","Use VPC Peering between Account A and Account B — this grants cross-account S3 access"],
c:2,
e:"<strong>Correct: Both IAM policy (Account A) AND bucket policy (Account B) required.</strong> Cross-account resource access in AWS requires explicit allow from BOTH sides: Identity-based policy (Account A): Lambda execution role must have IAM policy allowing s3:GetObject on arn:aws:s3:::account-b-bucket/*. Resource-based policy (Account B): S3 bucket policy must have a statement allowing the specific Lambda role ARN from Account A to perform s3:GetObject. If either is missing, access is denied. Contrast with same-account access: within the same account, a bucket policy OR an IAM policy alone can grant access (just one is needed). Exception: if Account B's bucket policy grants access to Account A's entire root (arn:aws:iam::AccountA:root), then just the identity-based policy in Account A is enough — the bucket policy delegates to Account A to manage access via IAM. VPC Peering: network-level connectivity, not S3 authorization."},

{id:206,domain:"Cost-Optimized Architectures",topic:"EC2 Pricing",sub:"Dedicated Instances vs Hosts",
q:"A company has per-socket software licensing for Windows Server that requires them to track exactly which physical sockets their instances run on, and they must ensure no other AWS customer's instances share their physical server. They also need to bring their existing per-socket licenses. Which EC2 option meets these requirements?",
o:["Dedicated Instances — single-tenant hardware; no other customer shares your server; but you cannot control or see which specific socket/core your instance runs on","On-Demand with Placement Groups — packs instances on fewer hosts but still shared tenancy","EC2 Dedicated Hosts — provides dedicated physical servers with visibility and control over socket, core, and NUMA topology; you can see host capacity and control instance placement on specific hosts; supports BYOL (Bring Your Own License) for per-socket and per-core licensing; host is dedicated to your account exclusively","EC2 Reserved Instances with dedicated tenancy — reserve capacity on dedicated hardware"],
c:2,
e:"<strong>Correct: EC2 Dedicated Hosts.</strong> Dedicated Hosts give you a physical server dedicated exclusively to your account. Key differentiators from Dedicated Instances: (1) Visibility: you see the host's sockets, cores, and NUMA nodes. (2) Instance placement control: assign specific instances to specific hosts. (3) BYOL support: per-socket and per-core licensing works because you control the physical topology. (4) Host affinity: instances restart on the same host. Dedicated Instances: also single-tenant (no other customer shares the hardware) but you have no visibility into or control over the physical host — hardware may change between stops/starts. Cannot be used for per-socket BYOL. Both cost more than default multi-tenant EC2. Dedicated Hosts: billed per host-hour. Dedicated Instances: billed per instance-hour with a dedicated tenancy surcharge. For BYOL with socket/core licensing → Dedicated Hosts are required."},

{id:207,domain:"High-Performing Architectures",topic:"Databases",sub:"ElastiCache Redis — Cluster Mode",
q:"A company has an application that uses ElastiCache Redis to cache session data. The current single-shard Redis cluster is running at 90% memory capacity and 80% CPU. The team needs to scale both memory and write throughput without application downtime. What is the correct ElastiCache Redis scaling approach?",
o:["Upgrade to a larger Redis node type","Add read replicas to the existing shard","Enable ElastiCache Redis Cluster Mode (Cluster Mode Enabled)","Migrate to ElastiCache Memcached"],
c:2,
e:"<strong>Correct: Redis Cluster Mode Enabled.</strong> ElastiCache Redis has two modes: Cluster Mode Disabled: one shard with a primary + up to 5 read replicas. Scales reads horizontally. Memory and write capacity limited to one primary node — must scale vertically. Cluster Mode Enabled: data partitioned across multiple shards (up to 500 nodes total). Each shard has a primary (writes) + replicas (reads). Adding shards scales both memory AND write throughput. Supports online resharding. Limitation: all keys in a multi-key command must hash to the same slot (use hash tags {}). Memcached: simpler, multithreaded, supports horizontal scaling — but no replication, no persistence, no Lua scripting, no sorted sets. For Redis with horizontal write scaling → Cluster Mode Enabled. For read scaling only → add replicas to Cluster Mode Disabled."},

{id:208,domain:"Resilient Architectures",topic:"Storage",sub:"AWS Backup",
q:"A company wants a centralized, policy-driven backup solution across EC2, RDS, DynamoDB, EFS, and S3 in all accounts within their AWS Organization. Backups must be immutable for 90 days (cannot be deleted even by account admins), and compliance reports must be generated automatically. What is the right approach?",
o:["Create separate backup solutions for each service — RDS automated backups, DynamoDB PITR, EFS backup, S3 versioning","Use AWS Lambda to trigger snapshots and copy them to a separate account","AWS Backup with backup vaults, backup plans, and AWS Backup Vault Lock — centrally manage backups across services and accounts via Organizations; enable Vault Lock in COMPLIANCE mode for immutability (backups cannot be deleted until retention expires, even by root); use AWS Backup Audit Manager for compliance reports","Use CloudFormation to deploy backup scripts to all accounts"],
c:2,
e:"<strong>Correct: AWS Backup with Vault Lock and Audit Manager.</strong> AWS Backup is the centralized backup service supporting: EC2 (EBS snapshots), RDS/Aurora, DynamoDB, EFS, FSx, S3, VMware, and more. Cross-account/cross-region backup via Organizations. Backup Plans: define schedules, retention, lifecycle rules centrally. Backup Vault Lock: COMPLIANCE mode prevents anyone (including root) from deleting recovery points before the minimum retention period — meets regulatory immutability requirements. GOVERNANCE mode allows privileged users to override. AWS Backup Audit Manager: generates compliance reports showing which resources are protected, backup job success/failure, and policy compliance. Without Backup Vault Lock, account admins could delete backups — Vault Lock in Compliance mode is the answer for 'immutable backups that even admins cannot delete.'"},

{id:209,domain:"High-Performing Architectures",topic:"Compute",sub:"Lambda Provisioned Concurrency",
q:"A company has a customer-facing Lambda function that handles user login requests. During peak hours it scales to 1,000 concurrent executions. Users complain of occasional 2-3 second delays, which coincide with Lambda cold starts for new execution environments. The function uses the Java runtime and initializes a database connection pool. What is the MOST effective way to reduce cold start latency?",
o:["Increase Lambda memory — more memory reduces initialization time proportionally","Set Lambda Reserved Concurrency to 1,000 — this pre-warms the function","Enable Lambda Provisioned Concurrency — pre-initializes a specified number of execution environments; provisioned environments are always warm (initialization code runs once, handler is ready to execute immediately); cold start latency is eliminated for requests handled by provisioned environments","Use Lambda SnapStart — saves initialized state to disk for faster cold starts (Java only)"],
c:2,
e:"<strong>Correct: Lambda Provisioned Concurrency.</strong> Provisioned Concurrency initializes a set number of Lambda execution environments in advance. The init phase (loading code, initializing SDK clients, loading ML models) runs once when provisioning — not on each request. Requests hitting provisioned environments start executing immediately with no cold start latency. Cost: pay for provisioned concurrency-hours even when idle (in addition to per-request charges). Use Auto Scaling for Provisioned Concurrency to scale with scheduled events or utilization targets. Reserved Concurrency: limits the maximum concurrent executions for a function — does NOT pre-warm environments. Increasing memory: reduces init time slightly but doesn't eliminate cold starts. Lambda SnapStart: Java only, saves initialized snapshot to restore quickly — similar goal but Java-specific and not available for all runtimes. Provisioned Concurrency = always-warm execution environments for latency-sensitive functions."},

{id:210,domain:"Secure Architectures",topic:"Networking",sub:"VPC Flow Logs",
q:"A security engineer at a company needs to investigate why an EC2 instance in a private subnet cannot reach an RDS instance. They want to capture all network traffic metadata (source IP, destination IP, port, protocol, and accept/reject status) for the subnet without installing any agents. What should they enable?",
o:["AWS CloudTrail","Amazon Inspector","VPC Flow Logs","Enable Enhanced Networking on the EC2 instance"],
c:2,
