e:"<strong>Correct: VPC Flow Logs.</strong> Flow Logs capture metadata for IP traffic at three levels: VPC (all traffic in VPC), Subnet (all traffic in subnet), or Network Interface (specific ENI). Key fields: srcaddr/dstaddr (IPs), srcport/dstport, protocol (6=TCP, 17=UDP, 1=ICMP), action (ACCEPT/REJECT), packets, bytes, start/end timestamps. Crucially: ACCEPT = traffic allowed by both security groups AND NACLs; REJECT = blocked by security groups OR NACLs. To diagnose: if flow log shows REJECT from EC2→RDS on port 3306, check security group outbound on EC2 and inbound on RDS and NACLs. Flow logs do NOT capture: DNS queries to Route 53, DHCP traffic, instance metadata traffic, AWS-internal traffic. Stored in CloudWatch Logs or S3. Use Athena to query S3-stored flow logs. CloudTrail: API calls, not network packets. Inspector: scans for reachability based on security group config, not live traffic."},

{id:211,domain:"High-Performing Architectures",topic:"Compute",sub:"EC2 Launch Templates",
q:"A team frequently launches EC2 instances manually and often forgets to include the correct IAM instance profile, user data script, security groups, and EBS encryption settings. How can they standardize and enforce consistent configuration for all new instances?",
o:["Create a detailed runbook document that engineers must follow when launching instances","Use AWS Config rules to detect and alert on non-compliant instances after launch","Create an EC2 Launch Template with all required configuration: instance type, AMI, IAM instance profile, user data, security groups, EBS volume type and encryption settings; engineers launch instances from the template — all configuration is pre-filled and can be versioned; use resource-based policies to restrict launching outside the template","Use only CloudFormation for all EC2 launches — manually launching is prohibited"],
c:2,
e:"<strong>Correct: EC2 Launch Templates.</strong> Launch Templates define a complete EC2 instance configuration: AMI, instance type, key pair, security groups, IAM instance profile, user data, EBS volumes (type, size, encryption, IOPS), placement group, tenancy, network interfaces, capacity reservation, tags. Benefits over Launch Configurations (legacy): versioning (maintain multiple versions, set default), support for Spot Instances, support for T2/T3 unlimited, use with EC2 Fleet and Auto Scaling. Enforce templates via IAM: attach an IAM policy with Condition: ec2:IsLaunchTemplateRequest: true to prevent launching without a template, or require specific template IDs. Versioning: update the template without recreating — old instances continue using their version. Launch Templates supersede Launch Configurations for Auto Scaling Groups and are the modern standard for repeatable EC2 configuration."},

{id:212,domain:"Resilient Architectures",topic:"Databases",sub:"RDS Read Replicas",
q:"A company has an RDS MySQL database in us-east-1 that handles heavy read traffic from a reporting application. The primary instance is at 90% CPU. Additionally, the team wants a copy of the data in eu-west-1 for disaster recovery. Which combination of RDS features addresses both requirements?",
o:["Create an RDS Multi-AZ standby in us-east-1 for DR — it can serve read traffic","Take hourly RDS snapshots and copy to eu-west-1 (RPO = 1 hour)","Create RDS Read Replicas — one in us-east-1 (same region) to offload reporting queries from the primary, and one in eu-west-1 (cross-region) for DR; read replicas use asynchronous replication (typically seconds to minutes lag); the eu-west-1 replica can be promoted to standalone primary if needed","Use Aurora instead — RDS MySQL doesn't support cross-region read replicas"],
c:2,
e:"<strong>Correct: RDS Read Replicas (same-region + cross-region).</strong> RDS Read Replicas use asynchronous binary log replication from the primary. Same-region replica: reporting app reads from replica, removing load from primary (Read Replicas can serve read traffic, unlike Multi-AZ standbys). Cross-region replica in eu-west-1: replication lag typically minutes — easily meets 1-hour RPO. On disaster, promote the replica to a standalone primary in minutes (new endpoint, Multi-AZ can then be configured). RDS MySQL DOES support cross-region read replicas — this is not Aurora-only. Multi-AZ standby: synchronous replication, automatic failover within region — does NOT serve read traffic (standby only) and does not provide cross-region DR. Hourly snapshots: RPO = up to 1 hour plus restore time — technically meets RPO requirement but read replicas are more flexible and always current."},

{id:213,domain:"Cost-Optimized Architectures",topic:"Networking",sub:"Data Transfer Costs",
q:"A company's AWS bill has a $15,000/month line item for 'Data Transfer Out to Internet' from EC2 instances serving static content. The content is the same files requested repeatedly by global users. What is the most cost-effective way to drastically reduce this specific charge?",
o:["Move EC2 instances to regions with lower data transfer pricing","Use S3 instead of EC2 for static content — S3 data transfer is free","Serve static content through Amazon CloudFront — data transferred from EC2 to CloudFront is free (no charge for origin fetch within same region); CloudFront to internet is charged at CloudFront rates (cheaper than EC2 rates, ~$0.085/GB vs $0.09/GB) AND repeated requests are served from cache at edge locations eliminating repeated origin fetches — cache hit ratio of 90%+ can reduce total data transfer by 90%","Use S3 Transfer Acceleration for cheaper global distribution"],
c:2,
e:"<strong>Correct: CloudFront for caching + lower data transfer rates.</strong> Two cost reduction mechanisms: (1) EC2 → CloudFront data transfer within the same AWS region is FREE (no origin fetch charge). (2) CloudFront → Internet rates are cheaper than EC2 → Internet rates, AND cached content is served from edge without repeated origin fetches. With a 90% cache hit ratio, only 10% of requests hit the origin — 90% served from edge cache at lower per-GB rates. Combined effect: massive reduction in both data transfer volume AND cost per GB. S3 data transfer to internet is NOT free — same pricing as EC2. S3 to CloudFront in the same region IS free. Moving regions: minor savings, doesn't fix the root cause (no caching). Transfer Acceleration: speeds up S3 uploads, doesn't reduce egress costs. CloudFront = caching + cheaper egress + free origin fetch."},

{id:214,domain:"Resilient Architectures",topic:"High Availability",sub:"Active-Active vs Active-Passive",
q:"A company needs a global web application where users in both US and EU always get served by their regional deployment (not just during failover), and if one region fails, traffic automatically shifts to the other. This is a continuous dual-region operation requirement, not a failover-only setup. What pattern is this?",
o:["Active-Passive — one primary region serves all traffic, the other is standby","Pilot Light — minimal core running in standby region, scale up on failover","Multi-Site Active-Active — both regions actively serve production traffic simultaneously; Route 53 latency-based or geolocation routing distributes users to their nearest region; both regions run full production capacity; if one region fails, Route 53 health checks redirect all traffic to the healthy region within seconds","Warm Standby — scaled-down running copy in second region, scale up on failover"],
c:2,
e:"<strong>Correct: Multi-Site Active-Active.</strong> Active-Active: both regions serve production traffic continuously. Route 53 with latency-based routing (or geolocation): US users → us-east-1, EU users → eu-west-1, each getting their lowest-latency region. Health checks on each region's endpoint: if us-east-1 fails, Route 53 stops routing to it within the TTL period (30–60 seconds typical); all traffic shifts to eu-west-1. Both regions run full capacity (most expensive DR strategy). Database challenge: need Aurora Global Database or DynamoDB Global Tables for multi-master or low-lag replication. RPO: near-zero (data already replicated). RTO: seconds to minutes (DNS failover). This is the most expensive but highest availability DR strategy. Active-Passive/Warm Standby/Pilot Light: only one region serves traffic at a time — the standby is only for failover."},

{id:215,domain:"Secure Architectures",topic:"Governance",sub:"AWS Control Tower",
q:"A company is setting up a new multi-account AWS environment and wants to establish a secure landing zone with pre-configured guardrails, account vending (new accounts created with baseline controls automatically), and centralized logging/auditing — without building all of this from scratch with Organizations + CloudFormation + Config. What service orchestrates this?",
o:["AWS Organizations with SCPs","AWS CloudFormation StackSets","AWS Control Tower","AWS Service Catalog"],
c:2,
e:"<strong>Correct: AWS Control Tower.</strong> Control Tower is the AWS-recommended way to set up and govern a multi-account environment at scale. It provides: Landing Zone: pre-built baseline with management, Log Archive (centralized CloudTrail/Config logs), and Audit accounts. Account Factory: self-service new account creation with mandatory controls pre-applied (via Service Catalog). Guardrails: (1) Preventive (SCPs): e.g., 'Disallow changes to CloudTrail.' (2) Detective (Config rules): e.g., 'Detect whether MFA is enabled for root.' Dashboard: compliance status across all accounts. Customizations for Control Tower (CfCT): add your own CloudFormation/SCPs on top. Organizations alone: creates the account structure but doesn't automate baseline controls. StackSets: deploys templates but doesn't orchestrate the full landing zone lifecycle. Control Tower = opinionated, automated multi-account governance from day 1."},

{id:216,domain:"Secure Architectures",topic:"Governance",sub:"AWS Service Catalog",
q:"A company wants to allow developers to provision approved AWS infrastructure (pre-approved EC2 types, approved VPC configurations, compliant RDS setups) without giving them IAM permissions to create arbitrary AWS resources. Provisioned resources must always follow company standards. What is the correct approach?",
o:["Grant developers PowerUser access — they can create most resources but not IAM","Use CloudFormation — developers write their own templates","AWS Service Catalog — administrators create Portfolios containing Products (CloudFormation templates for approved architectures); share portfolios with developer teams; developers browse the catalog and launch products using Service Catalog's launch role (which has broad permissions) — developers never need direct CloudFormation/EC2/RDS permissions; all provisioned resources follow the approved template","Use SCP to deny all resource creation except specific approved types"],
c:2,
e:"<strong>Correct: AWS Service Catalog.</strong> Service Catalog enables a 'vending machine' model for cloud resources. Admins: create Products (CloudFormation templates), bundle into Portfolios, define launch constraints (which IAM role to use when launching — can have broad permissions). Share portfolios with specific teams/accounts via Organizations. Developers: browse catalog, see only approved products, click launch — Service Catalog assumes the launch role (which has EC2/RDS/VPC permissions) to create resources. Developer's IAM permissions: only servicecatalog:ProvisionProduct — no direct EC2/RDS/VPC permissions needed. Governance: all resources created from approved templates. Updates: admins update product version; existing provisioned products can be updated to new versions. This separates 'what can be created' (admin concern) from 'who can create it' (developer self-service) without broad IAM permissions."},

{id:217,domain:"Secure Architectures",topic:"Security Services",sub:"Amazon Detective",
q:"A security engineer reviews an AWS GuardDuty finding of type 'UnauthorizedAccess:IAMUser/MaliciousIPCaller' for an IAM user in the company's account. The security team needs to immediately investigate the blast radius — what resources were accessed and what actions were taken — and then contain the threat. What is the correct initial response?",
o:["AWS Security Hub — aggregates findings but doesn't provide investigation graphs","AWS CloudTrail — search CloudTrail events manually for the IAM user's actions","Amazon Detective — automatically collects log data (CloudTrail, VPC Flow Logs, GuardDuty findings) and builds an interactive graph model showing relationships: IAM entities, IP addresses, AWS resources, and API calls over time; investigators can pivot from a GuardDuty finding to a visual timeline of all related activity without writing queries","AWS Config — shows resource configuration changes over time"],
c:2,
e:"<strong>Correct: Amazon Detective.</strong> Detective is purpose-built for security investigation. It continuously ingests CloudTrail, VPC Flow Logs, EKS audit logs, and GuardDuty findings and builds a graph model of entity behavior. When investigating a GuardDuty finding: click 'Investigate in Detective' → see a visual behavior graph for the IAM entity: all API calls made, source IPs, resources accessed, volumes relative to the entity's historical baseline, related findings. Detective answers: 'Is this API call unusual for this user?' (baselining), 'What else did this IP address do?' (IP behavior), 'What resources did this entity interact with?' (blast radius). Security Hub: aggregates and prioritizes findings — 'what happened.' Detective: investigates why and how — 'what was the full scope.' Detective does not remediate or alert — it's purely for post-detection investigation. Think of it as 'forensics for GuardDuty findings.'"},

{id:218,domain:"High-Performing Architectures",topic:"ML Services",sub:"Amazon Rekognition",
q:"A media company uploads millions of user-submitted images and videos daily. They need to automatically moderate content by detecting nudity, violence, and offensive imagery, and flag detected faces against a database of known bad actors. Which AWS service provides these capabilities without building custom ML models?",
o:["Amazon Comprehend","Amazon Textract","Amazon Rekognition","Amazon SageMaker"],
c:2,
e:"<strong>Correct: Amazon Rekognition.</strong> Rekognition provides computer vision as an API with no ML expertise required. Relevant capabilities: Content Moderation: detects explicit adult content, suggestive content, violence, visually disturbing content, drugs/tobacco/alcohol — returns labels with confidence scores; you set a confidence threshold and moderate accordingly. Face Search: compare faces in images/videos against a Collection (indexed database of face vectors); returns matching face IDs from your database (e.g., known bad actors). Face Detection: detect, locate, and analyze faces (age range, gender, emotions, accessories). Video analysis: frame-by-frame analysis for streaming video. Comprehend: NLP (sentiment, entities, language detection) — text, not images. Textract: OCR and form/table extraction from documents. SageMaker: build custom models — overkill when Rekognition's pre-built APIs cover the use case."},

{id:219,domain:"High-Performing Architectures",topic:"ML Services",sub:"Amazon Comprehend",
q:"A legal tech company processes thousands of contracts daily. They need to automatically extract: which parties are mentioned (named entities), whether the contract sentiment is favorable/unfavorable, classify documents as NDA/MSA/SOW, and detect the primary language. They want a managed NLP service without training custom models. What should they use?",
o:["Amazon Textract","Amazon Rekognition","Amazon Comprehend","Amazon Kendra"],
c:2,
e:"<strong>Correct: Amazon Comprehend.</strong> Comprehend is AWS's managed NLP service for text analysis. Pre-trained features (no training needed): Entity Recognition (PERSON, ORGANIZATION, LOCATION, DATE, QUANTITY, COMMERCIAL_ITEM), Sentiment Analysis (document-level and targeted sentiment), Key Phrase Extraction, Language Detection (100+ languages), PII Detection (SSNs, credit card numbers, phone numbers). Custom models: Custom Classification — train your own document classifier with labeled examples (NDA, MSA, SOW categories); Custom Entity Recognition — recognize domain-specific entities not in the base model. Comprehend Medical: healthcare-specific NLP (medications, diagnoses, procedures). Textract: OCR — extracts text from PDFs/images but doesn't perform NLP analysis on it. Kendra: enterprise search (find relevant documents from a query) — not NLP analysis of text. Rekognition: images/video. For 'analyze text and extract meaning' → Comprehend."},

{id:220,domain:"Resilient Architectures",topic:"Compute",sub:"EC2 Auto Scaling — Warm Pools",
q:"An e-commerce company uses EC2 Auto Scaling. During flash sales, the ASG must add 100 instances in minutes, but each instance takes 8 minutes to fully initialize (user data, software install, application startup). By the time instances are ready, the traffic surge has already degraded user experience. How can the ASG serve traffic within 1 minute of a scale-out trigger?",
o:["Use larger instance types","Pre-bake all dependencies into a custom AMI","Enable EC2 Auto Scaling Warm Pools","Use AWS Lambda instead of EC2"],
c:2,
e:"<strong>Correct: EC2 Auto Scaling Warm Pools.</strong> Warm Pools maintains a pre-initialized pool of instances outside the ASG's InService fleet. States: Stopped (least cost — you pay for EBS and optionally reserved) or Running (faster transitions, pay for compute). When the ASG needs to scale out, instead of launching and initializing a cold instance (8 minutes), it transitions a warm pool instance to InService (~30 seconds for stopped, instant for running). The warm pool automatically refills by launching new instances to replace those promoted to InService. Lifecycle hooks integrate with Warm Pools — instances can run initialization scripts when entering the warm pool (not during scale-out, so scale-out is fast). For flash sale scenarios: maintain warm pool of 50–100 pre-initialized instances → 1-minute scale-out. Baked AMIs: reduce init time but not to seconds. Lambda: different architecture entirely."},

{id:221,domain:"High-Performing Architectures",topic:"Databases",sub:"DynamoDB Time to Live",
q:"A company uses a DynamoDB table to store user sessions with an expiration timestamp attribute. The team wants expired sessions to be automatically deleted without running deletion jobs, and without consuming provisioned write capacity for the deletions. What feature should they enable?",
o:["Run a daily Lambda function to scan and delete expired sessions","Use an Amazon EventBridge rule to trigger session cleanup hourly","Enable DynamoDB Time to Live (TTL) on the expiration attribute","Use conditional writes to set a deletion flag on expired sessions"],
c:2,
e:"<strong>Correct: DynamoDB TTL (Time to Live).</strong> TTL is a built-in DynamoDB feature that automatically expires and deletes items. Setup: enable TTL on the table, specify the attribute name that holds the expiration time (Unix epoch in seconds). DynamoDB evaluates items in the background and deletes expired items within 48 hours (typically much sooner). Cost: zero — TTL deletions don't consume write capacity units and are not charged. If DynamoDB Streams is enabled, TTL deletions appear in the stream with userIdentity.type: 'Service' and principalId: 'dynamodb.amazonaws.com' — you can use this to trigger cleanup in other systems (like invalidating a cache). Lambda scan-and-delete: works but consumes read AND write capacity, costs money, and requires scheduling. TTL is the correct answer for 'auto-expire items' + 'no write capacity cost.'"},

{id:222,domain:"Secure Architectures",topic:"Firewall Manager",sub:"AWS Firewall Manager",
q:"A company with 50 AWS accounts in an Organization needs to ensure that all accounts have a WAF WebACL with the Core Rule Set applied to all ALBs, and that any new ALB created in any account automatically gets the WebACL — without manual action per account. What is the right approach?",
o:["Lambda function triggered by AWS Config rules to attach WAF WebACLs","CloudFormation StackSets to deploy WAF WebACLs to each account","AWS Firewall Manager with a WAF policy scoped to all accounts","AWS Organizations SCP to block ALB creation without a WAF"],
c:2,
e:"<strong>Correct: AWS Firewall Manager.</strong> Firewall Manager centrally manages security policies across AWS Organization accounts. It supports: WAF policies (attach WebACLs to CloudFront, ALB, API Gateway), Shield Advanced policies (enable Shield Advanced across accounts), Security Group policies (enforce or audit security group rules), Network Firewall policies, DNS Firewall policies. For this use case: create a WAF policy in Firewall Manager, specify the Core Rule Set, scope to all OUs. Firewall Manager: deploys WebACL to each account, attaches to all existing ALBs, and automatically attaches to NEW ALBs as they are created. Lambda/Config: detect non-compliance but remediation is eventual, not immediate. StackSets: deploys at a point in time — doesn't automatically handle new ALBs. SCPs: can prevent creating ALBs without specific tags but can't enforce WAF attachment. Firewall Manager = continuous, automatic, cross-account security policy enforcement."},

{id:223,domain:"High-Performing Architectures",topic:"Compute",sub:"EKS — Fargate Profiles",
q:"A team runs Kubernetes workloads on Amazon EKS. They want specific pods (namespace: analytics) to run without managing EC2 worker nodes — no node groups to patch, scale, or right-size. Other pods (namespace: web) should continue running on managed EC2 node groups for performance tuning. How can both requirements be met on one EKS cluster?",
o:["Create two separate EKS clusters, one Fargate and one EC2","EKS does not support mixing Fargate and EC2 node groups","Create an EKS Fargate Profile scoped to the analytics namespace","Use EC2 Auto Scaling with a high minimum capacity"],
c:2,
e:"<strong>Correct: EKS Fargate Profile for specific namespaces.</strong> EKS supports hybrid compute: Fargate Profiles and EC2 node groups coexist in the same cluster. Fargate Profile: defines selectors (namespace + optional labels) that determine which pods run on Fargate. Pods matching the selector: scheduled on Fargate (each pod gets its own micro-VM — completely isolated, no shared nodes). AWS manages: node provisioning, patching, scaling, right-sizing (Fargate bills per pod CPU/memory). Pods not matching any Fargate Profile selector: scheduled on EC2 node groups as normal. Fargate limitations: no DaemonSets on Fargate, no GPU support, no privileged containers, stateful workloads need EFS (no EBS on Fargate). EC2 node groups: full Kubernetes node functionality, better for stateful or GPU workloads. This hybrid approach lets you choose the right compute for each workload type."},

{id:224,domain:"Cost-Optimized Architectures",topic:"Databases",sub:"RDS Storage Auto Scaling",
q:"A company has an RDS database provisioned with 500 GB of storage. The storage usage grows unpredictably and the team has been caught off guard twice when storage filled up, causing database downtime. They want the storage to expand automatically when it is running low. What feature should they enable?",
o:["Take regular EBS snapshots and restore to a larger volume","Pre-provision 5 TB of storage for headroom","Enable RDS Storage Auto Scaling with a maximum storage threshold","Migrate to Amazon Aurora, which auto-scales storage automatically"],
c:2,
e:"<strong>Correct: RDS Storage Auto Scaling.</strong> RDS Storage Auto Scaling monitors free storage space and automatically scales up when: free storage < 10% of allocated storage OR free storage < 100 GB AND free storage < 5 minutes of remaining low storage. You set a Maximum Storage Threshold (prevents unbounded growth and cost). Scaling happens with zero downtime — RDS expands the underlying EBS volume in place. Supported for: General Purpose (gp2, gp3) and Provisioned IOPS (io1, io2). Note: RDS storage can only INCREASE — you cannot reduce allocated storage (to reduce, snapshot and restore to smaller). Aurora: auto-scales storage in 10 GB increments up to 128 TB — Aurora manages storage differently (shared distributed storage, not EBS-backed). For standard RDS, Storage Auto Scaling is the answer to prevent storage-full outages without manual intervention."},

{id:225,domain:"Resilient Architectures",topic:"S3",sub:"S3 Transfer Acceleration",
q:"A global company uploads large genomics files (50–500 GB each) to a single S3 bucket in us-east-1. Upload clients are distributed worldwide (Asia, Europe, South America). Upload speeds are poor for clients far from us-east-1. How can upload speeds be improved without changing the destination bucket or implementing a multi-region architecture?",
o:["Enable S3 Cross-Region Replication to regional buckets","Use AWS Snowball Edge to ship data from each region","Enable S3 Transfer Acceleration on the bucket","Deploy EC2 instances in each region as upload proxies"],
c:2,
e:"<strong>Correct: S3 Transfer Acceleration.</strong> S3 Transfer Acceleration uses CloudFront's globally distributed edge network to accelerate S3 uploads. The client uploads to the nearest edge location (PoP) instead of directly to us-east-1; data then travels over AWS's optimized global backbone to the S3 bucket. The destination bucket is unchanged — same us-east-1 bucket, just accessed via the accelerated endpoint. Use the AWS Speed Comparison Tool to verify improvement before enabling (acceleration only charges when it's actually faster). Charged per GB of accelerated transfer (~$0.04/GB for regional edges, $0.08/GB for non-regional). Best for: large files, long-distance transfers, multiple global upload clients. Cross-region replication + regional buckets: solves the problem differently but changes the architecture. EC2 relay: operational overhead. Snowball: for very large offline bulk migrations."},

{id:226,domain:"Resilient Architectures",topic:"Compute",sub:"AWS Batch — Job Dependencies",
q:"A company runs a genomics pipeline with four sequential steps: (1) quality control, (2) alignment which depends on QC completing, (3) variant calling which depends on alignment, and (4) annotation which depends on variant calling. Each step is compute-intensive and may require different instance types. How should this pipeline be orchestrated in AWS?",
o:["Chained Lambda functions, each triggering the next","Four SQS queues, each polling the previous queue's output","AWS Batch with native job dependency configuration","AWS Step Functions with AWS Batch as the task resource"],
c:2,
e:"<strong>Correct: AWS Batch with job dependencies.</strong> AWS Batch natively supports job dependencies via the dependsOn parameter. When submitting a job, specify the job IDs that must complete successfully before this job starts. Batch queues the dependent job and automatically starts it when all dependencies succeed. N-to-1 fan-in: multiple parent jobs can be dependencies of one child. Array jobs: thousands of parallel sub-jobs with dependencies between arrays. Each job in the pipeline can specify different instance requirements (memory, vCPUs, GPU) and use different compute environments. Step Functions + Batch: also a valid pattern for more complex orchestration (branching, error handling, human approval), but for a linear pipeline with dependencies, Batch's native dependency feature is simpler. Lambda: 15-minute timeout — inadequate for hours-long genomics steps. SQS: polling queues adds latency and requires custom dependency logic."},

{id:227,domain:"High-Performing Architectures",topic:"Serverless",sub:"Lambda Function URLs",
q:"A developer wants to expose a Lambda function as an HTTPS endpoint for webhooks from a third-party service. The function just receives POST requests and returns 200. They don't need API Gateway features (throttling, API keys, stages). What is the simplest way to give the Lambda function a dedicated HTTPS URL?",
o:["Amazon API Gateway HTTP API","Application Load Balancer with Lambda target","Lambda Function URL","Amazon CloudFront with a Lambda@Edge origin"],
c:2,
e:"<strong>Correct: Lambda Function URLs.</strong> Function URLs provide a built-in HTTPS endpoint for a Lambda function without API Gateway. Features: dedicated URL that persists (doesn't change on redeploy), CORS configuration, auth mode: AWS_IAM (Sigv4 signed requests only) or NONE (public, use for webhooks with their own validation). Free — no additional cost beyond Lambda invocations. Limitations compared to API Gateway: no throttling limits per endpoint, no WAF integration, no multiple routes/methods (just one function per URL), no usage plans, no API keys. For simple use cases like webhooks, file processing triggers, or internal tools — Function URLs eliminate the API Gateway overhead. API Gateway HTTP API: adds routing, throttling, JWT authorization — use when you need those features. Function URLs = the simplest possible HTTPS endpoint for Lambda."},

{id:228,domain:"Resilient Architectures",topic:"S3",sub:"S3 Pre-signed URLs",
q:"A company's web application allows authenticated users to download large private files from S3. The files must not be publicly accessible, but authorized users should be able to download directly from S3 without proxying through the application server. How should this be implemented?",
o:["Make the S3 bucket publicly accessible","Create a separate S3 bucket with public read access","Generate S3 Pre-signed URLs server-side with a short expiration","Use Amazon CloudFront with Signed URLs"],
c:2,
e:"<strong>Correct: S3 Pre-signed URLs.</strong> Pre-signed URLs embed temporary credentials in the URL itself. The signer (your backend with appropriate S3 IAM permissions) generates the URL with an expiry time. The recipient can download (or upload) directly from/to S3 using the URL — no AWS credentials needed. The URL includes the signer's identity and signature — S3 validates it on each request. Expiry: set appropriately for your use case (minutes for downloads, longer for resumable uploads). Security: the pre-signed URL only grants access to the specific object + operation + duration. CloudFront Signed URLs: use when you're serving through CloudFront (for caching, global delivery, custom domains) and want the same temporary access control. For direct S3 download with temporary access → Pre-signed URLs are the simplest approach. Pre-signed URLs for PUT: allow users to upload directly to S3 without exposing your IAM credentials."},

{id:229,domain:"Secure Architectures",topic:"S3 Security",sub:"S3 Block Public Access",
q:"A company has just adopted AWS and discovered that several S3 buckets have public ACLs or public bucket policies exposing sensitive data. They want to immediately prevent any current or future public access to ALL S3 buckets in their account, as a preventative control that overrides any bucket-level or object-level public settings. What is the fastest way to enforce this?",
o:["Review and update each bucket's ACL and policy individually","AWS Config rules to detect and remediate public bucket policies","Enable S3 Block Public Access at the account level","AWS Organizations SCP to restrict s3:PutBucketAcl and s3:PutBucketPolicy"],
c:2,
e:"<strong>Correct: S3 Block Public Access at account level.</strong> Block Public Access (BPA) is a safety override. When enabled at the ACCOUNT level, all four settings apply to every bucket in the account — regardless of individual bucket or object settings: BlockPublicAcls: new PUT requests with public ACLs are rejected; IgnorePublicAcls: existing public ACLs are ignored (objects with public ACLs are not publicly accessible); BlockPublicPolicy: bucket policies that grant public access are rejected; RestrictPublicBuckets: even if a public bucket policy somehow exists, access is restricted to authorized users. These account-level settings cannot be overridden by bucket owners. You can also set BPA at the Organization level via AWS Organizations. BPA at bucket level: only protects that specific bucket. Account-level BPA = one-click protection for all current and future buckets. For an S3 public access emergency → enable all four settings at account level immediately."},

{id:230,domain:"High-Performing Architectures",topic:"Databases",sub:"Amazon Keyspaces",
q:"A company runs a large Cassandra database on-premises using the CQL (Cassandra Query Language) API. They want to migrate to AWS with minimal application changes, without managing Cassandra servers, and with automatic scaling. What is the right AWS service?",
o:["Amazon DynamoDB","Amazon RDS for PostgreSQL","Amazon Keyspaces (for Apache Cassandra)","Amazon EMR with Cassandra on EC2"],
c:2,
e:"<strong>Correct: Amazon Keyspaces.</strong> Keyspaces is a serverless, managed Apache Cassandra-compatible database service. Applications using native Cassandra drivers (Java DataStax, Python, Node.js) can connect to Keyspaces with a connection string change — no code rewrite. Supports CQL v3.11 and Cassandra-compatible APIs. Auto-scales: on-demand (per request) or provisioned capacity modes. No infrastructure to manage: no Cassandra nodes, no ring management, no compaction tuning. Fully managed backups, point-in-time recovery, encryption at rest and in transit. DynamoDB: different API and data model — requires application rewrite from CQL. RDS PostgreSQL: no CQL compatibility. EMR with Cassandra: still requires managing EC2 nodes. For Cassandra migrations → Keyspaces is the purpose-built answer. Similar pattern: MSK for Kafka, Amazon MQ for ActiveMQ/RabbitMQ, ElastiCache for Redis/Memcached."},

{id:231,domain:"Cost-Optimized Architectures",topic:"Compute",sub:"EC2 Fleet",
q:"A company needs to launch 1,000 EC2 instances for a large batch job. They want to use a mix of Spot Instances for cost savings and On-Demand as fallback, can use multiple instance types (m5.2xlarge, m5a.2xlarge, m4.2xlarge), and want the fleet to be maintained at 1,000 instances even if Spot Instances are interrupted. What should they use?",
o:["1,000 On-Demand Instances","A single Spot Instance request for 1,000 units","EC2 Fleet with multiple instance type pools and a mixed On-Demand/Spot strategy","An EC2 Auto Scaling group"],
c:2,
e:"<strong>Correct: EC2 Fleet with mixed instance types and strategies.</strong> EC2 Fleet (or Spot Fleet) allows you to provision capacity across multiple instance types, purchase options (On-Demand + Spot), and AZs in a single request. Key capabilities: Multiple pools: m5.2xlarge, m5a.2xlarge, m4.2xlarge across 3 AZs = 9 pools — interruption to one pool doesn't lose all capacity. Allocation strategies: capacity-optimized (launch from pool with most available Spot capacity — reduces interruptions), lowest-price (cheapest Spot), price-capacity-optimized (balance). On-Demand base: guarantee a minimum On-Demand count for critical workloads. Target tracking: maintain a target number of instances, auto-replacing Spot interruptions. Auto Scaling Groups also support mixed instance types and Spot — but EC2 Fleet gives more direct control over allocation strategies across pools. For large Spot workloads → multi-pool EC2 Fleet with capacity-optimized allocation."},

{id:232,domain:"Resilient Architectures",topic:"Networking",sub:"AWS Site-to-Site VPN",
q:"A company needs encrypted connectivity between their on-premises data center and their AWS VPC urgently — the connection must be established within hours. They also want the connection to be resilient, so both VPN tunnels should be active simultaneously for redundancy. What should they configure?",
o:["AWS Direct Connect","AWS VPC Peering","AWS Site-to-Site VPN with both tunnels active simultaneously","AWS PrivateLink"],
c:2,
e:"<strong>Correct: AWS Site-to-Site VPN.</strong> Site-to-Site VPN connects on-premises to AWS VPC over the internet via IPSec encrypted tunnels. Provisioning: minutes (just configure the Virtual Private Gateway or Transit Gateway attachment and download the customer gateway config). Each VPN connection has TWO tunnels (endpoints in different AZs) for redundancy — if one tunnel fails, traffic fails over to the other. Active-active: both tunnels carry traffic simultaneously using BGP ECMP (requires Transit Gateway for true active-active; with VGW, one tunnel is active and one is standby). Bandwidth: up to 1.25 Gbps per tunnel. For urgent connectivity or backup to Direct Connect → VPN. Direct Connect: weeks to provision (physical cross-connect at a DX location). The canonical architecture is VPN for quick/low-cost backup + Direct Connect for primary bandwidth/latency requirements."},

{id:233,domain:"Secure Architectures",topic:"Logging & Monitoring",sub:"CloudWatch Metric Filters",
q:"A company's application logs are streaming to a CloudWatch Log Group. The team wants to create a CloudWatch alarm that triggers when more than 100 ERROR log entries appear within any 5-minute window, so they can alert the on-call team. What is the correct approach?",
o:["Export logs to S3 and query with Amazon Athena","Use CloudWatch Logs Insights with a scheduled query","Create a CloudWatch Metric Filter and CloudWatch Alarm on error count","Enable AWS CloudTrail data events on the Log Group"],
c:2,
e:"<strong>Correct: CloudWatch Metric Filter + Alarm.</strong> Metric Filters extract numeric metrics from log data in real-time. Setup: create a filter pattern (e.g., '[level=ERROR]' or just 'ERROR' for simple text matching) on the Log Group; specify a metric name, namespace, and value to increment (usually 1 per match). CloudWatch updates the metric as logs stream in — no delay. Then create a standard CloudWatch Alarm on this metric: Period=300s, Threshold=100, ComparisonOperator=GreaterThanThreshold, Action=SNS. Metric Filters are the standard pattern for 'alert when log pattern occurs.' Logs Insights: ad-hoc queries, not real-time metrics or alarms. S3+Athena: batch analysis with significant delay. CloudTrail: API calls to CloudWatch, not log content. Metric Filter → CloudWatch Alarm → SNS = the canonical log-based alerting pattern."},

{id:234,domain:"High-Performing Architectures",topic:"Networking",sub:"Route 53 — Private Hosted Zones",
q:"A company has multiple VPCs (dev, staging, prod). They want internal DNS resolution so that applications in any VPC can resolve api.internal.company.com to the correct private IP of the internal API service, without using public DNS or exposing internal hostnames. What should they configure?",
o:["Add entries to each EC2 instance's /etc/hosts file","AWS Cloud Map for service discovery","Create a Route 53 Private Hosted Zone and associate it with all VPCs","Create public Route 53 records pointing to private IP addresses"],
c:2,
e:"<strong>Correct: Route 53 Private Hosted Zone.</strong> Private Hosted Zones (PHZ) provide DNS resolution within associated VPCs. Setup: create PHZ for internal.company.com, associate with dev/staging/prod VPCs. DNS resolver (169.254.169.253 / Route 53 Resolver in each VPC) answers queries for *.internal.company.com with records from the PHZ — private IPs, never exposed publicly. PHZ + VPC association: a PHZ can be associated with VPCs across multiple accounts (share PHZ via RAM or cross-account association). VPC DNS settings: enableDnsHostnames=true and enableDnsSupport=true required. Private records coexist: if a public hosted zone also has internal.company.com, Route 53 returns private records when queried from associated VPCs (PHZ takes precedence). /etc/hosts: doesn't scale, requires updating every instance. Public DNS with private IPs: public DNS would expose internal hostnames and private IPs leak — bad security practice."},

{id:235,domain:"High-Performing Architectures",topic:"Databases",sub:"Redshift Spectrum",
q:"A company stores 5 years of historical sales data in S3 (Parquet format, partitioned by year/month) and current-year data in Redshift. Analysts need to run SQL queries that JOIN historical S3 data with current Redshift data without loading all 5 years into Redshift (too expensive). What feature enables this?",
o:["Load all 5 years of historical data directly into Redshift","Use Amazon Athena for S3 queries and join results in application code","Amazon Redshift Spectrum with external tables in the AWS Glue Data Catalog","AWS Glue ETL job to load S3 data into Redshift nightly"],
c:2,
e:"<strong>Correct: Redshift Spectrum.</strong> Redshift Spectrum allows Redshift to query data directly in S3 without loading it. Architecture: define an external schema in Redshift pointing to a Glue Data Catalog database; create external tables referencing S3 locations. In SQL, reference external tables like regular tables — JOIN s3_historical_sales h WITH current_sales c ON h.order_id = c.order_id. Redshift pushes down predicates and projection to Spectrum; Spectrum scans S3 (partitions, columnar formats like Parquet/ORC are efficient); results returned to Redshift leader node for final JOIN. Cost: $5 per TB scanned in S3 (plus Redshift cluster cost). Performance tips: use columnar formats (Parquet), partition by commonly filtered columns (year/month), use Redshift Spectrum with appropriate partitioning to avoid full S3 scans. This eliminates loading 5 years of historical data into expensive Redshift storage."},

{id:236,domain:"Resilient Architectures",topic:"Application Integration",sub:"SNS FIFO",
q:"A company's order processing system uses SNS to fan out order events. They need to ensure that order events for the same order ID are processed in strict order with no parallel processing of the same order, and each event must be processed exactly once. What SNS subscriber configuration achieves this?",
o:["Standard SNS topic with a delivery retry policy","Standard SNS topic with SQS Standard queue subscribers","SNS FIFO topic with SQS FIFO queue subscribers","Standard SNS topic with message filtering"],
c:2,
e:"<strong>Correct: SNS FIFO with SQS FIFO subscribers.</strong> SNS FIFO (First-In-First-Out) topics provide: strict ordering — messages with the same MessageGroupId are delivered in the order published; exactly-once delivery — deduplication via MessageDeduplicationId (or content-based dedup); fan-out — multiple SQS FIFO queue subscribers each receive all messages in order. MessageGroupId = orderId ensures all events for order #123 are processed in sequence across all downstream systems. Limitations: SNS FIFO can ONLY have SQS FIFO queue subscribers (not email, HTTP, Lambda directly). Standard SNS: best-effort ordering, at-least-once delivery — events for the same order may arrive out of order or be duplicated. For 'ordered' + 'exactly-once' + 'fan-out' → SNS FIFO + SQS FIFO is the complete answer."},

{id:237,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS Lambda — SnapStart",
q:"A company has a Java Lambda function with a 6-second cold start time because it initializes a large framework during startup. The function is invoked infrequently but requires fast response when called. What is the MOST effective way to reduce the impact of cold starts without refactoring the function?",
o:["Increase Lambda memory allocation","Use Lambda Provisioned Concurrency","Enable Lambda SnapStart (Java 11+)","Migrate from Spring Boot to Quarkus with native compilation"],
c:2,
e:"<strong>Correct: Lambda SnapStart (Java).</strong> Lambda SnapStart works by: (1) After you publish a function version, Lambda initializes the execution environment (runs init code, loads Spring Boot context). (2) Takes a memory and disk snapshot of the initialized environment. (3) Encrypts and caches the snapshot. (4) On subsequent cold starts, Lambda restores the snapshot rather than re-running initialization — sub-second cold start regardless of framework size. Currently supported: Java 11 and Java 17 runtimes. Key consideration: snapshot restored environments must handle state properly — avoid caching data that should be refreshed per invocation (random seeds, TLS session data, timestamps) in init code. Provisioned Concurrency: eliminates cold starts entirely but bills per provisioned environment-hour. SnapStart: no idle cost, just reduced cold start duration — better for infrequent invocations. Quarkus: valid optimization but requires code migration."},

{id:238,domain:"Resilient Architectures",topic:"Storage",sub:"S3 CORS",
q:"A company has a web application served from https://app.example.com that makes JavaScript fetch() calls directly to an S3 bucket to download JSON data files. The browser blocks these requests with a CORS error. How should this be resolved?",
o:["Move the S3 bucket to the same domain as the web app","Enable public access on the S3 bucket","Configure a CORS rule on the S3 bucket specifying AllowedOrigins","Use Amazon CloudFront with a CloudFront Function to add CORS headers"],
c:2,
e:"<strong>Correct: Configure CORS on the S3 bucket.</strong> CORS (Cross-Origin Resource Sharing) is a browser security mechanism. When app.example.com JavaScript calls s3.amazonaws.com, the browser sends a preflight OPTIONS request; without CORS headers in the response, the browser blocks the actual request. S3 CORS configuration (JSON or XML): AllowedOrigins: which origins can make cross-origin requests (use specific origins in production, not '*'). AllowedMethods: GET, PUT, POST, DELETE, HEAD. AllowedHeaders: which request headers are allowed. ExposeHeaders: which response headers the browser can read. MaxAgeSeconds: how long the browser caches the preflight response. S3 checks the Origin header and responds with matching CORS headers if a rule matches. CORS is NOT about authorization — a private bucket can have CORS rules, but credentials are still needed. Public access is not required for CORS. CloudFront approach also works but adds complexity."},

{id:239,domain:"Secure Architectures",topic:"Encryption",sub:"AWS CloudHSM",
q:"A financial institution must use a FIPS 140-2 Level 3 validated Hardware Security Module (HSM) where they have exclusive control of the hardware and the keys never leave the HSM. AWS must NOT have access to the keys — even for management. Which service meets this requirement?",
o:["AWS KMS with a Customer Managed Key (CMK)","AWS KMS with a Custom Key Store backed by CloudHSM","AWS CloudHSM","On-premises HSM connected via AWS Direct Connect"],
c:2,
e:"<strong>Correct: AWS CloudHSM.</strong> CloudHSM provides dedicated hardware security modules inside your VPC that you exclusively control. Key properties: FIPS 140-2 Level 3 validated — higher than KMS's Level 2. Single-tenant: no sharing with other AWS customers or with AWS. AWS responsibility: physical security, hardware maintenance, availability — AWS cannot access your keys or cryptographic material. You: initialize the HSM, create credentials (crypto officers, crypto users), manage keys — if you lose your HSM credentials, AWS cannot recover your keys. Supports industry-standard APIs: PKCS#11, Java JCE, Microsoft CNG/CryptoAPI. Clustered for HA (multiple HSMs in different AZs). KMS with Customer Managed Keys: AWS manages the underlying HSMs and has operational access for key management. KMS Custom Key Stores: uses CloudHSM but routes through KMS API — KMS has management plane access. CloudHSM = your HSM, only you hold the keys."},

{id:240,domain:"High-Performing Architectures",topic:"Networking",sub:"AWS Global Accelerator — Static IPs",
q:"A company's enterprise clients have strict firewall rules and can only whitelist specific IP addresses. The company serves their application globally through multiple AWS regions but keeps changing their ALB DNS names and IPs when they update infrastructure. What AWS service provides stable, static anycast IP addresses that never change, regardless of backend changes?",
o:["Amazon Route 53 with static IP address records","Elastic IP addresses attached to Application Load Balancers","AWS Global Accelerator with two static anycast IP addresses","Amazon CloudFront"],
c:2,
e:"<strong>Correct: AWS Global Accelerator for static IPs.</strong> Global Accelerator provides exactly two static anycast IP addresses per accelerator. These IPs: never change (persistent for accelerator lifetime), globally anycast (users connect to nearest PoP automatically), support both TCP and UDP traffic (Layer 4). Backend endpoints can change freely (swap ALBs, change regions, add/remove endpoints) without affecting the client-facing IPs. This solves the whitelisting problem: clients configure firewall rules with the two IPs once and never need to update them. CloudFront: doesn't provide static IPs — CloudFront uses a large rotating range of IPs, clients would need to allow the entire aws.json IP range for CloudFront. ALBs and NLBs: DNS-based, IPs change. NLBs do support Elastic IPs (for NLB, not ALB), but they're regional — no global anycast. Global Accelerator static IPs = 'never change the IP, change everything behind it.'"},

{id:241,domain:"High-Performing Architectures",topic:"ML Services",sub:"Amazon SageMaker",
q:"A data science team wants to train a custom ML model on a large dataset in S3, tune hyperparameters automatically, deploy the model as a scalable HTTPS endpoint for real-time inference, and monitor the endpoint for data drift — all without managing servers. Which AWS service provides this end-to-end ML lifecycle?",
o:["AWS Lambda with a scikit-learn layer","Amazon Rekognition","Amazon EMR with Apache Spark MLlib","Amazon SageMaker"],
c:3,
e:"<strong>Correct: Amazon SageMaker.</strong> SageMaker covers the complete ML lifecycle: Data preparation: SageMaker Data Wrangler, Feature Store. Training: managed training jobs (choose instance type, framework — TensorFlow, PyTorch, XGBoost); SageMaker terminates training instances when done. Hyperparameter Tuning: Automatic Model Tuning runs multiple training jobs with different hyperparameter combinations (Bayesian or random search). Model deployment: SageMaker Endpoints — managed HTTPS endpoint with auto-scaling; supports real-time, batch transform, and async inference. Monitoring: SageMaker Model Monitor detects data drift, model quality degradation, feature attribution drift. Pipelines: MLOps automation. Lambda: 15-minute timeout, 10 GB memory — insufficient for large model training. Rekognition: pre-built models only. EMR MLlib: Spark-based, operational overhead. SageMaker = the AWS answer for custom ML end-to-end."},

{id:242,domain:"Resilient Architectures",topic:"Compute",sub:"Lambda — Reserved vs Provisioned Concurrency",
q:"A company has a Lambda function that serves a rate-limited downstream API that can only handle 50 concurrent calls. Without a concurrency limit, Lambda could scale to thousands of concurrent executions and overwhelm the downstream system. What Lambda feature should be configured to protect the downstream API?",
o:["Set the Lambda function timeout to a very low value","Add retry logic with exponential backoff in the Lambda function","Set Lambda Reserved Concurrency to 50","Set Lambda Provisioned Concurrency to 50"],
c:2,
e:"<strong>Correct: Reserved Concurrency for throttling.</strong> Reserved Concurrency has two effects: (1) Maximum cap — Lambda will not scale beyond the reserved amount for this function, regardless of account limits. Requests beyond this limit are throttled (synchronous invocations return HTTP 429 TooManyRequestsException; async invocations go to DLQ/retry). (2) Reservation — sets aside concurrency from the account pool that no other function can use. Set to 50: Lambda runs at most 50 concurrent executions, protecting the downstream at-50-limit dependency. Provisioned Concurrency: pre-warms environments for low latency — does NOT cap concurrency (the function can still scale beyond the provisioned amount using regular on-demand concurrency). Setting timeout low: reduces concurrency slightly but still doesn't cap it reliably. Reserved Concurrency = hard cap on how many executions run simultaneously."},

{id:243,domain:"Secure Architectures",topic:"Networking",sub:"NACL vs Security Group",
q:"A company has an EC2 instance in a public subnet with a security group allowing all inbound traffic on port 80. A NACL on the subnet denies all inbound traffic on port 80 from IP 1.2.3.4. A request arrives from IP 1.2.3.4 on port 80. What is the outcome?",
o:["The request reaches the EC2 instance because security groups take precedence over NACLs","The request is denied by the NACL before reaching the security group","The request is allowed because both must explicitly deny for traffic to be blocked","The security group allow and NACL deny cancel each other out"],
c:1,
e:"<strong>Correct: NACL deny blocks the traffic before it reaches the security group.</strong> Traffic evaluation order: NACLs are evaluated FIRST at the subnet boundary, THEN security groups at the instance ENI. NACLs are stateless and process rules in number order (lowest first), returning the first MATCH (allow or deny). If the NACL denies the traffic, it never reaches the instance or the security group. Security groups are only evaluated if traffic passes the NACL. In this scenario: NACL deny for 1.2.3.4:80 → traffic dropped at subnet boundary → security group never checked. Remember: NACLs are stateless — the return traffic (response from EC2 to client) must also be explicitly allowed in the NACL's outbound rules (ephemeral ports 1024–65535). Security groups are stateful — no outbound rule needed for return traffic. NACL = subnet-level, stateless, ordered rules. SG = instance-level, stateful, all rules evaluated."},

{id:244,domain:"Resilient Architectures",topic:"Compute",sub:"EC2 — Instance Metadata Service",
q:"A developer is writing a script that runs on an EC2 instance and needs to retrieve the instance's current IAM role credentials programmatically, without hardcoding access keys or using the AWS CLI. What endpoint provides this?",
o:["Query the AWS STS API from outside the instance","Read credentials from ~/.aws/credentials on the instance","Query the EC2 Instance Metadata Service (IMDS) endpoint at 169.254.169.254","Use AWS Secrets Manager to store and retrieve IAM credentials"],
c:2,
e:"<strong>Correct: EC2 Instance Metadata Service (IMDS).</strong> IMDS is a local link-local HTTP endpoint (169.254.169.254) accessible only from within the instance — not routable over the network. It provides instance-specific data: instance ID, AZ, public IP, IAM role credentials, user data, AMI ID, security groups. IAM credentials endpoint: GET http://169.254.169.254/latest/meta-data/iam/security-credentials/ returns the role name; GET .../role-name returns rotating temp credentials. AWS SDKs automatically query IMDS for credentials when no static credentials are configured — you rarely need to call IMDS directly. IMDSv2 (recommended): requires a session token (PUT request first to get token, then GET with token header) — protects against SSRF attacks. IMDSv1: simple GET, vulnerable to SSRF. Require IMDSv2 via instance metadata options or SCP. ~/.aws/credentials: not pre-configured on EC2; using static credentials is an antipattern. STS: used by IMDS internally to generate temp credentials."},

{id:245,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"EBS Volume Types",
q:"A company runs a database on EC2 with I/O requirements of 64,000 IOPS and 1,000 MB/s throughput. The volume must support consistent sub-millisecond latency. Which EBS volume type is required?",
o:["Amazon EBS gp3 (General Purpose SSD)","Amazon EBS gp2 (General Purpose SSD, previous generation)","Amazon EBS io2 Block Express (Provisioned IOPS SSD)","Amazon EBS st1 (Throughput Optimized HDD)"],
c:2,
e:"<strong>Correct: io2 Block Express.</strong> EBS volume types: gp3: 3,000–16,000 IOPS (provisioned), up to 1,000 MB/s — 64K IOPS exceeds gp3 max. gp2: 3 IOPS/GB, max 16,000 IOPS baseline (bursting to 3,000 for small volumes) — also cannot reach 64K. io1: up to 64,000 IOPS (on Nitro instances), 1,000 MB/s — technically meets IOPS but io2 BE is superior. io2 Block Express: up to 256,000 IOPS, 4,000 MB/s, single-digit millisecond latency, 99.999% durability (vs 99.9% for other types) — designed for large, mission-critical databases. Requires Nitro-based EC2 instances. st1: sequential throughput HDD (500 MB/s max), NOT for random IOPS databases. sc1: cold HDD, infrequent access. For '64,000 IOPS + 1,000 MB/s + sub-millisecond' → io2 Block Express is the only single-volume answer."},

{id:246,domain:"Resilient Architectures",topic:"Networking",sub:"VPC CIDR Planning",
q:"A company is planning a new VPC that will eventually need to support 1,000 EC2 instances across 4 subnets (2 public, 2 private) in 2 AZs. They plan to peer the VPC with their existing VPC (10.0.0.0/16). What CIDR block should they use?",
o:["10.0.0.0/16","172.16.0.0/20","10.1.0.0/16","192.168.0.0/30"],
c:2,
e:"<strong>Correct: 10.1.0.0/16 (non-overlapping, sufficient size).</strong> VPC Peering requirement: VPC CIDRs must NOT overlap — identical or overlapping CIDRs cannot be peered (10.0.0.0/16 cannot peer with 10.0.0.0/16 or 10.0.128.0/17). 10.1.0.0/16 provides 65,534 usable IPs across the VPC. Subnet sizing for 1,000 instances across 4 subnets: /20 per subnet (~4,094 IPs each, 4,094 × 4 = 16,376 available) — ample for 1,000 with room for growth. AWS reserves 5 IPs per subnet (first 4 and last 1). CIDR immutability: VPC primary CIDR cannot be changed after creation; you can add secondary CIDRs but can't remove the primary. Plan for future growth: /16 is the largest VPC CIDR (65K IPs); /28 is the smallest subnet (11 usable IPs). Always choose non-overlapping RFC 1918 ranges for VPCs that will peer or connect via VPN."},

{id:247,domain:"High-Performing Architectures",topic:"Databases",sub:"Amazon MemoryDB",
q:"A company uses Redis as their primary database (not just a cache) for a leaderboard application — data must be durable and survive Redis node failures without data loss. They currently lose leaderboard data when the Redis primary fails because replicas have replication lag. What AWS service provides Redis-compatible in-memory storage with strong consistency and multi-AZ durability?",
o:["Amazon ElastiCache for Redis with Multi-AZ and automatic failover","Amazon ElastiCache for Redis with read replicas across AZs","Amazon MemoryDB for Redis","Amazon RDS"],
c:2,
e:"<strong>Correct: Amazon MemoryDB for Redis.</strong> MemoryDB is purpose-built for using Redis as a primary database (not cache). Key difference from ElastiCache Redis: MemoryDB stores data in a durable, distributed, Multi-AZ transaction log. Every write is persisted to this log before the write is acknowledged — no data loss on node failure or AZ outage. ElastiCache Redis: asynchronous replication — the primary acknowledges writes before they reach replicas; on failover, promoted replica may be missing recent writes. MemoryDB use cases: leaderboards, session stores, user profiles, financial ledgers — anywhere Redis is the database of record and durability matters. Same Redis APIs, data structures, and commands as ElastiCache. MemoryDB provides: read microsecond, write single-digit ms, 99.99% availability, automatic failover with zero data loss. If the question says 'Redis as primary database' + 'no data loss' → MemoryDB."},

{id:248,domain:"Resilient Architectures",topic:"Application Integration",sub:"API Gateway — Throttling",
q:"A company's API Gateway REST API endpoint is being overwhelmed during traffic spikes — the downstream Lambda function is throttling and users receive 429 errors. The team wants to smooth out bursts by queuing excess requests and processing them as Lambda capacity becomes available, while maintaining eventual processing of all requests. What architecture change should be made?",
o:["Increase Lambda Reserved Concurrency","Enable API Gateway response caching","Configure API Gateway to write to an SQS queue and process asynchronously with Lambda","Enable API Gateway usage plans and throttling"],
c:2,
e:"<strong>Correct: API Gateway → SQS → Lambda (async buffering).</strong> This is the request buffering pattern: API Gateway receives the request and writes it to SQS (using the AWS service integration — no Lambda invoke, just a PutMessage). Client gets 200 Accepted immediately. A consumer Lambda polls SQS at a controlled rate (set via event source mapping batch size and concurrency). SQS acts as an elastic buffer — handles traffic spikes without dropping requests. Lambda processes at a steady rate within its concurrency limits. Benefits: decoupling (no direct synchronous Lambda invocation under load), durability (SQS retains messages up to 14 days), controlled processing rate. Tradeoff: asynchronous — clients don't get a synchronous response; need a separate mechanism (webhook, polling endpoint, WebSocket) to return results. API Gateway caching: serves cached responses for repeated requests, doesn't help with novel requests under load. Lambda Reserved Concurrency: caps executions but still drops excess synchronous requests."},

{id:249,domain:"Secure Architectures",topic:"Data Protection",sub:"Amazon Macie — Automated Findings",
q:"A company wants to automatically remediate Macie findings where an S3 object containing SSNs is found in a bucket that should NEVER contain PII. When Macie generates a finding, the object should automatically be quarantined (moved to a separate restricted bucket) within minutes. What architecture achieves this?",
o:["Review Macie findings weekly and manually quarantine non-compliant objects","Configure Amazon Macie to block S3 access on a finding","Amazon Macie findings to EventBridge, triggering a Lambda quarantine function","Configure Amazon Macie to automatically delete objects with sensitive data"],
c:2,
e:"<strong>Correct: Macie → EventBridge → Lambda remediation.</strong> Macie generates findings and publishes them to EventBridge (and Security Hub) in real time. EventBridge rule: source: aws.macie, detailType: Macie Finding, filter by findingType containing 'SensitiveData'. Target: Lambda function. Lambda action: (1) Extract s3BucketName and s3ObjectKey from the finding. (2) Copy the object to a quarantine bucket (s3:CopyObject). (3) Delete the original (s3:DeleteObject). (4) Optionally tag the quarantine object with the finding ID and send an SNS notification. This is the standard automated remediation pattern for security findings: Finding → EventBridge → Lambda action. Macie itself only generates findings — it cannot perform S3 operations. Same pattern applies to GuardDuty findings (e.g., compromised EC2 → EventBridge → Lambda → isolate via security group change). Key principle: AWS security services detect, EventBridge routes, Lambda remediates."},

{id:250,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS App Runner",
q:"A startup developer has a containerized web API (Docker image in ECR). They want it deployed to a production HTTPS endpoint with automatic scaling (scale to zero when no traffic, scale up on demand), zero infrastructure management, and CI/CD that auto-deploys when the ECR image is updated — all configured in minutes. What is the fastest path?",
o:["Amazon ECS with Fargate","Amazon EKS with Fargate profiles","AWS App Runner","Amazon EC2 with Docker"],
c:2,
e:"<strong>Correct: AWS App Runner.</strong> App Runner is a fully managed container application service designed for speed and simplicity. You provide: an ECR image (or GitHub repo with a Dockerfile/runtime) and configuration (CPU, memory, port, environment variables). App Runner handles: provisioning compute, load balancing, TLS certificate, auto-scaling (including scale-to-zero with fast scale-up), health checks, and CI/CD (redeploy on ECR image push or GitHub commit). HTTPS URL ready in minutes. Tradeoffs vs ECS/EKS: no VPC support by default (App Runner VPC connector available for private resources), limited customization, fewer configuration options. Best for: web APIs, microservices, simple web apps that need to go from container to production HTTPS quickly. ECS Fargate: more control but requires significant AWS resource configuration (~10–15 steps). EKS: Kubernetes expertise and cluster management. App Runner = 'I have a Docker image, give me a URL.'"},

{id:251,domain:"Resilient Architectures",topic:"Storage",sub:"EFS Performance Modes",
q:"A machine learning team runs distributed training jobs that perform millions of small file operations (checkpointing model weights every few seconds) on EFS. The file system is currently in General Purpose performance mode and latency is becoming a bottleneck. What should they change?",
o:["Switch from EFS Standard to EFS Infrequent Access storage class","Enable EFS Intelligent Tiering","Switch to EFS Max I/O performance mode","Migrate to Amazon FSx for Lustre"],
c:2,
e:"<strong>Correct: Max I/O performance mode.</strong> EFS performance modes: General Purpose (default): lowest per-operation latency, recommended for most workloads, max 35,000 read IOPS / 7,000 write IOPS. Max I/O: higher aggregate IOPS and throughput for massively parallel workloads (hundreds/thousands of EC2 instances or containers), slightly higher latency per operation. Choose Max I/O when aggregate throughput matters more than per-operation latency. Additionally consider: Provisioned Throughput: specify a throughput level independent of storage size (useful when workload is throughput-bound, not IOPS-bound). Bursting Throughput: throughput scales with storage size. FSx for Lustre: also valid for ML training — extremely high performance parallel file system, integrates with S3; often preferred for pure ML training I/O. Performance mode cannot be changed after creation — important design decision."},

{id:252,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Trusted Advisor",
q:"A company wants to identify EC2 instances with consistently low utilization (CPU < 10% for 14 days), unused Elastic IPs, idle load balancers, and RDS instances with 0 connections — to right-size and delete unused resources and reduce their bill. Where can they get these recommendations without building custom monitoring?",
o:["AWS Cost Explorer","AWS Config","AWS Trusted Advisor","Amazon CloudWatch metrics with manual analysis"],
c:2,
e:"<strong>Correct: AWS Trusted Advisor.</strong> Trusted Advisor analyzes your AWS account and provides actionable recommendations across five pillars: Cost Optimization: low-utilization EC2 instances (CPU < 10%, network < 5 MB for 14 days), idle load balancers (< 100 requests/day), unassociated Elastic IPs ($0.005/hour when unattached), underutilized RDS instances (0 connections for 7 days), obsolete EBS snapshots. Security: open security groups, MFA on root, exposed access keys. Fault Tolerance: EBS snapshot age, S3 bucket logging. Performance: high-utilization EC2, CloudFront cache hit ratios. Service Limits: approaching quotas. Business/Enterprise support plans get full checks; Basic/Developer get limited free checks. AWS Compute Optimizer: ML-based right-sizing for EC2, Lambda, ECS on Fargate — more detailed instance recommendations. Trusted Advisor is the broader 'find cost waste and other issues' tool."},

{id:253,domain:"Resilient Architectures",topic:"Compute",sub:"Auto Scaling — Cooldown",
q:"An Auto Scaling Group (ASG) adds an instance when CPU > 70% (scale-out). Immediately after a scale-out event, CPU drops to 65% but within 2 minutes spikes to 80%, triggering another scale-out. The team sees 'thrashing' — instances are added and removed repeatedly. What ASG feature prevents this?",
o:["Increase the Auto Scaling group minimum instance count","Switch to a target tracking scaling policy","Increase the Auto Scaling group cooldown period","Enable instance scale-in protection"],
c:2,
e:"<strong>Correct: ASG Cooldown Period.</strong> The cooldown period is a pause after a scaling activity during which the ASG doesn't evaluate scaling policies. Default: 300 seconds (5 minutes). During the cooldown, the ASG waits for new instances to come up and start handling traffic (which reduces CPU) before triggering another scale event. Without adequate cooldown: scale-out event → CPU briefly drops → more scale-out triggers before previous instances are serving → over-provision → scale-in triggers. Cooldown prevents this oscillation. Types: default cooldown (applies to all simple scaling policies), and per-policy cooldown (step scaling, target tracking have their own cooldown override). Target tracking scaling: uses a target tracking policy with a built-in warmup period and scale-in cooldown (default 300s for scale-in) — inherently smoother than simple scaling. Instance warm-up (for target tracking and step scaling): time for new instances to contribute to CloudWatch metrics before they count toward aggregate metrics."},

{id:254,domain:"High-Performing Architectures",topic:"Application Integration",sub:"SQS — Long Polling",
q:"A Lambda function polls an SQS queue every second to check for messages. When the queue is empty (which happens 90% of the time), Lambda still runs, consuming concurrency and costing money. How can you eliminate unnecessary empty polls and reduce cost?",
o:["Switch to an SQS FIFO queue","Increase the Lambda function timeout","Enable SQS Long Polling (ReceiveMessageWaitTimeSeconds = 20)","Enable SQS message deduplication"],
c:2,
e:"<strong>Correct: SQS Long Polling.</strong> SQS polling modes: Short polling (default, WaitTimeSeconds=0): SQS immediately returns — even if no messages. Checks a subset of servers. May return empty even if messages exist. Long polling (WaitTimeSeconds=1–20): SQS holds the connection for up to the specified seconds waiting for messages. Returns as soon as a message arrives or after the wait time. Queries all SQS servers. Benefits: eliminates most empty responses (fewer API calls = lower cost), reduces false empties (messages won't be missed). Configure at queue level (ReceiveMessageWaitTimeSeconds) or per-request. Lambda SQS trigger: automatically uses long polling — you don't need to implement it. For custom polling code, set WaitTimeSeconds=20 in ReceiveMessage calls. Cost impact: if 90% of polls were empty at $0.0000004/request, long polling can reduce API calls by 80–90%, saving cost. FIFO queues: ordering/deduplication, same polling modes apply."},

{id:255,domain:"Secure Architectures",topic:"Compliance",sub:"HIPAA on AWS",
q:"A healthcare company wants to store Protected Health Information (PHI) on AWS. They need to ensure HIPAA compliance, including having a Business Associate Agreement (BAA) in place with AWS. Where do they sign the BAA and which AWS services can they use for PHI?",
o:["HIPAA compliance is not achievable on AWS","Submit a legal request to Amazon to negotiate a custom BAA","Sign the AWS Business Associate Agreement (BAA) through AWS Artifact and use only HIPAA-eligible services","HIPAA compliance is automatic on AWS — no BAA is required"],
c:2,
e:"<strong>Correct: Sign BAA via AWS Artifact, use only HIPAA-eligible services.</strong> HIPAA on AWS requires: (1) Business Associate Agreement: sign the AWS BAA through AWS Artifact (Agreements tab) — self-service, covers all HIPAA-eligible services. (2) Use only HIPAA-eligible services for PHI: AWS publishes a list of ~100+ eligible services (EC2, S3, RDS, Lambda, DynamoDB, SageMaker, etc.). (3) Implement appropriate technical safeguards: encryption at rest (KMS), encryption in transit (TLS), access controls (IAM), audit logging (CloudTrail). (4) Shared responsibility: AWS secures the infrastructure; customer secures their applications and data. Not all AWS services are HIPAA-eligible — check the AWS HIPAA Compliance page before using a service for PHI. Signing the BAA doesn't automatically make your architecture compliant — you must also implement proper controls. AWS Artifact = the self-service portal for AWS compliance agreements and reports."},

{id:256,domain:"High-Performing Architectures",topic:"Databases",sub:"Neptune",
q:"A social networking application needs to query complex relationships like 'find all friends-of-friends who live in New York and have purchased the same products as User A' — traversing multi-hop relationships efficiently. A relational database struggles with these queries. What database is purpose-built for this?",
o:["Amazon DynamoDB","Amazon Redshift","Amazon Neptune","Amazon DocumentDB"],
c:2,
e:"<strong>Correct: Amazon Neptune.</strong> Neptune is a managed graph database optimized for storing and querying highly connected data. Graph concepts: vertices (nodes: people, products, cities), edges (relationships: FRIEND_OF, PURCHASED, LIVES_IN), properties on both. Multi-hop queries are first-class: 'Find all vertices reachable within 3 hops from User A via FRIEND_OF edges, filtered by LIVES_IN New York' is a simple Gremlin or SPARQL query. In SQL, this would require expensive recursive CTEs or multiple JOINs. Use cases: social networks, recommendation engines, fraud detection (find transaction ring: A→B→C→A), knowledge graphs, network topology, identity graphs. Query languages: Gremlin (property graph), SPARQL (RDF semantic graph), openCypher. Neptune supports Multi-AZ and read replicas. DynamoDB/Redshift/DocumentDB: all require application-level graph traversal logic — they're not graph-native."},

{id:257,domain:"High-Performing Architectures",topic:"Databases",sub:"Amazon QLDB",
q:"A financial services company needs an immutable ledger to record all financial transactions. Every transaction must be cryptographically verifiable — auditors should be able to prove that no historical transaction has been altered or deleted, and the system must provide a complete audit trail without any delete or update capability. What service provides this?",
o:["Amazon RDS with triggers writing to an audit table","Amazon DynamoDB with versioning enabled","Amazon QLDB (Quantum Ledger Database)","Amazon S3 with Object Lock in Compliance mode"],
c:2,
e:"<strong>Correct: Amazon QLDB.</strong> QLDB is a fully managed ledger database with a built-in immutable journal. Key properties: Append-only journal: changes are always additions — you cannot delete or modify historical entries. All versions of every document are retained. Cryptographic verification: QLDB maintains a hash chain (Merkle tree-like structure) over the journal; a digest covers all committed transactions. To verify a transaction, request its proof — cryptographically verify it was included in the journal without modification. PartiQL query language: SQL-compatible, can query current and historical data. Use cases: financial transactions, supply chain provenance, DMV records, healthcare records — anywhere you need an authoritative, tamper-evident system of record. Unlike blockchain (decentralized, consensus-based), QLDB is centralized (owned by one entity) but still cryptographically verifiable. Not for decentralized trust — for that, use Amazon Managed Blockchain."},

{id:258,domain:"Resilient Architectures",topic:"Compute",sub:"AWS Fargate — Task Sizing",
q:"A containerized data processing task runs as an ECS Fargate task. The task currently uses 4 vCPU and 8 GB memory but analysis shows it peaks at 1.5 vCPU and 3 GB memory. The task runs 10,000 times per month and each run takes 10 minutes. What is the cost impact of right-sizing to 2 vCPU / 4 GB?",
o:["No cost impact — Fargate charges per task regardless of CPU and memory settings","No cost impact — Fargate charges a flat rate per task launch","Approximately 50% cost reduction — Fargate bills per vCPU-second and per GB-second","Cost increases due to configuration management overhead"],
c:2,
e:"<strong>Correct: ~50% cost reduction.</strong> Fargate pricing: charged per vCPU-second ($0.04048/vCPU-hour) and per GB-second ($0.004445/GB-hour), starting from task launch until task stops. Current cost: 4 vCPU × $0.04048 + 8 GB × $0.004445 = $0.19742/hour. Right-sized: 2 vCPU × $0.04048 + 4 GB × $0.004445 = $0.09871/hour — exactly 50% less. Over 10,000 tasks × 10 min = 1,667 task-hours: savings = $0.09871 × 1,667 = ~$164/month. Always right-size Fargate tasks based on actual metrics (CloudWatch Container Insights provides per-container CPU and memory utilization). ECS Fargate valid vCPU/memory combinations are constrained (e.g., 2 vCPU requires 4–16 GB). AWS Compute Optimizer can recommend right-sized task definitions for ECS Fargate."},

{id:259,domain:"Secure Architectures",topic:"IAM",sub:"AWS Organizations — Tag Policies",
q:"A company wants to enforce consistent resource tagging across all accounts in their AWS Organization — specifically that every EC2 instance must have a 'CostCenter' tag with values from an approved list ['Engineering', 'Marketing', 'Finance']. Invalid or missing tags should be flagged. What is the correct mechanism?",
o:["IAM permission boundaries on the CreateTags API","AWS Organizations SCP to deny ec2:RunInstances without a CostCenter tag","AWS Organizations Tag Policies combined with an SCP for enforcement","AWS Config rules to detect and alert on non-compliant tags"],
c:2,
e:"<strong>Correct: Tag Policies for compliance reporting (+ SCP for enforcement).</strong> Organizations Tag Policies define the tag key case (CostCenter not costcenter) and allowed values. They generate compliance reports accessible via the Resource Groups Tagging API — showing which resources violate tag policy. Important nuance: Tag Policies by default are REPORTING only — they don't block resource creation with invalid tags. To actually ENFORCE: combine with an SCP that denies ec2:RunInstances unless the aws:RequestTag/CostCenter condition is met with an allowed value. Tag Policies + enforcement mode (Preview): AWS does allow enforcement mode in Tag Policies to prevent non-compliant tag operations, but this is newer functionality — exam questions often focus on reporting vs. enforcement distinction. For the exam: Tag Policies = define tag standards + report compliance. SCP = enforce (block API calls without correct tags). Config rules = detect non-compliance after the fact."},

{id:260,domain:"High-Performing Architectures",topic:"Compute",sub:"EC2 — AMI",
q:"A company wants to create a 'golden AMI' — a pre-configured EC2 image with all OS patches applied, required software installed, security hardening applied, and monitoring agents pre-installed. New EC2 instances must always launch from this AMI. How should they build and maintain this AMI?",
o:["Manually launch, configure, and snapshot an EC2 instance monthly","Use EC2 User Data scripts to install software at launch time","Use EC2 Image Builder with automated scheduled pipelines","Containerize the software and run Docker instead of using AMIs"],
c:2,
