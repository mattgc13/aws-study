o:["HIPAA compliance is not possible on AWS — PHI cannot be stored in the cloud","Send a legal request to Amazon Legal and wait for a custom BAA to be negotiated","Sign the AWS BAA through AWS Artifact (Agreements section) — no negotiation needed; then use only HIPAA-eligible services (EC2, S3, RDS, DynamoDB, Lambda, CloudTrail, KMS, etc.) for PHI storage and processing; non-eligible services cannot be used for PHI even with a BAA","HIPAA compliance is automatic on AWS — no BAA required because AWS is inherently compliant"],
c:2,
e:"<strong>Correct: Sign BAA via AWS Artifact, use only HIPAA-eligible services.</strong> HIPAA on AWS requires: (1) Business Associate Agreement: sign the AWS BAA through AWS Artifact (Agreements tab) — self-service, covers all HIPAA-eligible services. (2) Use only HIPAA-eligible services for PHI: AWS publishes a list of ~100+ eligible services (EC2, S3, RDS, Lambda, DynamoDB, SageMaker, etc.). (3) Implement appropriate technical safeguards: encryption at rest (KMS), encryption in transit (TLS), access controls (IAM), audit logging (CloudTrail). (4) Shared responsibility: AWS secures the infrastructure; customer secures their applications and data. Not all AWS services are HIPAA-eligible — check the AWS HIPAA Compliance page before using a service for PHI. Signing the BAA doesn't automatically make your architecture compliant — you must also implement proper controls. AWS Artifact = the self-service portal for AWS compliance agreements and reports."},

{id:256,domain:"High-Performing Architectures",topic:"Databases",sub:"Neptune",
q:"A social networking application needs to query complex relationships like 'find all friends-of-friends who live in New York and have purchased the same products as User A' — traversing multi-hop relationships efficiently. A relational database struggles with these queries. What database is purpose-built for this?",
o:["Amazon DynamoDB — NoSQL, stores relationships as nested attributes","Amazon Redshift — data warehouse, good for complex analytical queries","Amazon Neptune — fully managed graph database supporting Gremlin (Apache TinkerPop) and SPARQL (RDF/SPARQL) query languages; designed for highly connected data: social networks, knowledge graphs, fraud detection, recommendation engines — multi-hop relationship traversals (MATCH path queries) are native operations, not expensive JOINs","Amazon DocumentDB — document database, stores relationship data in JSON"],
c:2,
e:"<strong>Correct: Amazon Neptune.</strong> Neptune is a managed graph database optimized for storing and querying highly connected data. Graph concepts: vertices (nodes: people, products, cities), edges (relationships: FRIEND_OF, PURCHASED, LIVES_IN), properties on both. Multi-hop queries are first-class: 'Find all vertices reachable within 3 hops from User A via FRIEND_OF edges, filtered by LIVES_IN New York' is a simple Gremlin or SPARQL query. In SQL, this would require expensive recursive CTEs or multiple JOINs. Use cases: social networks, recommendation engines, fraud detection (find transaction ring: A→B→C→A), knowledge graphs, network topology, identity graphs. Query languages: Gremlin (property graph), SPARQL (RDF semantic graph), openCypher. Neptune supports Multi-AZ and read replicas. DynamoDB/Redshift/DocumentDB: all require application-level graph traversal logic — they're not graph-native."},

{id:257,domain:"High-Performing Architectures",topic:"Databases",sub:"Amazon QLDB",
q:"A financial services company needs an immutable ledger to record all financial transactions. Every transaction must be cryptographically verifiable — auditors should be able to prove that no historical transaction has been altered or deleted, and the system must provide a complete audit trail without any delete or update capability. What service provides this?",
o:["RDS with triggers that write to an audit table — audit table could be modified","DynamoDB with TTL disabled and versioning — can still be deleted by admins","Amazon QLDB (Quantum Ledger Database) — immutable, cryptographically verifiable ledger; uses a journal-based storage model where all changes are append-only; the entire history of every document change is maintained; a hash chain (SHA-256) over the journal makes any tampering detectable; applications can verify the integrity of any transaction using the digest API","S3 Object Lock in Compliance mode — immutable object storage but not a queryable database"],
c:2,
e:"<strong>Correct: Amazon QLDB.</strong> QLDB is a fully managed ledger database with a built-in immutable journal. Key properties: Append-only journal: changes are always additions — you cannot delete or modify historical entries. All versions of every document are retained. Cryptographic verification: QLDB maintains a hash chain (Merkle tree-like structure) over the journal; a digest covers all committed transactions. To verify a transaction, request its proof — cryptographically verify it was included in the journal without modification. PartiQL query language: SQL-compatible, can query current and historical data. Use cases: financial transactions, supply chain provenance, DMV records, healthcare records — anywhere you need an authoritative, tamper-evident system of record. Unlike blockchain (decentralized, consensus-based), QLDB is centralized (owned by one entity) but still cryptographically verifiable. Not for decentralized trust — for that, use Amazon Managed Blockchain."},

{id:258,domain:"Resilient Architectures",topic:"Compute",sub:"AWS Fargate — Task Sizing",
q:"A containerized data processing task runs as an ECS Fargate task. The task currently uses 4 vCPU and 8 GB memory but analysis shows it peaks at 1.5 vCPU and 3 GB memory. The task runs 10,000 times per month and each run takes 10 minutes. What is the cost impact of right-sizing to 2 vCPU / 4 GB?",
o:["Right-sizing doesn't affect Fargate cost — Fargate charges per task regardless of CPU/memory settings","Fargate charges a flat rate per task launch, not per resource","Fargate bills per vCPU-second and per GB-second. Right-sizing from 4 vCPU/8 GB to 2 vCPU/4 GB reduces both dimensions by 50% — cost is approximately halved. At 10,000 runs × 10 minutes each = 100,000 minutes of compute: ~50% savings on both vCPU and memory charges = ~50% total cost reduction","Right-sizing always increases cost due to configuration management overhead"],
c:2,
e:"<strong>Correct: ~50% cost reduction.</strong> Fargate pricing: charged per vCPU-second ($0.04048/vCPU-hour) and per GB-second ($0.004445/GB-hour), starting from task launch until task stops. Current cost: 4 vCPU × $0.04048 + 8 GB × $0.004445 = $0.19742/hour. Right-sized: 2 vCPU × $0.04048 + 4 GB × $0.004445 = $0.09871/hour — exactly 50% less. Over 10,000 tasks × 10 min = 1,667 task-hours: savings = $0.09871 × 1,667 = ~$164/month. Always right-size Fargate tasks based on actual metrics (CloudWatch Container Insights provides per-container CPU and memory utilization). ECS Fargate valid vCPU/memory combinations are constrained (e.g., 2 vCPU requires 4–16 GB). AWS Compute Optimizer can recommend right-sized task definitions for ECS Fargate."},

{id:259,domain:"Secure Architectures",topic:"IAM",sub:"AWS Organizations — Tag Policies",
q:"A company wants to enforce consistent resource tagging across all accounts in their AWS Organization — specifically that every EC2 instance must have a 'CostCenter' tag with values from an approved list ['Engineering', 'Marketing', 'Finance']. Invalid or missing tags should be flagged. What is the correct mechanism?",
o:["IAM permission boundaries — deny CreateTags API unless approved values are used","SCP to deny ec2:RunInstances without a CostCenter tag — this works but doesn't validate allowed values","AWS Organizations Tag Policies — define tag keys (CostCenter) and allowed values (['Engineering', 'Marketing', 'Finance']); attach to OUs or accounts; Tag Policies generate compliance reports (via Resource Groups Tagging API) showing non-compliant resources but do NOT enforce at creation time (they report, not block) — combine with SCP to DENY RunInstances without required tags for enforcement","AWS Config rules — detect non-compliant tags and send alerts"],
c:2,
e:"<strong>Correct: Tag Policies for compliance reporting (+ SCP for enforcement).</strong> Organizations Tag Policies define the tag key case (CostCenter not costcenter) and allowed values. They generate compliance reports accessible via the Resource Groups Tagging API — showing which resources violate tag policy. Important nuance: Tag Policies by default are REPORTING only — they don't block resource creation with invalid tags. To actually ENFORCE: combine with an SCP that denies ec2:RunInstances unless the aws:RequestTag/CostCenter condition is met with an allowed value. Tag Policies + enforcement mode (Preview): AWS does allow enforcement mode in Tag Policies to prevent non-compliant tag operations, but this is newer functionality — exam questions often focus on reporting vs. enforcement distinction. For the exam: Tag Policies = define tag standards + report compliance. SCP = enforce (block API calls without correct tags). Config rules = detect non-compliance after the fact."},

{id:260,domain:"High-Performing Architectures",topic:"Compute",sub:"EC2 — AMI",
q:"A company wants to create a 'golden AMI' — a pre-configured EC2 image with all OS patches applied, required software installed, security hardening applied, and monitoring agents pre-installed. New EC2 instances must always launch from this AMI. How should they build and maintain this AMI?",
o:["Manually launch an EC2 instance, configure it, create an AMI snapshot — repeat monthly","Use EC2 User Data scripts — install everything at launch time (8-minute install delay on every new instance)","Use EC2 Image Builder — automates AMI creation pipelines: define base OS, software components (install packages, run scripts), and test components (run tests on the built image); schedule weekly builds that automatically patch and rebuild the AMI; share the AMI across accounts via Organizations; Launch Templates reference the latest AMI version","Use Docker and run software as containers instead of baking AMIs"],
c:2,
e:"<strong>Correct: EC2 Image Builder.</strong> EC2 Image Builder automates the creation, maintenance, validation, and distribution of AMIs (and container images). Pipeline components: (1) Infrastructure Configuration: EC2 instance type and IAM role used during build. (2) Image Recipe: base image (latest Amazon Linux 2) + components (BuildComponent: install/configure software, run hardening scripts) + test components (TestComponent: run compliance checks, verify software). (3) Distribution settings: copy AMI to target regions, share with target accounts. Schedule: trigger weekly → automatically applies latest OS patches. The built AMI is tested before distribution. Integration: Launch Templates can reference the latest version of a shared AMI. Benefits over manual process: repeatable, auditable, automated patching, version history. User data: installs at every launch — slow, inconsistent across instances (different package versions at different times). Golden AMI pattern: bake everything in — faster launch, consistent configuration."},

{id:261,domain:"Resilient Architectures",topic:"High Availability",sub:"Elastic IP and EC2 Failover",
q:"A legacy application requires a fixed IP address for DNS (the IP is hardcoded in several client configurations). The application runs on EC2. If the instance fails, a replacement instance must be reachable at the SAME IP address within 5 minutes, without any DNS changes. How is this achieved?",
o:["Assign a static private IP to the instance — private IPs are instance-specific and cannot be moved","Use a NLB with a static IP — the IP changes if you delete and recreate the NLB","Allocate an Elastic IP (EIP) and associate it with the primary EC2 instance; if the instance fails, launch a replacement instance and re-associate the SAME EIP with the new instance using aws ec2 associate-address — the EIP persists independently of instances, and re-association takes seconds","Use Route 53 with a 30-second TTL pointing to the instance's public IP — DNS propagation achieves the same effect"],
c:2,
e:"<strong>Correct: Elastic IP (EIP) re-association.</strong> An Elastic IP is a static public IPv4 address that belongs to your account (not an instance). You associate it with an EC2 instance; it stays associated until you disassociate it. On instance failure: (1) Detect failure (CloudWatch alarm, health check). (2) Terminate or stop failed instance (disassociates the EIP automatically). (3) Launch replacement instance. (4) Associate the EIP with the new instance (aws ec2 associate-address — takes seconds, not minutes). Result: the EIP moves to the new instance; clients using the IP experience connectivity within the failover time (instance launch + EIP re-association). EIPs are free when associated with a running instance; $0.005/hour when allocated but not associated. Route 53 low TTL: changes the DNS record (different IP) — doesn't work for hardcoded IPs. NLB with static IP: better long-term solution but requires architecture change."},

{id:262,domain:"High-Performing Architectures",topic:"Serverless",sub:"Step Functions — Express Workflows",
q:"A company processes IoT sensor events at 10,000 events/second. Each event triggers a short workflow: validate → transform → store in DynamoDB → publish to SNS. Each execution completes in under 5 seconds. They evaluated Standard Step Functions Workflows but the cost is too high at this volume. What is the right Step Functions workflow type?",
o:["Standard Workflows — up to 1 year duration, exactly-once execution, full audit history; best for low-volume long-running workflows","Lambda-chained functions — simpler but no built-in state management or retry logic","Express Workflows — designed for high-volume, short-duration workloads (up to 5 minutes); priced per execution + duration (not per state transition like Standard); supports at-least-once execution; ideal for IoT event processing, data transformation pipelines, streaming data — up to 100,000 executions/second","Standard Workflows with a lower price tier for high-volume workloads — no such tier exists"],
c:2,
e:"<strong>Correct: Step Functions Express Workflows.</strong> Two workflow types: Standard Workflows: max 1 year duration, exactly-once execution semantics, full execution history in console/CloudWatch, priced per state transition ($0.025 per 1,000 transitions) — expensive at high volume (10K events/sec × many transitions). Express Workflows: max 5 minutes duration, at-least-once execution (idempotent steps required), execution history only in CloudWatch Logs, priced per execution + GB-second of duration — much cheaper at high volume; supports 100,000+ executions/second. For IoT at 10K events/second with 5-second executions → Express Workflows: ~10,000 executions/second × $0.000001/execution = $0.01/second = $864/day. Standard at same volume would be prohibitively expensive. Choose Standard when you need: exactly-once guarantees, long durations, full execution history in console. Choose Express for: high-volume, short-duration, cost-sensitive event processing."},

{id:263,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"AWS Budgets Actions",
q:"A company's development team has a monthly budget of $5,000. In previous months, a runaway process left EC2 instances running and the bill reached $12,000. They want to automatically stop EC2 instances in the dev account when the forecasted spend exceeds $5,000, without human intervention. What is the correct approach?",
o:["Set up a CloudWatch billing alarm at $5,000 and send an email — requires human action to stop instances","Use Cost Explorer budget alerts — alerts only, no automated action","Configure an AWS Budget with a Budget Action — set alert at 100% of $5,000 forecasted cost; add a Budget Action that applies an SCP to the dev account (denying ec2:StartInstances and ec2:RunInstances) or runs an SSM Automation document that stops all running EC2 instances — automated enforcement without human intervention","Write a Lambda function that checks spend daily and stops instances if over budget"],
c:2,
e:"<strong>Correct: AWS Budgets with Budget Actions.</strong> Budget Actions allow automatic enforcement when a budget threshold is breached. Action types: (1) Apply an IAM policy: attach a policy to IAM users/roles (e.g., deny ec2:RunInstances). (2) Apply a Service Control Policy: attach an SCP to an OU or account (stronger — affects all principals including root). (3) Run an SSM Automation document: execute runbooks (e.g., stop all EC2 instances, scale down ASGs). Configuration: set threshold at 100% of $5,000 forecasted or actual spend; select action (SCP to deny new launches + SSM to stop running instances). Actions can require IAM approval (approval-only) or execute automatically. This is the native AWS tool for 'stop spending when budget is exceeded.' CloudWatch billing alarms: only SNS/email notifications. Lambda solution: requires building custom spend-checking and action logic. Budget Actions = built-in automated cost governance."},

{id:264,domain:"Resilient Architectures",topic:"Storage",sub:"DynamoDB Point-in-Time Recovery",
q:"A developer accidentally ran a script that deleted 50,000 items from a production DynamoDB table. The error was discovered 2 hours later. How can the table be restored to its state from 3 hours ago?",
o:["Restore from the last DynamoDB on-demand backup — only available if manually triggered before the incident","DynamoDB cannot recover from mass deletion — data is permanently lost","Enable DynamoDB Point-in-Time Recovery (PITR) — if enabled, PITR maintains continuous backups for up to 35 days; restore the table to any second within the retention window (e.g., 3 hours ago) by creating a new table from the restore point; the original table continues operating while the restored table is created in parallel","Use AWS Backup to restore the table — AWS Backup only supports RDS, not DynamoDB"],
c:2,
e:"<strong>Correct: DynamoDB Point-in-Time Recovery (PITR).</strong> PITR provides continuous, automatic backups of DynamoDB tables with granularity to any second within the last 35 days. When you initiate a restore: DynamoDB creates a NEW table (not overwrite in place) from the selected point in time — the original table keeps running. After restoration: compare new table with current, reconcile differences if needed, swap application endpoint. PITR must be enabled on the table BEFORE the incident (a best practice for production tables). Cost: additional storage charge for backup data (~$0.20/GB/month). On-demand backups: point-in-time snapshots you manually trigger — only useful if you took one recently. AWS Backup DOES support DynamoDB — it can take and restore DynamoDB backups centrally. PITR is the answer for 'restore to a specific moment in the past' for DynamoDB. For RDS: automated backups also support PITR to any second within the retention window."},

{id:265,domain:"Secure Architectures",topic:"IAM",sub:"Roles Anywhere",
q:"An on-premises application running on servers in a data center needs to call AWS APIs (access S3, DynamoDB). The security team does NOT want to create IAM users with long-term access keys for the on-premises servers. What allows on-premises servers to use IAM roles and get temporary credentials?",
o:["Store IAM access keys in AWS Secrets Manager and have on-premises servers retrieve them","Create IAM users with rotating access keys and store in the on-premises servers' environment variables","AWS IAM Roles Anywhere — allows on-premises workloads to use X.509 certificates from a trusted Certificate Authority to authenticate and obtain temporary IAM role credentials (via STS); configure a Trust Anchor (CA certificate), create Profiles (IAM roles to assume), and on-premises servers use their certificates to call IAM Roles Anywhere — no long-term keys","Use AWS Direct Connect — this provides network connectivity but not IAM credentials"],
c:2,
e:"<strong>Correct: AWS IAM Roles Anywhere.</strong> IAM Roles Anywhere extends IAM roles to workloads outside AWS. Setup: (1) Trust Anchor: register your CA certificate (your PKI, ACM Private CA, or any X.509 CA) with IAM Roles Anywhere. (2) Profile: define which IAM roles can be assumed and session policies. (3) On-premises servers: use their X.509 certificates (signed by the trusted CA) to call IAM Roles Anywhere endpoint → get temporary credentials (AccessKeyId, SecretAccessKey, SessionToken, 1-hour expiry). The AWS SDK picks up these temporary credentials automatically. Benefits: no long-term keys, certificate-based identity (ties to your existing PKI), automatic credential rotation (1-hour temp creds). Use with: on-premises servers, edge devices, Kubernetes clusters outside AWS, CI/CD systems. Similar patterns: EC2 uses instance profiles, Lambda/ECS use task roles — Roles Anywhere extends this to non-AWS compute."},

{id:266,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS ParallelCluster",
q:"A computational fluid dynamics research team needs to run HPC (High Performance Computing) simulations on AWS. They need MPI-based parallel computing across hundreds of tightly coupled EC2 instances, a shared file system accessible by all nodes, job scheduling (submit jobs to a queue), and automatic scale-up/down of compute nodes based on queue depth. What is the fastest way to deploy this HPC environment?",
o:["Manually provision EC2 instances in a cluster placement group and configure MPI yourself","Use ECS with hundreds of containers — containers handle parallelism automatically","AWS ParallelCluster — an open-source cluster management tool that deploys and manages HPC clusters on AWS; automates: head node setup, compute node configuration (EFA, cluster placement groups, EBS/EFS/FSx for shared storage), job schedulers (Slurm, SGE, Torque), and auto-scaling based on queue depth — clusters can scale from 0 to thousands of nodes; deploy with a single configuration file","Amazon SageMaker Distributed Training — for ML, not general HPC MPI workloads"],
c:2,
e:"<strong>Correct: AWS ParallelCluster.</strong> ParallelCluster is the AWS-supported tool for HPC cluster deployment. One configuration file (YAML) defines: Head node: manages job queue, user login, shared storage mounting. Compute fleet: instance types (c5n.18xlarge for compute, p3.16xlarge for GPU), placement groups, EFA networking for MPI. Shared storage: Amazon FSx for Lustre (high-performance, S3-integrated) or EFS. Job scheduler: Slurm (most common for HPC). Auto-scaling: Slurm + ParallelCluster automatically provision compute nodes when jobs enter the queue and terminate idle nodes — 'scale to zero' capability eliminates idle HPC costs. Supports: Spot Instances for cost-effective HPC, custom AMIs, Intel/AMD/ARM instances, GPU clusters for ML+HPC. Manual EC2 setup: weeks of configuration work. SageMaker: ML training, not general MPI HPC. ParallelCluster = HPC cluster in hours, not weeks."},

{id:267,domain:"Resilient Architectures",topic:"Networking",sub:"Direct Connect — Redundancy",
q:"A company has a single AWS Direct Connect connection at 10 Gbps as their primary link. A network engineer notes that if the Direct Connect location (colocation facility) suffers a power outage, they lose all connectivity to AWS. What architecture provides the highest resilience?",
o:["Add a second Direct Connect connection at the same location — same failure domain","Enable Direct Connect failover mode — there is no such feature","Add a second Direct Connect connection at a DIFFERENT Direct Connect location (separate colocation facility) — eliminates single facility as SPOF; also add a Site-to-Site VPN as a final backup for internet-based failover; this achieves: two independent fiber paths, two different facilities, internet VPN as last resort","Enable Direct Connect Resiliency Toolkit — it only checks existing redundancy but doesn't add connections"],
c:2,
e:"<strong>Correct: Two Direct Connect connections at different locations + VPN backup.</strong> Direct Connect redundancy levels: No redundancy: one connection — any fiber cut or facility outage = total loss. Connection-level redundancy: two connections at the same location — protects against fiber cut, not facility outage. Location-level redundancy (recommended): two connections at two DIFFERENT Direct Connect locations — independent facilities, independent fiber paths; a full facility outage only fails one path. Maximum resiliency: two connections at two different locations (as above) + Site-to-Site VPN over internet as a final failover — provides internet-based backup if both DX locations fail (rare but possible). Direct Connect Resiliency Toolkit: helps you test your resiliency configuration by failing connections to see if traffic fails over correctly — useful for validation, not for adding connections. For exam: 'same location = same failure domain' → always use different locations for highest availability."},

{id:268,domain:"High-Performing Architectures",topic:"Monitoring",sub:"CloudWatch Dashboards",
q:"A company has 10 microservices each with their own CloudWatch metrics and alarms. The operations team wants a single operational health dashboard showing all services' error rates, latency, and alarm states in one view, updated in real-time. What should they build?",
o:["Deploy Grafana on EC2 and manually configure it to query each CloudWatch metric","Use AWS X-Ray Service Map — good for tracing but not operational dashboards","Create a CloudWatch Dashboard — add widgets for each metric (line graphs for error rates, number widgets for latency P99, alarm status widgets), aggregate metrics across multiple services and regions in one view; dashboards auto-refresh every 1–60 seconds; share dashboards publicly or with specific accounts; use composite alarms to show overall health","Use AWS Console Service Health Dashboard — this shows AWS service health, not application metrics"],
c:2,
e:"<strong>Correct: CloudWatch Dashboard.</strong> CloudWatch Dashboards are customizable, shareable operational views. Widget types: Line, Stacked Area, Number (current value), Gauge (speedometer style), Bar, Text (Markdown), Alarm Status (shows red/green for alarm states), Logs Table (CloudWatch Logs Insights results), Explorer (auto-discover and display metrics). Cross-account, cross-region: one dashboard can display metrics from multiple accounts and regions (configure cross-account observability). Sharing: share dashboards publicly (no login required — useful for NOC screens) or with specific accounts. Auto-refresh: 1 second to 15 minutes. Composite Alarms: combine multiple alarm states into a single parent alarm ('service is unhealthy if latency > threshold OR error rate > threshold') — show composite alarm state as a single widget. X-Ray Service Map: traces, not operational metrics dashboards. AWS Service Health Dashboard: AWS infrastructure health, not your application. CloudWatch Dashboard = operational health monitoring for your workloads."},

{id:269,domain:"Resilient Architectures",topic:"Compute",sub:"EC2 — Capacity Reservations",
q:"A company plans to launch 100 c5.4xlarge instances in us-east-1a at 9 AM on Black Friday for a guaranteed capacity boost. They are concerned that EC2 capacity might not be available at that time due to high demand. How can they guarantee capacity availability without paying for unused instances before Black Friday?",
o:["Purchase Reserved Instances — they guarantee capacity in a specific AZ","Use Spot Instance requests early — Spot capacity is usually plentiful","Create an On-Demand Capacity Reservation for us-east-1a, c5.4xlarge, 100 instances — reserves EC2 capacity in a specific AZ immediately; if a matching running instance is in that AZ, it uses the reservation's billing (On-Demand rate); the reservation holds capacity even when no instances are running; cancel the reservation after Black Friday; combine with a Savings Plan for the discount","Launch the instances on Black Friday morning and hope for the best"],
c:2,
e:"<strong>Correct: On-Demand Capacity Reservation.</strong> Capacity Reservations guarantee EC2 capacity in a specific AZ for a specific instance type. You create the reservation immediately and capacity is held for you — regardless of overall demand. Billing: On-Demand rate applies from reservation creation, whether instances are running or not (you pay for the reservation even when no instances use it). To avoid paying for idle capacity before Black Friday: create the Capacity Reservation the night before. For a pricing discount: combine with Regional Reserved Instances or Savings Plans (the discount applies to instances matching the reservation). Zonal Reserved Instances: provide capacity reservation + discount but require 1-year or 3-year commitment. On-Demand Capacity Reservations: no commitment, cancel anytime — ideal for known short-term capacity needs. Spot Instances: no capacity guarantee — can be interrupted or unavailable. Regional RIs: no capacity reservation guarantee (only zonal RIs provide capacity guarantee)."},

{id:270,domain:"Secure Architectures",topic:"IAM",sub:"Permission Evaluation Logic",
q:"A user has an IAM identity policy that allows s3:PutObject on a bucket. There is also an explicit DENY in an SCP from AWS Organizations for s3:DeleteObject. The user tries to run 'aws s3 rm s3://bucket/file'. What happens?",
o:["The SCP deny only applies to IAM roles, not IAM users in member accounts","The user can delete the file because their identity policy doesn't explicitly deny DeleteObject","The delete is denied — SCPs are policy guardrails that set maximum permissions; an explicit deny in an SCP blocks the action for all principals in the account (users, roles, including root) regardless of identity policies; explicit deny always overrides any allow","The SCP deny is overridden by an explicit IAM allow for s3:DeleteObject"],
c:2,
e:"<strong>Correct: SCP explicit deny blocks the action.</strong> IAM policy evaluation logic for AWS Organizations members: (1) If there's an explicit DENY anywhere (identity policy, resource policy, SCP, permissions boundary, session policy) → DENY. Explicit deny overrides all allows. (2) If there's no explicit deny: check if any applicable policy allows the action. (3) If no allow is found → implicit deny. In this scenario: SCP has explicit DENY for s3:DeleteObject → the delete is denied regardless of any IAM allow. SCPs apply to all principals in the account (IAM users, IAM roles, root user) — except the management account's principals (SCPs don't apply to the management account). SCPs don't grant permissions on their own — they only restrict. The user would also need an IAM allow to perform an action (SCPs + IAM both must allow). For s3:PutObject: SCP doesn't deny it, IAM allows it → allowed. For s3:DeleteObject: SCP explicitly denies → denied even if IAM allowed it."},

{id:271,domain:"High-Performing Architectures",topic:"Databases",sub:"RDS Parameter Groups",
q:"A DBA needs to tune MySQL configuration parameters on an RDS instance — specifically increasing max_connections, setting innodb_buffer_pool_size, and enabling slow_query_log. These are settings normally changed in my.cnf on self-managed MySQL. How are these configured on RDS?",
o:["SSH into the RDS instance and edit /etc/mysql/my.cnf directly — RDS allows OS-level access","Modify the default parameter group — AWS doesn't allow changes to default groups","Create a custom DB Parameter Group with the desired parameter values (max_connections, innodb_buffer_pool_size, slow_query_log, etc.); associate the parameter group with the RDS instance; static parameters require an instance reboot to take effect; dynamic parameters apply immediately without reboot","Submit an AWS Support request to have AWS change MySQL parameters for you"],
c:2,
e:"<strong>Correct: Custom DB Parameter Group.</strong> RDS Parameter Groups are the mechanism for configuring database engine settings. You cannot SSH into RDS instances — AWS manages the underlying OS. Default Parameter Group: AWS-managed, cannot be edited. Custom Parameter Group: create one, modify any supported parameters, associate with your RDS instance. Parameter types: Dynamic: take effect immediately without reboot (e.g., slow_query_log, log_output). Static: require a pending reboot to take effect (e.g., max_connections, innodb_buffer_pool_size). Pending reboot: parameter change shows 'pending reboot' in the console; apply by rebooting the instance during a maintenance window. Option Groups: separate from parameter groups; configure optional features (Oracle TDE, MySQL memcached, SQL Server CLR, etc.). Cluster Parameter Groups: for Aurora clusters — cluster-level parameters apply to all instances, instance-level parameter groups for instance-specific settings."},

{id:272,domain:"Resilient Architectures",topic:"Application Integration",sub:"EventBridge Scheduler",
q:"A company needs to run a Lambda function to generate reports at exactly 8:00 AM EST every weekday (Monday–Friday), regardless of daylight saving time changes. What is the correct EventBridge Scheduler configuration?",
o:["Create a CloudWatch Events rule with cron(0 8 ? * MON-FRI *) — CloudWatch Events uses UTC only","Create an EventBridge rule with rate(1 day) starting at 8 AM EST","Use EventBridge Scheduler with a cron expression and set the timezone to America/New_York — cron(0 8 ? * MON-FRI *) in the America/New_York timezone; Scheduler automatically adjusts for DST changes, so the function always runs at 8 AM local time even when clocks change","Create a Lambda function that checks the current time every minute and triggers the report function"],
c:2,
e:"<strong>Correct: EventBridge Scheduler with timezone support.</strong> EventBridge Scheduler (not the same as EventBridge Rules) supports: Cron and rate schedules, Timezone-aware scheduling (specify any IANA timezone — America/New_York, Europe/London, Asia/Tokyo), Target invocation (Lambda, SQS, SNS, Step Functions, and 270+ direct API targets). With America/New_York timezone: the scheduler automatically handles EST (UTC-5) and EDT (UTC-4) transitions — when DST shifts, the function still runs at 8:00 AM New York time. EventBridge Rules (cron): always UTC — you'd need cron(0 13 ? * MON-FRI *) for 8 AM EST, then manually change to cron(0 12 ...) during EDT — error-prone. EventBridge Scheduler is the modern, timezone-aware replacement for time-based EventBridge Rules. It also supports one-time schedules (fire once at a specific datetime) and flexible time windows (fire within a range to distribute load)."},

{id:273,domain:"Secure Architectures",topic:"Network Security",sub:"WAF — Rate-Based Rules",
q:"A web application is being targeted by a credential stuffing attack — thousands of login attempts from many different IP addresses, each IP sending only 10–20 requests per minute (low rate, evading simple IP-block rules). The team wants to automatically block IP addresses that send more than 100 login attempts in any 5-minute window. What WAF rule type handles this?",
o:["IP set match rule — manually maintain a list of blocked IPs; doesn't auto-update","Geographic match rule — block traffic by country of origin","WAF Rate-Based Rule — configure with rate limit of 100 requests per 5-minute window, scope to the /login path; WAF automatically tracks request rates by IP address and blocks IPs that exceed the threshold, removing the block when the rate drops — no manual intervention required","Regex pattern match rule — match against known credential stuffing user-agent strings"],
c:2,
e:"<strong>Correct: WAF Rate-Based Rules.</strong> Rate-Based Rules in AWS WAF count requests from each source IP over a rolling 5-minute window. When an IP exceeds the configured rate limit, WAF automatically applies the rule action (BLOCK, CAPTCHA, or COUNT) to subsequent requests from that IP. When the rate drops below the threshold, the block is automatically removed. Key features: scope to specific paths (e.g., /login, /api/auth) using AND conditions with other statements; aggregate by IP, forwarded IP (if behind CloudFront/ALB with X-Forwarded-For), HTTP header, or query string. Rate-based rules are different from Count-based rules — they're dynamic and self-managing. Minimum rate limit: 100 requests per 5 minutes. Perfect for: login protection, API abuse prevention, DDoS mitigation at Layer 7. IP set rules: static list — can't auto-block new IPs. Geo match: blocks by country regardless of behavior. Regex: signature-based (easy to evade by changing user-agent)."},

{id:274,domain:"High-Performing Architectures",topic:"Storage",sub:"S3 Multipart Upload",
q:"A company uploads large video files (5–50 GB each) to S3 from application servers. Uploads frequently fail midway through due to network interruptions, requiring the entire file to be re-uploaded. How should they redesign the upload process to handle failures gracefully and improve upload speed?",
o:["Compress videos before uploading to reduce file size","Use S3 Transfer Acceleration — speeds up uploads but doesn't help with failures mid-upload","Use S3 Multipart Upload — split the file into parts (5 MB minimum per part, up to 10,000 parts); upload parts in parallel; if any part fails, retry only that part (not the entire file); once all parts are uploaded, complete the multipart upload (S3 assembles the file); benefits: parallel uploads saturate bandwidth, failure recovery is per-part, files > 5 GB REQUIRE multipart upload","Enable S3 versioning — doesn't help with upload failures but prevents accidental overwrites"],
c:2,
e:"<strong>Correct: S3 Multipart Upload.</strong> Multipart Upload splits a large object into parts for parallel, resumable uploads. Requirements: minimum part size 5 MB (except last part), maximum 10,000 parts per object, maximum object size 5 TB. Process: (1) Initiate multipart upload → get Upload ID. (2) Upload parts (can be done in parallel with multiple threads/connections). (3) Complete multipart upload → S3 assembles parts into the final object. Failure handling: if a part fails, retry that specific part — only ~50 MB retry instead of 50 GB restart. Parallel upload: 10 parts uploading simultaneously at 100 Mbps each = effectively 1 Gbps aggregate upload speed. Objects > 5 GB: MUST use multipart upload (single PUT limit is 5 GB). Best practice: use multipart for any object > 100 MB. Lifecycle rules: set to abort incomplete multipart uploads after N days to avoid storage charges for partial uploads. The AWS SDK automatically uses multipart for large files via the transfer manager."},

{id:275,domain:"Resilient Architectures",topic:"Compute",sub:"Elastic Load Balancing — Health Checks",
q:"An ALB target group has an EC2 instance that is running and serving valid requests, but the ALB is marking it as unhealthy and not sending traffic to it. The health check endpoint is /health and the target returns HTTP 200. What is the most likely cause?",
o:["ALBs only support HTTP/1.0 for health checks — the instance uses HTTP/1.1","The instance's CPU utilization is too high, causing ALB to mark it unhealthy","The ALB security group does not have an outbound rule allowing health check traffic to the instance; or the instance's security group does not allow inbound traffic from the ALB on the health check port — health checks fail if network connectivity between ALB and instance is blocked","ALB health checks always use port 443 — the health check must use HTTPS"],
c:2,
e:"<strong>Correct: Security group misconfiguration blocking health checks.</strong> ALB health check flow: ALB sends HTTP GET to /health on the instance's health check port (default: traffic port). If the ALB security group doesn't allow outbound to the instance's port (usually not an issue since SG default allows all outbound), or more commonly, the INSTANCE's security group doesn't allow inbound from the ALB's security group on the health check port → health check request is dropped → ALB marks instance unhealthy. Fix: add an inbound rule to the instance's security group allowing traffic from the ALB's security group (reference SG ID, not CIDR) on port 80 (or health check port). Common mistake: adding the ALB security group to the instance's NACL or not including the health check port. Health check details that could also cause issues: wrong path (/health vs /healthcheck), wrong port, wrong protocol, success codes not including 200 (can specify 200-299 or custom codes like 200,301)."},

{id:276,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Storage Classes — Access Patterns",
q:"A company stores 1 PB of log files in S3 Standard. Analysis shows 70% of files have NEVER been accessed after 30 days, 20% are accessed once between 31–90 days, and 10% are accessed regularly throughout the year. What lifecycle configuration minimizes cost while maintaining immediate retrieval for the 10% regularly accessed?",
o:["Move everything to Glacier after 30 days — cheapest but creates access delays for regularly-accessed 10%","Keep everything in S3 Standard — simplest but expensive for 90% rarely-accessed files","Use S3 Lifecycle rules: files stay in Standard for 30 days; at day 31, transition to S3 Intelligent-Tiering — IT automatically moves the 70% never-accessed files to Infrequent Access tier (saving 40%), occasionally-accessed to Archive Instant tier (saving 68%), while keeping the regularly-accessed 10% in Frequent Access tier at Standard pricing; no retrieval fees; monitoring fee per object","Manually review access logs monthly and move files to appropriate storage classes"],
c:2,
e:"<strong>Correct: Transition to S3 Intelligent-Tiering after 30 days.</strong> This scenario has mixed and unpredictable access patterns within the same bucket — exactly what Intelligent-Tiering is designed for. After the 30-day Standard period, transition everything to Intelligent-Tiering (IT). IT automatically handles the access pattern diversity: Frequently accessed (10%): stays in Frequent Access tier (same cost as Standard). Occasionally accessed (20%): moves to Infrequent Access tier after 30 days without access (40% cheaper). Never accessed (70%): moves to Archive Instant Access tier after 90 days without access (68% cheaper). No retrieval fees when data moves back to Frequent tier. Small monthly monitoring fee ($0.0025/1,000 objects). Alternative: lifecycle rules to Glacier for everything → cheap storage but the 10% regularly-accessed would incur retrieval costs and latency. IT is the right tool when you have mixed, unpredictable patterns in the same data set."},

{id:277,domain:"Resilient Architectures",topic:"Networking",sub:"IPv6 in VPC",
q:"A company is enabling IPv6 in their VPC. Instances in a private subnet need outbound-only IPv6 internet connectivity (they can initiate connections to IPv6 internet resources but must NOT be accessible from the internet via IPv6). What gateway provides this?",
o:["Internet Gateway — enables both inbound and outbound IPv6 traffic","NAT Gateway — handles IPv4 NAT; does not process IPv6 traffic","Egress-Only Internet Gateway — allows outbound IPv6 traffic from instances in the VPC to the internet, while blocking inbound IPv6-initiated connections from the internet; route table: ::/0 → Egress-Only IGW for private subnet instances","IPv6 traffic requires NAT64 — convert IPv6 to IPv4 using a NAT Gateway"],
c:2,
e:"<strong>Correct: Egress-Only Internet Gateway.</strong> IPv6 addressing in AWS: all IPv6 addresses are public (no private IPv6 ranges like RFC 1918 for IPv4). For instances in a private subnet that need to initiate IPv6 connections to the internet (e.g., download IPv6-only resources) but must not be reachable from the internet: Egress-Only Internet Gateway (EOIGW): allows outbound IPv6 traffic; blocks unsolicited inbound IPv6 connections. It's the IPv6 equivalent of a NAT Gateway for IPv4 (though it doesn't translate addresses — it's a stateful gateway that blocks inbound). Route table: add ::/0 → egress-only-igw for private subnet. Internet Gateway: enables full bidirectional IPv4 and IPv6 connectivity — not appropriate for instances that must not accept inbound. NAT Gateway: handles IPv4 translation only; does not process IPv6 traffic. NAT64: converts IPv6 client requests to IPv4 — different use case (for IPv6-only clients reaching IPv4 resources)."},

{id:278,domain:"High-Performing Architectures",topic:"Serverless",sub:"API Gateway — WebSocket",
q:"A multiplayer gaming application needs a real-time bidirectional communication channel between the game server (Lambda) and connected players. Players send game actions, and the server broadcasts updates to all players simultaneously. REST API polling is too slow. What API Gateway configuration enables this?",
o:["REST API with long polling — clients hold connections open for up to 29 seconds","HTTP API with streaming responses — HTTP API doesn't support server-push streaming","API Gateway WebSocket API — maintains persistent WebSocket connections; routes: $connect (when client connects), $disconnect (when client disconnects), custom routes (e.g., 'gameAction'); Lambda handles each route; the @connections API allows the server-side Lambda to push messages back to any connected client by connection ID; supports fan-out to all players","SQS + Lambda polling — Lambda polls SQS for messages to push to clients"],
c:2,
e:"<strong>Correct: API Gateway WebSocket API.</strong> WebSocket APIs provide full-duplex, persistent connections. Route types: $connect: invoked when a client establishes a WebSocket connection — store the connectionId in DynamoDB. $disconnect: invoked on disconnect — clean up connectionId. Custom routes (e.g., 'gameAction'): based on a routeSelectionExpression field in the JSON message body. Server-to-client push: use the @connections management API endpoint (POST to https://{api-id}.execute-api.{region}.amazonaws.com/{stage}/@connections/{connectionId}) to push a message to any connected client by its connectionId. Fan-out pattern: on a game state update, Lambda queries DynamoDB for all active connectionIds, then calls @connections for each. This enables: real-time multiplayer, collaborative editing, chat applications, live dashboards. REST long polling: 29-second max, not truly real-time, inefficient. HTTP API: request-response only, no server push. WebSocket = bidirectional, persistent, real-time."},

{id:279,domain:"Resilient Architectures",topic:"Storage",sub:"AWS Snow Family — Snowball Edge",
q:"A construction company operates on remote sites with no reliable internet connectivity. Their drones generate 10 TB of video footage per day that needs to be processed locally (object detection ML inference) before uploading to S3 when the site gets occasional internet access. What Snow family device supports both local ML inference AND storage?",
o:["AWS Snowmobile — exabyte-scale offline data transfer truck, no compute capability","AWS Snowcone — smallest device (8 TB usable), includes 2 vCPUs and 4 GB RAM — possibly too limited for ML inference","AWS Snowball Edge Compute Optimized — 104 TB usable storage, 52 vCPUs, 208 GB RAM, optional GPU; runs EC2 AMIs and Lambda functions locally for ML inference; stores video footage locally; transfers to S3 when connected","AWS Snowball Edge Storage Optimized — 80 TB usable, 40 vCPUs — lower compute than Compute Optimized; suitable if inference is lightweight"],
c:2,
e:"<strong>Correct: Snowball Edge Compute Optimized.</strong> Snow family comparison: Snowcone: 8 TB HDD or 14 TB SSD usable, 2 vCPUs, 4 GB RAM — for small edge workloads and lightweight data collection. Snowball Edge Storage Optimized: 80 TB usable, 40 vCPUs, 80 GB RAM — balanced storage and compute. Snowball Edge Compute Optimized: 104 TB NVMe usable, 52 vCPUs, 208 GB RAM, optional V100 GPU — designed for demanding edge ML inference, IoT data aggregation, pre-processing before cloud transfer. Snowmobile: 100 PB container truck for massive migrations — no edge compute. For daily 10 TB generation + ML inference (object detection requires significant compute) → Compute Optimized with GPU is the answer. All Snow devices include: local S3-compatible endpoints, EC2 AMI support, AWS Lambda execution, automatic data encryption, and transfer to S3 when connected. OpsHub: GUI for managing Snow devices."},

{id:280,domain:"Secure Architectures",topic:"Monitoring",sub:"AWS Security Lake",
q:"A large enterprise wants to centralize security logs from CloudTrail, VPC Flow Logs, Route 53 DNS logs, Lambda logs, and third-party security tools (firewall logs, endpoint detection) across all AWS accounts into a single security data lake for long-term retention, SIEM integration, and custom security analytics with Athena. What service automates this?",
o:["Stream all logs to a CloudWatch Logs cross-account central log group","Manually configure each account to deliver logs to a central S3 bucket","Amazon Security Lake — automatically centralizes security data from AWS sources (CloudTrail, VPC Flow Logs, Route 53, Lambda, Security Hub findings) and third-party sources into a dedicated S3 security lake in a subscriber account; normalizes all data to the OCSF (Open Cybersecurity Schema Framework) standard; integrates with Athena, OpenSearch, and SIEM tools for analysis; manages data lifecycle and replication across regions","Use AWS Glue to crawl all log sources and load them into a central Redshift cluster"],
c:2,
e:"<strong>Correct: Amazon Security Lake.</strong> Security Lake automates the collection, normalization, and centralization of security data. What it does automatically: enables log sources across all accounts in an Organization (CloudTrail management and data events, VPC Flow Logs, Route 53 query logs, Lambda execution logs, Security Hub findings, AWS WAF logs). Normalizes to OCSF: Open Cybersecurity Schema Framework — a vendor-neutral, open standard format making data consistent regardless of source. Stores in dedicated S3 buckets with configurable lifecycle. Subscribers: security tools, SIEMs (Splunk, Sumo Logic), analytics tools (Athena, Amazon SageMaker) can subscribe to query the data. Why it matters: without Security Lake, you need custom scripts/Glue jobs to collect, normalize, and deliver logs from 10+ sources. Security Lake does this with a few clicks. OCSF normalization means your Athena queries work the same way for CloudTrail events, VPC Flow Logs, and firewall logs."}
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE (localStorage)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const STORE_KEY = 'aws_saa_v1';
const DOMAINS = [...new Set(Q.map(x => x.domain))];
const TOPICS  = [...new Set(Q.map(x => x.topic))];

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
  catch { return {}; }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(S)); }

let S = {
  answered: 0, correct: 0, quizzes: 0,
  streak: 0, lastDay: '',
  topicStats: {}, domainStats: {},
  seenIds: [], bookmarks: [], history: [],
  ...loadState()
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// QUIZ STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let QZ = { qs:[], idx:0, picks:{}, correct:0, type:'mini' };
let pending = null; // selected option index awaiting submit

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function shuffle(a) {
  const b = [...a];
  for (let i=b.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; }
  return b;
}
function pct(c,t) { return t ? Math.round(c/t*100) : null; }
function colorFor(p) {
  if (p===null) return 'var(--border)';
  if (p>=80) return 'var(--green)';
  if (p>=60) return 'var(--accent)';
  return 'var(--red)';
}
function labelFor(p) {
  if (p===null) return 'Not started';
  if (p>=80) return 'Strong 💪';
  if (p>=60) return 'Developing 📈';
  return 'Needs Work ⚠️';
}
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if (id==='home') renderHome();
  if (id==='dash') renderDash();
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function touchStreak() {
  const today = new Date().toDateString();
  if (S.lastDay !== today) {
    const yest = new Date(Date.now()-86400000).toDateString();
    S.streak = (S.lastDay===yest) ? S.streak+1 : 1;
    S.lastDay = today;
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HOME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderHome() {
  const p = pct(S.correct, S.answered);
  document.getElementById('home-stats').innerHTML = `
    <div class="stat"><div class="stat-n">${S.answered||0}</div><div class="stat-l">Questions Answered</div></div>
    <div class="stat"><div class="stat-n" style="color:${colorFor(p)}">${p!==null?p+'%':'—'}</div><div class="stat-l">Overall Score</div></div>
    <div class="stat"><div class="stat-n">${S.streak||0}</div><div class="stat-l">Day Streak 🔥</div></div>
    <div class="stat"><div class="stat-n">${S.quizzes||0}</div><div class="stat-l">Quizzes Taken</div></div>`;
  // Show Weak Areas button if any topic is below 60%
  const hasWeak = TOPICS.some(t => { const ts=S.topicStats?.[t]; return ts&&ts.t>0&&pct(ts.c,ts.t)<60; });
  document.getElementById('weak-btn').style.display = hasWeak ? 'block' : 'none';
  // Show Bookmarks button
  const bkCount = (S.bookmarks||[]).length;
  document.getElementById('bk-btn').style.display = bkCount > 0 ? 'block' : 'none';
  document.getElementById('bk-count').textContent = bkCount;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DASHBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderDash() {
  let h = '';
  const op = pct(S.correct, S.answered);

  // Overall
  h += `<div class="card" style="text-align:center">
    <div style="font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:6px">OVERALL PROFICIENCY</div>
    <div style="font-size:52px;font-weight:700;color:${colorFor(op)}">${op!==null?op+'%':'—'}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">${S.answered} questions answered · ${labelFor(op)}</div>
  </div>`;

  // By Domain
  h += `<div class="card"><div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px;letter-spacing:.3px">BY EXAM DOMAIN</div>`;
  DOMAINS.forEach(d => {
    const ds = S.domainStats?.[d]||{c:0,t:0};
    const p = pct(ds.c,ds.t);
    h += `<div class="bar-row">
      <div class="bar-label">
        <span class="bar-name" style="font-weight:600">${d}</span>
        <span class="bar-meta">${ds.t} answered · ${p!==null?p+'%':'—'}</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${p||0}%;background:${colorFor(p)}"></div></div>
    </div>`;
  });
  h += '</div>';

  // By Topic
  h += `<div class="card"><div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px;letter-spacing:.3px">BY TOPIC</div>`;
  TOPICS.forEach(t => {
    const ts = S.topicStats?.[t]||{c:0,t:0};
    const p = pct(ts.c,ts.t);
    const col = colorFor(p);
    h += `<div class="bar-row">
      <div class="bar-label">
        <span class="bar-name">${t}</span>
        <span class="badge" style="background:${col}22;color:${col}">${labelFor(p).replace(/ .*/,'')}</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${p||0}%;background:${col}"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${ts.t} answered · ${p!==null?p+'%':'—'}</div>
    </div>`;
  });
  h += '</div>';

  // Weak areas callout
  const weak = TOPICS.filter(t => { const ts=S.topicStats?.[t]; return ts&&ts.t>0&&pct(ts.c,ts.t)<60; });
  if (weak.length) {
    h += `<div class="card" style="border-color:var(--red)">
      <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px">⚠️ Priority Focus Areas</div>`;
    weak.forEach(t => {
      const ts=S.topicStats[t];
      h += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px">${t}</span>
        <span style="color:var(--red);font-weight:700;font-size:13px">${pct(ts.c,ts.t)}%</span>
      </div>`;
    });
    h += '</div>';
  }

  h += `<div style="text-align:center;padding:12px;font-size:11px;color:var(--muted)">
    v3 · 100 questions across all 4 SAA-C03 domains
  </div>`;

  document.getElementById('dash-body').innerHTML = h;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// QUIZ ENGINE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let timerInterval = null;
let timerSecs = 0;

function startTimer(seconds) {
  clearInterval(timerInterval);
  timerSecs = seconds;
  const el = document.getElementById('exam-timer');
  el.classList.add('show');
  el.classList.remove('warn');
  function tick() {
    if (timerSecs <= 0) { clearInterval(timerInterval); showResults(); return; }
    timerSecs--;
    const h = Math.floor(timerSecs/3600);
    const m = Math.floor((timerSecs%3600)/60);
    const s = timerSecs%60;
    el.textContent = `⏱ ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (timerSecs <= 600) el.classList.add('warn'); // red under 10 min
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  const el = document.getElementById('exam-timer');
  if (el) { el.classList.remove('show','warn'); }
}

function startQuiz(type) {
  stopTimer();
  const count = type==='full' ? 65 : 10;
  let pool = shuffle(Q);

  if (type==='extra') {
    const seen = new Set(S.seenIds||[]);
    const unseen = pool.filter(q=>!seen.has(q.id));
    pool = unseen.length>=5 ? unseen : pool;
  } else if (type==='weak') {
    const weakTopics = new Set(TOPICS.filter(t => {
      const ts=S.topicStats?.[t]; return ts&&ts.t>0&&pct(ts.c,ts.t)<60;
    }));
    const weakQs = shuffle(Q.filter(q=>weakTopics.has(q.topic)));
    const otherQs = shuffle(Q.filter(q=>!weakTopics.has(q.topic)));
    pool = [...weakQs, ...otherQs];
  } else if (type==='bookmarks') {
    const bkSet = new Set(S.bookmarks||[]);
    pool = shuffle(Q.filter(q=>bkSet.has(q.id)));
    if (pool.length===0) { alert('No bookmarked questions yet. Bookmark questions during a quiz using the 🔖 button.'); return; }
  }

  QZ = { qs: pool.slice(0, Math.min(count, pool.length)), idx:0, picks:{}, correct:0, type };
  pending = null;
  goTo('quiz');
  if (type==='full') startTimer(130*60); // 130 minutes
  renderQ();
}

function renderQ() {
  const q = QZ.qs[QZ.idx];
  const total = QZ.qs.length;
  const i = QZ.idx;
  const answered = QZ.picks[i];
  const LTRS = ['A','B','C','D'];

  // Header
  document.getElementById('q-prog-txt').textContent = `Question ${i+1} of ${total}`;
  document.getElementById('q-prog-bar').style.width = `${(i/total)*100}%`;
  document.getElementById('live-score').textContent = `${QZ.correct} / ${i}`;

  // Options
  let optsH = q.o.map((opt,oi)=>{
    let cls = 'opt';
    if (answered!==undefined) {
      if (oi===q.c) cls+=' correct';
      else if (oi===answered) cls+=' wrong';
    } else if (oi===pending) cls+=' sel';
    return `<div class="${cls}" onclick="pickOpt(${oi})" id="op${oi}">
      <span class="opt-ltr">${LTRS[oi]}</span>
      <span class="opt-txt">${opt}</span>
    </div>`;
  }).join('');

  // Explanation
  let explH = '';
  if (answered!==undefined) {
    const icon = answered===q.c ? '✅' : '❌';
    explH = `<div class="expl show">${icon} ${q.e}</div>`;
  }

  // Bottom button
  let btnH = '';
  if (answered===undefined) {
    btnH = `<button class="btn btn-gold" id="sub-btn" onclick="submitQ()" ${pending===null?'disabled':''} style="margin-top:14px">Submit Answer</button>`;
  } else if (i < total-1) {
    btnH = `<button class="btn btn-gold" onclick="nextQ()" style="margin-top:14px">Next Question →</button>`;
  } else {
    btnH = `<button class="btn btn-green" onclick="showResults()" style="margin-top:14px">📊 View Results</button>`;
  }

  const isBk = (S.bookmarks||[]).includes(q.id);
  document.getElementById('quiz-body').innerHTML = `
    <div style="padding:0 16px;max-width:500px;margin:0 auto">
      <div class="card">
        <div class="q-meta">📁 ${q.domain} &nbsp;·&nbsp; ${q.topic} &nbsp;·&nbsp; ${q.sub}
          <button class="bk-btn" onclick="toggleBookmark(${q.id})" title="Bookmark">${isBk?'🔖':'🏷️'}</button>
        </div>
        <div class="q-text">${q.q}</div>
        ${optsH}
        ${explH}
        ${btnH}
      </div>
    </div>`;
}

function pickOpt(i) {
  if (QZ.picks[QZ.idx]!==undefined) return; // already answered
  pending = i;
  renderQ();
}

function submitQ() {
  if (pending===null) return;
  const q = QZ.qs[QZ.idx];
  const ok = pending===q.c;
  QZ.picks[QZ.idx] = pending;
  if (ok) QZ.correct++;

  // Update persistent stats
  S.answered++;
  if (ok) S.correct++;
  if (!S.topicStats[q.topic]) S.topicStats[q.topic]={c:0,t:0};
  S.topicStats[q.topic].t++;
  if (ok) S.topicStats[q.topic].c++;
  if (!S.domainStats[q.domain]) S.domainStats[q.domain]={c:0,t:0};
  S.domainStats[q.domain].t++;
  if (ok) S.domainStats[q.domain].c++;
  if (!S.seenIds) S.seenIds=[];
  if (!S.seenIds.includes(q.id)) S.seenIds.push(q.id);
  touchStreak();
  saveState();

  pending = null;
  renderQ();
}

function nextQ() {
  QZ.idx++;
  pending = null;
  renderQ();
}

function exitQuiz() {
  if (QZ.idx>0 || QZ.picks[0]!==undefined) {
    if (!confirm('Exit quiz? Your progress will be lost.')) return;
  }
  stopTimer();
  goTo('home');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RESULTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showResults() {
  stopTimer();
  S.quizzes++;
  // Save to history
  if (!S.history) S.history=[];
  S.history.push({ p: Math.round(QZ.correct/QZ.qs.length*100), c: QZ.correct, t: QZ.qs.length, type: QZ.type, ts: Date.now() });
  if (S.history.length > 10) S.history = S.history.slice(-10);
  saveState();

  const cor = QZ.correct;
  const tot = QZ.qs.length;
  const p   = Math.round(cor/tot*100);
  const pass = p>=72;
  const LTRS = ['A','B','C','D'];

  // Score history mini chart
  let chartH = '';
  if (S.history.length > 1) {
    const bars = S.history.map(h => {
      const col = h.p>=72 ? 'var(--green)' : h.p>=55 ? 'var(--accent)' : 'var(--red)';
      const ht = Math.max(8, Math.round(h.p * 0.48));
      const label = h.p+'%';
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
        <div style="width:100%;background:${col};border-radius:4px 4px 0 0;height:${ht}px"></div>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">${label}</div>
      </div>`;
    }).join('');
    chartH = `<div class="card" style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--accent)">SCORE HISTORY</div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:56px">${bars}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center">Last ${S.history.length} quizzes · 72% = passing</div>
    </div>`;
  }

  let h = `
    <div class="score-ring" style="border-color:${pass?'var(--green)':'var(--red)'}">
      <div class="score-big" style="color:${pass?'var(--green)':'var(--red)'}">${p}%</div>
      <div class="score-sub">${cor} / ${tot}</div>
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:18px;font-weight:700">${pass?'🎉 Passed!':'📚 Keep Going!'}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">AWS passing score: 72% &nbsp;·&nbsp; Need ${Math.ceil(tot*.72)} correct</div>
    </div>
    ${chartH}
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">Question Review</div>`;

  QZ.qs.forEach((q,i)=>{
    const a = QZ.picks[i];
    if (a===undefined) return;
    const ok = a===q.c;
    h += `<div class="rev-item" style="border-color:${ok?'var(--green)':'var(--red)'}">
      <div class="rev-q"><strong>${i+1}.</strong> ${q.q.length>90?q.q.slice(0,90)+'…':q.q}</div>
      <div class="rev-a">Your answer: ${LTRS[a]}. ${q.o[a].slice(0,55)}${q.o[a].length>55?'…':''}</div>
      ${!ok?`<div class="rev-a" style="color:var(--green)">✓ Correct: ${LTRS[q.c]}. ${q.o[q.c].slice(0,55)}${q.o[q.c].length>55?'…':''}</div>`:''}
    </div>`;
  });
  h += `</div>
    <button class="btn btn-gold" onclick="goTo('home')">🏠 Back to Home</button>
    <button class="btn btn-gray" onclick="startQuiz('mini')">📝 Take Another Quiz</button>`;

  document.getElementById('results-body').innerHTML = h;
  document.getElementById('results').classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>{ if(s.id!=='results') s.classList.remove('active'); });
  window.scrollTo(0,0);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BOOKMARKS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleBookmark(id) {
  if (!S.bookmarks) S.bookmarks=[];
  const idx = S.bookmarks.indexOf(id);
  if (idx===-1) S.bookmarks.push(id);
  else S.bookmarks.splice(idx,1);
  saveState();
  renderQ(); // re-render to update icon
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STUDY MODE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function goStudy(topicFilter) {
  const el = document.getElementById('study-body');
  const titleEl = document.getElementById('study-title');
  const LTRS = ['A','B','C','D'];

  if (!topicFilter) {
    // Show topic picker
    titleEl.textContent = 'Study Mode';
    let h = `<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Choose a topic to study. All answers and explanations are shown immediately — no scoring.</p>`;
    // Group by domain then topic
    DOMAINS.forEach(d => {
      const domTopics = [...new Set(Q.filter(q=>q.domain===d).map(q=>q.topic))];
      h += `<div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:6px;margin-top:4px">${d.toUpperCase()}</div>`;
      domTopics.forEach(t => {
        const count = Q.filter(q=>q.topic===t).length;
        const ts = S.topicStats?.[t]||{c:0,t:0};
        const p = pct(ts.c,ts.t);
        const col = colorFor(p);
        h += `<button class="topic-btn" onclick="goStudy('${t.replace(/'/g,"\\'")}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:600">${t}</span>
            ${p!==null?`<span style="font-size:11px;padding:2px 7px;border-radius:999px;background:${col}22;color:${col}">${p}%</span>`:'<span style="font-size:11px;color:var(--muted)">New</span>'}
          </div>
          <div class="tb-meta">${count} question${count!==1?'s':''}</div>
        </button>`;
      });
    });
    el.innerHTML = h;
  } else {
    // Show all questions for this topic
    titleEl.textContent = topicFilter;
    const qs = Q.filter(q=>q.topic===topicFilter);
    let h = `<button onclick="goStudy()" style="background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:0 0 12px;display:block">← All Topics</button>`;
    h += `<p style="font-size:12px;color:var(--muted);margin-bottom:14px">${qs.length} questions · ${topicFilter}</p>`;
    qs.forEach((q,i) => {
      let optsH = q.o.map((opt,oi)=>{
        const cls = oi===q.c ? 'study-opt s-correct' : 'study-opt s-other';
        return `<div class="${cls}"><span style="font-weight:700;min-width:16px;color:var(--muted)">${LTRS[oi]}</span>&nbsp;${opt}${oi===q.c?' <span style="color:var(--green);margin-left:6px">✓</span>':''}</div>`;
      }).join('');
      h += `<div class="study-q">
        <div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:8px">${q.sub}</div>
        <div class="s-q">${i+1}. ${q.q}</div>
        ${optsH}
        <div class="study-expl">${q.e}</div>
      </div>`;
    });
    el.innerHTML = h;
  }

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('study').classList.add('active');
  window.scrollTo(0,0);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
touchStreak();
renderHome();
</script>
