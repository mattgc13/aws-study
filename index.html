  var c=document.createElement('canvas');
  c.width=c.height=192;
  var ctx=c.getContext('2d');
  // Dark background

  ctx.beginPath();ctx.roundRect(0,0,192,192,32);ctx.fill();
  // Cloud emoji icon

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;
  --accent:#f59e0b;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;
  --text:#f1f5f9;--muted:#94a3b8;--border:#475569;--r:12px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:24px}
.screen{display:none;padding:16px;max-width:500px;margin:0 auto}
.screen.active{display:block}
.home-content{padding:16px;max-width:500px;margin:0 auto}
h2{font-size:18px;font-weight:700}
/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:16px 16px 0;max-width:500px;margin:0 auto 20px}
.hdr-logo{font-size:26px}
.hdr h1{font-size:19px;font-weight:700;flex:1}
.back-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;line-height:1}
/* Cards & Buttons */
.card{background:var(--surface);border-radius:var(--r);padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-gold{background:var(--accent);color:#000}
.btn-blue{background:var(--blue);color:#fff}
.btn-gray{background:var(--surface2);color:var(--text)}
.btn-green{background:var(--green);color:#000}
.btn:disabled{opacity:.4;cursor:default}
/* Stats grid */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--surface);border-radius:var(--r);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-n{font-size:30px;font-weight:700;color:var(--accent)}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px}
/* Progress bar */
.prog-bg{background:var(--surface2);border-radius:999px;height:5px;margin:10px 0 18px}
.prog{height:5px;border-radius:999px;background:var(--accent);transition:width .3s}
/* Quiz */
.q-meta{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:10px;letter-spacing:.3px}
.q-text{font-size:15px;line-height:1.65;margin-bottom:18px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;border:2px solid var(--border);border-radius:var(--r);margin-bottom:9px;cursor:pointer;background:var(--surface);transition:border-color .15s,background .15s}
.opt:active{transform:scale(.985)}
.opt.sel{border-color:var(--blue);background:rgba(59,130,246,.12)}
.opt.correct{border-color:var(--green);background:rgba(34,197,94,.12)}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,.12)}
.opt.reveal-correct{border-color:var(--green);background:rgba(34,197,94,.08)}
.opt-ltr{font-weight:700;font-size:13px;color:var(--muted);min-width:18px;padding-top:1px}
.opt-txt{font-size:14px;line-height:1.5}
.expl{background:var(--surface2);border-radius:var(--r);padding:15px;margin-top:14px;font-size:13px;line-height:1.65;display:none}
.expl.show{display:block}
.expl strong{color:var(--accent)}
/* Dashboard bars */
.bar-row{margin-bottom:12px}
.bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bar-name{font-size:13px}
.bar-meta{font-size:11px;color:var(--muted)}
.bar-bg{background:var(--surface2);border-radius:999px;height:7px}
.bar-fill{height:7px;border-radius:999px;transition:width .5s}
/* Proficiency badge */
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
/* Results */
.score-ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;border:4px solid var(--accent)}
.score-big{font-size:34px;font-weight:700}
.score-sub{font-size:11px;color:var(--muted)}
.rev-item{padding:11px 13px;border-radius:8px;background:var(--surface2);margin-bottom:8px;border-left:3px solid}
.rev-q{font-size:12px;margin-bottom:4px;line-height:1.4}
.rev-a{font-size:11px;color:var(--muted)}
/* Quiz header bar */
.quiz-hdr{display:flex;align-items:center;gap:10px;max-width:500px;margin:0 auto;padding:12px 16px 0}
.quiz-hdr-info{flex:1}
.q-progress-txt{font-size:12px;color:var(--muted);margin-bottom:4px}
.live-score{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}
.timer{font-size:13px;font-weight:700;white-space:nowrap;padding:4px 10px;border-radius:999px;background:var(--surface2);display:none}
.timer.show{display:block}
.timer.warn{background:rgba(239,68,68,.2);color:var(--red)}
/* Study Mode */
.topic-btn{display:block;width:100%;text-align:left;padding:12px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;font-size:14px;color:var(--text);transition:border-color .15s}
.topic-btn:active{opacity:.75}
.topic-btn .tb-meta{font-size:11px;color:var(--muted);margin-top:2px}
.study-q{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.study-q .s-q{font-size:14px;line-height:1.6;margin-bottom:12px;font-weight:600}
.study-opt{display:flex;gap:8px;padding:9px 12px;border-radius:8px;margin-bottom:6px;font-size:13px;line-height:1.45}
.study-opt.s-correct{background:rgba(34,197,94,.15);border:1px solid var(--green)}
.study-opt.s-other{background:var(--surface2);border:1px solid var(--border)}
.study-expl{font-size:12px;color:var(--muted);line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.study-expl strong{color:var(--accent)}
/* Bookmark */
.bk-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;line-height:1;float:right;margin-top:-2px}
/* Score History */
.hist-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:48px;margin-top:8px}
.hist-bar{flex:1;border-radius:4px 4px 0 0;min-width:14px;position:relative;transition:height .4s}
.hist-bar-lbl{font-size:9px;text-align:center;margin-top:3px;color:var(--muted)}
</style>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// QUESTION BANK  (35 exam-quality questions)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Q = [
// ── DOMAIN 1: SECURE ARCHITECTURES ──
{id:1,domain:"Secure Architectures",topic:"IAM",sub:"Cross-Account Access",
q:"A company has two AWS accounts. Developers in Account A need to access S3 buckets in Account B without sharing long-term credentials. What is the MOST secure approach?",
o:["Create IAM users in Account B and share the access keys with Account A developers","Create an IAM role in Account B with a trust policy allowing Account A; developers call sts:AssumeRole","Store Account B credentials in AWS Secrets Manager in Account A","Grant Account A's root user access via S3 bucket ACLs"],
c:1,
e:"<strong>Correct: IAM cross-account role assumption.</strong> The best practice is an IAM role in Account B with a trust policy referencing Account A's IAM entities. Developers use STS AssumeRole to get short-lived temporary credentials — no long-term keys are ever shared. Option A uses long-term credentials (bad). Option C doesn't solve the cross-account IAM problem. Option D uses root (never recommended) and ACLs are legacy."},

{id:2,domain:"Secure Architectures",topic:"IAM",sub:"Service Control Policies",
q:"A security team wants to prevent ALL users in member accounts of AWS Organizations from disabling CloudTrail, even account administrators. What should they implement?",
o:["IAM permission boundaries on every user and role","Service Control Policies (SCPs) at the OU or account level denying cloudtrail:StopLogging","A CloudWatch alarm that alerts when CloudTrail is stopped","AWS Config rules with automatic remediation"],
c:1,
e:"<strong>Correct: SCPs in AWS Organizations.</strong> SCPs are guardrails applied at the Organization, OU, or account level. They restrict what actions can be performed in member accounts regardless of IAM permissions — even the account's own administrators cannot bypass an SCP. A Deny SCP for cloudtrail:StopLogging and cloudtrail:DeleteTrail achieves this. Permission boundaries apply per IAM entity, not org-wide. Config rules detect after-the-fact; SCPs prevent it entirely."},

{id:3,domain:"Secure Architectures",topic:"S3 Security",sub:"VPC Endpoints",
q:"A company stores sensitive data in S3 and wants to ensure traffic from EC2 instances NEVER traverses the internet, AND wants to prevent data exfiltration to external S3 buckets. What combination achieves this?",
o:["S3 bucket policy with IP whitelist + Security Groups on EC2","VPC Gateway Endpoint for S3 + S3 bucket policy with aws:sourceVpc condition + VPC endpoint policy restricting accessible buckets","CloudFront signed URLs + WAF","S3 Object Lock + Versioning"],
c:1,
e:"<strong>Correct: VPC Gateway Endpoint + bucket policy + endpoint policy.</strong> A VPC Gateway Endpoint routes S3 traffic over AWS's private network (no internet). The bucket policy using aws:sourceVpce or aws:sourceVpc ensures only requests from your VPC are accepted. The VPC endpoint policy restricts which S3 buckets can be accessed from the VPC — preventing exfiltration to attacker-owned buckets. This is AWS's recommended data-loss-prevention pattern for S3."},

{id:4,domain:"Secure Architectures",topic:"Encryption",sub:"KMS Key Material",
q:"A company needs to encrypt EBS volumes and must be able to IMMEDIATELY and PERMANENTLY invalidate all access to encrypted data in case of a security incident. Which approach provides this capability?",
o:["AWS managed keys (aws/ebs default key)","Customer managed KMS key with AWS-generated key material","Customer managed KMS key with imported key material","SSE-S3 server-side encryption"],
c:2,
e:"<strong>Correct: CMK with imported key material.</strong> When you import your own key material into KMS, you can delete that key material immediately at any time — rendering all data encrypted with it permanently inaccessible (crypto-shredding). AWS managed keys cannot be deleted or controlled this way. Standard CMKs with AWS-generated material require a 7–30 day waiting period before deletion. SSE-S3 applies to S3, not EBS, and doesn't support crypto-shredding."},

{id:5,domain:"Secure Architectures",topic:"DDoS Protection",sub:"WAF & Shield",
q:"A web app on ALB is suffering volumetric DDoS attacks and SQL injection attempts. The security team requires 24/7 access to AWS DDoS experts during an attack. What should they deploy?",
o:["AWS WAF + Shield Standard (free tier)","AWS WAF with managed rule groups + Shield Advanced","AWS Network Firewall + GuardDuty","CloudFront with geo-restriction only"],
c:1,
e:"<strong>Correct: WAF + Shield Advanced.</strong> AWS WAF with managed rule groups blocks application-layer attacks like SQL injection and XSS. Shield Advanced adds enhanced volumetric DDoS protection AND 24/7 access to the AWS Shield Response Team (SRT) who proactively assist during attacks. Shield Advanced also provides cost protection for DDoS-related scaling charges. Shield Standard is free but provides only basic L3/L4 protection with no SRT access."},

{id:6,domain:"Secure Architectures",topic:"Secrets Management",sub:"Rotation",
q:"An EC2 application connects to RDS using credentials stored in a plaintext config file on disk. What is the AWS-recommended approach to eliminate this risk?",
o:["Encrypt the config file using KMS","Store credentials in EC2 instance tags (they're hidden by default)","Use AWS Secrets Manager with automatic rotation; retrieve via IAM instance role at runtime","Store in SSM Parameter Store as a standard (not SecureString) parameter"],
c:2,
e:"<strong>Correct: AWS Secrets Manager with IAM instance role.</strong> Secrets Manager stores secrets encrypted at rest, supports automatic RDS credential rotation without application downtime, and EC2 instances retrieve secrets at runtime using their IAM role — zero hardcoded credentials. Config files on disk can be read by anyone with OS access. Instance tags are visible in the console and not designed for secrets. SSM Parameter Store SecureString works but lacks automatic rotation. Secrets Manager is the purpose-built solution."},

{id:7,domain:"Secure Architectures",topic:"GuardDuty",sub:"Threat Findings",
q:"GuardDuty raises a finding: 'UnauthorizedAccess:EC2/TorClient' on one of your production EC2 instances. What does this mean and what is the appropriate IMMEDIATE response?",
o:["The instance has high CPU; scale it up","The instance is communicating with Tor exit nodes suggesting compromise; immediately isolate it and begin forensic investigation","A user in the account has unusual login activity; reset their password","The instance's SSL certificate has expired"],
c:1,
e:"<strong>Correct: Tor communication = likely compromise; isolate immediately.</strong> GuardDuty's TorClient finding means the EC2 instance has active communication with Tor network exit nodes — a strong indicator of compromise (C2 communication, data exfiltration). Immediate response: (1) Isolate by modifying the Security Group to block all traffic, (2) take an EBS snapshot for forensics, (3) terminate and replace from a known-good AMI. GuardDuty analyzes VPC Flow Logs, DNS logs, and CloudTrail to detect threats."},

{id:8,domain:"Secure Architectures",topic:"IAM",sub:"Identity Federation",
q:"A large enterprise with 5,000 employees wants to give staff AWS Console access using their existing Active Directory credentials. Creating IAM users for all employees is not acceptable. What is the recommended solution?",
o:["Create IAM users synced from AD using a custom Lambda script","AWS IAM Identity Center (formerly SSO) integrated with Active Directory via SAML 2.0 or AD Connector","Amazon Cognito User Pools with AD sync","One shared IAM admin account for all employees"],
c:1,
e:"<strong>Correct: AWS IAM Identity Center with AD integration.</strong> IAM Identity Center is AWS's recommended workforce identity solution. It integrates with on-premises Active Directory (via AWS Directory Service AD Connector or Managed AD) or any SAML 2.0 IdP. Employees sign in with existing credentials, and you centrally manage access across multiple AWS accounts and applications. No IAM user proliferation. Cognito is for customer-facing (consumer) apps. Shared accounts violate audit/accountability requirements."},

// ── DOMAIN 2: RESILIENT ARCHITECTURES ──
{id:9,domain:"Resilient Architectures",topic:"RDS",sub:"Multi-AZ vs Read Replicas",
q:"A MySQL RDS database must have automatic failover within 2 minutes during an AZ failure, AND handle read traffic that is 4x the write traffic. What configuration achieves BOTH goals?",
o:["RDS Single-AZ with a manual failover runbook","RDS Multi-AZ for automatic failover + up to 5 Read Replicas to offload reads","Aurora Multi-Master for all read/write operations","RDS Multi-AZ alone (the standby also serves reads)"],
c:1,
e:"<strong>Correct: Multi-AZ + Read Replicas.</strong> These are complementary, not competing, features. Multi-AZ: synchronous replication to standby in another AZ, automatic failover ~1–2 minutes (automatic DNS flip). Read Replicas: asynchronous replicas that serve SELECT queries, up to 5 for MySQL RDS. Common trap: the Multi-AZ standby instance does NOT serve reads — it only exists for failover. Option D is wrong for this reason. Read Replicas are NOT for HA/failover; they're for read scaling. Use both for the full solution."},

{id:10,domain:"Resilient Architectures",topic:"Auto Scaling",sub:"Scaling Policy Types",
q:"An e-commerce site has a known, predictable traffic spike every Saturday at noon that lasts 3 hours. During other times, traffic is moderate. What scaling strategy is MOST efficient?",
o:["Target tracking on CPU — always reactive to actual load","Step scaling triggered at 70% CPU","Scheduled scaling to pre-provision capacity before noon Saturday, combined with target tracking for unexpected spikes","Manual scaling by an engineer every Saturday morning"],
c:2,
e:"<strong>Correct: Scheduled + target tracking (hybrid).</strong> Scheduled scaling proactively provisions capacity before the known spike (e.g., scale out at 11:45 AM Saturday). This avoids the reactive lag of metric-based scaling, which can cause performance issues during the ramp-up period. Target tracking handles any unexpected additional load. This hybrid approach is best practice for predictable-but-variable traffic. Pure reactive scaling always lags behind demand. Manual scaling is error-prone and doesn't scale operationally."},

{id:11,domain:"Resilient Architectures",topic:"Load Balancing",sub:"ALB vs NLB",
q:"A multiplayer game uses custom TCP protocols on ports 7000–8000 and needs ultra-low latency. Client firewalls require static IP addresses to whitelist the endpoints. Which load balancer fits?",
o:["Application Load Balancer (ALB) with sticky sessions","Network Load Balancer (NLB) with Elastic IPs","Classic Load Balancer","AWS Global Accelerator with ALB backend"],
c:1,
e:"<strong>Correct: Network Load Balancer (NLB).</strong> NLB operates at Layer 4 (TCP/UDP/TLS) with microsecond latency, handles millions of requests/second, and supports assigning Elastic IPs (one static IP per AZ) — perfect for firewall whitelisting. ALB is Layer 7 (HTTP/HTTPS only) and does not support static IPs or raw TCP. Classic LB is legacy. Global Accelerator provides static IPs but routes to ALB which still can't handle non-HTTP. NLB is the definitive answer for TCP + static IP + ultra-low latency."},

{id:12,domain:"Resilient Architectures",topic:"Route 53",sub:"Failover Routing",
q:"A company's primary site is in us-east-1 with a standby in us-west-2 (active-passive DR). Traffic should only go to us-west-2 if us-east-1 is unhealthy. Which Route 53 configuration is correct?",
o:["Latency-based routing between both regions","Weighted routing with 100 weight to us-east-1 and 0 to us-west-2","Failover routing with health checks on both records","Geolocation routing routing US users to us-east-1"],
c:2,
e:"<strong>Correct: Failover routing with health checks.</strong> Route 53 Failover routing is designed exactly for active-passive DR. You define a PRIMARY record (us-east-1) and SECONDARY/failover record (us-west-2), each with associated Route 53 health checks. If the primary health check fails, Route 53 automatically serves the secondary record. Without health checks, Route 53 won't detect failures. Latency routing picks the fastest, not the healthiest. Weighted routing doesn't automatically shift on failure. Geolocation ignores endpoint health."},

{id:13,domain:"Resilient Architectures",topic:"Decoupling",sub:"SQS Buffering",
q:"A web app creates image processing jobs faster than the processing fleet can handle during peak hours, causing jobs to be dropped. What is the BEST architectural solution?",
o:["Permanently scale up the processing EC2 instances to handle peak load","Add SQS between the web tier and processing tier; use SQS queue depth (ApproximateNumberOfMessagesVisible) as the Auto Scaling metric for the processing fleet","Process images synchronously in the web tier request","Use a larger EC2 instance type for processing"],
c:1,
e:"<strong>Correct: SQS decoupling + queue-depth Auto Scaling.</strong> SQS acts as a durable buffer: the web tier enqueues jobs (fast, always succeeds), and the processing tier dequeues at its own pace — no jobs are dropped even if processing is slow. Scale the processing fleet based on queue depth: when messages pile up, add workers; when the queue drains, scale in. This decoupled architecture handles traffic bursts without losing work. Permanent scale-up wastes money at off-peak times. Synchronous processing blocks web requests."},

{id:14,domain:"Resilient Architectures",topic:"S3",sub:"Replication",
q:"To enable S3 Cross-Region Replication (CRR) for automatic replication of new objects, which prerequisites MUST be met?",
o:["Versioning enabled on source bucket only","Versioning enabled on BOTH source and destination buckets; existing objects require S3 Batch Operations to replicate","No special prerequisites; CRR works on any bucket","S3 Event Notifications must be configured"],
c:1,
e:"<strong>Correct: Versioning on both buckets + Batch Operations for existing objects.</strong> CRR requires: (1) Versioning enabled on source AND destination, (2) an IAM role with permissions to replicate. Key exam traps: CRR only replicates objects added AFTER replication is configured — existing objects must be replicated using S3 Batch Operations with a 'Replicate' job. Also: delete markers are NOT replicated by default (configurable). Objects encrypted with SSE-KMS require additional KMS key grants in the destination region."},

{id:15,domain:"Resilient Architectures",topic:"Disaster Recovery",sub:"DR Strategies",
q:"A company needs RTO ≤ 1 hour and RPO ≤ 15 minutes for a critical app. Which DR strategy meets these requirements at the LOWEST cost?",
o:["Backup & Restore: snapshot to S3, restore from scratch on failure (RTO: hours)","Pilot Light: replicate data only, start/scale remaining infra on failure (RTO: 30–60+ min)","Warm Standby: scaled-down but running copy in DR region (RTO: ~15 min, scale up on failover)","Multi-Site Active-Active: full production in 2 regions simultaneously"],
c:2,
e:"<strong>Correct: Warm Standby.</strong> DR tiers from cheapest/slowest to expensive/fastest: Backup & Restore (RTO hours) → Pilot Light (RTO 30-60+ min, needs provisioning time) → Warm Standby (scaled-down running environment, RTO ~15 min — just scale up and flip DNS) → Active-Active (near-zero RTO, highest cost). Warm Standby provides RPO in minutes via continuous replication and RTO within the 1-hour window by pre-provisioning infrastructure at reduced capacity. Active-Active meets the SLA but costs significantly more."},

{id:16,domain:"Resilient Architectures",topic:"Route 53",sub:"Routing Pitfall",
q:"Route 53 weighted routing sends 80% to us-east-1 and 20% to eu-west-1. NO health checks are configured. If us-east-1 goes down, what happens?",
o:["Route 53 detects the failure and automatically routes 100% to eu-west-1","80% of user requests fail (routed to the downed endpoint); 20% succeed","Route 53 alerts SNS and pauses routing","All traffic is automatically rerouted to eu-west-1"],
c:1,
e:"<strong>Correct: 80% of requests fail — Route 53 keeps routing to the failed endpoint.</strong> This is a critical exam concept: weighted, latency, and geolocation routing policies do NOT automatically detect endpoint failures unless you explicitly associate Route 53 health checks with each DNS record. Without health checks, Route 53 treats all endpoints as healthy and blindly distributes traffic per weights. Always attach health checks to routing policy records if you need automatic failover behavior."},

// ── DOMAIN 3: HIGH-PERFORMING ARCHITECTURES ──
{id:17,domain:"High-Performing Architectures",topic:"CloudFront",sub:"Cache Behaviors",
q:"An ALB-backed web app has: (1) static assets at /static/* that change only on deploy, and (2) REST API at /api/* that is user-specific and dynamic. How should CloudFront be configured?",
o:["One behavior caching everything for 24 hours","Two behaviors: /static/* with long TTL (e.g., 1 year using Cache-Control headers); /api/* forwarding Authorization header (per-user cache key) with TTL=0 to bypass cache","Disable CloudFront caching entirely; use it only for SSL","Cache all paths and do a full invalidation after every deploy"],
c:1,
e:"<strong>Correct: Multiple cache behaviors with different TTLs.</strong> CloudFront path-based behaviors let you apply different cache settings per URL pattern. /static/*: max-age=31536000 (1 year) since assets are versioned and change only at deploy — maximizes cache hit rate. /api/*: forward Authorization header (creates per-user cache key) + TTL=0 (or Cache-Control: no-store) so dynamic personal data is never cached. Caching everything serves stale API data to users. Full invalidations on every deploy are slow and costly."},

{id:18,domain:"High-Performing Architectures",topic:"DynamoDB",sub:"Access Patterns & GSI",
q:"A DynamoDB table uses userId as the partition key. An analytics team needs to query ALL orders placed on a specific date across ALL users. The table has 100M items. What is the MOST efficient approach?",
o:["Table Scan with FilterExpression on a 'date' attribute","Query on userId with a date condition","Global Secondary Index (GSI) with orderDate as partition key (or date + shard)","Local Secondary Index (LSI) with orderDate as sort key"],
c:2,
e:"<strong>Correct: GSI with orderDate as partition key.</strong> A Scan reads every item (100M!) and filters client-side — extremely expensive in time and cost. A Query on userId can't span all users. An LSI shares the same partition key (userId), so it still can't query across users by date. A GSI with orderDate (or a bucketed date like 'YYYY-MM-DD') as the partition key allows efficient Query operations by date. If a single date has extremely high cardinality, add a shard suffix to the partition key to avoid hot partitions."},

{id:19,domain:"High-Performing Architectures",topic:"ElastiCache",sub:"Redis vs Memcached",
q:"An application needs a caching layer that supports: sorted sets (for a real-time leaderboard), data persistence across restarts, and Multi-AZ automatic failover. Which should you use?",
o:["ElastiCache for Memcached with Auto Discovery","ElastiCache for Redis with cluster mode and Multi-AZ replication","ElastiCache for Memcached with multi-threading","DynamoDB DAX"],
c:1,
e:"<strong>Correct: ElastiCache for Redis.</strong> Redis supports: sorted sets (ZADD/ZRANGE — perfect for leaderboards), data persistence (RDB snapshots + AOF), and Multi-AZ with automatic failover via replication groups. Cluster mode adds horizontal sharding. Memcached is simpler (pure in-memory key-value, no persistence, no replication, no complex data structures). Memcached wins only for simplest key-value caching with multi-threading. DynamoDB DAX is specifically a read-through cache for DynamoDB, not a general-purpose cache. Choose Redis whenever you need persistence, HA, or advanced data structures."},

{id:20,domain:"High-Performing Architectures",topic:"S3",sub:"Performance Optimization",
q:"A data ingestion pipeline uploads thousands of small objects per second to S3 with keys like '2024-05-16/sensor-001.json'. The team sees 503 SlowDown errors. What is the root cause and fix?",
o:["S3 bucket is in the wrong region; move it closer","Date-based key prefixes create hot partitions in S3; randomize or hash the prefix to distribute load","Enable S3 Transfer Acceleration to increase throughput","Increase the number of S3 buckets"],
c:1,
e:"<strong>Correct: Sequential prefixes create hot partitions; use random/hash prefixes.</strong> S3 partitions data by key prefix and handles up to 3,500 PUT and 5,500 GET requests/second PER PREFIX. Date-based prefixes (2024-05-16/) concentrate all writes in one partition. Fix: prepend a hash of the key (e.g., first 4-8 hex chars of MD5) to distribute objects across many partitions, each with its own 3,500 PUT/s capacity. Transfer Acceleration improves geographic upload speed, not partition throughput. Multiple buckets adds complexity without addressing the partitioning root cause."},

{id:21,domain:"High-Performing Architectures",topic:"Lambda",sub:"SQS Integration",
q:"A Lambda function processes SQS messages and takes up to 25 seconds per batch. The team notices messages are frequently processed twice, causing duplicate side effects. What is the MOST likely cause?",
o:["Lambda function has a bug causing it to pull messages twice","SQS visibility timeout is shorter than the Lambda execution time, so messages become visible again before processing completes","Lambda concurrency limit is too low","SQS FIFO queue should be used instead of Standard"],
c:1,
e:"<strong>Correct: Visibility timeout shorter than execution time.</strong> When SQS delivers a message, it becomes invisible for the visibility timeout period. If Lambda takes 25s but visibility timeout is, say, 15s, SQS re-enqueues the message (assuming it failed) while Lambda is still processing it. Another Lambda invocation picks up the duplicate. Fix: set SQS visibility timeout to at least 6× the Lambda function timeout. Also ensure your Lambda is idempotent (safe to run twice). This is one of the most common Lambda+SQS exam scenarios."},

{id:22,domain:"High-Performing Architectures",topic:"VPC Connectivity",sub:"Direct Connect",
q:"An enterprise must connect its on-premises data center to AWS with dedicated bandwidth, consistent sub-millisecond latency, and without traversing the public internet (compliance requirement). What should they use?",
o:["Site-to-Site VPN over the public internet with AES-256 encryption","AWS Direct Connect (dedicated private connection)","VPC Peering between on-premises VPC and AWS VPC","AWS PrivateLink"],
c:1,
e:"<strong>Correct: AWS Direct Connect.</strong> Direct Connect provides a dedicated physical network connection from your data center to an AWS Direct Connect location, bypassing the public internet entirely. It offers consistent performance and can be partitioned into virtual interfaces. Important exam nuance: Direct Connect alone does NOT encrypt traffic (connection is private but not encrypted). For both privacy AND encryption, combine Direct Connect with a Site-to-Site VPN. VPC Peering is VPC-to-VPC only. PrivateLink is for service endpoints. VPN uses the internet — violates the compliance requirement."},

{id:23,domain:"High-Performing Architectures",topic:"Aurora",sub:"Read Scaling",
q:"An Aurora MySQL cluster handles heavy read traffic during business hours with unpredictable spikes. The team wants read capacity to scale automatically without manual intervention. What should they configure?",
o:["Aurora Multi-Master to spread reads and writes across multiple writer nodes","Aurora Auto Scaling policy for Aurora Replicas based on average CPU utilization","Manually add read replicas every morning and remove them at night","RDS Proxy to pool connections and reduce load"],
c:1,
e:"<strong>Correct: Aurora Auto Scaling for Read Replicas.</strong> Aurora Auto Scaling monitors metrics (CPU utilization or replica connections) and automatically adds or removes Aurora Replicas (up to 15) based on your defined policy. This provides elastic read capacity without manual intervention. Aurora Multi-Master enables multiple write nodes — it's for write availability, not read scaling. RDS Proxy reduces connection overhead but doesn't add compute capacity. Manual scaling requires human intervention and can't respond fast enough to sudden spikes."},

// ── DOMAIN 4: COST-OPTIMIZED ARCHITECTURES ──
{id:24,domain:"Cost-Optimized Architectures",topic:"EC2 Pricing",sub:"Spot Instances",
q:"A genomics company runs 8-hour batch analysis jobs that can checkpoint and restart from where they left off if interrupted. They run these jobs continuously. What EC2 purchasing option minimizes cost?",
o:["On-Demand Instances — guaranteed availability","Reserved Instances (1-year, no upfront) — predictable billing","Spot Instances — up to 90% discount for interruption-tolerant workloads","Dedicated Hosts — for licensing compliance"],
c:2,
e:"<strong>Correct: Spot Instances.</strong> Spot Instances use spare AWS capacity at up to 90% discount vs On-Demand. The key qualifiers for Spot suitability: (1) fault-tolerant — can be interrupted with 2-minute warning ✓, (2) checkpointing — can resume from last checkpoint ✓. Batch analytics and genomics pipelines are the canonical Spot use cases. On-Demand: full price, no savings. Reserved: best for steady-state 24/7 workloads, not batch. Dedicated Hosts: for BYOL licensing compliance, expensive. Spot is always the answer for interruptible batch workloads."},

{id:25,domain:"Cost-Optimized Architectures",topic:"S3 Storage Classes",sub:"Lifecycle Policies",
q:"Objects are accessed frequently for 30 days, then rarely for 60 days, then essentially never — but must be retrievable within 12 hours if needed. Which S3 lifecycle policy minimizes cost?",
o:["S3 Standard for all data — simple and predictable","Transition to S3 Standard-IA after 30 days → S3 Glacier Flexible Retrieval after 90 days","Transition to S3 Glacier Instant Retrieval after 30 days","Transition to S3 One Zone-IA after 30 days, then delete after 90 days"],
c:1,
e:"<strong>Correct: Standard → Standard-IA (day 30) → Glacier Flexible Retrieval (day 90).</strong> S3 Standard-IA: lower storage cost than Standard, same retrieval performance, per-GB retrieval fee — ideal for days 30-90. S3 Glacier Flexible Retrieval: very low storage cost, retrieval in minutes to 12 hours (Bulk retrieval) — meets the '≤12 hour' requirement at minimum cost. Glacier Instant Retrieval costs more than Flexible and isn't needed since same-day retrieval isn't required. One Zone-IA stores in a single AZ (availability risk). All-Standard ignores lifecycle optimization."},

{id:26,domain:"Cost-Optimized Architectures",topic:"Savings Plans",sub:"Compute vs EC2",
q:"A company uses EC2 (multiple families/regions), Lambda, and Fargate. They want ONE commitment-based discount covering all three. Which product should they purchase?",
o:["EC2 Instance Savings Plans (specific family, specific region)","EC2 Reserved Instances (Convertible)","Compute Savings Plans — apply to EC2, Lambda, and Fargate regardless of instance family or region","Spot Instances for all three services"],
c:2,
e:"<strong>Correct: Compute Savings Plans.</strong> Compute Savings Plans are the most flexible commitment: they automatically apply to any EC2 (any family, size, OS, region, tenancy), Lambda, and Fargate. You commit to a $/hour spend for 1 or 3 years and get up to 66% savings. EC2 Instance Savings Plans cover only EC2 within a specific instance family and region — don't cover Lambda/Fargate. Convertible RIs cover only EC2. Spot doesn't apply to Lambda or Fargate at all. Compute Savings Plans is the right answer whenever the requirement spans multiple compute services."},

{id:27,domain:"Cost-Optimized Architectures",topic:"Data Transfer",sub:"VPC Endpoints",
q:"EC2 instances in a VPC are transferring large amounts of data to/from an S3 bucket in the SAME region, incurring significant data transfer costs. What eliminates these costs?",
o:["Move the S3 bucket to another region closer to users","Create a VPC Gateway Endpoint for S3 — S3 traffic stays on AWS private network at no cost","Enable S3 Transfer Acceleration","Use S3 Intelligent-Tiering to reduce storage costs"],
c:1,
e:"<strong>Correct: VPC Gateway Endpoint for S3.</strong> Without a VPC endpoint, EC2-to-S3 traffic in the same region may route through the internet gateway, incurring $0.09/GB data transfer costs. A VPC Gateway Endpoint for S3 (free to create) routes traffic through AWS's internal network — data transfer is free when EC2 and S3 are in the same region. Bonus: it also keeps all traffic private. Gateway Endpoints are available for S3 and DynamoDB. This is a zero-cost fix for a potentially large bill. Transfer Acceleration is for improving upload speed from external locations."},

{id:28,domain:"Cost-Optimized Architectures",topic:"RDS",sub:"Dev Environment Costs",
q:"A development team runs RDS instances 24/7 but developers only work 8 hours/day on weekdays (~40hrs/168hrs/week). What is the most cost-effective approach?",
o:["Purchase Reserved Instances for dev RDS — discounted hourly rate","Use smaller RDS instance types for development","Automate RDS stop/start on a schedule using EventBridge Scheduler + Systems Manager Automation (or Lambda)","Migrate dev databases to DynamoDB"],
c:2,
e:"<strong>Correct: Scheduled stop/start automation.</strong> RDS instances can be stopped (they auto-restart after 7 days, so automation must re-stop them). Stopped RDS instances incur no compute charges (storage charges still apply). At 40hrs/168hrs, you can eliminate ~76% of compute costs. EventBridge Scheduler triggers a stop action at 6 PM weekdays and a start at 8 AM weekdays. Reserved Instances reduce per-hour cost but you still pay 24/7 — worse than stop/start for truly intermittent dev workloads. Smaller instances sacrifice performance."},

{id:29,domain:"Cost-Optimized Architectures",topic:"Serverless Costs",sub:"Low-Traffic APIs",
q:"A company's internal REST API receives exactly 500 requests/day. It runs on a t3.small EC2 instance costing ~$15/month. What would be more cost-effective?",
o:["Downsize to t3.nano (~$5/month)","Switch to Spot Instance for the EC2","Migrate to API Gateway + Lambda (pay-per-request, ~$0/month at this scale)","Use ECS Fargate with a small task definition"],
c:2,
e:"<strong>Correct: API Gateway + Lambda.</strong> At 500 req/day = ~15,000 req/month: Lambda first 1M requests/month are FREE. API Gateway first 1M calls/month = $3.50. Total cost: ~$0–$1/month vs $15/month on EC2. Serverless is almost always cheaper than any always-on compute for low-traffic, spiky workloads. t3.nano at $5/month is better than t3.small but still can't compete with near-zero Lambda costs. Spot adds complexity and interruption risk. Fargate still charges for running tasks. Lambda is the textbook answer for very low or unpredictable traffic APIs."},

{id:30,domain:"Cost-Optimized Architectures",topic:"S3 Storage Classes",sub:"Intelligent-Tiering",
q:"A company accumulates S3 objects with UNPREDICTABLE access patterns — some objects remain hot for months, others go cold after one access. They cannot predict which objects will be accessed. What storage class is optimal?",
o:["S3 Standard — always available, never penalized for access","S3 Standard-IA — pay for retrieval only when needed","S3 Intelligent-Tiering — automatically moves objects between tiers based on actual access patterns with no retrieval fees","S3 Glacier Flexible Retrieval — assume data is cold"],
c:2,
e:"<strong>Correct: S3 Intelligent-Tiering.</strong> Intelligent-Tiering is purpose-built for unpredictable access patterns. It monitors access and automatically moves objects: Frequent Access tier (Standard pricing) → Infrequent Access tier after 30 days of no access → Archive Instant Access → optional deep archive tiers. Critically: NO retrieval fees and NO performance impact when objects are accessed (automatically promoted to Frequent Access). Small monitoring fee: $0.0025 per 1,000 objects/month. S3 Standard wastes money on cold objects. Standard-IA has retrieval fees and performance hits. Glacier assumes cold data."},

// ── MIXED: ADDITIONAL IMPORTANT TOPICS ──
{id:31,domain:"Secure Architectures",topic:"VPC Design",sub:"Public/Private Subnets",
q:"A 3-tier web app needs: web servers accessible from internet, app servers accessible only from web servers, databases accessible only from app servers. What VPC design achieves this?",
o:["All tiers in a single public subnet with Security Groups","Web in public subnet; App and DB in private subnets; Security Groups chained: web SG → app SG → DB SG","All tiers in private subnets with a NAT Gateway","Web and App in public subnets; DB in private subnet"],
c:1,
e:"<strong>Correct: Public/private subnet split with Security Group chaining.</strong> Web tier: public subnet (IGW route), SG allows 80/443 from 0.0.0.0/0. App tier: private subnet (no IGW route), SG allows app port only from web-tier SG ID. DB tier: private subnet, SG allows DB port only from app-tier SG ID. This SG chaining pattern is powerful and idiomatic AWS. Private subnets are isolated from inbound internet traffic by routing (no IGW route), not just Security Groups. All-public exposes everything unnecessarily. This 3-tier pattern is one of the most tested architectures on the exam."},

{id:32,domain:"Resilient Architectures",topic:"SNS/SQS",sub:"Fan-out Pattern",
q:"When an order is placed, 3 independent systems must be notified: (1) email confirmation, (2) inventory update, (3) fulfillment trigger. Each system must process independently and not block others. What is the BEST pattern?",
o:["A single Lambda calls all 3 services sequentially","Publish to SNS topic → SNS fans out to 3 separate SQS queues → each service polls its own queue","A single SQS queue that all 3 services read from","Direct Lambda invocations from the order service to each downstream service"],
c:1,
e:"<strong>Correct: SNS fan-out to 3 SQS queues.</strong> This is the canonical AWS decoupling pattern: (1) Order service publishes ONE message to SNS. (2) SNS delivers a copy to 3 SQS queues (email-queue, inventory-queue, fulfillment-queue). (3) Each service independently polls its own queue. Benefits: each service processes at its own pace, failures in one don't affect others, each can have its own retry/DLQ policy, queues buffer traffic spikes. Sequential Lambda is tightly coupled (one failure blocks others). Single SQS queue means all services compete for the same messages and must filter."},

{id:33,domain:"High-Performing Architectures",topic:"CloudFront",sub:"S3 Origin",
q:"A company hosts a static website on S3. Direct S3 URL access should be BLOCKED — only CloudFront should be able to serve the content. What mechanism enforces this?",
o:["S3 bucket policy allowing public access + CloudFront in front","CloudFront Origin Access Control (OAC) with S3 bucket policy allowing only the OAC principal; S3 Block Public Access enabled","S3 website endpoint with Referer-based bucket policy","S3 signed URLs from CloudFront"],
c:1,
e:"<strong>Correct: CloudFront Origin Access Control (OAC).</strong> OAC (the modern replacement for Origin Access Identity/OAI) is the mechanism for restricting S3 access to CloudFront only. Steps: (1) Create an OAC in CloudFront. (2) Update S3 bucket policy to allow s3:GetObject only from the CloudFront OAC principal. (3) Enable S3 Block Public Access. Now the bucket is inaccessible directly — all traffic must go through CloudFront. This provides: edge caching, HTTPS enforcement, geo-restriction, WAF protection, and signed URL/cookie support while keeping the origin private."},

{id:34,domain:"Secure Architectures",topic:"Logging",sub:"CloudTrail",
q:"A compliance requirement mandates: all AWS API activity logged across ALL regions, logs immutable for 7 years, and no administrator can disable logging. What combination achieves this?",
o:["Enable CloudTrail per region; store logs in individual regional buckets","Single multi-region CloudTrail trail + S3 bucket with Object Lock (Compliance mode, 7-year retention) + SCP denying cloudtrail:StopLogging and cloudtrail:DeleteTrail","CloudWatch Logs for all services + VPC Flow Logs","AWS Config with all rules enabled"],
c:1,
e:"<strong>Correct: Multi-region trail + S3 Object Lock + SCPs.</strong> Multi-region CloudTrail: one trail captures API activity in all regions and global services (IAM, CloudFront, STS). S3 Object Lock in Compliance mode: objects cannot be deleted or modified — not even by root — for the specified retention period (7 years). SCPs via Organizations: even account admins cannot disable CloudTrail. This three-layer defense satisfies stringent compliance auditors. CloudWatch captures app logs, not API calls. VPC Flow Logs capture network data, not API calls. Config tracks resource configuration, not API activity."},

{id:35,domain:"Resilient Architectures",topic:"ECS/Fargate",sub:"Container Operations",
q:"A team runs containerized microservices on ECS with EC2 launch type. They spend significant time patching, scaling, and managing the EC2 fleet. They want to eliminate this overhead. What should they migrate to?",
o:["ECS with EC2 launch type but using Spot Instances to reduce cost","AWS Fargate launch type — serverless containers with no EC2 management","Amazon EKS with self-managed node groups","Run Docker on EC2 instances managed by Systems Manager"],
c:1,
e:"<strong>Correct: AWS Fargate.</strong> Fargate is a serverless compute engine for containers that eliminates ALL EC2 fleet management: no patching, no AMI updates, no capacity planning, no scaling of the underlying hosts. You specify CPU and memory per task; AWS manages everything else. You pay per task-second. ECS with EC2 (even Spot) still requires managing the underlying instances. EKS with self-managed nodes is more complex than ECS and still requires node management. Manual Docker on EC2 is the highest operational burden. Fargate is the right answer whenever the requirement is 'reduce/eliminate infrastructure management for containers.'"},

// ── VPC ADVANCED ──
{id:36,domain:"Resilient Architectures",topic:"VPC",sub:"Transit Gateway",
q:"A company has 10 VPCs across 3 AWS regions plus an on-premises data center. They currently manage 45 VPC peering connections and each new VPC requires 10 new peering connections. What dramatically simplifies this architecture?",
o:["Continue adding VPC peering connections","AWS Transit Gateway — single hub all VPCs and on-premises connections attach to; supports transitive routing","Use VPC sharing via AWS Resource Access Manager","PrivateLink endpoints between every VPC pair"],
c:1,
e:"<strong>Correct: AWS Transit Gateway.</strong> VPC peering has no transitive routing and doesn't scale: N VPCs need N×(N-1)/2 peering connections. Transit Gateway is a regional, fully managed hub: attach VPCs, VPN connections, and Direct Connect gateways to it. Supports transitive routing (VPC A → TGW → VPC B), inter-region TGW peering, multiple route tables for traffic segmentation, and multicast. One attachment per VPC regardless of how many other VPCs you need to reach. This is the canonical large-scale multi-VPC connectivity answer on the exam."},

{id:37,domain:"Secure Architectures",topic:"VPC",sub:"SG vs NACL",
q:"A developer removes ALL inbound rules from a Security Group. An already-established TCP connection from a client continues working. Why is Security Group behavior different from NACLs in this situation?",
o:["Security Groups have hidden default ALLOW rules that can't be removed","Security Groups are stateful: connection tracking automatically allows return traffic; NACLs are stateless and evaluate every packet independently","NACLs take precedence over Security Groups for established connections","Security Groups only apply on ingress, not egress"],
c:1,
e:"<strong>Correct: Security Groups are stateful; NACLs are stateless.</strong> Stateful (SGs): if a connection is allowed inbound, return traffic is automatically permitted regardless of outbound rules. Stateless (NACLs): every packet evaluated independently. For a client request on port 443, a NACL needs both an inbound ALLOW for 443 AND an outbound ALLOW for the ephemeral response port range (1024–65535). NACLs also process rules in ascending number order — first match wins. This stateful/stateless distinction and NACL rule ordering are among the most tested VPC concepts."},

{id:38,domain:"Secure Architectures",topic:"VPC",sub:"Interface Endpoints",
q:"EC2 instances in a private subnet (no NAT, no internet) need to call AWS Secrets Manager, SSM Parameter Store, and KMS APIs. Which VPC endpoint type is required for these services?",
o:["VPC Gateway Endpoints — works for all AWS services","VPC Interface Endpoints (AWS PrivateLink) — creates ENIs in your subnet for each service","NAT Gateway routing to the public service endpoints","Direct Connect private VIF for all API calls"],
c:1,
e:"<strong>Correct: VPC Interface Endpoints (PrivateLink).</strong> Two VPC endpoint types: Gateway Endpoints: only S3 and DynamoDB, added to route tables, free. Interface Endpoints: all other AWS services (SSM, KMS, Secrets Manager, EC2 API, STS, etc.), create ENIs in your subnets, hourly cost + data fee. Traffic stays on the AWS private network — no internet required. For private subnets calling any AWS API that isn't S3/DynamoDB: create Interface Endpoints for each service. Also update Security Groups to allow HTTPS (443) from the private subnet to the endpoint ENIs."},

// ── EC2 ADVANCED ──
{id:39,domain:"High-Performing Architectures",topic:"EC2",sub:"Placement Groups",
q:"A Hadoop cluster requires 20 EC2 instances where each node must be isolated from other nodes' hardware failures. If one physical server fails, only the instances on THAT server should be affected — not all instances. Which placement group achieves this?",
o:["Cluster placement group — packs instances on same hardware for lowest latency","Spread placement group — each instance on distinct hardware, max 7 per AZ per group","Partition placement group — instances in logical partitions, each partition on separate racks, supports hundreds of instances","No placement group needed — AWS automatically isolates instances"],
c:2,
e:"<strong>Correct: Partition placement group.</strong> Partition groups: each partition runs on a separate rack (independent power and network). If one rack fails, only that partition is affected. Supports up to 7 partitions per AZ, hundreds of instances per group. Ideal for large distributed/replicated workloads: HDFS, Cassandra, HBase, Kafka — where you want replica sets on separate failure domains. Spread: max 7 instances per AZ (too small for 20), each on completely separate hardware — use for small groups needing max isolation. Cluster: all on same rack, opposite of fault isolation."},

{id:40,domain:"High-Performing Architectures",topic:"EC2",sub:"EBS Volume Types",
q:"A production relational database requires 40,000 sustained IOPS with consistent single-digit millisecond latency. Which EBS volume type is required?",
o:["gp3 — up to 16,000 IOPS, cost-effective general purpose SSD","gp2 — 3 IOPS/GB, bursts to 16,000 IOPS","io1/io2 — provisioned IOPS SSD, up to 64,000 IOPS (Nitro) with consistent performance","st1 — throughput-optimized HDD, high sequential MB/s"],
c:2,
e:"<strong>Correct: io1/io2 Provisioned IOPS SSD.</strong> gp3: up to 16,000 IOPS (40,000 exceeds this). gp2: 3 IOPS/GB bursting to 16,000 — still insufficient. io1/io2: up to 64,000 IOPS on Nitro-based instances, consistent low latency, designed for I/O-intensive databases. st1/sc1: HDD — sequential throughput only, not suitable for random-access databases. io2 Block Express reaches 256,000 IOPS. Rule: whenever IOPS requirement exceeds 16,000, the answer is io1/io2. io2 also has higher durability (99.999%) vs io1 (99.8–99.9%)."},

{id:41,domain:"Cost-Optimized Architectures",topic:"EC2",sub:"Instance Store",
q:"A big data MapReduce job needs the highest possible disk throughput for a temporary shuffle/sort operation. The data does NOT need to persist after the job completes. What storage provides maximum performance for this use case?",
o:["io2 Block Express EBS — highest IOPS EBS volume","Amazon EFS — shared, highly parallel file system","EC2 NVMe Instance Store — physically attached, no network overhead, highest raw IOPS and throughput","gp3 EBS with maximum provisioned throughput (1,000 MB/s)"],
c:2,
e:"<strong>Correct: EC2 Instance Store (NVMe SSD).</strong> Instance Store is physically attached to the host — no EBS network round-trips. Provides the highest raw IOPS and throughput available on EC2 (millions of IOPS on i3/i3en instances). Critical limitation: ephemeral — data is lost on stop, termination, hibernation, or host failure. For temporary scratch/shuffle data in a batch job, that's perfectly acceptable. Instance families with NVMe instance store: i3/i3en (storage-optimized), d3 (dense HDD), c5d/m5d/r5d (NVMe scratch). Match storage choice to persistence requirement: temporary = instance store for max performance."},

{id:42,domain:"Resilient Architectures",topic:"EC2",sub:"Hibernate",
q:"A data science application loads a 50GB ML model into RAM on EC2 startup, taking 20 minutes. The instance is stopped each night to save costs. The team wants to eliminate the 20-minute startup time each morning without keeping the instance running overnight. What EC2 feature solves this?",
o:["Create a daily AMI to capture instance state including RAM","Use EC2 Auto Scaling with pre-warmed instances in standby","Enable EC2 Hibernate — saves RAM contents to the encrypted EBS root volume; on restart, RAM state is fully restored and applications continue without rebooting","Use a larger, faster instance type so startup is quicker"],
c:2,
e:"<strong>Correct: EC2 Hibernate.</strong> Hibernate dumps all RAM contents to the encrypted EBS root volume, then fully powers off (no compute charges). On restart, RAM is restored from EBS — OS does not reboot, the 50GB model is already in memory, applications resume in seconds. Requirements: EBS-backed instance with encrypted root volume large enough to hold RAM, hibernation enabled at launch, supported instance families. You pay for EBS storage of the RAM dump while hibernated, but not EC2 compute hours. AMI captures disk state only — not RAM. Pre-warmed instances still incur compute charges. Hibernate is the purpose-built 'suspend to disk' solution."},

// ── S3 ADVANCED ──
{id:43,domain:"Secure Architectures",topic:"S3",sub:"Presigned URLs",
q:"A media company stores private video files in S3. The application server needs to allow authenticated users to download specific files directly from S3 for up to 1 hour without making the bucket public or exposing AWS credentials to the client. What is the correct approach?",
o:["Set S3 bucket to public-read and validate tokens client-side","Generate S3 pre-signed URLs server-side using the application's IAM role with a 1-hour expiry; return URL to the client","Use CloudFront with a public distribution pointing to the S3 bucket","Create per-user IAM credentials with S3 read-only access"],
c:1,
e:"<strong>Correct: S3 Pre-signed URLs.</strong> The application server (with an IAM role having s3:GetObject) generates a pre-signed URL using the AWS SDK. The URL embeds the object key, expiry timestamp, and a cryptographic signature. The end user receives this URL and downloads directly from S3 — no AWS credentials are needed or exposed. After expiry, the URL is invalid. Pre-signed URLs also work for PUT (allowing direct uploads). For high-scale video streaming with CDN benefits, combine with CloudFront Signed URLs/Cookies. Pre-signed URLs are the canonical pattern for time-limited, authenticated access to private S3 objects."},

{id:44,domain:"Secure Architectures",topic:"S3",sub:"Object Lock",
q:"A healthcare company must retain patient records in S3 for exactly 10 years. No one — including AWS account root — should be able to delete or alter any record during the retention period. What S3 configuration achieves absolute immutability?",
o:["S3 Versioning with MFA Delete — root with physical MFA device can still bypass","S3 Object Lock in Governance mode — privileged users with bypass permission can still delete/modify","S3 Object Lock in Compliance mode with 10-year retention — no override possible by anyone including root","S3 Lifecycle policy that prevents expiration actions"],
c:2,
e:"<strong>Correct: S3 Object Lock — Compliance mode.</strong> Two modes: Governance mode: objects protected but users with s3:BypassGovernanceRetention CAN delete/overwrite — useful for testing or administrative exceptions. Compliance mode: the retention period CANNOT be shortened or overridden by ANY user, including root. Objects are completely immutable for the full retention period. Satisfies WORM (Write Once Read Many) compliance: SEC 17a-4, HIPAA, FINRA. Requires versioning. Legal Hold is a separate toggle that indefinitely protects an object independently of retention period (useful while litigation is pending)."},

{id:45,domain:"Resilient Architectures",topic:"S3",sub:"Event Notifications",
q:"New image uploads to an S3 bucket must trigger THREE parallel independent processors (resize, watermark, virus scan). Each processor must receive a copy of every upload event. What architecture handles this?",
o:["Configure 3 separate S3 Event Notifications — one pointing to each Lambda","Configure S3 Event Notification → SNS topic → 3 SQS queues → each consumed by one Lambda (SNS fan-out)","Use EventBridge with S3 and schedule each Lambda to poll","Configure one Lambda that calls the other two synchronously"],
c:1,
e:"<strong>Correct: S3 → SNS → 3 SQS queues (fan-out).</strong> S3 Event Notifications support only one destination per event type+prefix combination. For multiple parallel consumers: S3 → SNS (one notification) → fan out to 3 SQS queues (resize-q, watermark-q, scan-q) → each Lambda polls its own queue. Benefits: each processor is independent (failure in one doesn't affect others), each has its own DLQ and retry policy, scales independently. Alternatively: use EventBridge with S3 (supports multiple targets per rule). 3 separate S3 notifications won't work — S3 allows only one notification destination per event+prefix. Single Lambda calling others creates tight coupling."},

// ── RDS ADVANCED ──
{id:46,domain:"High-Performing Architectures",topic:"RDS",sub:"Aurora Serverless",
q:"A startup has a new SaaS application with completely unpredictable database load — zero traffic for hours, then sudden spikes. They need a database that minimizes cost during idle periods and scales instantly for spikes without manual intervention.",
o:["RDS MySQL db.t3.micro — cheapest fixed instance, always running","Aurora Provisioned with minimum instance class and Read Replicas for scale","Aurora Serverless v2 — scales ACUs from near-zero to hundreds in seconds, billed per ACU-second","DynamoDB — always serverless and cheap"],
c:2,
e:"<strong>Correct: Aurora Serverless v2.</strong> Aurora Serverless v2 scales in fine-grained 0.5 ACU (Aurora Capacity Unit) increments within seconds. Can idle at 0.5 ACU (near-zero cost) and instantly scale to hundreds of ACUs for spikes. Billed per ACU-second of actual usage — idle = minimal cost. Perfect for: unpredictable workloads, dev/test, new applications with unknown traffic, multi-tenant SaaS. Aurora Provisioned has fixed hourly costs 24/7 regardless of load. RDS t3.micro also runs continuously. DynamoDB is NoSQL — not a drop-in replacement for relational workloads."},

{id:47,domain:"Resilient Architectures",topic:"RDS",sub:"RDS Proxy",
q:"A serverless application has hundreds of concurrent Lambda functions each opening a new connection to an RDS MySQL database, causing 'too many connections' errors and failover issues. What is the AWS-recommended solution?",
o:["Increase max_connections in the RDS parameter group — more connections allowed","Add a Read Replica to distribute the connection load","Amazon RDS Proxy — pools and multiplexes Lambda connections; Lambda connects to Proxy, Proxy maintains a smaller warm pool to RDS","Implement connection pooling inside the Lambda function using a global variable"],
c:2,
e:"<strong>Correct: RDS Proxy.</strong> Lambda's execution model creates one connection per invocation, potentially thousands simultaneously — each consuming hundreds of MB of RDS memory. RDS Proxy maintains a warm connection pool to RDS and multiplexes thousands of client connections onto far fewer database connections (up to 66% reduction). Additional benefits: improved failover time (clients reconnect to Proxy which handles the RDS failover transparently — 66% faster), supports IAM auth and Secrets Manager integration, works with MySQL, PostgreSQL, MariaDB, SQL Server, Aurora. Connection pooling in Lambda's global scope helps slightly but not at scale. Proxy is the purpose-built solution for Lambda+RDS."},

{id:48,domain:"Resilient Architectures",topic:"RDS",sub:"Point-in-Time Recovery",
q:"An RDS MySQL database is accidentally corrupted by a developer running DROP TABLE on production. The team needs to recover the exact data from 3 days ago at 2:47 PM. What RDS feature makes this possible?",
o:["Manual snapshot taken during the last maintenance window (previous night)","RDS automated backups with Point-in-Time Recovery (PITR) — restore to any second within the retention window","Export RDS data to S3 and restore from CSV","Restore from an RDS Read Replica"],
c:0,
e:"<strong>Correct: RDS Automated Backups with Point-in-Time Recovery (PITR).</strong> RDS automated backups continuously archive transaction logs to S3 alongside daily backups. This enables PITR: restore the database to any specific second within the backup retention window (1–35 days). Restoring creates a NEW RDS instance (original stays untouched). Manual snapshots only capture the point-in-time of the snapshot — you can't restore to an arbitrary minute if your last snapshot was midnight. PITR to 2:47 PM exactly 3 days ago is only possible with automated backups. Always set retention to the maximum (35 days) for production databases. Read Replicas don't help — the DROP TABLE replicates to them."},

// ── DYNAMODB ──
{id:49,domain:"High-Performing Architectures",topic:"DynamoDB",sub:"Global Tables",
q:"A gaming company has a DynamoDB table in us-east-1. Asian players experience 200ms+ latency. The company needs the table to accept writes from BOTH us-east-1 and ap-southeast-1 with automatic bidirectional replication within seconds. What provides this?",
o:["DynamoDB Streams + custom Lambda to replicate writes between regions","DynamoDB Cross-Region Read Replicas (read-only in secondary regions)","DynamoDB Global Tables — multi-region, multi-active replication with sub-second synchronization","Deploy separate tables per region and handle conflicts in application code"],
c:2,
e:"<strong>Correct: DynamoDB Global Tables.</strong> Global Tables are fully managed, multi-region, multi-active (read AND write in any region). Changes replicate asynchronously across all regions — typically under 1 second. Conflict resolution: last-writer-wins based on timestamps. Auto-configured requirement: DynamoDB Streams must be enabled (Global Tables handles this automatically). Use cases: globally distributed apps needing local-region write latency, active-active DR. Players in Singapore write to ap-southeast-1; US players write to us-east-1 — data synchronized automatically. Custom Stream-based replication requires managing Lambda, conflict resolution, and retries yourself."},

{id:50,domain:"High-Performing Architectures",topic:"DynamoDB",sub:"TTL and Streams",
q:"A session management service stores user sessions in DynamoDB. Sessions should expire automatically after 24 hours without application-managed deletes. When a session expires, a Lambda must archive it for analytics. What DynamoDB features enable this pattern?",
o:["A CloudWatch rule triggering Lambda every hour to scan and delete old sessions","DynamoDB TTL on an expiration attribute (auto-deletes expired items) + DynamoDB Streams triggering Lambda on the delete event","DynamoDB Auto Scaling removes old items based on capacity","CloudWatch Logs capturing delete events"],
c:1,
e:"<strong>Correct: DynamoDB TTL + Streams + Lambda.</strong> TTL: add an expiry_time attribute (Unix epoch) to each session. DynamoDB automatically deletes expired items in the background at no cost — typically within 48 hours of expiry. Streams: DynamoDB Streams captures item-level changes (INSERT/MODIFY/REMOVE). TTL deletes appear as REMOVE events in the stream. Configure a Lambda trigger on the stream to archive expired sessions to S3/Redshift. This pattern is cost-efficient (no polling Lambda), automatic, and decoupled. Hourly Lambda scan is expensive (reads entire table), slow, and costs money. This TTL+Streams pattern is a very common SAA exam scenario."},

{id:51,domain:"High-Performing Architectures",topic:"DynamoDB",sub:"Capacity Modes",
q:"A company is migrating a workload to DynamoDB and has no historical data on read/write patterns. They want to start immediately without capacity planning, and don't mind slightly higher per-request costs initially. Which DynamoDB capacity mode should they choose?",
o:["Provisioned mode with Auto Scaling — adjusts to demand automatically","On-Demand mode — no capacity planning, pay per actual request, never throttled (within account limits)","Provisioned mode with very high WCU/RCU set as a buffer","Reserved Capacity for DynamoDB to reduce costs upfront"],
c:1,
e:"<strong>Correct: DynamoDB On-Demand mode.</strong> On-Demand: no capacity planning, instantly scales to any traffic level, pay per request. Never throttled (within account service limits). More expensive per request (~2.5x vs Provisioned at steady load) but perfect for unknown traffic patterns. Once traffic is established, switch to Provisioned + Auto Scaling to reduce costs. Provisioned + Auto Scaling adjusts WCU/RCU based on utilization but can still throttle if traffic spikes faster than Auto Scaling reacts (3–5 minute lag). On-Demand has no lag — it scales instantly. Start On-Demand, profile traffic, then optimize to Provisioned."},

// ── KINESIS ──
{id:52,domain:"High-Performing Architectures",topic:"Kinesis",sub:"Streams vs Firehose",
q:"A company collects clickstream data (500 MB/hour) and needs: (1) a fraud detection Lambda consuming data within 2 seconds of ingestion, and (2) automatic delivery to S3 for batch analytics with no custom consumer code. What combination is correct?",
o:["Kinesis Data Firehose for both — Lambda transform for fraud + S3 delivery","Kinesis Data Streams (fraud detection Lambda, <1s latency) + Kinesis Firehose subscribed to the same stream (automatic S3 delivery — no consumer code)","Two separate SQS queues — one for Lambda, one for S3 sync","One Lambda reading from Firehose and writing to both fraud system and S3"],
c:1,
e:"<strong>Correct: Kinesis Data Streams + Firehose fan-out.</strong> Kinesis Data Streams: real-time (<1s latency), multiple consumers, data retained 1–365 days (replayable). Fraud detection Lambda consumes the stream with sub-2s latency. Kinesis Firehose can use a Data Stream as its source, delivering records to S3/Redshift/OpenSearch automatically — no consumer code. Firehose has ~60s minimum buffer but that's fine for batch analytics. Firehose alone cannot achieve 2-second fraud detection (60s minimum latency). Data Streams alone requires custom code for S3 delivery. The Streams+Firehose combination gives you real-time processing + managed S3 delivery simultaneously."},

{id:53,domain:"High-Performing Architectures",topic:"Kinesis",sub:"Shard Capacity",
q:"A Kinesis Data Stream with 3 shards is receiving 4 MB/s of data and producers are getting ProvisionedThroughputExceededException. What is the correct resolution?",
o:["Enable Enhanced Fan-Out to increase write throughput","Add more consumer applications to drain the stream faster","Shard splitting — increase from 3 to at least 4 shards (4 MB/s write capacity)","Increase the data retention period from 24 hours to 7 days"],
c:2,
e:"<strong>Correct: Shard splitting to add write capacity.</strong> Each Kinesis shard: 1 MB/s ingestion, 2 MB/s reads, 1,000 records/second. 3 shards = 3 MB/s write capacity. Writing 4 MB/s → throttling. Split one shard → 4 shards → 4 MB/s capacity. Shard splitting divides a shard by hash key range. Shard merging combines two. Cost: per shard-hour, right-size to minimize. Enhanced Fan-Out increases consumer read throughput (2 MB/s per consumer per shard) — doesn't affect write/ingest capacity. Retention period affects data durability, not throughput. Formula: ceil(required MB/s) = minimum shards."},

// ── CLOUDWATCH ──
{id:54,domain:"High-Performing Architectures",topic:"CloudWatch",sub:"CloudWatch Agent",
q:"An EC2 instance's memory utilization is not visible in CloudWatch metrics even with Detailed Monitoring enabled. An alarm needs to fire when memory exceeds 80%. What is required?",
o:["Enable Enhanced Monitoring in the EC2 console — includes memory metrics","Memory is a standard EC2 metric; Detailed Monitoring must be enabled for 1-minute granularity","Install the CloudWatch Unified Agent on the EC2 instance; it collects OS-level metrics (memory, disk, swap) and publishes as custom metrics","Create a Lambda function that polls /proc/meminfo via SSM Run Command every minute"],
c:2,
e:"<strong>Correct: CloudWatch Unified Agent for OS-level metrics.</strong> By default, CloudWatch collects hypervisor-level EC2 metrics: CPU utilization, network I/O, disk IOPS, status checks — not inside-the-OS. Memory, swap, disk space used, and per-process metrics require the CloudWatch Unified Agent installed on the instance. The agent collects these and publishes to CloudWatch as custom metrics (namespace: CWAgent). Then create a standard CloudWatch Alarm on the memory metric. Detailed Monitoring increases frequency (5 min → 1 min) for the same default metrics — still no memory. Enhanced Monitoring is an RDS feature, not EC2. The Unified Agent is the only way to get OS-level metrics."},

{id:55,domain:"Secure Architectures",topic:"CloudWatch",sub:"EventBridge",
q:"A security team needs an email notification within 2 minutes whenever anyone calls iam:CreateUser in the AWS account. What is the most direct solution?",
o:["CloudWatch Metrics alarm on IAM API call volume","CloudTrail → EventBridge rule matching iam:CreateUser API event → SNS topic with email subscription","AWS Config rule detecting new IAM users — sends SNS notification","Lambda polling CloudTrail logs every minute"],
c:1,
e:"<strong>Correct: CloudTrail + EventBridge + SNS.</strong> CloudTrail records every API call including iam:CreateUser. EventBridge receives CloudTrail management events in near-real-time and can pattern-match: eventSource=iam.amazonaws.com, eventName=CreateUser. Route matching events to an SNS topic with an email subscription. Total delay: ~1–2 minutes from API call to email. Config rules detect configuration drift but with higher latency and more setup. Lambda polling CloudTrail logs is slow (logs may take 15 minutes to appear in S3) and expensive. CloudWatch Metrics doesn't capture specific API calls. CloudTrail → EventBridge → SNS is the standard near-real-time security alerting pattern."},

// ── CLOUDFORMATION ──
{id:56,domain:"High-Performing Architectures",topic:"CloudFormation",sub:"StackSets",
q:"An organization uses AWS Organizations with 30 member accounts. Security policy requires identical VPC configs and security IAM roles in ALL current AND future member accounts. CloudFormation StackSets should be used. Which permission model deploys automatically to new accounts added to an OU?",
o:["Self-managed permissions — requires manually creating execution roles in each new account","Service-managed permissions with Organizations integration — automatically deploys to existing accounts and new accounts added to the OU","CloudFormation alone without StackSets handles multi-account deployments","Use AWS CDK with cross-account pipelines"],
c:1,
e:"<strong>Correct: StackSets with service-managed permissions (Organizations integration).</strong> Service-managed permissions use Organizations to deploy automatically: to all current accounts in an OU AND to any new account added to the OU in the future — zero manual work per new account. Self-managed permissions require creating AWSCloudFormationStackSetAdministrationRole and AWSCloudFormationStackSetExecutionRole in each account manually. For organization-wide baselines (security guardrails, VPC templates, logging), service-managed StackSets is the answer. Supports concurrent deployments, failure tolerance settings, and per-region/per-account customization via parameters."},

{id:57,domain:"High-Performing Architectures",topic:"CloudFormation",sub:"Change Sets",
q:"Before updating a production CloudFormation stack, a team wants to preview exactly which resources will be added, modified, or deleted — without applying any changes. What CloudFormation feature enables this?",
o:["CloudFormation Drift Detection — shows differences between live stack and deployed template","CloudFormation Change Sets — create a preview of what will change; no changes applied until you explicitly execute the change set","CloudFormation Stack Policies — prevent specific resources from being replaced","CloudFormation Rollback Triggers — define alarms that trigger automatic rollback"],
c:1,
e:"<strong>Correct: CloudFormation Change Sets.</strong> Two-phase process: (1) Create Change Set: submit the new/updated template, CloudFormation calculates the impact (Add/Modify/Remove per resource) — no changes made yet. (2) Review the change set in console/CLI — confirm no unintended replacements (e.g., Replace on an RDS instance = delete + recreate). (3) Execute Change Set: apply changes. Critical for production safety. Drift Detection compares a live stack against the last deployed template — detects out-of-band changes (resources modified outside CloudFormation). Change Sets are the preview-before-apply tool."},

// ── SYSTEMS MANAGER ──
{id:58,domain:"Secure Architectures",topic:"Systems Manager",sub:"Session Manager",
q:"A security audit finds that EC2 instances have port 22 (SSH) open to the internet via security groups, and SSH sessions are not logged. The team wants to eliminate exposed SSH ports and get full session logging. What AWS-native solution achieves both?",
o:["Restrict port 22 to specific IP ranges and add auditd logging","Use EC2 Instance Connect — no bastion needed but still uses port 22","AWS Systems Manager Session Manager — no open inbound ports required; all session activity logged to CloudTrail, S3, and CloudWatch Logs","Configure a logging proxy between the bastion and EC2 instances"],
c:2,
e:"<strong>Correct: AWS Systems Manager Session Manager.</strong> Session Manager provides browser/CLI shell access to EC2 without any open inbound ports. The SSM Agent connects OUTBOUND to SSM endpoints — no port 22 or 3389 needed. Session logging: start/end captured in CloudTrail, full terminal I/O streamed to CloudWatch Logs and/or S3. Access controlled entirely by IAM (ssm:StartSession). Requirements: SSM Agent (pre-installed on Amazon Linux 2/2023, recent Windows AMIs), EC2 instance profile with AmazonSSMManagedInstanceCore, and for private subnets without internet: SSM VPC Interface Endpoints. Eliminates the largest attack surface: exposed SSH ports."},

{id:59,domain:"Secure Architectures",topic:"Systems Manager",sub:"Parameter Store",
q:"A Lambda function needs to retrieve a database password stored as an SSM Parameter Store SecureString (encrypted with the default aws/ssm KMS key). What minimum IAM permissions are required on the Lambda execution role?",
o:["s3:GetObject — Parameter Store is backed by S3","ssm:GetParameter with WithDecryption=true (the default aws/ssm key grants automatic kms:Decrypt for the account)","secretsmanager:GetSecretValue — SSM uses Secrets Manager API internally","No permissions needed — Lambda auto-discovers SSM parameters in the same region"],
c:1,
e:"<strong>Correct: ssm:GetParameter (with WithDecryption=true) for the specific parameter ARN.</strong> SecureString parameters are encrypted with KMS. To retrieve and decrypt: you need ssm:GetParameter. When using the default aws/ssm managed key, calling GetParameter with WithDecryption=true automatically uses the key (no explicit kms:Decrypt needed in the role — it's implicit with ssm:GetParameter). If using a Customer Managed Key (CMK), you additionally need kms:Decrypt on that specific key. Best practice: grant ssm:GetParameter only on the specific parameter ARN(s), not ssm:*. Lambda environment variables are simpler but visible in the console and not automatically rotatable."},

// ── SECURITY SERVICES ──
{id:60,domain:"Secure Architectures",topic:"Security Services",sub:"Macie",
q:"A compliance team needs to automatically scan all S3 buckets to find any objects containing PII (SSNs, credit card numbers, passport numbers) and identify buckets with risky security configurations (public access, no encryption). Which service provides this?",
o:["Amazon GuardDuty — detects unauthorized access and threats","AWS Config — tracks S3 bucket configuration rules","Amazon Macie — ML-powered sensitive data discovery in S3; classifies data and flags security findings","AWS Trusted Advisor — identifies open S3 buckets"],
c:2,
e:"<strong>Correct: Amazon Macie.</strong> Macie uses ML to automatically discover and classify sensitive data in S3: PII (SSNs, passport numbers, driver's licenses, credit cards), financial data, credentials (AWS keys, private keys), healthcare data. Generates two finding categories: (1) Sensitive Data findings — specific objects containing PII, (2) Policy findings — bucket misconfigurations (public access enabled, replication not encrypted, shared externally). GuardDuty detects threats in CloudTrail/DNS/VPC Flow Logs. Config tracks configuration compliance (public block status, encryption, versioning). Trusted Advisor has basic open-bucket checks. Macie is the dedicated data classification and PII discovery service."},

{id:61,domain:"Secure Architectures",topic:"Security Services",sub:"Inspector",
q:"A DevSecOps team wants every new ECR container image scanned for CVEs automatically on push, without manual scan scheduling. Which service provides continuous automated vulnerability scanning for container images?",
o:["Amazon GuardDuty — detects threats in running containers","AWS Trusted Advisor — checks for ECR best practices","Amazon Inspector v2 — integrates with ECR for automatic image scanning on push; continuously re-evaluates as new CVEs are published","AWS Security Hub — aggregates findings from multiple security tools"],
c:2,
e:"<strong>Correct: Amazon Inspector v2 with ECR integration.</strong> Inspector v2 enables scan-on-push: every ECR image push triggers an automatic Inspector scan against known OS and programming language CVEs. Results appear as Inspector findings and in ECR image details. Crucially: Inspector continuously re-evaluates images as new CVEs are published — an image clean yesterday may have new findings today (no rescanning needed). You can block deployments by checking Inspector findings in CI/CD. Inspector also scans EC2 instances (OS packages, network reachability) and Lambda functions (dependencies). GuardDuty monitors EKS runtime behavior. Security Hub aggregates but doesn't scan images itself."},

// ── COST MANAGEMENT ──
{id:62,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Compute Optimizer",
q:"A company has 200 EC2 instances across multiple sizes and families. Some instances may be over-provisioned and some under-provisioned. The team wants data-driven recommendations to right-size without guesswork. Which service provides this?",
o:["AWS Cost Explorer — shows which services have highest spend","AWS Trusted Advisor — flags instances with CPU below 10% for 4+ days","AWS Compute Optimizer — analyzes 14 days of CloudWatch utilization metrics using ML; provides specific instance type recommendations with projected cost/performance impact","AWS Budgets — sets alerts for when spend exceeds thresholds"],
c:2,
e:"<strong>Correct: AWS Compute Optimizer.</strong> Compute Optimizer uses ML on CloudWatch utilization data to provide specific resize recommendations for: EC2 instances (right-size to optimal type and family), EC2 Auto Scaling groups, EBS volumes (right-size type and size), Lambda functions (right-size memory), ECS on Fargate (right-size CPU/memory). Provides three findings: over-provisioned (save money), optimized (keep), under-provisioned (improve performance). Shows projected monthly savings and performance impact. Requires ≥30 hours of data (14-day lookback preferred). Trusted Advisor: only flags <10% average CPU — no cross-metric ML, no specific type recommendations. Compute Optimizer is the purpose-built right-sizing tool."},
