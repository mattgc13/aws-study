q:"A company uses AWS Organizations. They want to ensure that NO account in the production OU can disable CloudTrail or delete CloudTrail logs, even if an account's root user tries. SCPs are enabled. What SCP should they attach to the Production OU?",
o:["Attach a Deny SCP on cloudtrail:DeleteTrail and cloudtrail:StopLogging actions to the Production OU — this overrides even root user permissions within member accounts","Create an IAM policy denying these actions and attach it to all IAM users in each account","Enable AWS Config rules to detect and auto-remediate CloudTrail disabling","Use a Permission Boundary on all roles in production accounts"],
c:0,
e:"<strong>Correct: Deny SCP on CloudTrail actions.</strong> SCPs in AWS Organizations are the ONLY control that can restrict root user permissions in member accounts. An SCP Deny on cloudtrail:DeleteTrail, cloudtrail:StopLogging, and s3:DeleteObject (on the log bucket) applied to the Production OU prevents even account root users from disabling CloudTrail. IAM policies don't apply to root. Permission Boundaries apply to IAM entities, not root. AWS Config can detect violations but cannot prevent them. SCPs are your guardrails — they define the maximum permissions boundary for all principals (including root) in member accounts."},

{id:111,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Savings Plans",
q:"A company runs a mix of EC2 instances and Fargate tasks that change instance types and sizes frequently as they migrate workloads. They want to commit to AWS compute usage for 1 year to get a discount but need flexibility to switch instance families, sizes, and even move from EC2 to Fargate. Which purchase option gives them this flexibility?",
o:["EC2 Reserved Instances (Convertible) — can change instance family within EC2 only","Standard Reserved Instances — cheapest but locked to specific instance type","Compute Savings Plans — apply to any EC2 instance (any family, size, OS, region) and Fargate/Lambda usage; most flexible discount option at up to 66% off On-Demand","EC2 Instance Savings Plans — apply to specific instance family in a region; cannot apply to Fargate"],
c:2,
e:"<strong>Correct: Compute Savings Plans.</strong> Compute Savings Plans offer the most flexibility: they apply automatically to any EC2 instance regardless of instance family, size, OS, tenancy, or region, AND to AWS Fargate and Lambda. You commit to a $/hour spend for 1 or 3 years. EC2 Instance Savings Plans are cheaper but apply only to a specific instance family in a specific region (not Fargate). Convertible RIs allow instance family changes within EC2 but not Fargate. For workloads that span EC2 and Fargate or change frequently, Compute Savings Plans are the answer."},

{id:112,domain:"Resilient Architectures",topic:"Route 53",sub:"Routing Policies",
q:"A global e-commerce company wants to route users to the AWS region with the lowest network latency. They have deployments in us-east-1, eu-west-1, and ap-southeast-1. Which Route 53 routing policy should they use?",
o:["Geolocation routing — routes based on user's geographic location to the nearest region","Weighted routing — distributes traffic by percentage across regions","Latency-based routing — Route 53 measures latency between the user and each region and directs the user to the region with the lowest latency","Failover routing — routes to primary until it fails, then to secondary"],
c:2,
e:"<strong>Correct: Latency-based routing.</strong> Route 53 latency routing directs users to the region that provides the lowest latency based on AWS's latency measurements between AWS regions and the user's DNS resolver. This dynamically routes to the fastest region, not necessarily the geographically closest one. Geolocation routing is based on geographic location (useful for content licensing or language preferences), not latency. Weighted routing splits traffic by fixed percentage. Failover routing is for active-passive DR. The key phrase 'lowest network latency' → latency-based routing."},

{id:113,domain:"Resilient Architectures",topic:"Route 53",sub:"Health Checks & Failover",
q:"A company hosts a web app in us-east-1 with a hot standby in us-west-2. If the primary region becomes unavailable, Route 53 should automatically redirect traffic to the standby. What configuration achieves this?",
o:["Latency routing with health checks — Route 53 will stop routing to a region that is slow","Weighted routing with 90/10 split — most traffic goes to primary","Route 53 Failover routing — designate us-east-1 as PRIMARY and us-west-2 as SECONDARY; attach a health check to the primary record; if the health check fails, Route 53 automatically routes to the secondary","Geolocation routing with a default record pointing to us-west-2"],
c:2,
e:"<strong>Correct: Route 53 Failover routing with health checks.</strong> Failover routing requires: (1) A PRIMARY record for us-east-1 with a health check. (2) A SECONDARY record for us-west-2 (no health check needed on secondary). Route 53 evaluates the health check; if primary is unhealthy, all traffic routes to the secondary. This is active-passive DR. Health checks can monitor endpoints, CloudWatch alarms, or other health checks (calculated health checks). Latency routing doesn't do failover — it routes to the fastest region, but if both are slow, it still picks one. Weighted routing doesn't do automatic failover based on health."},

{id:114,domain:"High-Performing Architectures",topic:"Application Integration",sub:"EventBridge",
q:"A company wants to build an event-driven architecture where S3 uploads, EC2 state changes, and third-party SaaS events (e.g., Zendesk ticket creation) all trigger different downstream Lambda functions. They want centralized routing rules without custom code to fan out events. What service should they use?",
o:["Amazon SNS — publish events to topics with Lambda subscriptions","Amazon SQS — create separate queues for each event source and poll with Lambda","Amazon EventBridge — serverless event bus that accepts events from AWS services, custom apps, and 90+ SaaS integrations; routing rules pattern-match on event content to target Lambda functions, SQS, Step Functions, etc.","Amazon Kinesis Data Streams — ingest all events and route with consumer Lambda functions"],
c:2,
e:"<strong>Correct: Amazon EventBridge.</strong> EventBridge is the AWS event bus service purpose-built for event-driven architectures. It has: (1) Default event bus (AWS service events like EC2 state changes, S3 events via EventBridge notifications). (2) Custom event buses (your application events). (3) Partner event buses (90+ SaaS partners like Zendesk, Datadog, Shopify). Rules use event patterns to match and route events to targets (Lambda, SQS, Step Functions, etc.) — no custom routing code. SNS topics require explicit publish calls; they don't natively ingest SaaS events. SQS is a queue, not an event router. EventBridge is the answer for centralized event routing across AWS, custom, and SaaS sources."},

{id:115,domain:"Secure Architectures",topic:"Threat Detection",sub:"GuardDuty & Security Hub",
q:"A company wants a single pane of glass for security findings across their AWS Organization — findings from GuardDuty, Macie, Inspector, and third-party tools should be normalized, aggregated, and prioritized in one place. What service provides this?",
o:["Amazon Detective — investigates and visualizes security findings using graph analysis","AWS Config — aggregates configuration compliance findings across accounts","AWS Security Hub — aggregates, normalizes, and prioritizes security findings from GuardDuty, Macie, Inspector, Firewall Manager, and partner tools into a single dashboard with compliance standards scoring","AWS Trusted Advisor — provides best practice recommendations including security checks"],
c:2,
e:"<strong>Correct: AWS Security Hub.</strong> Security Hub is the centralized security posture management service. It: (1) Aggregates findings from GuardDuty, Macie, Inspector, IAM Access Analyzer, Firewall Manager, and 50+ partner tools. (2) Normalizes findings into the AWS Security Finding Format (ASFF). (3) Scores your account against security standards (CIS, PCI-DSS, AWS Foundational Security Best Practices). (4) Works cross-account via Organizations. Amazon Detective helps investigate and visualize EXISTING findings (it answers 'why is this happening?'). Config tracks configuration compliance. Trusted Advisor gives recommendations, not finding aggregation."},

{id:116,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS Outposts",
q:"A manufacturing company needs to run AWS compute (EC2, ECS, RDS) in their on-premises data center with single-digit millisecond latency to factory floor PLCs (programmable logic controllers) that cannot route traffic to the public cloud. They want to use the same AWS APIs and console they use for their cloud workloads. What solution fits?",
o:["Deploy EC2 instances in a Local Zone nearest to the factory","Use AWS Direct Connect to reduce latency to the existing AWS region","Deploy AWS Outposts in the factory data center — AWS-managed rack with EC2, ECS, EKS, RDS, and S3 on Outposts running on-premises, connected back to the parent AWS region","Set up a VMware Cloud on AWS cluster in the factory"],
c:2,
e:"<strong>Correct: AWS Outposts.</strong> Outposts is a fully managed AWS rack (42U rack or 1U/2U servers) physically deployed in your on-premises facility. It runs genuine AWS infrastructure so you use the same EC2, ECS, EKS, RDS, S3 on Outposts APIs and console. Traffic between Outpost workloads and on-premises equipment (PLCs) never leaves the facility — single-digit ms latency. The Outpost connects back to its parent region for management. Local Zones extend AWS regions to metro areas but are still AWS-managed facilities, not your premises. Direct Connect reduces latency but doesn't put compute on-premises. Outposts = AWS infrastructure, your building."},

{id:117,domain:"High-Performing Architectures",topic:"Compute",sub:"AWS Wavelength",
q:"A company is building a low-latency mobile gaming application. They need compute at the edge of 5G networks to achieve sub-10ms latency for mobile players. Their target carriers are Verizon and Vodafone. What AWS solution is specifically designed for this?",
o:["Deploy EC2 instances in the AWS region closest to the carrier network","Use Amazon CloudFront with Lambda@Edge to move compute closer to users","AWS Wavelength — embeds AWS compute inside telecom 5G networks; traffic stays within the carrier network and never traverses the internet to reach an AWS region","Deploy in an AWS Local Zone in the nearest metropolitan area"],
c:2,
e:"<strong>Correct: AWS Wavelength.</strong> Wavelength Zones are AWS infrastructure deployments embedded within telecommunications providers' 5G networks (Verizon, Vodafone, KDDI, SK Telecom). Mobile device traffic travels over the 5G network directly to the Wavelength Zone compute — it never leaves the carrier network to traverse the public internet to an AWS region. This achieves single-digit millisecond latency for 5G-connected devices. CloudFront/Lambda@Edge reduce latency for content delivery but are still internet-based. Local Zones reduce latency to cities but are not embedded in 5G carrier networks. Wavelength = ultra-low latency for 5G mobile apps."},

{id:118,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"S3 Intelligent-Tiering",
q:"A data analytics company stores large objects in S3. Access patterns are unpredictable — some objects are accessed frequently, some are never accessed again after 30 days. The team doesn't want to manage lifecycle rules or pay retrieval fees, but wants automatic cost optimization. What S3 storage class is best?",
o:["S3 Standard-IA (Infrequent Access)","S3 One Zone-IA","S3 Glacier Instant Retrieval","S3 Intelligent-Tiering"],
c:3,
e:"<strong>Correct: S3 Intelligent-Tiering.</strong> Intelligent-Tiering monitors access patterns and automatically moves objects between tiers: Frequent Access (like Standard), Infrequent Access (after 30 days without access, 40% cheaper), Archive Instant Access (after 90 days, 68% cheaper), optional Archive and Deep Archive tiers. Crucially, there are NO retrieval fees when objects move back to Frequent Access — you only pay a small monthly monitoring fee per object. It's ideal for unpredictable access patterns. Standard-IA and One Zone-IA charge per-GB retrieval fees. Glacier requires restore operations. Intelligent-Tiering removes the need to predict or manage transitions manually."},

{id:119,domain:"Resilient Architectures",topic:"Messaging",sub:"SQS vs SNS vs EventBridge",
q:"A company has an order processing system. When an order is placed, it needs to: (1) update inventory, (2) send a confirmation email, and (3) trigger fraud detection — all simultaneously. Each consumer should process the message independently. What architecture is correct?",
o:["Use a single SQS Standard queue — all three services poll the same queue and process messages; each message is deleted after one service reads it","Use SNS with three SQS queue subscriptions (fan-out pattern) — SNS publishes one message, all three SQS queues receive a copy, each downstream service processes independently","Use SQS FIFO queue with MessageGroupId to route to three consumers","Chain Lambda functions: inventory → email → fraud detection in sequence"],
c:1,
e:"<strong>Correct: SNS fan-out to SQS queues.</strong> The SNS fan-out pattern: publish one message to an SNS topic → SNS delivers to all subscribed SQS queues simultaneously. Each downstream service (inventory, email, fraud) has its own SQS queue and processes independently at its own pace. This decouples services, handles backpressure per queue, and allows independent retry. Single SQS queue: only one consumer receives each message — the first to read it deletes it, others don't see it. Chained Lambdas are sequential, not parallel — if fraud detection is slow, email confirmation waits. SNS fan-out → SQS is the canonical pattern for one-to-many parallel processing."},

{id:120,domain:"Secure Architectures",topic:"CloudFront",sub:"Field-Level Encryption",
q:"A company processes payments via a CloudFront-fronted API. Credit card numbers in form submissions should be encrypted at the CloudFront edge using a public key, so that only the payment microservice (which holds the private key) can decrypt them — not even other backend services. What feature achieves this?",
o:["CloudFront HTTPS (TLS termination) — encrypts data in transit to the origin","AWS WAF on the CloudFront distribution to block malicious payloads","CloudFront Field-Level Encryption — CloudFront encrypts specific POST fields (e.g., credit card number) at the edge using a public key; the encrypted value passes through all origin layers and only the private key holder can decrypt","AWS KMS envelope encryption at the ALB layer"],
c:2,
e:"<strong>Correct: CloudFront Field-Level Encryption.</strong> Field-Level Encryption adds an extra layer beyond HTTPS. You upload a public key to CloudFront; CloudFront encrypts specific HTTP POST fields at the edge before forwarding to the origin. The encrypted ciphertext is opaque to all intermediate services — only the microservice with the matching private key can decrypt it. This protects sensitive data (credit cards, SSNs) even if other services or logs are compromised. Regular HTTPS only protects data in transit and decrypts at the first SSL termination point. WAF inspects traffic but doesn't encrypt. KMS is for AWS service encryption, not per-field HTTP request encryption at edge."},

{id:121,domain:"High-Performing Architectures",topic:"Compute",sub:"Lambda — Power Tuning",
q:"A Lambda function processes image thumbnails. It currently uses 128 MB memory and takes 8 seconds per invocation, costing $0.0000133/invocation. A team member suggests increasing memory to 1 GB. What is the likely outcome regarding both performance and cost?",
o:["Increasing memory always increases cost proportionally — 8x more memory = 8x more cost per invocation","Memory has no effect on CPU; only storage throughput increases","Lambda allocates CPU proportional to memory. At 1 GB (8x more memory), the function may run in ~1 second (8x faster), and since Lambda charges memory × duration, cost may stay the same or decrease while performance improves significantly","Memory above 512 MB is billed at a premium tier rate"],
c:2,
e:"<strong>Correct: More memory = more CPU = faster execution, often same or lower cost.</strong> Lambda's pricing = GB-seconds (memory × duration). It also allocates CPU proportionally to memory. A CPU-bound function (like image processing) at 128 MB with 8 seconds: 128MB × 8s = 1024 MB-seconds. At 1024 MB: if it runs in 1 second: 1024MB × 1s = 1024 MB-seconds — same cost, 8× faster. Often the function runs even faster than proportional, making it both faster AND cheaper. Use the AWS Lambda Power Tuning tool to find the optimal memory setting. There is no premium tier above 512 MB — pricing is linear in memory."},

{id:122,domain:"Resilient Architectures",topic:"Storage",sub:"AWS DataSync",
q:"A company needs to migrate 500 TB of NFS data from their on-premises NAS to Amazon S3, then keep data synchronized between on-premises and S3 on an ongoing basis (incremental syncs). They need encryption in transit and data integrity verification. What is the right tool?",
o:["AWS Snowball Edge — ship physical appliances to copy all data; no ongoing sync capability","rsync over a Direct Connect connection — manual script, no managed service","AWS DataSync — managed data movement service that accelerates transfers from NFS/SMB/HDFS/object storage to S3/EFS/FSx; uses a DataSync agent on-premises; handles scheduling, encryption, integrity verification, and incremental syncs automatically","AWS Storage Gateway File Gateway — mounts as NFS and backs up to S3"],
c:2,
e:"<strong>Correct: AWS DataSync.</strong> DataSync is purpose-built for scheduled, incremental data movement between on-premises storage (NFS, SMB, HDFS, S3-compatible) and AWS storage (S3, EFS, FSx). Features: automatic encryption in transit (TLS), per-file checksums for integrity verification, bandwidth throttling, scheduling, and incremental transfers (only changed files). Deploys as a VM agent on-premises. Snowball Edge is for offline bulk transfers where network is impractical — no ongoing sync. rsync requires self-managed scripting. Storage Gateway is for hybrid cloud access (mount S3 as NFS), not bulk migration with sync. DataSync = managed, scheduled, incremental, verified data movement."},

{id:123,domain:"Resilient Architectures",topic:"Compute",sub:"EC2 Auto Scaling — Predictive",
q:"A retail website has a consistent traffic surge every weekday at 8 AM when employees start work. The current reactive Auto Scaling policy adds capacity after CPU crosses 70%, but the scale-out takes 5 minutes while users experience slow response times. How can you eliminate the lag?",
o:["Decrease the CloudWatch alarm period to 1 minute so the alarm triggers faster","Pre-warm by maintaining 2x instances at all times — eliminates scale-out lag but wastes money","Enable Predictive Scaling on the Auto Scaling Group — it analyzes historical traffic patterns (7 days) and proactively adds capacity BEFORE the anticipated surge","Use Scheduled Scaling with a fixed cron at 7:55 AM to launch instances before the surge"],
c:2,
e:"<strong>Correct: Predictive Scaling.</strong> Predictive Scaling uses ML to analyze 14 days of historical CloudWatch metrics and forecast future demand. It proactively schedules capacity additions BEFORE the forecasted increase — so capacity is ready when traffic surges begin. Unlike Scheduled Scaling (which requires you to manually define the schedule), Predictive Scaling learns patterns automatically and adapts as patterns change. Both are valid, but Predictive Scaling is more adaptive for 'consistent but learned' patterns. Reducing alarm period helps with reactive scaling but doesn't eliminate the 5-minute EC2 launch lag. Over-provisioning wastes money. Predictive Scaling = proactive capacity based on ML forecasting."},

{id:124,domain:"Secure Architectures",topic:"Compliance",sub:"AWS Artifact",
q:"A company's compliance team needs to download AWS's ISO 27001 certification, SOC 2 Type II report, and PCI DSS compliance documents to provide to their auditors as evidence of AWS's compliance posture. Where should they go?",
o:["Contact AWS Support and request compliance documents via a support ticket","AWS Trusted Advisor — provides security and compliance checks","AWS Artifact — self-service portal in the console for downloading AWS compliance reports (ISO, SOC, PCI, FedRAMP, HIPAA) and viewing/accepting AWS agreements","AWS Config — maintains compliance records for the account"],
c:2,
e:"<strong>Correct: AWS Artifact.</strong> AWS Artifact is a self-service compliance portal available directly in the AWS Management Console. It provides: (1) AWS Artifact Reports — download third-party audit reports: ISO certifications, SOC reports, PCI DSS AOC, FedRAMP authorization, HIPAA eligibility, etc. (2) AWS Artifact Agreements — view and accept BAAs (Business Associate Agreements) for HIPAA, NDA agreements, etc. No need to contact AWS Support or wait for approval. Trusted Advisor checks your account's configuration against best practices. Config tracks resource configurations. AWS Artifact = AWS's own compliance documentation library."},

{id:125,domain:"Cost-Optimized Architectures",topic:"Cost Management",sub:"Cost Allocation Tags",
q:"A company has hundreds of EC2 instances across dozens of projects and teams sharing a single AWS account. The finance team needs a monthly report showing exact AWS spend broken down by project and team. What is the correct approach?",
o:["Use AWS Cost Explorer with default dimensions — it automatically breaks down cost by project","Create separate AWS accounts per project for automatic cost isolation","Enable cost allocation tags — tag resources with Project and Team keys; activate the tags in the billing console; Cost Explorer and Cost and Usage Reports then allow filtering and grouping by tag","Use AWS Budgets with a budget per service — it shows cost by service, not project"],
c:2,
e:"<strong>Correct: Cost allocation tags.</strong> The workflow: (1) Apply tags to resources (EC2, RDS, etc.) — e.g., Key: Project, Value: ProjectAlpha. (2) Activate tags as cost allocation tags in the Billing Console (only activated tags appear in cost reports). (3) Use Cost Explorer or the Cost and Usage Report (CUR) to group/filter by tag. This enables chargeback and showback without separate accounts. Without tag activation, tags appear on resources but NOT in billing reports. Separate accounts provide stronger isolation but create management overhead. Cost Explorer default dimensions are service, region, account — not project. Tags + activation = project-level cost visibility."},

{id:126,domain:"High-Performing Architectures",topic:"Databases",sub:"ElastiCache Strategies",
q:"A read-heavy web application queries the same product data from RDS thousands of times per second. To reduce DB load, the team adds ElastiCache Redis with a lazy loading (cache-aside) strategy. If an item is not in cache, what happens?",
o:["ElastiCache returns an error and the application must retry later","The application reads from RDS, then writes the result to ElastiCache with a TTL; subsequent reads for that item are served from cache","ElastiCache automatically fetches from RDS and populates itself — no application logic needed","The application reads from RDS but does not write to cache — only a write-through strategy populates cache"],
c:1,
e:"<strong>Correct: Lazy loading (cache-aside) pattern.</strong> In lazy loading: (1) App checks cache — cache miss. (2) App reads from RDS (the source of truth). (3) App writes the result to ElastiCache with a TTL. (4) Next request for same data — cache hit, served directly. Stale data risk is controlled by TTL. Pro: only requested data is cached (no wasted memory). Con: first request always hits DB (cache miss penalty). Write-through strategy: app writes to cache AND DB on every write — no miss penalty but wastes cache for rarely-read items. ElastiCache is NOT a read-through cache (it doesn't fetch from RDS automatically) — application code handles the miss/load/store logic."},

{id:127,domain:"Resilient Architectures",topic:"Storage",sub:"EFS vs EBS vs S3",
q:"A company runs a containerized microservices application on ECS with dozens of tasks. Multiple tasks need to simultaneously read and write to a shared file system — e.g., for shared configuration files, media uploads, and processing state. Which storage solution is correct?",
o:["EBS gp3 volume — attach to multiple ECS tasks for shared access","S3 — all tasks can read/write objects with the S3 API; good for large files but not a POSIX filesystem","Amazon EFS — a managed NFS file system that can be mounted concurrently by hundreds of EC2 instances and ECS tasks; provides shared POSIX-compatible storage with automatic scaling","FSx for Lustre — high-performance parallel file system for HPC and ML workloads"],
c:2,
e:"<strong>Correct: Amazon EFS.</strong> EFS is a managed NFS service that provides a shared POSIX filesystem. Key property: it can be mounted CONCURRENTLY by multiple EC2 instances, ECS tasks, Lambda functions (in VPC), and EKS pods across multiple AZs. It scales storage automatically. For containerized workloads needing shared state, EFS is the standard answer. EBS volumes: can only be attached to ONE EC2 instance at a time in Read/Write mode (EBS Multi-Attach for io1/io2 is limited to a single AZ and requires cluster-aware apps). S3 is an object store, not a POSIX filesystem — no file locking, directory semantics, or append operations. FSx for Lustre is for HPC/ML, not general shared storage."},

{id:128,domain:"Secure Architectures",topic:"Encryption",sub:"KMS Key Policies",
q:"A company uses a KMS Customer Managed Key (CMK) to encrypt S3 objects. A developer's IAM policy grants them s3:GetObject but they cannot decrypt the objects. What additional permission is required and where must it be granted?",
o:["Add kms:Decrypt to the developer's IAM policy — that alone is sufficient","KMS does not require additional permissions beyond S3 — the bucket policy controls decryption","The KMS key policy must explicitly allow the developer (or their IAM role) kms:Decrypt; additionally, the developer's IAM policy must also allow kms:Decrypt — BOTH the key policy and IAM policy must permit the action","Rotate the CMK to grant temporary decryption access"],
c:2,
e:"<strong>Correct: Both KMS key policy AND IAM policy must allow kms:Decrypt.</strong> KMS uses a two-gating model: (1) Key policy (resource-based): must explicitly allow the principal to use the key. (2) IAM policy (identity-based): must also allow the kms:Decrypt action. If either denies (or doesn't allow), decryption fails. Exception: if the key policy contains the 'enable IAM policies' statement (allows account root to delegate via IAM), then just the IAM policy is sufficient. But by default, both must allow. S3 GetObject triggers KMS Decrypt automatically, but KMS still checks key policy + IAM policy. This two-gate model is unique to KMS among AWS services."},

{id:129,domain:"High-Performing Architectures",topic:"Compute",sub:"ECS vs EKS",
q:"A startup is containerizing their first application — a simple 3-tier web app with 5 microservices. The team is experienced with Docker but has no Kubernetes experience. They want a managed AWS container orchestration service that minimizes operational overhead and avoids learning Kubernetes. Which should they choose?",
o:["Amazon EKS (Elastic Kubernetes Service) — industry standard, largest ecosystem, best long-term choice","Amazon ECS (Elastic Container Service) — AWS-native container orchestration, simpler than Kubernetes, deep AWS integration (IAM, ALB, CloudWatch, Secrets Manager), lower operational overhead for teams without K8s experience","EC2 with Docker Compose — most control, familiar Docker syntax","AWS Lambda container images — pack microservices as Lambda functions for zero infrastructure"],
c:1,
e:"<strong>Correct: Amazon ECS for teams new to containers on AWS.</strong> ECS is AWS-native container orchestration. Key advantages: simpler mental model (Tasks and Services vs K8s Pods/Deployments/ReplicaSets/Services/Ingress), deep native AWS integration (IAM task roles, ALB integration, CloudWatch Container Insights, Secrets Manager injection), lower ops overhead — no need to learn kubectl or manage the Kubernetes control plane. With Fargate launch type, there are no EC2 instances to manage at all. EKS is the right choice when teams already know Kubernetes or need K8s ecosystem tools. For Docker-experienced teams new to orchestration, ECS (especially with Fargate) has a much gentler learning curve."},

{id:130,domain:"Resilient Architectures",topic:"High Availability",sub:"Well-Architected — Reliability",
q:"According to the AWS Well-Architected Framework's Reliability Pillar, which practice is most important for recovering from infrastructure failures quickly and consistently?",
o:["Adding more redundant hardware in the primary data center to reduce failure probability","Manual runbooks and on-call engineers who can diagnose and fix failures within 1 hour","Automated recovery through infrastructure as code (IaC), automated health checks, and Auto Scaling — systems detect failures and recover automatically without human intervention","Performing full DR tests once per year to validate recovery procedures"],
c:2,
e:"<strong>Correct: Automated recovery without human intervention.</strong> The Reliability Pillar's core design principle is: 'Automatically recover from failure.' Key practices: (1) Use health checks and Auto Scaling to automatically replace unhealthy instances. (2) Infrastructure as Code (CloudFormation, CDK) to recreate infrastructure reliably. (3) Multi-AZ and multi-region for fault isolation. (4) Circuit breakers and retry with backoff to handle transient failures. The pillar explicitly warns against manual processes — human reaction time (even 1 hour) is unacceptable for automated systems. Redundant hardware is 'traditional IT' thinking; the cloud model uses disposable, automatically replaced instances. Annual DR tests alone don't ensure fast recovery."},

{id:131,domain:"Cost-Optimized Architectures",topic:"Well-Architected",sub:"Cost Optimization Pillar",
q:"The AWS Well-Architected Framework Cost Optimization Pillar recommends 'measuring overall efficiency.' A company has a web service running on 20 large EC2 instances utilizing only 15% average CPU. What is the recommended approach?",
o:["This is fine — over-provisioning provides a safety buffer for unexpected traffic","Right-size the instances — analyze actual usage with CloudWatch and AWS Compute Optimizer, then move to smaller instance types or use Auto Scaling to match capacity to actual demand","Add more instances to improve redundancy, which reduces per-instance cost through economies of scale","Migrate all instances to Reserved Instances at the current size — this locks in the current configuration at lower cost"],
c:1,
e:"<strong>Correct: Right-sizing with Compute Optimizer.</strong> 15% CPU utilization means you're paying for 85% unused capacity. The Cost Optimization Pillar principle 'right size' says: match instance type/size to actual workload requirements. Process: use CloudWatch metrics + AWS Compute Optimizer (ML-based rightsizing recommendations) to identify optimal instance type. Combine with Auto Scaling to match capacity to demand dynamically. Buying RIs at the wrong size locks in waste. Adding more instances increases cost. Over-provisioning is explicitly called out as waste in the pillar. Compute Optimizer analyzes EC2, Lambda, EBS, ECS on Fargate, and Auto Scaling Groups and provides rightsizing recommendations."},

{id:132,domain:"Secure Architectures",topic:"Security Services",sub:"AWS Config",
q:"A company needs to continuously monitor whether any S3 bucket in their account has public access enabled, and automatically remediate the issue by disabling public access whenever a non-compliant bucket is detected — without manual intervention. What is the correct solution?",
o:["Enable Amazon Macie to detect public buckets and send email alerts","Use CloudTrail to log s3:PutBucketPolicy API calls and trigger a Lambda function via CloudWatch Events to check each change","Use AWS Config with the s3-bucket-public-read-prohibited managed rule; configure an automatic remediation action using Systems Manager Automation (AWS-DisableS3BucketPublicReadWrite) to fix non-compliant buckets","Set up a daily Lambda function that scans all buckets and disables public access"],
c:2,
e:"<strong>Correct: AWS Config rule with automatic remediation.</strong> AWS Config provides continuous compliance monitoring. The s3-bucket-public-read-prohibited managed rule evaluates every S3 bucket whenever it changes. When a bucket is non-compliant (public access enabled), Config triggers an automatic remediation action — in this case, an SSM Automation document that calls the S3 API to disable public access. This is fully automated, event-driven, and requires no manual intervention. Macie detects sensitive data, not just public access — and doesn't auto-remediate. CloudTrail + Lambda can work but requires custom code. Daily Lambda misses violations between runs. Config + remediation = continuous automated compliance enforcement."},

{id:133,domain:"High-Performing Architectures",topic:"Migration",sub:"AWS MGN",
q:"A company wants to migrate 50 on-premises servers to AWS with minimal downtime. The servers run a mix of Windows and Linux, and the company cannot afford more than 15 minutes of downtime during cutover. They want to replicate live servers to AWS and do a final cutover during a maintenance window. What service should they use?",
o:["AWS Database Migration Service (DMS) — for server migrations","AWS Server Migration Service (SMS) — lift-and-shift server migration","AWS Application Migration Service (MGN) — continuous block-level replication of source servers to AWS; runs lightweight agent on source, creates a staging area in AWS, allows testing before cutover, then final cutover with ~15 minutes or less of downtime","AWS Snowball Edge — offline data transfer for server migrations"],
c:2,
e:"<strong>Correct: AWS Application Migration Service (MGN).</strong> MGN (formerly CloudEndure Migration) is AWS's recommended lift-and-shift migration service. Process: (1) Install lightweight AWS Replication Agent on source servers. (2) Agent continuously replicates block storage to AWS staging area (minimizes cutover downtime). (3) Launch test instances to validate migration. (4) Cutover: briefly stop source, perform final sync (~minutes), launch production instances. Typical cutover downtime: under 15 minutes. Supports any OS. SMS (deprecated in favor of MGN) used incremental AMI-based replication with longer cutover windows. DMS is for databases only. Snowball is for offline data transfer, not live server replication."},

{id:134,domain:"Resilient Architectures",topic:"Disaster Recovery",sub:"DR Strategies",
q:"A company's RPO requirement is 4 hours and RTO is 1 hour. Their workload is a 3-tier web application. They want to minimize cost while meeting these requirements. Which DR strategy should they implement?",
o:["Backup & Restore — back up to S3 every 4 hours, restore from scratch when needed (RTO = 4+ hours to rebuild — doesn't meet 1-hour RTO)","Pilot Light — run a minimal core (just the database with replication) in the DR region; pre-build AMIs for app/web tiers; when disaster strikes, scale up DR region in ~1 hour","Warm Standby — run a scaled-down but fully functional copy of the production environment in DR region; can scale up quickly but costs more than Pilot Light","Multi-Site Active/Active — full production capacity in both regions, instant failover, but highest cost"],
c:1,
e:"<strong>Correct: Pilot Light.</strong> Pilot Light keeps only the critical core running in DR (typically the database tier with active replication). App and web servers are not running — but AMIs and launch templates are pre-built so you can launch them quickly (typically within 1 hour). This meets RTO of 1 hour while minimizing cost (only DB is running, not full app stack). RPO of 4 hours is met by database replication lag. Backup & Restore: cheapest but RTO = hours (full rebuild) — doesn't meet 1-hour RTO. Warm Standby: faster RTO (~minutes) but costs more than Pilot Light. Active/Active: fastest (near-zero RTO/RPO) but highest cost. Pilot Light = sweet spot for 1-hour RTO at minimal cost."},

{id:135,domain:"Secure Architectures",topic:"Logging & Monitoring",sub:"CloudTrail",
q:"A security team discovers that someone deleted critical data from a DynamoDB table two days ago. They need to determine: which IAM user/role made the API call, what time it occurred, and from what IP address. Where is this information found?",
o:["Amazon CloudWatch Metrics — stores API call counts but not caller identity or IP","AWS Config — tracks configuration changes to AWS resources but not API call identity","AWS CloudTrail — logs every AWS API call with: caller identity (ARN, account), timestamp, source IP, request parameters, and response; stored in S3; searchable in CloudTrail Event History for 90 days, or in CloudWatch Logs if configured","VPC Flow Logs — log network traffic including DynamoDB API calls with source IP"],
c:2,
e:"<strong>Correct: AWS CloudTrail.</strong> CloudTrail records every AWS API call — including DynamoDB DeleteItem, BatchWriteItem, etc. Each CloudTrail record contains: eventTime, eventName (e.g., DeleteItem), userIdentity (IAM user ARN, role, or service), sourceIPAddress, requestParameters (table name, key), and responseElements. CloudTrail Event History in the console shows the last 90 days of management events. For data events (like DynamoDB item-level operations), you must explicitly enable data event logging in a trail. CloudWatch Metrics show aggregated counts — no identity. Config tracks table-level configuration (not item operations). VPC Flow Logs capture IP traffic metadata but not API call identity. CloudTrail is always the answer for 'who did what and when in AWS.'"},

{id:136,domain:"High-Performing Architectures",topic:"Compute",sub:"Elastic Beanstalk Deployments",
q:"A team deploys a new version to Elastic Beanstalk. They need zero downtime during deployment and the ability to instantly roll back if the new version has bugs. Which deployment policy meets both requirements, even though it requires double the instances momentarily?",
o:["Rolling — replaces instances in batches; a failed batch causes partial downtime","Rolling with additional batch — adds a batch of new instances first, then rolls; slightly increases capacity but doesn't provide an instant rollback environment","Immutable — launches an entirely new Auto Scaling group with the new version alongside the current one; if health checks pass, swap; if not, terminate new ASG instantly — zero downtime AND instant rollback by terminating the new fleet","All at once — fastest but causes full downtime"],
c:2,
e:"<strong>Correct: Immutable deployment.</strong> Immutable creates a brand-new Auto Scaling group with new instances running the new version — the old ASG keeps serving traffic throughout. Health checks run on new instances; if they pass, Beanstalk shifts traffic and terminates the old ASG. If health checks fail, just terminate the new ASG — old version never stopped serving. This gives true zero downtime AND instant rollback. Rolling replaces instances in the existing ASG in batches — a bad batch means some capacity runs the broken version. Blue/Green (separate environment swap via CNAME) is similar to immutable but at environment level. All-at-once is fastest but causes a full outage."},

{id:137,domain:"High-Performing Architectures",topic:"Compute",sub:"Elastic Beanstalk vs CloudFormation",
q:"A developer wants to deploy a web application to AWS without manually configuring EC2, Auto Scaling, RDS, or load balancers. They want to simply upload their code and have AWS handle the infrastructure. They also need the ability to SSH into instances for debugging. Which service fits?",
o:["AWS Lambda — upload code directly; no servers to manage","AWS CloudFormation — define infrastructure as YAML/JSON templates","AWS Elastic Beanstalk — PaaS that automatically handles EC2, Auto Scaling Groups, ELB, RDS provisioning, and health monitoring; developer just uploads application code; still provides full access to underlying EC2 instances","AWS App Runner — fully managed container service with no infrastructure access"],
c:2,
e:"<strong>Correct: AWS Elastic Beanstalk.</strong> Beanstalk is a PaaS (Platform as a Service) that automates infrastructure provisioning. You upload your code (ZIP, WAR, Docker image) and Beanstalk provisions EC2, ALB, Auto Scaling, RDS, CloudWatch, and S3 for you. Unlike Lambda (no server access) or App Runner (managed containers), Beanstalk gives you full access to the underlying EC2 instances — you can SSH in. You can also override any configuration. CloudFormation is IaC for defining infrastructure — it requires you to design and specify the architecture yourself. Beanstalk is for developers who want infrastructure automation but still want control when needed."},

{id:138,domain:"Resilient Architectures",topic:"Application Integration",sub:"Step Functions",
q:"A data pipeline requires: (1) call a Lambda to validate input, (2) if valid, run a Glue ETL job (which takes 20 minutes), (3) after Glue completes, call another Lambda to notify downstream systems. The whole workflow must be auditable and handle failures with retry logic. What should orchestrate this?",
o:["SQS queues between each step — each Lambda polls the next queue","A single Lambda function that calls Glue synchronously and waits 20 minutes","AWS Step Functions Standard Workflow — visual state machine that coordinates Lambda, Glue, and other services with built-in retry/catch, wait states (can pause for hours/days waiting for Glue), and full execution history for audit","Amazon EventBridge pipes to chain the steps sequentially"],
c:2,
e:"<strong>Correct: AWS Step Functions Standard Workflow.</strong> Step Functions is purpose-built for multi-step workflow orchestration. Key capabilities: (1) Wait states — pause execution for minutes/hours/days waiting for async jobs like Glue (no Lambda timeout concern). (2) Retry and Catch — built-in error handling with exponential backoff per state. (3) Execution history — every state transition is logged for full audit trail. (4) Visual workflow — see the state machine graph and execution path. Standard Workflows: for long-running (up to 1 year), auditable workflows. Express Workflows: for high-volume, short-duration (up to 5 minutes). A Lambda waiting 20 minutes would time out. SQS chains are hard to audit and manage. EventBridge pipes are for simple event routing, not complex multi-step orchestration."},

{id:139,domain:"High-Performing Architectures",topic:"API Gateway",sub:"REST vs HTTP vs WebSocket",
q:"A team is building a new serverless API backed by Lambda. They need request/response transformation, usage plans with API keys, and per-client throttling. They do NOT need WebSocket support. Which API Gateway type should they use?",
o:["HTTP API — cheapest, lowest latency, but lacks usage plans, API keys, and request/response transformation","REST API — full-featured: supports usage plans, API keys, per-method throttling, request/response mapping templates, WAF integration, caching","WebSocket API — bidirectional persistent connections for real-time apps","GraphQL API via AppSync — better for complex data fetching"],
c:1,
e:"<strong>Correct: REST API.</strong> API Gateway REST API is the full-featured option. It uniquely supports: usage plans (throttle clients, set quotas), API keys (identify callers, enforce usage plans), request/response mapping templates (transform request/response body using VTL), method-level throttling, edge-optimized endpoints, API caching, and direct WAF WebACL integration. HTTP APIs: ~70% cheaper and lower latency than REST APIs but MISSING: usage plans, API keys, request/response transformation, edge optimization. Use HTTP APIs for simple proxy to Lambda/HTTP endpoints where you don't need those features. WebSocket APIs: for persistent bidirectional connections. REST API is the answer whenever you see 'usage plans,' 'API keys,' or 'request transformation.'"},

{id:140,domain:"High-Performing Architectures",topic:"Networking",sub:"Global Accelerator",
q:"A company has an ALB in us-east-1 serving a global user base. Users in Asia and Europe report high latency and packet loss. The company wants to route user traffic over the AWS global network backbone (rather than the public internet) from the nearest AWS edge location to the application. What should they deploy?",
o:["Amazon CloudFront with the ALB as origin — caches content at edge locations","Route 53 latency-based routing — routes DNS to the nearest region","AWS Global Accelerator — provides two static anycast IP addresses; user traffic enters the AWS global network at the nearest edge location (PoP) and travels over AWS backbone to the ALB; reduces internet hops and improves latency and availability","Deploy additional ALBs in Asia and Europe regions"],
c:2,
e:"<strong>Correct: AWS Global Accelerator.</strong> Global Accelerator gives you two static anycast IP addresses that route traffic to the nearest AWS edge location (Point of Presence). From there, traffic travels over the private AWS global backbone — not the public internet — to your endpoint (ALB, NLB, EC2, or Elastic IP). Benefits: lower latency (fewer hops), better packet loss (private backbone), instant failover (Global Accelerator detects unhealthy endpoints in seconds), and static IPs (no DNS TTL delays). CloudFront also uses edge locations but is for content delivery/caching — it terminates the connection at the edge and serves cached content. Global Accelerator does NOT cache — it accelerates all traffic (TCP/UDP) to your application backend. Key distinction: CloudFront = caching CDN; Global Accelerator = network acceleration to your backend."},

{id:141,domain:"High-Performing Architectures",topic:"Storage",sub:"Storage Gateway",
q:"A company has on-premises applications that write files to a local NFS mount. They want these files backed up to S3 automatically while still allowing on-premises apps to access frequently used files with low latency via a local cache. What is the correct Storage Gateway configuration?",
o:["AWS Storage Gateway — Volume Gateway (stored mode)","AWS Storage Gateway — Volume Gateway (cached mode)","AWS Storage Gateway — File Gateway","AWS Storage Gateway — Tape Gateway"],
c:2,
e:"<strong>Correct: File Gateway.</strong> File Gateway creates an NFS or SMB file share backed by S3. On-premises applications write to the NFS share exactly as before — File Gateway transparently stores objects in S3. A local cache stores recently accessed files for low-latency reads. Volume Gateway (Cached): presents iSCSI block volumes (not NFS), primary data in S3 with cache on-premises. Volume Gateway (Stored): iSCSI volumes stored on-premises, asynchronous backups to S3. Tape Gateway: virtual tape library for backup applications (no file share). The key differentiators: NFS/SMB file access → File Gateway. iSCSI block access → Volume Gateway. Backup tapes → Tape Gateway."},

{id:142,domain:"Cost-Optimized Architectures",topic:"Storage",sub:"Snow Family",
q:"A company needs to migrate 8 PB of data from their on-premises data center to S3. Their internet connection is 1 Gbps. At this speed, transferring 8 PB would take approximately 740 days. They need the migration done in under 6 months. What is the correct approach?",
o:["Use AWS DataSync with multiple parallel streams to saturate the 1 Gbps link — theoretical transfer time is faster than 740 days","Order multiple AWS Snowball Edge Storage Optimized devices — each holds 80 TB usable; load data locally and ship to AWS; AWS loads into S3","Order AWS Snowmobile — an exabyte-scale data transfer service using a 45-foot ruggedized shipping container truck; handles petabyte-to-exabyte scale migrations","Upgrade the internet connection to 10 Gbps for 74 days of transfer"],
c:1,
e:"<strong>Correct: AWS Snowball Edge Storage Optimized (multiple devices).</strong> For 8 PB: order ~100 Snowball Edge devices (80 TB usable each). Load data, ship back to AWS. AWS ingests into S3 within weeks. Snowball Edge can also run EC2 and Lambda locally for edge computing during data collection. Snowmobile (the truck) is for 10 PB+ — it's viable at 8 PB but Snowball Edge devices are typically used unless the data is in one location and the scale justifies Snowmobile logistics. DataSync at 1 Gbps: theoretical max ~10 TB/day = 800+ days for 8 PB — not within 6 months. Rule of thumb: if transfer would take more than a week over your network, use Snowball. 8 PB at 1 Gbps = ~740 days → Snowball is the clear answer."},

{id:143,domain:"High-Performing Architectures",topic:"Databases",sub:"DynamoDB Streams",
q:"An e-commerce application uses DynamoDB for orders. When an order item is inserted or modified, a downstream inventory service must be notified within seconds to update stock counts. The notification must include both the old item values and new item values. What is the correct approach?",
o:["Poll the DynamoDB table with a Lambda function every 30 seconds for changes","Enable DynamoDB Streams with StreamViewType=NEW_AND_OLD_IMAGES; configure a Lambda event source mapping on the stream; Lambda is triggered automatically for each change with old and new item data","Use S3 event notifications when DynamoDB exports to S3","Enable DynamoDB Streams and poll from EC2 with the Kinesis Client Library"],
c:1,
e:"<strong>Correct: DynamoDB Streams + Lambda.</strong> DynamoDB Streams captures a time-ordered sequence of item-level changes. StreamViewType options: KEYS_ONLY (just the key), NEW_IMAGE (new item only), OLD_IMAGE (old item only), NEW_AND_OLD_IMAGES (both — required here to know what changed). Lambda event source mapping: Lambda polls the stream automatically (no polling code needed) and is invoked with batches of change records within seconds. This is the canonical CDC (Change Data Capture) pattern for DynamoDB. Polling every 30 seconds introduces unnecessary latency and cost. S3 export is batch-oriented (hourly), not real-time. KCL polling from EC2 works but adds operational overhead vs Lambda event source mapping."},

{id:144,domain:"High-Performing Architectures",topic:"Databases",sub:"DynamoDB Global Tables",
q:"A gaming company has players globally (US, Europe, Asia). They use DynamoDB and need all players to have low-latency reads AND writes from their nearest region, with data automatically replicated across all regions. What DynamoDB feature enables this?",
o:["DynamoDB Read Replicas — create read replicas in other regions for low-latency reads; writes still go to the primary region","Cross-Region Replication with DynamoDB Streams and Lambda — manually replicate changes","DynamoDB Global Tables — multi-master, multi-region replication; each region has a full copy; reads and writes are served locally in each region with automatic conflict resolution (last-writer-wins)","DynamoDB Accelerator (DAX) in each region for in-memory caching"],
c:2,
e:"<strong>Correct: DynamoDB Global Tables.</strong> Global Tables is DynamoDB's built-in multi-master replication. Each participating region has a full replica. Applications write locally (sub-millisecond latency to regional DynamoDB). Replication between regions is automatic (typically under 1 second). Conflict resolution: last-writer-wins based on timestamp. This is fully managed — no Streams + Lambda replication code needed. DynamoDB doesn't have Read Replicas in the traditional sense — Global Tables provides both read and write locality. DAX is an in-memory cache in front of DynamoDB, not a replication feature. If the question mentions 'global low-latency writes' + DynamoDB → Global Tables."},

{id:145,domain:"High-Performing Architectures",topic:"Databases",sub:"DynamoDB DAX",
q:"A DynamoDB table serves a leaderboard API that receives 500,000 read requests per second during peak gaming events. The same top-10 leaderboard data is being read by millions of users simultaneously. Read latency is currently 2-5 ms but the team wants sub-millisecond. What should they add?",
o:["Increase DynamoDB Read Capacity Units (RCUs) to handle 500K reads/second","Enable DynamoDB Streams to pre-compute the leaderboard","Add Amazon DAX (DynamoDB Accelerator) cluster — in-memory write-through cache for DynamoDB; microsecond read latency for cached items; compatible with DynamoDB API; no application code changes beyond pointing to DAX endpoint","Use ElastiCache Redis with a DynamoDB read-through Lambda"],
c:2,
e:"<strong>Correct: Amazon DAX (DynamoDB Accelerator).</strong> DAX is an in-memory cache specifically built for DynamoDB. It sits in front of DynamoDB and serves cached reads in microseconds (vs milliseconds for DynamoDB). For a leaderboard read by millions of users, DAX dramatically reduces DynamoDB read load (and therefore cost). Compatibility: DAX uses the same API as DynamoDB — minimal code changes (just change the endpoint URL). Write-through: writes go through DAX to DynamoDB, keeping the cache consistent. Limitations: only for DynamoDB (not other databases), item cache + query cache. ElastiCache + Lambda would work but requires more custom code and a separate cache invalidation strategy. DAX is the purpose-built answer for DynamoDB sub-millisecond read performance."},

{id:146,domain:"Secure Architectures",topic:"Networking",sub:"VPC Endpoints",
q:"A Lambda function in a private VPC needs to call the S3 API to read objects. You want the traffic to stay within the AWS network and NOT traverse the internet. The solution must not require a NAT Gateway (to save cost). What should you create?",
o:["Attach an Elastic IP to the Lambda function and use a public S3 endpoint","Create a NAT Gateway in a public subnet — Lambda routes through NAT to reach S3","Create a VPC Gateway Endpoint for S3 — free to create; adds S3 as a route in the VPC route table; traffic from Lambda to S3 stays on the AWS private network without a NAT Gateway","Create a VPC Interface Endpoint for S3 — uses PrivateLink, billed per hour and per GB"],
c:2,
e:"<strong>Correct: VPC Gateway Endpoint for S3.</strong> Gateway Endpoints are free and support only S3 and DynamoDB. They work by adding entries to the VPC route table — traffic to S3 from within the VPC is automatically routed through the endpoint over AWS's private network. No NAT Gateway, no internet exposure, no cost. Interface Endpoints (PrivateLink): create an ENI in your subnet with a private IP; support 90+ AWS services; billed ~$0.01/hour + $0.01/GB — not free. Lambda in a VPC cannot have Elastic IPs. NAT Gateway routes to the public S3 endpoint (internet-bound) and costs ~$0.045/hour + $0.045/GB processed. For S3 and DynamoDB: Gateway Endpoint = free, private. For other services: Interface Endpoint = private but costs money."},

{id:147,domain:"Secure Architectures",topic:"Networking",sub:"VPC Interface Endpoints",
q:"A company runs EC2 instances in a private subnet with no internet access. The instances need to call the Systems Manager API (for Session Manager and Patch Manager) without internet access or NAT Gateway. What must they create?",
o:["A VPC Gateway Endpoint for Systems Manager — free, like the S3 Gateway Endpoint","Internet Gateway in the private subnet — EC2 instances need public IPs","VPC Interface Endpoints (PrivateLink) for com.amazonaws.[region].ssm, com.amazonaws.[region].ssmmessages, and com.amazonaws.[region].ec2messages — these ENIs in the subnet allow private connectivity to the SSM service","A NAT Gateway — SSM requires internet connectivity"],
c:2,
e:"<strong>Correct: VPC Interface Endpoints for SSM.</strong> Systems Manager (and most AWS services outside S3/DynamoDB) use Interface Endpoints (AWS PrivateLink). You create an ENI in your private subnet; the EC2 instances DNS-resolve the SSM endpoint to this private IP and communicate without internet. For full SSM functionality in a private subnet, you need THREE interface endpoints: (1) com.amazonaws.REGION.ssm (core API), (2) com.amazonaws.REGION.ssmmessages (Session Manager), (3) com.amazonaws.REGION.ec2messages (Run Command). Gateway Endpoints only support S3 and DynamoDB — SSM is not supported. NAT Gateway works but is more expensive and routes through internet. Interface Endpoints = the right pattern for private subnet → AWS service API calls."},

{id:148,domain:"Resilient Architectures",topic:"Infrastructure as Code",sub:"CloudFormation StackSets",
q:"A company uses AWS Organizations and wants to deploy the same CloudFormation stack (VPC configuration, security groups, CloudTrail, Config rules) to all 50 accounts across 6 OUs automatically — including any new accounts that join the organization in the future. What is the correct approach?",
o:["Manually deploy the CloudFormation stack in each account — run a script","Use CloudFormation Nested Stacks to reference child stacks from a parent stack in the management account","Use CloudFormation StackSets with service-managed permissions and automatic deployment enabled — StackSets deploys the stack to all target accounts/OUs simultaneously; automatic deployment ensures new accounts in the OU get the stack automatically","Create a Lambda function triggered by Organizations events to deploy stacks in new accounts"],
c:2,
e:"<strong>Correct: CloudFormation StackSets with service-managed permissions.</strong> StackSets extends CloudFormation to deploy a single template across multiple accounts and regions simultaneously. Service-managed permissions (vs self-managed) uses Organizations to automatically assume the right role in each member account — no manual role creation. Automatic deployment: when enabled, any new account added to a targeted OU automatically gets the stack deployed (and removed on account removal). This is the canonical answer for 'deploy to all Organization accounts' or 'enforce a baseline config across all accounts.' Nested Stacks: decompose a large stack into modules within one account, not multi-account. Manual/Lambda approaches don't scale and aren't idempotent."},

{id:149,domain:"Resilient Architectures",topic:"Infrastructure as Code",sub:"CloudFormation Change Sets",
q:"A team needs to update a production CloudFormation stack that includes an RDS database. Before executing the update, they want to preview exactly what resources will be added, modified, or deleted — especially whether the RDS instance will be replaced (which would cause data loss). What CloudFormation feature lets them do this?",
o:["Deploy to a staging environment first and compare","Use CloudFormation Drift Detection — it identifies differences between the current stack and the template","Create a CloudFormation Change Set — it shows a preview of proposed changes (resource additions, modifications, replacements, deletions) without executing them; the team reviews and then chooses to execute or discard","Use the CloudFormation --dry-run flag to preview changes"],
c:2,
e:"<strong>Correct: CloudFormation Change Sets.</strong> A Change Set is a preview of changes that WOULD occur if you updated the stack with a new template or parameter values. It shows each resource and the action: Add, Modify (with Replacement: True/False/Conditional), or Remove. Critically, Replacement: True for an RDS instance means the old instance will be deleted and a new one created — data loss risk unless you have a snapshot. The team reviews the Change Set before deciding to execute. Drift Detection: identifies differences between the CURRENT live stack and its LAST DEPLOYED template (e.g., someone manually changed a security group). It's for detecting unauthorized changes, not previewing future updates. There is no `--dry-run` flag. Change Set = preview before executing a stack update."},

{id:150,domain:"Secure Architectures",topic:"IAM",sub:"IAM Access Analyzer",
q:"A security team wants to identify all S3 buckets, IAM roles, KMS keys, Lambda functions, and SQS queues in their account that are accessible by external AWS accounts or public principals (not just their own account). They want continuous monitoring, not a one-time scan. What should they use?",
o:["Manually review each resource policy for external principals quarterly","AWS Trusted Advisor — checks for publicly accessible S3 buckets only","Amazon Inspector — scans for software vulnerabilities and unintended network exposure","IAM Access Analyzer — continuously monitors resource policies (S3, IAM roles, KMS, Lambda, SQS, Secrets Manager) and generates findings for any resource shared with external principals or made public; findings appear in real-time as policies change"],
c:3,
e:"<strong>Correct: IAM Access Analyzer.</strong> Access Analyzer uses automated reasoning (provable security) to analyze resource-based policies and identify resources that are shared outside the account or organization. Supported resource types: S3 buckets, IAM roles (cross-account trust), KMS keys, Lambda functions/layers, SQS queues, Secrets Manager secrets. It's continuous — as soon as a policy changes to allow external access, a finding is generated. You can set the zone of trust to the account or the Organization. Trusted Advisor only checks S3 and a few other services, not comprehensively. Inspector focuses on workload vulnerabilities, not resource-based policy analysis. Quarterly manual reviews miss changes in between."},

{id:151,domain:"High-Performing Architectures",topic:"Analytics",sub:"Kinesis Data Streams vs Firehose",
q:"A company streams IoT sensor data at 50,000 records/second. Use case A needs multiple independent consumers (analytics app, ML pipeline, alerting system) each processing the full stream at their own pace, with data retained for 7 days for replay. Use case B just needs to load the raw data into S3 for long-term storage with no custom processing. Which services fit each use case?",
o:["Use Kinesis Data Firehose for both — it supports multiple consumers and replay","Use Kinesis Data Streams for both — it can deliver to S3 directly","Use case A: Kinesis Data Streams — supports multiple independent consumers (Enhanced Fan-Out), configurable retention (1–365 days), replay; Use case B: Kinesis Data Firehose — fully managed, zero administration, buffers and delivers to S3/Redshift/OpenSearch automatically with no consumer code","Use SQS for A (multiple consumers) and S3 directly for B"],
c:2,
e:"<strong>Correct: Streams for A, Firehose for B.</strong> Kinesis Data Streams: (A) Supports multiple consumers simultaneously via shared throughput or Enhanced Fan-Out (dedicated 2 MB/s per consumer per shard). Configurable retention: 24h default, up to 365 days. Consumers read at their own pace and can replay. You write consumer applications (KCL, Lambda). Kinesis Data Firehose: (B) Fully managed delivery pipeline — receives data and buffers/delivers to S3, Redshift, OpenSearch, Splunk, HTTP. No consumer code. Near-real-time (60-second buffer). No replay, no multiple consumers, no custom processing beyond optional Lambda transform. Firehose CAN receive from a Kinesis Data Stream as its source. SQS: each message is consumed once (not fan-out for full stream)."},

{id:152,domain:"High-Performing Architectures",topic:"Analytics",sub:"Redshift",
q:"A company runs complex analytical SQL queries on 500 TB of historical sales data. Query results that were returned in seconds 6 months ago now take 10 minutes because the data has grown. A DBA notices most slow queries full-scan large tables and filter on the sale_date column. What is the most effective Redshift optimization?",
o:["Upgrade to a larger Redshift node type to add more CPU","Add a sort key on sale_date — Redshift uses zone maps to skip blocks of data outside the query's date range, dramatically reducing I/O","Enable Redshift Spectrum to offload queries to S3","Add more Redshift nodes to the cluster"],
c:1,
e:"<strong>Correct: Sort key on sale_date.</strong> Redshift stores data in 1 MB blocks. Sort keys physically order rows within a table. Zone maps track the min/max values of sort key columns per block. When a query filters WHERE sale_date BETWEEN '2024-01-01' AND '2024-03-31', Redshift uses zone maps to skip blocks entirely — this is called block elimination or zone map pruning. For time-series data filtered by date, a sort key on date is the single most impactful optimization. Additionally, consider a distribution key on the column used in JOINs to co-locate joined rows. Adding nodes/upgrading helps parallel processing but doesn't eliminate the full-scan problem. Spectrum offloads to S3 but doesn't help in-cluster query performance."},

{id:153,domain:"Resilient Architectures",topic:"Compute",sub:"EC2 Placement Groups",
q:"A financial trading application requires the LOWEST possible network latency between 8 EC2 instances that must communicate with each other for a distributed in-memory calculation. They need single-digit microsecond latency and are willing to accept the risk that all instances could fail if the underlying hardware fails. Which placement group is correct?",
o:["Spread placement group — places each instance on separate hardware to maximize availability","Partition placement group — divides instances into logical partitions on separate hardware racks","Cluster placement group — packs instances close together within a single AZ, on the same high-bandwidth, low-latency physical network; enables enhanced networking with up to 100 Gbps throughput between instances","No placement group — default placement is optimized for latency"],
c:2,
e:"<strong>Correct: Cluster placement group.</strong> Cluster placement groups colocate instances in a single AZ on the same underlying high-bisection-bandwidth network. This enables: lowest possible network latency (microseconds), highest throughput (up to 100 Gbps with ENA or EFA), best for tightly coupled HPC and distributed in-memory workloads. Tradeoff: if the underlying hardware fails, all instances in the cluster group may fail together (single failure domain). Spread placement groups: each instance on separate rack (max 7 instances per AZ per group) — optimizes for availability, not latency. Partition placement groups: groups of instances on separate racks (up to 7 partitions per AZ) — for large distributed workloads like Kafka/Hadoop where rack failure isolation matters but full spread isn't needed."},

{id:154,domain:"Secure Architectures",topic:"Compute",sub:"EC2 Instance Connect vs SSM Session Manager",
q:"A company wants to allow engineers to connect to EC2 instances for troubleshooting WITHOUT managing SSH keys, opening inbound port 22 in security groups, or requiring a bastion host. Connections must be auditable (logged). What is the correct solution?",
o:["Distribute SSH key pairs to engineers via AWS Secrets Manager and open port 22 only from the office IP range","Use EC2 Instance Connect with port 22 open — it generates temporary SSH keys but still requires port 22 inbound","AWS Systems Manager Session Manager — browser-based or CLI shell access to EC2 instances; requires SSM Agent (pre-installed on Amazon Linux 2/Windows); no inbound ports, no SSH keys, all session activity logged to CloudWatch Logs and S3","Create a bastion host in a public subnet and forward SSH from there"],
c:2,
e:"<strong>Correct: AWS Systems Manager Session Manager.</strong> Session Manager provides interactive shell access to EC2 instances with ZERO inbound security group rules — communication goes outbound from the instance to the SSM endpoint via HTTPS (port 443). No SSH keys, no bastion host. All session activity (keystrokes, output) can be logged to CloudWatch Logs and S3 for full audit. Requirements: SSM Agent installed and running on the instance (pre-installed on Amazon Linux 2, Amazon Linux 2023, Windows Server 2016+), and the EC2 instance profile must have the AmazonSSMManagedInstanceCore policy. EC2 Instance Connect: still requires port 22 open inbound and SSH daemon running. Bastion host: operational overhead and still requires SSH. Session Manager = no ports, no keys, full audit."},

{id:155,domain:"Cost-Optimized Architectures",topic:"EC2 Pricing",sub:"Spot Instances",
q:"A genomics company runs large-scale batch analysis jobs that take 4–6 hours each. Jobs can be interrupted and resumed from a checkpoint. They want maximum cost savings (up to 90% off On-Demand) and can tolerate occasional interruptions. What EC2 purchasing model should they use?",
o:["On-Demand Instances","Reserved Instances (1-year term)","Spot Instances","Dedicated Hosts"],
c:2,
e:"<strong>Correct: Spot Instances.</strong> Spot Instances use unused EC2 capacity at discounts of 70–90% below On-Demand. They can be reclaimed by AWS with a 2-minute notification (Spot interruption). Ideal workloads: batch processing, HPC, genomics, rendering, CI/CD — anything that can checkpoint and resume, or retry from the beginning. Best practices: use Spot Fleets or EC2 Auto Scaling Spot groups with multiple instance types and AZs to minimize interruption probability. Save Spot interruption notices via EventBridge for graceful checkpoint. Reserved Instances: for 24/7 baseline workloads, not bursty batch. Dedicated Hosts: for per-socket/per-core licensing or compliance. The key phrase 'up to 90% savings' + 'fault-tolerant' + 'can be interrupted' = Spot Instances."},

{id:156,domain:"Resilient Architectures",topic:"Networking",sub:"NAT Gateway vs NAT Instance",
q:"Private subnet EC2 instances need outbound internet access (e.g., to download OS patches) but should not accept inbound connections. The team wants a managed, highly available solution that doesn't require patching or management. What should they deploy?",
o:["Deploy a NAT Instance (self-managed EC2) in the public subnet","Attach an Internet Gateway directly to the private subnet","Deploy a NAT Gateway in the public subnet and update private subnet route tables","Deploy an Egress-Only Internet Gateway"],
c:2,
e:"<strong>Correct: NAT Gateway.</strong> A NAT Gateway provides outbound internet access for instances in private subnets while blocking inbound connections. It's fully managed by AWS: no OS to patch, automatically scales up to 45 Gbps, highly available within a single AZ. For multi-AZ high availability, create one NAT Gateway per AZ and route each AZ's private subnets to their local NAT Gateway (avoids cross-AZ traffic charges). NAT Instance: a self-managed EC2 instance; you must patch it, configure HA manually, and disable source/destination check — legacy, not recommended for new architectures. Internet Gateway on a private subnet: instances would need public IPs, which private subnet instances don't have. Egress-Only IGW: for IPv6 outbound only, not IPv4."},

{id:157,domain:"High-Performing Architectures",topic:"Databases",sub:"RDS Proxy",
q:"A serverless application uses Lambda functions that each open a new database connection to RDS MySQL. During peak traffic, 5,000 Lambda functions run concurrently, each holding an RDS connection. The database hits its connection limit and begins rejecting connections. What is the best solution?",
o:["Increase the RDS instance size to support more connections — larger instances allow more connections","Implement connection pooling in each Lambda function with persistent connections","Deploy RDS Proxy between Lambda and RDS — RDS Proxy maintains a pool of persistent database connections and multiplexes Lambda connections through the pool; Lambda functions connect to Proxy (low overhead) rather than directly to RDS","Use DynamoDB instead of RDS — it handles unlimited concurrent connections"],
c:2,
e:"<strong>Correct: RDS Proxy.</strong> RDS Proxy is a fully managed database proxy that sits between your application and RDS/Aurora. It maintains a warm pool of connections to the database and multiplexes many application connections through fewer database connections. Perfect for Lambda: each Lambda invocation connects to RDS Proxy (fast, lightweight), and Proxy handles the actual database connection pooling. Benefits: reduces connection overhead on the database, enables graceful failover (Proxy maintains connections during RDS failover), and IAM authentication support. Without Proxy, 5,000 concurrent Lambda executions = 5,000 database connections. With Proxy, they share ~50–100 database connections. Increasing RDS size helps marginally but doesn't solve the fundamental connection exhaustion problem. Connection pooling in Lambda: doesn't work because Lambda execution environments are ephemeral and don't share state."},

{id:158,domain:"Secure Architectures",topic:"S3 Security",sub:"S3 Object Lock",
q:"A healthcare company must retain medical records in S3 for exactly 7 years and ensure that NO ONE — not even the account root user or AWS — can delete or overwrite the records during that period. After 7 years, records may be deleted. What S3 feature enforces this?",
o:["S3 Versioning with MFA Delete enabled — requires MFA for version deletion","S3 Lifecycle rules to transition to Glacier and expire after 7 years — prevents accidental deletion","S3 Object Lock in COMPLIANCE mode with a 7-year retention period — once set in Compliance mode, the retention period CANNOT be shortened by anyone, including root; objects cannot be overwritten or deleted until retention expires","S3 Object Lock in GOVERNANCE mode with a 7-year retention period — protects most users but privileged users can bypass"],
c:2,
e:"<strong>Correct: S3 Object Lock in COMPLIANCE mode.</strong> Object Lock implements WORM (Write Once Read Many) storage. Two modes: GOVERNANCE mode: most users are blocked from deletion/modification; users with s3:BypassGovernanceRetention permission CAN bypass — suitable for internal controls. COMPLIANCE mode: NO user (including root, AWS Support) can shorten the retention period or delete objects before expiry — suitable for regulatory mandates (SEC 17a-4, HIPAA). For a healthcare mandate where 'no one can delete,' Compliance mode is required. MFA Delete prevents casual deletion but doesn't provide immutability against a determined root user. Lifecycle rules can be deleted. S3 Object Lock Compliance mode = true regulatory-grade immutability."},

{id:159,domain:"High-Performing Architectures",topic:"Compute",sub:"Lambda Destinations",
q:"A Lambda function processes payment events asynchronously (invoked by SNS). On success, the result should be sent to an SQS queue for downstream processing. On failure (after all retries), the event must be sent to a different SQS Dead Letter Queue for investigation. What is the cleanest way to configure this?",
o:["Add try/catch in Lambda code — on success publish to SQS, on failure publish to DLQ manually","Configure Lambda Dead Letter Queue for failures only — no built-in success routing","Configure Lambda Destinations: set an On Success destination (SQS queue) and an On Failure destination (DLQ); Lambda automatically routes invocation results to the appropriate destination without code changes","Use SNS message filtering to route success and failure events to different queues"],
c:2,
e:"<strong>Correct: Lambda Destinations.</strong> Lambda Destinations (for async invocations) automatically route the result of a function invocation to a target: On Success: sends the invocation record + response to an SQS queue, SNS topic, EventBridge, or another Lambda. On Failure: sends the failed invocation record (with error details + original event) to an SQS queue, SNS topic, EventBridge, or another Lambda — after all retry attempts are exhausted. Destinations are configured without code changes. Dead Letter Queue (DLQ): older feature, only handles failures (equivalent to On Failure destination), only supports SQS or SNS. Destinations are the modern, more flexible replacement with both success and failure routing. Manual code: fragile and adds complexity."},

{id:160,domain:"Cost-Optimized Architectures",topic:"Databases",sub:"DynamoDB On-Demand vs Provisioned",
q:"A startup launches a new mobile app. Traffic is completely unpredictable during the first few months — spikes could occur at any time (viral moments) with no warning. They want to avoid capacity planning, pay only for what they use, and never throttle requests. Which DynamoDB capacity mode should they choose initially?",
o:["Provisioned capacity with Auto Scaling — set min/max RCUs/WCUs and let Auto Scaling adjust","Provisioned capacity at the maximum expected peak — avoids throttling but pays for idle capacity 24/7","On-Demand capacity mode — DynamoDB instantly accommodates any amount of traffic; no capacity planning; pay per request (read request units + write request units); slightly higher per-request cost than provisioned but zero risk of throttling","Reserved capacity for DynamoDB — lowest cost per RCU/WCU but requires 1-year commitment"],
c:2,
e:"<strong>Correct: DynamoDB On-Demand mode.</strong> On-Demand instantly scales to any traffic level with zero configuration — no provisioned RCUs/WCUs to set. Pay per request: ~$1.25 per million write request units, ~$0.25 per million read request units. Perfect for unpredictable traffic, new applications, and spiky workloads where you can't forecast demand. Tradeoff: ~6–7× more expensive per request than appropriately-sized provisioned capacity. Once traffic patterns are predictable (typically 3–6 months in), switch to Provisioned + Auto Scaling for 70–80% cost reduction. Provisioned + Auto Scaling: requires 5–15 minutes to scale out — may throttle during sudden spikes. Maximum provisioned: wastes money on idle capacity. Reserved: for long-term, stable, predictable workloads."},

{id:161,domain:"Resilient Architectures",topic:"Compute",sub:"Auto Scaling — Termination Policy",
q:"An Auto Scaling group is scaling in (removing instances). The group spans 3 AZs with an uneven number of instances: AZ-1 has 4, AZ-2 has 3, AZ-3 has 3. The default termination policy is in effect. Which instance is terminated first?",
o:["The oldest instance across all AZs — regardless of AZ balance","A random instance across all AZs","First, Auto Scaling selects the AZ with the most instances (AZ-1 with 4); within that AZ, it terminates the instance with the oldest launch template/configuration — this rebalances AZs and phases out old configurations","The newest instance — to preserve long-running instances with warm caches"],
c:2,
